const TIER={'documented':'DOCUMENTED','alleged-credible':'ALLEGED','denied':'DENIED'};
const AFRICA=['Horn / NE Africa','Sahel Core','Coastal Frontier','Central Africa','Southern Africa'];
const SUBS=['Horn / NE Africa','Sahel Core','Coastal Frontier','Central Africa','Caribbean','Southern Africa','South America','North America','Middle East','Europe','Caucasus','South Asia','Central Asia','East Asia','Southeast Asia','Global'];
const WEEKS=['W5','W6','W7','W8','W9','W10','W11','W12','W16','W17'];
let flt='all',sel=null,q='',subFlt='all';

function color(d){return CCLR[d.cat]||SEV[d.sev]||'#888';}
function grp(a,k){return a.reduce((m,i)=>((m[i[k]]=m[i[k]]||[]).push(i),m),{});}
function dlt(d){const h=d.esc_history,nz=h.filter(v=>v>0);if(nz.length<2)return 0;return h[h.length-1]-h[h.length-2];}
function dstr(x){return x>0?'+'+x:x<0?''+x:'0';}
function dcls(x){return x>0?'d-up':x<0?'d-dn':'d-fl';}

function matchWhere(d){
  // returns array of match locations, or [] if no match
  if(!q) return ['all'];
  const s=q.toLowerCase(); const hits=[];
  if([d.name,d.sub,d.region,d.subregion,d.domain,d.note,d.mil,d.pol,d.eco,d.assess].join(' ').toLowerCase().includes(s)) hits.push('theater');
  if((d.gov||[]).some(g=>(g.src+' '+g.detail).toLowerCase().includes(s))) hits.push('gov');
  if((d.leverage||[]).some(l=>(l.actor+' '+l.asset).toLowerCase().includes(s))) hits.push('leverage');
  if((d.econlev||[]).some(e=>(e.holder+' '+e.channel+' '+e.detail).toLowerCase().includes(s))) hits.push('econ');
  if((d.external||[]).some(x=>(x.actor+' '+x.side+' '+x.flow+' '+x.for).toLowerCase().includes(s))) hits.push('external');
  // systems: does this theater appear as a node in a matching system, or does a system match by name?
  (typeof SYSTEMS!=='undefined'?SYSTEMS:[]).forEach(sys=>{
    const sysText=(sys.name+' '+sys.type+' '+sys.summary+' '+sys.significance).toLowerCase();
    const nodeHit=(sys.nodes||[]).some(n=>n.theater===d.id && sysText.includes(s));
    const nameHit=(sys.nodes||[]).some(n=>n.theater===d.id) && sysText.includes(s);
    if(nodeHit||nameHit) hits.push('system');
  });
  (typeof INVEST!=='undefined'?INVEST:[]).forEach(inv=>{
    const invText=(inv.commodity+' '+inv.use+' '+inv.chokehold+' '+inv.signal+' '+inv.vectors).toLowerCase();
    if((inv.theaters||[]).includes(d.id) && invText.includes(s)) hits.push('investment');
  });
  (typeof GROUPS!=='undefined'?GROUPS:[]).forEach(g=>{
    const gText=(g.name+' '+g.full+' '+g.affil+' '+g.military+' '+g.logistics+' '+g.economy+' '+g.note).toLowerCase();
    if((g.theaters||[]).includes(d.id) && gText.includes(s)) hits.push('group');
  });
  (typeof BLOCS!=='undefined'?BLOCS:[]).forEach(b=>{
    const bText=(b.name+' '+b.arena+' '+b.members+' '+b.contest+' '+b.fault).toLowerCase();
    if((b.theaters||[]).includes(d.id) && bText.includes(s)) hits.push('bloc');
  });
  return hits;
}
function matches(d){ return matchWhere(d).length>0; }
function fdb(){
  let d=DB.filter(matches);
  if(subFlt!=='all')d=d.filter(x=>x.subregion===subFlt);
  if(flt==='critical')return d.filter(x=>x.sev==='critical');
  if(flt==='escalating')return d.filter(x=>x.trend==='up');
  if(flt==='deescalating')return d.filter(x=>x.trend==='dn');
  if(flt==='africa')return d.filter(x=>AFRICA.includes(x.subregion));
  if(flt==='latam')return d.filter(x=>['South America','Caribbean','North America'].includes(x.subregion)&&x.id!=='us-politics');
  if(flt==='conflict')return d.filter(x=>x.tclass==='conflict');
  if(flt==='watch')return d.filter(x=>x.tclass==='watch');
  return d;
}
function spark(h,c){return `<div class="row-spark">${h.map((v,i)=>{const ht=Math.max(2,Math.round(v/100*18));const now=i===h.length-1;return `<div class="sbar" style="height:${ht}px;${now?'background:'+c:''}"></div>`;}).join('')}</div>`;}

function renderSubFilter(){
  const present=[...new Set(DB.map(d=>d.subregion))];
  document.getElementById('subFilter').innerHTML=SUBS.filter(s=>present.includes(s)).map(s=>
    `<button class="sub-chip${subFlt===s?' on':''}" onclick="setSub('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
}
function setSub(s){subFlt=(subFlt===s?'all':s);clearSel();renderSubFilter();renderList();}

function renderTicker(){
  const items=[...DB].sort((a,b)=>b.esc-a.esc).map(d=>{
    const dl=dlt(d);const arrow=dl>0?`<span class="up">▲${dl}</span>`:dl<0?`<span class="dn">▼${Math.abs(dl)}</span>`:'';
    return `${d.flag} <b>${d.name.split('—')[0].trim()}</b> ${d.esc} ${arrow}`;
  }).join('  ·  ');
  document.getElementById('ticker').innerHTML=items+'  ·  ';
}

function renderList(){
  const data=fdb();
  document.getElementById('sc').textContent=data.filter(x=>x.sev==='critical').length;
  document.getElementById('se').textContent=data.filter(x=>x.trend==='up').length;
  document.getElementById('sd').textContent=data.filter(x=>x.trend==='dn').length;
  document.getElementById('st').textContent=data.length;
  const wrap=document.getElementById('listWrap');
  if(!data.length){wrap.innerHTML='<div style="padding:30px;text-align:center;font-family:var(--FM);font-size:10px;color:var(--dim);letter-spacing:1px">NO MATCHES</div>';return;}
  const byCat=grp(data,'cat');
  wrap.innerHTML=CORDER.filter(c=>byCat[c]).map(cat=>{
    const items=byCat[cat].sort((a,b)=>b.esc-a.esc);
    const bySub=grp(items,'subregion');
    const subHtml=SUBS.filter(s=>bySub[s]).map(sub=>{
      const rows=bySub[sub].map(d=>{
        const dl=dlt(d),c=color(d);
        const tags=[];
        tags.push(d.tclass==='conflict'?'<span class="tag tag-conflict">⚔ CONFLICT</span>':'<span class="tag tag-watch">◎ WATCH</span>');
        if(q){const w=matchWhere(d).filter(x=>x!=='theater'&&x!=='all');if(w.length)tags.push('<span class="match-tag">↳ '+w.join(' · ')+'</span>');}
        if(d.gov&&d.gov.length)tags.push('<span class="tag tag-gov">GOV</span>');
        if(d.econlev&&d.econlev.length)tags.push('<span class="tag tag-econ">ECON</span>');
        if(d.external&&d.external.length)tags.push('<span class="tag tag-ext">EXT</span>');
        if(d.diplomacy_active)tags.push('<span class="tag tag-dip">DIPL</span>');
        return `<div class="row${d.id===sel?' active':''}" onclick="pick('${d.id}')">
          <div class="row-flag">${d.flag||'●'}</div>
          <div class="row-main">
            <div class="row-name">${d.name}</div>
            <div class="row-sub">${d.sub}</div>
            ${tags.length?`<div class="row-tags">${tags.join('')}</div>`:''}
          </div>
          <div class="row-right">
            <div class="row-idx" style="color:${c}">${d.esc}</div>
            <div class="row-delta ${dcls(dl)}">${dl>0?'▲':dl<0?'▼':'►'} ${dstr(dl)}</div>
            ${spark(d.esc_history,c)}
          </div>
        </div>`;
      }).join('');
      return `<div class="sub-head" onclick="event.stopPropagation()"><span class="sub-mark"></span><span class="sub-name">${sub}</span><span class="sub-count">${bySub[sub].length}</span></div>${rows}`;
    }).join('');
    return `<div class="cat-group">
      <div class="cat-head" onclick="this.parentElement.classList.toggle('closed')">
        <div class="cat-icon ci-${cat}">${CICON[cat]}</div>
        <div class="cat-name">${CNAME[cat]}</div>
        <div class="cat-count">${items.length}</div>
        <div class="cat-caret">▾</div>
      </div>
      <div class="cat-body">${subHtml}</div>
    </div>`;
  }).join('');
}

function bigHist(d){
  const c=color(d);
  const bars=`<div class="hist-bars">${d.esc_history.map((v,i)=>{
    const h=Math.max(3,Math.round(v/100*42));const now=i===d.esc_history.length-1;
    return `<div class="hist-col"><div class="hist-v">${v||'·'}</div><div class="hist-b" style="height:${h}px;background:${now?c:'var(--faint)'}"></div><div class="hist-w">${WEEKS[i]}</div></div>`;
  }).join('')}</div>`;
  const note=d.hist_real
    ? `<div class="hist-note real">Tracked week-over-week since ${d.tracked_since||'2026'}.</div>`
    : `<div class="hist-note">⚠ Trend estimate — this theater entered tracking ${d.tracked_since||'recently'}. Only the current value is independently verified; earlier bars are an analytic estimate of trajectory, not a recorded series.</div>`;
  return bars+note;
}

const BUILD_DAY=new Date("2026-07-17");
function freshCls(a){if(!a)return "fr-old";const mns={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};const p=a.split(" ");const dt=new Date(+p[2],mns[p[1]],+p[0]);const dd=(BUILD_DAY-dt)/86400000;return dd<=1?"fr-ok":dd<=3?"fr-age":"fr-old";}
function histPanel(d){
  const h=d.history; if(!h)return '';
  const roots=h.roots?`<div class="section"><div class="section-head" style="color:var(--ice)">\u25f7 ROOTS \u00b7 HOW IT GOT HERE</div><div class="hist-roots">${h.roots}</div></div>`:'';
  const tl=(h.timeline&&h.timeline.length)?`<div class="section"><div class="section-head" style="color:var(--amber)">\u25f7 TIMELINE</div><div class="htl">${h.timeline.map(t=>`<div class="htl-row"><div class="htl-date">${t.date}</div><div class="htl-line"><span class="htl-dot"></span></div><div class="htl-e">${t.e}</div></div>`).join('')}</div></div>`:'';
  const act=(h.actors&&h.actors.length)?`<div class="section"><div class="section-head" style="color:var(--ext)">\u25f7 ACTORS \u00b7 WHO THEY ARE</div><div class="hact">${h.actors.map(a=>`<div class="hact-card"><div class="hact-name">${a.name}</div><div class="hact-bio">${a.bio}</div></div>`).join('')}</div></div>`:'';
  const br=h.bridge?`<div class="section"><div class="section-head" style="color:var(--red)">\u25f7 THEN \u2192 NOW \u00b7 WHY THIS HISTORY IS THE CRISIS</div><div class="hist-bridge">${h.bridge}</div></div>`:'';
  const src=(h.sources&&h.sources.length)?`<div class="section"><div class="section-head" style="color:var(--grn)">\u25f7 SOURCES \u00b7 SCHOLARSHIP &amp; PRIMARY TEXTS</div><div class="hsrc">${h.sources.map(x=>`<div class="hsrc-row"><span class="hsrc-work">${x.work}</span><span class="hsrc-auth">${x.author}${x.year?' \u00b7 '+x.year:''}</span>${x.note?`<div class="hsrc-note">${x.note}</div>`:''}</div>`).join('')}</div></div>`:'';
  return roots+tl+br+act+src;
}

function stCls(s){
  if(s.startsWith('DISPROVEN'))return 'st-dis';
  if(s.startsWith('DOCUMENTED'))return 'st-doc';
  if(s.startsWith('UNRESOLVED'))return 'st-unr';
  if(s.startsWith('CONTESTED'))return 'st-con';
  if(s.startsWith('UNSUPPORTED'))return 'st-uns';
  if(s.startsWith('ALLEGED'))return 'st-unr';
  return 'st-con';
}

function openHuman(){
  const w=DB.filter(function(d){return d.human;});
  var tD=0,tX=0;
  w.forEach(function(d){tD+=(d.human.dead||0);tX+=(d.human.disp||0);});
  const fmt=function(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'k':''+n;};
  const rows=w.sort(function(a,b){return (b.human.dead||0)-(a.human.dead||0);}).map(function(d){
    const h=d.human;
    return '<div class="hm-row" onclick="closeOverlay();pick(\''+d.id+'\')">'
      +'<div class="hm-th">'+d.flag+' '+d.name.split('\u2014')[0].trim()+'</div>'
      +'<div class="hm-nums"><span class="hm-d">\u2020 '+fmt(h.dead||0)+''+(h.est?'<span class="hm-est">~est</span>':'')+'</span><span class="hm-x">\u2924 '+fmt(h.disp||0)+'</span>'+(h.famine?'<span class="hm-f">\u26a0 FAMINE</span>':'')+(h.aid?'<span class="hm-a">AID: '+h.aid+'</span>':'')+'</div>'
      +'<div class="hm-basis">'+(h.basis||'')+'</div><div class="hm-note">'+h.note+'</div></div>';
  }).join('');
  board('\u2695 HUMAN COST LEDGER','',
    '<div class="intro-note" style="margin-bottom:14px">The price in one view: deaths and displacement per tracked conflict, famine and aid-access flags where they apply. Figures are the file\u2019s working numbers \u2014 scope noted per theater (a war\u2019s round vs its total), sourced in each theater\u2019s record. <b>Board totals: \u2020 '+fmt(tD)+' dead \u00b7 \u2924 '+fmt(tX)+' displaced</b> across '+w.length+' theaters. The extraction lens\u2019s bottom line is paid here.</div>'+rows);
}

function openDebt(){
  const rows=DEBT.map(function(x){
    var d=DB.find(function(q){return q.id===x.th;});

      +'<div class="io-chips">'+chip+'</div></div>';

    return '<div class="cn-card"><div class="wb-top"><span class="wb-inst">'+x.who+'</span><span class="cn-fig">'+x.fig+'</span></div>'

  const chinaGroup='<div class="ov-group"><div class="ov-ghead" style="color:var(--red)">\u25c8 CHINA &amp; THE CREDITOR BALANCE<span class="ov-gmeta">'+CREDIT.length+'</span></div>'+cnRows+'</div>';
  const ustRows=USDEBT.map(function(x){
    var tc=x.type.indexOf('RIVAL')>=0||x.type.indexOf('BRICS')>=0?'us-rival':x.type.indexOf('CUSTODY')>=0||x.type.indexOf('DOMICILE')>=0?'us-cust':'us-ally';
    return '<div class="us-row"><div class="us-top"><span class="us-c">'+x.c+'</span><span class="us-amt">'+x.amt+'</span></div>'
      +'<div class="us-meta"><span class="us-type '+tc+'">'+x.type+'</span><span class="us-chg">'+x.chg+'</span></div>'
      +'<div class="us-note">'+x.note+'</div></div>';
  }).join('');
  const ustGroup='<div class="ov-group"><div class="ov-ghead" style="color:var(--red)">\u25c6 US DEBT \u00b7 WHO FINANCES THE HEGEMON<span class="ov-gmeta">'+USDEBT.length+'</span></div>'
    +'<div class="us-stats"><b>The asymmetry this board exists to show.</b> Foreign investors hold a record <b>\u00249.49 TRILLION</b> in US Treasuries (Feb 2026, TIC) \u2014 up \u0024587B over twelve months \u2014 against total US debt of ~\u002439T. That is roughly 28-30% of marketable Treasury debt, <b>down from nearly 50% in 2008</b> as the Fed, US banks and money funds took up the slack.<br><br><b>The split inside the flow is the signal:</b> in February 2026 private foreign investors bought <b>\u0024147.3B net</b> while foreign OFFICIAL institutions \u2014 central banks and sovereign funds \u2014 <b>sold \u002446.1B net</b>. Private money still wants dollars; sovereigns are quietly reducing. That divergence, not the headline total, is the de-dollarization measure.<br><br><b>And the comparison that frames everything above:</b> Africa receives \u002422.4B a year from IDA with policy conditions attached to it. The United States borrows \u00249.49T from the world with none. Same instrument, opposite terms \u2014 which is what reserve-currency status actually buys.<br><span class="wb-src" style="border:0;padding:0">SOURCE \u00b7 US Treasury TIC, Major Foreign Holders table (Dec 2025 / Feb 2026 releases) \u00b7 ticdata.treasury.gov</span></div>'
    +ustRows+'</div>';
  const wbcRows=WBCTRY.map(function(x){
    var hd=x.c.indexOf('\u25a0')>=0?' wbc-tot':'';
    return '<div class="wbc-row'+hd+'"><div class="wbc-top"><span class="wbc-c">'+x.c+'</span><span class="wbc-exp">'+x.exp+'</span></div>'
      +'<div class="wbc-meta"><span class="wbc-rank">'+x.rank+'</span><span class="wbc-fy">FY25: '+x.fy25+'</span></div>'
      +'<div class="wbc-note">'+x.note+'</div></div>';
  }).join('');
  const wbcGroup='<div class="ov-group"><div class="ov-ghead" style="color:var(--cyan)">\u25a3 WORLD BANK \u00b7 PER-COUNTRY EXPOSURE<span class="ov-gmeta">'+WBCTRY.length+'</span></div>'
    +'<div class="wbc-lead"><b>Two different numbers, often confused.</b> <b>EXPOSURE</b> is the outstanding stock a country still owes IDA. <b>COMMITMENT</b> is new lending approved in a single fiscal year. A state can have huge exposure and small new commitments (winding down), or the reverse (scaling up). Both are shown below; figures are from IDA\u2019s quarterly financial statements, 31 Mar 2026, and FY2025 commitment data.</div>'
    +wbcRows+'</div>';
  const wbRows=WBANK.map(function(x){
    return '<div class="wb-card"><div class="wb-top"><span class="wb-inst">'+x.inst+'</span><span class="wb-fig">'+x.fig+'</span></div>'
      +'<div class="wb-sub">'+x.sub+'</div>'
      +'<div class="wb-af">\u25b8 AFRICA: '+x.af+'</div>'
      +'<div class="wb-read">'+x.read+'</div>'
      +'<div class="wb-src">SOURCE \u00b7 '+x.src+' \u00b7 window: '+x.win+'</div></div>';

  const wbGroup='<div class="ov-group"><div class="ov-ghead" style="color:var(--cyan)">\u25c8 WORLD BANK \u00b7 IDA &amp; IBRD<span class="ov-gmeta">'+WBANK.length+'</span></div>'+wbRows+'</div>';
  const afRows=AFDEBT.map(function(x){

    return '<div class="af-row"'+click+'><div class="af-top"><span class="af-c">'+x.c+'</span><span class="af-risk '+rc+'">'+x.risk+'</span></div>'
      +'<div class="af-line"><span class="af-prog">'+x.prog+'</span><span class="af-out">'+x.out+'</span><span class="af-win">'+x.win+'</span></div>'
      +'<div class="af-note">'+x.note+'</div></div>';
  }).join('');
  const afHead='<div class="ov-group"><div class="ov-ghead" style="color:var(--gold)">\u2637 AFRICA \u00b7 THE CONTINENTAL LEDGER<span class="ov-gmeta">'+AFDEBT.length+'</span></div>'
    +'<div class="af-stats"><b>45 of 54 African states carry active IMF debt</b> (May 2026). <b>Global IMF credit outstanding stood at SDR 121.16B on 31 Mar 2026</b> \u2014 SDR 91.84B through the General Resources Account, SDR 23.44B through the concessional PRGT, and SDR 5.88B through the Resilience and Sustainability Trust. That total was SDR 73.54B at the end of 2019: <b>the Fund\u2019s outstanding book has grown ~65% since before the pandemic.</b> Concessional lending to Africa has risen from \u00248B pre-COVID to \u002436B. Across the PRGT-eligible world the Fund\u2019s own DSA counts <b>9 states in debt distress, 24 at high risk, 26 at moderate, 8 at low</b> \u2014 African states are the bulk of the first two categories. African ranking by outstanding credit (May 2026): <b>Egypt SDR 7.25B \u00b7 C\u00f4te d\u2019Ivoire SDR 3.60B \u00b7 Kenya SDR 2.87B \u00b7 Ghana SDR 2.73B \u00b7 Angola SDR 2.44B</b>, then DR Congo, Ethiopia, Tanzania, Zambia and Cameroon (SDR 1.18B). Kenya sits third with no active programme at all. FOR SCALE: <b>Argentina alone owes SDR 41.79B</b> \u2014 more than every African state combined, and roughly four times the next-largest borrower on earth. The conditionality Africa accepts for hundreds of millions is not the conditionality Buenos Aires negotiates for forty billion.</div>'
    +afRows+'</div>';
  board('\u2696 DEBT \u00b7 CONDITIONALITY AS LEVERAGE','',
    '<div class="dx-wrap">'
   +'<div class="dx-h">\u25a4 HOW TO READ THIS BOARD</div>'
   +'<div class="dx-lead">Five layers, each answering a different question. Read top to bottom and the argument assembles itself: <b>who lends to the United States without conditions \u2192 who lends to Africa with them \u2192 who lends against collateral instead \u2192 what every African state actually owes \u2192 what the conditions say.</b></div>'
   +'<div class="dx-grid">'
   +'<div class="dx-box"><div class="dx-t">THE VOCABULARY</div>'
     +'<div class="dx-d"><b>SDR</b> \u2014 Special Drawing Right, the IMF\u2019s unit of account, a basket of five currencies. Roughly \u00241.33 as of 2026. Figures are quoted in SDR because that is how the Fund keeps its books; dollar conversions drift with exchange rates.</div>'
     +'<div class="dx-d"><b>QUOTA</b> \u2014 each member\u2019s capital subscription, which sets its voting power AND its normal borrowing ceiling. <b>Access as a % of quota is the dependency measure</b>: 100% is a standard drawing, 391% (Benin) means the Fund has waived its own limits. High multiples signal a state that cannot fund itself any other way.</div>'
     +'<div class="dx-d"><b>OUTSTANDING vs COMMITTED</b> \u2014 outstanding is money actually drawn and still owed. Committed is the headline programme size, much of which may never be disbursed if reviews fail. This board labels which is which.</div>'
   +'</div>'
   +'<div class="dx-box"><div class="dx-t">THE INSTRUMENTS</div>'
     +'<div class="dx-d"><b>ECF</b> Extended Credit Facility \u2014 concessional, zero-interest, for low-income states. <b>EFF</b> Extended Fund Facility \u2014 market-rate, longer structural reform. <b>SBA</b> Stand-By \u2014 short-term crisis. <b>RCF/RFI</b> \u2014 rapid emergency, minimal conditions.</div>'
     +'<div class="dx-d"><b>RSF</b> Resilience and Sustainability Facility \u2014 the climate window, opened 2022. Longer maturities, but <b>only available to states already in another IMF programme</b>: climate money gated behind conditionality.</div>'
     +'<div class="dx-d"><b>PCI</b> Policy Coordination Instrument \u2014 surveillance and conditions with NO money attached. <b>FCL</b> Flexible Credit Line \u2014 a pre-approved credit line for states judged strong enough to need no conditions at all. Morocco holds the only African FCL; Rwanda holds a PCI. The two ends of the same ladder.</div>'
   +'</div>'
   +'<div class="dx-box"><div class="dx-t">THE RISK LABELS</div>'
     +'<div class="dx-d">Distress classes come from the joint IMF-World Bank <b>Debt Sustainability Analysis</b>, which rates each low-income country <b>LOW \u00b7 MODERATE \u00b7 HIGH \u00b7 IN DEBT DISTRESS</b>, and separately judges the debt <b>sustainable</b> or <b>unsustainable</b>.</div>'
     +'<div class="dx-d"><b>The label is a forecast, not a fact.</b> It rests on growth and export projections made by the same institutions that lend. Ethiopia is rated unsustainable while its programme continues; Kenya is high-risk with no programme at all. Where the platform disagrees with a rating it says so rather than deferring.</div>'
     +'<div class="dx-d"><b>MARKET</b> on this board means the state borrows commercially rather than from the Fund \u2014 not that it is safe.</div>'
   +'</div>'
   +'<div class="dx-box dx-warn"><div class="dx-t">WHERE THIS DATA IS WEAK</div>'
     +'<div class="dx-d"><b>Chinese figures are commitments, not debt.</b> The CLA Database tracks signed loans, not disbursements or repayments \u2014 totals overstate what is actually owed. Most \u2018debt trap\u2019 arguments rest on this conflation.</div>'
     +'<div class="dx-d"><b>US Treasury holdings are custody data.</b> Belgium\u2019s position is Euroclear; Luxembourg, Cayman and Ireland are fund domiciles, not sovereign wealth. Chinese holdings held through Brussels do not appear on China\u2019s line \u2014 the real position is higher than the table shows.</div>'
     +'<div class="dx-d"><b>DSA classes are dated.</b> The published list runs to Sep 2025; some states have moved since. <b>Hidden debt is real</b> \u2014 Mozambique 2016 and Senegal 2024 were both discovered only after a change of government, which means any figure here could be understated by the same mechanism.</div>'
   +'</div>'
   +'</div></div>'+

      'Each build: (1) news sweep against live reporting, prioritized by index and volatility; (2) patch only sourced, material changes — dated inline (e.g. "JUL 15 —"); (3) full engine validation: JS syntax check, stub-DOM runtime execution, board-render tests, data-integrity audit (no duplicate IDs, all required fields, esc_history length, coordinate sanity); (4) version bump with changelog. Fabricating updates to look busy corrupts the file — the discipline is that an honest "verified, unchanged" outranks an invented development.<br><b>Primary-statement monitoring:</b> head-of-state feeds (incl. Truth Social) are treated as primary sources with a verification gate \u2014 posts count only when confirmed via the public archive (trumpstruth.org) or independent wire reporting, because fabricated screenshots circulate constantly (PolitiFact-documented). Verified posts are logged as DOCUMENTED statements of intent, never as accomplished facts.')
    +sec('RED-TEAM DOCTRINE \u00b7 ARGUING WITH OURSELVES','Adopted from an external review (Jul 2026) that correctly identified the platform\u2019s biggest risk: <b>a single coherent lens can underweight what it is not optimized to see</b> \u2014 local politics, identity, governance failure, criminal incentives, historical grievance. Standing counters now built in: <b>(1) Competing Reads</b> on key theaters carry the platform\u2019s read beside rival explanations with a stated CONFIDENCE level (HIGH/MOD/LOW), so inference is never dressed as evidence. <b>(2) The four standing questions</b>, asked of every major assessment: is local governance failure more important than external influence? \u00b7 are economic incentives sufficient, or do history and identity matter more? \u00b7 is this criminal enterprise rather than ideological insurgency? \u00b7 does the evidence support a coordinated strategy, or are unrelated dynamics being grouped? <b>(3) Observation vs interpretation</b>: dated notes are the observed record; Assessment and Competing Reads are interpretation, labeled as such. <b>(4) Benchmarking</b> against, not substituting for, the named external set \u2014 ACLED (events), International Crisis Group (political analysis), Small Arms Survey (weapons flows), ISS Africa and CDD West Africa (African-led security analysis), RUSI/IISS (military balance), Chatham House (political economy). Where they disagree with this board, the disagreement is signal.')
    +sec('CHANGELOG \u00b7 RECENT BUILDS','<b>v59</b> Debt &amp; Conditionality board \u2014 IMF programmes with quota shares, attached conditions and leverage reads \u00b7 <b>v58</b> inline sourcing to 100% (55/55), Human Cost Ledger to 34 theaters, three Watchlist verdicts recorded (Scarborough read-validated, Haiti stall-confirmed, Ebola tripped/logged-late), W17 rollover, Levant + Red Sea + Sahel + Haiti sweeps, Venezuela history/news contradiction corrected \u00b7 <b>v57</b> Jul 17 sweep (6th-night strikes, blockade metrics, Fedorov firing); inline source links (refs); freshness-decay stamps; Watchlist TRIPPED tier \u00b7 <b>v59</b> cited-history standard complete 55/55 \u00b7 <b>v52</b> Asia histories \u00b7 <b>v51</b> week-rollover fix + rollweek tool + Europe/Eurasia histories \u00b7 <b>v50</b> full audit (7 sparkline desyncs fixed, tier-anchor doc corrected) \u00b7 <b>v48-49</b> Watchlist board + Middle East histories \u00b7 <b>v47</b> Markets live catalysts \u00b7 <b>v44-46</b> history layer 55/55, Africa citations, Jul 15-16 sweeps \u00b7 <b>v43</b> three dead boards recovered (Method/Systems/Patrons), board() arg fix')
    +sec('KNOWN LIMITS',
      '<b>Reconciliation risk (found and fixed, Jul 17 2026):</b> the History layer was authored from model knowledge while the news layer is swept from live reporting — the two can drift apart. An audit found Venezuela’s history still describing Maduro in the present tense as ‘a ruler who won’t leave’ months after a US raid captured him (3 Jan 2026); the timeline, actors and roots were corrected and an unverified casualty figure (4,333 quake dead) was withdrawn in favour of sourced reporting (~1,450). A cross-theater consistency scan found no other case. This class of error is now checked at sweep time. One analyst-AI pipeline, not a newsroom: single-point judgment on index scores; web-search source pool skews English-language; back-histories on newer theaters are estimates; freshness varies by theater (see stamps). The platform is a structured argument about the world, and its method is printed here so the argument can be checked.'));
}
function openBlocs(){
  document.getElementById('ovTitle').textContent='\u2b21 BLOCS \u0026 ALIGNMENTS \u00b7 THE STRUCTURAL FAULT LINES';
  document.getElementById('overlay').classList.add('show');
  const nm=id=>{const t=DB.find(x=>x.id===id);return t||{flag:'\u25cf',name:id};};
  document.getElementById('ovScroll').innerHTML=`
    <div class="inv-lead">Not a map of all diplomacy \u2014 only the structural alignments that actually explain the conflicts on this board. Each bloc shows who is on each side, what is genuinely being contested, and the fault line where it breaks. These are the \u201cwhy\u201d behind the external-actor flows tracked in every theater.</div>
    ${BLOCS.map(b=>`
    <div class="blc-card">
      <div class="blc-name">${b.icon} ${b.name}</div>
      <div class="blc-what">${b.what.toUpperCase()}</div>
      <div class="blc-sides">
        <div class="blc-side blc-a"><span class="blc-lbl">SIDE A</span>${b.sideA}</div>
        <div class="blc-side blc-b"><span class="blc-lbl">SIDE B</span>${b.sideB}</div>
      </div>
      <div class="blc-row"><div class="blc-k">WHAT'S ACTUALLY CONTESTED</div><div class="blc-v">${b.contest}</div></div>
      <div class="blc-fault"><div class="blc-k">\u26a0 FAULT LINE</div><div class="blc-v">${b.faultline}</div></div>
      <div class="blc-row"><div class="blc-k">THEATERS \u00b7 TAP TO OPEN</div><div class="inv-theaters">${b.theaters.map(id=>{const t=nm(id);return `<span class="inv-th-chip" onclick="closeOverlay();pick('${id}')">${t.flag||'\u25cf'} ${t.name?t.name.split('\u2014')[0].trim():id}</span>`;}).join('')}</div></div>
    </div>`).join('')}`;
}


function openContested(){
  const withC=DB.filter(d=>d.contested&&d.contested.claims&&d.contested.claims.length).sort((a,b)=>b.esc-a.esc);
  const none=DB.filter(d=>d.contested&&(!d.contested.claims||!d.contested.claims.length));
  // tally statuses
  const tally={};
  withC.forEach(d=>d.contested.claims.forEach(c=>{const k=c.status.split('\u2014')[0].trim();tally[k]=(tally[k]||0)+1;}));
  const nClaims=Object.values(tally).reduce((a,b)=>a+b,0);
  const chips=Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<span class="ct-st ${stCls(k)}" style="margin:0 5px 5px 0">${k} \u00b7 ${v}</span>`).join('');
  const cards=withC.map(d=>`
    <div class="ctb-card" onclick="closeOverlay();pick('${d.id}')">
      <div class="ctb-head">
        <div class="ctb-n">${d.flag||''} ${d.name}</div>
        <div class="ctb-e ${d.esc>=90?'e-crit':(d.esc>=75?'e-sev':'e-elev')}">${d.esc}</div>
      </div>
      <div class="ctb-sum">${d.contested.summary}</div>
      ${d.contested.claims.map(c=>`<div class="ctb-cl">
        <span class="ct-st ${stCls(c.status)}">${c.status.split('\u2014')[0].trim()}</span>
        <div class="ctb-ct">${c.claim}</div>
      </div>`).join('')}
    </div>`).join('');
  board('\u25c9 CONTESTED \u00b7 THE NARRATIVE WAR',
    `<div class="intro-note">Where the story and the ground don't match. Every claim is scored on what the evidence actually supports \u2014 not on who said it. <b>${withC.length} of ${DB.length} theaters</b> carry an active narrative war (${nClaims} contested claims). The other ${none.length} are marked as having none: <b>the absence of an information operation is itself a finding</b>, so it is stated rather than left blank.</div>
     <div class="ctb-tally">${chips}</div>
     ${cards}
     <div class="ctb-clean"><div class="ctb-ch">\u2713 NO SIGNIFICANT NARRATIVE WAR (${none.length})</div>
       <div class="ctb-cl2">${none.map(d=>`<span class="grp-th" onclick="closeOverlay();pick('${d.id}')">${d.flag||''} ${d.name.split('\u2014')[0].trim()}</span>`).join('')}</div></div>`);
}
function openMovers(){
  const real=DB.filter(d=>d.hist_real!==false);
  const seeded=DB.filter(d=>d.hist_real===false);
  const wd=d=>{const h=d.esc_history;return h[h.length-1]-h[h.length-2];};
  const up=real.filter(d=>wd(d)>0).sort((a,b)=>wd(b)-wd(a));
  const dn=real.filter(d=>wd(d)<0).sort((a,b)=>wd(a)-wd(b));
  const fl=real.filter(d=>wd(d)===0).sort((a,b)=>b.esc-a.esc);
  const row=d=>{const x=wd(d);const s=x>0?'+'+x:(x<0?''+x:'0');
    return `<div class="mv-row" onclick="closeOverlay();pick('${d.id}')">
      <div class="mv-d ${x>0?'mv-up':(x<0?'mv-dn':'mv-fl')}">${s}</div>
      <div class="mv-n">${d.flag||''} ${d.name}</div>
      <div class="mv-e">${d.esc}</div></div>`;};
  const srow=d=>`<div class="mv-row mv-seed" onclick="closeOverlay();pick('${d.id}')">
      <div class="mv-d mv-est">EST</div>
      <div class="mv-n">${d.flag||''} ${d.name}</div>
      <div class="mv-e">${d.esc}</div></div>`;
  board('\u21c5 MOVERS \u00b7 WEEK-OVER-WEEK',
    `<div class="intro-note">Ranked by change since last week. <b>Only theaters with real tracked history appear in the movement columns</b> \u2014 newly-seeded theaters have estimated back-history and cannot show meaningful deltas, so they are listed separately below rather than polluting the signal.</div>
     <div class="mv-sec"><div class="mv-h mv-hu">\u25b2 ESCALATING (${up.length})</div>${up.map(row).join('')||'<div class="mv-empty">None this week.</div>'}</div>
     <div class="mv-sec"><div class="mv-h mv-hd">\u25bc EASING (${dn.length})</div>${dn.map(row).join('')||'<div class="mv-empty">None this week.</div>'}</div>
     <div class="mv-sec"><div class="mv-h mv-hf">\u2014 HOLDING (${fl.length})</div>${fl.map(row).join('')}</div>
     <div class="mv-sec"><div class="mv-h mv-hs">\u25c8 NOT YET TRACKABLE (${seeded.length}) \u00b7 estimated back-history</div>
       <div class="mv-note">These theaters entered tracking recently. Their 10-week curves are analyst estimates, not observed movement \u2014 so no delta is claimed until two real weeks accumulate.</div>
       ${seeded.map(srow).join('')}</div>`);
}
function buildKML(data){
  const cm={military:'ff4e56e2',political:'fff07f9a',economic:'ff8ac94c',energy:'ff30a0e0',strategic:'ffd59b5b'};
  const ic={military:'red',political:'purple',economic:'grn',energy:'wht',strategic:'ltblu'};
  const st=Object.keys(cm).map(k=>`<Style id="s-${k}"><IconStyle><color>${cm[k]}</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/paddle/${ic[k]}-circle.png</href></Icon></IconStyle><LabelStyle><scale>.7</scale></LabelStyle></Style>`).join('');
  const bs=grp(data,'subregion');
  const folders=SUBS.filter(s=>bs[s]).map(sub=>`<Folder><name>${sub}</name>${bs[sub].filter(d=>!d.offmap&&d.lat!=null&&d.lon!=null).map(d=>{
    const dl=dlt(d);const ext=(d.external||[]).map(x=>`${x.actor}→${x.side} [${TIER[x.tier]}]: ${x.flow}`).join(' | ');
    return `<Placemark><name>${d.flag||''} ${d.name}${d.external?' ◆':''}</name><description><![CDATA[<b>${d.name}</b><br/>Index: ${d.esc}/100 (Δ${dstr(dl)})<br/>Status: ${SLBL[d.status]||d.status}<br/>${d.note}<br/>${ext?'<b>External:</b> '+ext:''}<br/><i>v59 · Week 16</i>]]></description><styleUrl>#s-${d.cat}</styleUrl><Point><coordinates>${d.lon},${d.lat},0</coordinates></Point></Placemark>`;
  }).join('')}</Folder>`).join('');
  return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>MERIDIAN by Leverage — Week 16</name>${st}${folders}</Document></kml>`;
}
function dl(c,n,m){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:m}));a.download=n;a.click();}
function exportKML(){dl(buildKML(fdb()),'MERIDIAN-Leverage-W16.kml','application/vnd.google-earth.kml+xml');}
function exportCSV(){
  const data=fdb();const h=['Name','Category','Subregion','Domain','Severity','Status','Index','Delta','Lat','Lon'];
  const rows=data.map(d=>[`"${d.name}"`,d.cat,`"${d.subregion}"`,`"${d.domain}"`,d.sev,SLBL[d.status]||d.status,d.esc,dstr(dlt(d)),d.lat,d.lon].join(','));
  dl([h.join(','),...rows].join('\n'),'MERIDIAN-Leverage-W16.csv','text/csv');
}
