r 1,500 troops. It stalled. Meanwhile a UN report finds MORE THAN 60% OF CASUALTIES occur during anti-gang operations — the intervention is a leading cause of the toll it exists to reduce."}, {"id":"vectus","prov":"VERIFIED","src":"HRW (1,243 killed in 141 operations)","name":"Vectus Global","full":"Vectus Global · Erik Prince private military company","affil":"UNITED STATES · private contractor","icon":"▣","color":"#8a4a4a","tier":"SEVERE","strength":"Drone strikes under an unpublished contract","theaters":["haiti"],"mil":"The private military company led by ERIK PRINCE, founder of Blackwater, contracted by Haiti's transitional government. It has struck gang targets using EXPLOSIVE-LADEN QUADCOPTERS in densely populated neighbourhoods. HRW documented at least 1,243 people killed in 141 drone operations between March 2025 and January 2026, INCLUDING 17 CHILDREN, some appearing unlawful and possibly amounting to extrajudicial killings.","log":"Commercial drone airframes and contractor personnel; the contract with the Haitian government HAS NEVER BEEN MADE PUBLIC.","eco":"Paid by a transitional government that cannot fund its own police.","assess":"ACCOUNTABILITY'S VANISHING POINT. A foreign private company conducts lethal strikes in a capital city under a contract no citizen has seen, for a government no one elected, with no public accountability mechanism — and the Secretary-General has warned the Vectus-supported Special Security Task Force may be listed next year for child casualties. This is what security outsourcing looks like at its end state."}, {"id":"hnp","prov":"VERIFIED","src":"UN Secretary-General child-violations reporting","name":"Haitian National Police","full":"Police Nationale d'Haïti · Special Security Task Force","affil":"HAITIAN STATE","icon":"⚑","color":"#c7a54a","tier":"SEVERE","strength":"Outgunned, and now facing a UN listing","theaters":["haiti"],"mil":"The state's primary security institution, chronically under-resourced against better-armed gangs, and operating alongside the Vectus-supported Special Security Task Force. The UN Secretary-General has warned that the HNP and the Task Force SHOULD BE LISTED next year among parties committing grave violations against children if their record repeats.","log":"Donor-funded equipment, an arms embargo that constrains it more than the gangs, and heavy attrition.","eco":"State salaries where they are paid.","assess":"The gangs Gran Grif, Kraze Barye and 400 Mawozo were added to the Secretary-General's child-violations annexes this year. The state's own police are one report away from the same list. When the distinction between the armed groups and the security forces stops being visible in the human-rights record, the state has lost the argument that it is different in kind."}, {"id":"tatmadaw","prov":"VERIFIED","src":"ICG; territorial control reporting 2026","name":"Tatmadaw / SAC","full":"Myanmar Armed Forces · State Administration Council","affil":"MYANMAR STATE · junta","icon":"⚑","color":"#8a4a4a","tier":"CRITICAL","strength":"Losing territory, gaining a patron","theaters":["myanmar"],"mil":"Min Aung Hlaing's junta, holding the dry-zone core, Naypyidaw and the major cities while losing the peripheries. Overstretched and suffering desertion since Operation 1027; it compensates with AIRPOWER, striking Sagaing and Karenni relentlessly. It has lost Chin State's last base (2025) and 14 of Rakhine's 17 townships.","log":"Air force, Russian and Chinese aircraft, conscription by force — and, since July 2026, memoranda on all four of Xi's Global Initiatives.","eco":"Jade, gas (Shwe pipeline), and the Kyaukphyu corridor — revenue streams that require Chinese buyers and Chinese protection.","assess":"THE FRAME THIS PLATFORM HAD TO QUALIFY. The junta is losing ground and gaining a patron simultaneously. Beijing pressured the MNDAA to return Lashio and now underwrites Naypyidaw — which is why the Watchlist carries a tripwire designed to falsify this file's own 'junta is losing' read."}, {"id":"arakan-army","prov":"VERIFIED","src":"HRW; Fortify Rights","name":"Arakan Army","full":"Arakan Army · Rakhine/Arakanese nationalist force","affil":"MYANMAR · Rakhine ethnic","icon":"⚔","color":"#4a9dc7","tier":"CRITICAL","strength":"50,000+ · holds 14 of Rakhine's 17 townships","theaters":["myanmar"],"mil":"The most successful ethnic armed organisation of the war. It has effectively taken Rakhine State — the junta clings to the capital Sittwe and the Chinese-backed KYAUKPHYU deep-sea port — and now fights well beyond it, into Ayeyarwady, Bago and Magway alongside local PDFs. Part of the Three Brotherhood Alliance.","log":"Captured junta stocks, the Bangladesh frontier, and revenue from the territory it administers.","eco":"Taxation of a state it now governs, plus the leverage of sitting astride Kyaukphyu — China's Indian Ocean outlet.","assess":"THE UNCOMFORTABLE ENTRY. The AA is the war's most effective liberation force AND, per HRW and Fortify Rights, has killed Rohingya civilians, burned villages and conscripted men in areas it controls. A platform that credits anti-junta resistance without recording this would be doing exactly what it criticises others for."}, {"id":"mndaa","prov":"VERIFIED","src":"Kutkai reporting Mar 2026","name":"MNDAA","full":"Myanmar National Democratic Alliance Army · Kokang","affil":"MYANMAR · Kokang (ethnic Chinese)","icon":"◆","color":"#c74a4a","tier":"SEVERE","strength":"6,000+ · broke the alliance it helped build","theaters":["myanmar"],"mil":"Kokang force that seized LAUKKAI in January 2024, forcing a regional commander's surrender — the Tatmadaw's most humiliating defeat. Then, under Chinese pressure, it handed LASHIO back to the junta. On 14-15 MARCH 2026 it ATTACKED ITS OWN ALLY THE TNLA and took KUTKAI, detaining fighters and seizing trade gates — shattering the Three Brotherhood Alliance. It now holds a ceasefire with the junta.","log":"The China border, and Beijing's tolerance — which is the actual supply line.","eco":"Border trade gates, casinos and the Kokang crossing economy.","assess":"THE CLEAREST CASE OF EXTERNAL LEVERAGE ON THIS BOARD. An ethnic army that beat the Myanmar military, then returned a captured city on Beijing's instruction, then turned its guns on its closest ally in a move analysts read as realignment toward China. The Brotherhood Alliance was not defeated — it was bought apart."}, {"id":"tnla","prov":"VERIFIED","src":"Kutkai reporting Mar 2026","name":"TNLA","full":"Ta'ang National Liberation Army","affil":"MYANMAR · Ta'ang/Palaung ethnic","icon":"▲","color":"#c7a54a","tier":"SEVERE","strength":"~10,000 · attacked by its former ally","theaters":["myanmar"],"mil":"Ta'ang nationalist force founded 1992, HQ Namhsan, grown from 800 fighters in 2011 to around 10,000. A Brotherhood Alliance and Northern Alliance member that took ground in Operation 1027 — and in March 2026 lost Kutkai not to the junta but to the MNDAA, after the MNDAA restricted fuel and goods into its territory. Now holds a ceasefire with the junta while fighting a former ally.","log":"Northern Shan highlands; supply now squeezed by the MNDAA's control of crossings.","eco":"Tea, taxation, and the Shan trade corridors.","assess":"Proof that Myanmar's war has stopped being binary. The TNLA now has ceasefires with the government it took up arms against and open war with the ally it fought beside — the resistance is fragmenting into its component nationalisms exactly as the junta stabilises."}, {"id":"kia","prov":"VERIFIED","src":"Bhamo and rare-earth belt reporting","name":"KIA","full":"Kachin Independence Army","affil":"MYANMAR · Kachin ethnic","icon":"✧","color":"#5aa86e","tier":"SEVERE","strength":"Sits on the rare-earth belt","theaters":["myanmar"],"mil":"One of the oldest ethnic armies in the country, pressing junta battalions around BHAMO and holding much of Kachin State. Northern Alliance member; allied with the NUG's PDFs.","log":"The China frontier and long-established base areas.","eco":"THE RARE EARTHS. Kachin's heavy rare-earth mines feed Chinese processing — the KIA's control of that belt gives it a revenue stream and gives Beijing a reason to deal with it directly, whatever Naypyidaw says. Also jade.","assess":"The clearest link between Myanmar's war and the minerals system this platform tracks. Chinese magnet supply chains run through territory held by an armed group in open revolt against a government China is simultaneously underwriting."}, {"id":"uwsa","prov":"VERIFIED","src":"ICG; Wa SAD reporting","name":"UWSA","full":"United Wa State Army","affil":"MYANMAR · Wa ethnic · Chinese-equipped","icon":"▣","color":"#b8863d","tier":"SEVERE","strength":"~30,000 · the best-armed non-state force in Asia","theaters":["myanmar"],"mil":"Around 30,000 troops with modern Chinese weapons — reportedly including man-portable air defence and armoured vehicles — governing the WA SELF-ADMINISTERED DIVISION as a de facto state with its own administration, schools and currency circulation. It has largely stayed OUT of the civil war while everyone else fights.","log":"Direct Chinese supply; territorial contiguity with Yunnan.","eco":"Mining, agriculture, and a long history in the narcotics economy; now a substantial legitimate trade sector too.","assess":"The end-state every other ethnic army is fighting toward, achieved decades ago and preserved by not fighting. The Wa demonstrate that Myanmar's real settlement was never federalism — it was armed autonomy tolerated by Beijing."}, {"id":"pdf-nug","prov":"VERIFIED","src":"Sagaing resistance reporting","name":"PDFs / NUG","full":"People's Defence Forces · National Unity Government","affil":"MYANMAR · multi-ethnic anti-coup","icon":"⚑","color":"#7d5ac7","tier":"CRITICAL","strength":"Hundreds of local units · Sagaing is their heartland","theaters":["myanmar"],"mil":"The armed wing of the parallel National Unity Government — hundreds of locally raised People's Defence Forces, overwhelmingly BAMAR-MAJORITY young people who took up arms after the 2021 coup. SAGAING remains the resistance heartland under relentless airstrikes. PDFs fight alongside the AA in Ayeyarwady and Magway, the KIA in the north, and Karenni forces besieging Loikaw.","log":"Locally made weapons, 3D-printed components, ethnic-army training and diaspora funding.","eco":"Diaspora remittances and local contribution — the least resource-financed force in this war.","assess":"THE ANOMALY THE EXTRACTION LENS CANNOT EXPLAIN. A mass armed movement with almost no resource base, fighting on donations and improvised weapons, sustained for five years by political conviction. Any framework that reduces conflict to who controls what mineral has to account for Sagaing — and this one says so."}, {"id":"pna-junta-militias","prov":"VERIFIED","src":"Junta auxiliary reporting","name":"PNA & junta militias","full":"Pa-O National Army · Pyusawhti · Border Guard Forces","affil":"MYANMAR · pro-junta auxiliaries","icon":"●","color":"#8a6db8","tier":"ELEVATED","strength":"The state's ethnic proxies","theaters":["myanmar"],"mil":"The PA-O NATIONAL ARMY guards the Pa-O Self-Administered Zone in southern Shan and has actively RECRUITED FOR THE TATMADAW since the coup. Alongside it sit the Pyusawhti militias and assorted Border Guard Forces — locally raised, state-armed, and implicated in violence against resistance-aligned communities.","log":"State weapons and local recruitment in the zones they administer.","eco":"Local levies and control of the administered zones.","assess":"Every side in this war has ethnic auxiliaries, including the junta. The framing of 'ethnic armies versus the military' obscures that several ethnic organisations chose the state — which is what a genuinely multi-national conflict looks like from inside."}, {"id":"nw-bandits","prov":"VERIFIED","src":"Amnesty International (725 villages); ACLED","name":"Northwest bandit syndicates","full":"Zamfara/Katsina/Sokoto armed groups · Turji, Dogo Gidé, Sububu and others","affil":"NIGERIAN · CRIMINAL · Hausa and Fulani","icon":"◆","color":"#c77d4a","tier":"CRITICAL","strength":"20,000-30,000 fighters · 725 villages under their control","theaters":["nigeria","lakurawa"],"mil":"Not one organisation but dozens of competing gangs under named kachallas — BELLO TURJI, DOGO GIDÉ, HALILU SUBUBU SENO, DAN KARAMI, ALI KACHALLA and others. Estimates put 20,000-30,000 armed bandits across the northwest, ONE THIRD OF THEM IN ZAMFARA, which was Nigeria's deadliest state in 2024. They fight the state, the vigilantes and EACH OTHER — inter-group clashes are among the most frequent incident types. Both HAUSA and FULANI militias operate in the space.","log":"Motorcycles, forest camps in the Rugu and Kamuku reserves, and weapons flowing from the Sahel and from corrupt supply.","eco":"A GOVERNANCE ECONOMY, not just robbery: Amnesty documents 725 VILLAGES ACROSS 13 LGAs under bandit control where residents are TAXED under threat of death, abduction or eviction — people have been killed for refusing to pay. Plus mass-abduction ransom and illegal gold mining.","assess":"THE FRONT THE 'GENOCIDE' FRAME ERASES. This is criminal enterprise with proto-governance, not ideology — Muslim communities are its principal victims, and its perpetrators are Muslim. It is the largest source of violent deaths in Nigeria and the least ideological, which is exactly why the platform's Nigeria Competing Read insists the four fronts be kept analytically separate."}, {"id":"ansaru","prov":"VERIFIED","src":"EUAA actor mapping","name":"Ansaru & Mahmuda","full":"Jama'atu Ansaril Muslimina fi Biladis-Sudan · Mahmuda group","affil":"NIGERIAN · al-Qaeda-aligned","icon":"⚔","color":"#8a4a4a","tier":"SEVERE","strength":"Al-Qaeda's Nigerian foothold — in the northwest, not the northeast","theaters":["nigeria"],"mil":"A Boko Haram splinter that broke away in 2012 over the killing of Muslim civilians and aligned with AL-QAEDA rather than Islamic State. It operates in the NORTHWEST and North-Central — Kaduna, Niger and Kogi states — not the northeastern theatre, and EUAA identifies armed conflict between Ansaru, the MAHMUDA group and state forces as a distinct conflict strand. Specialises in kidnapping foreigners and high-value targets.","log":"Kainji forest complex and the Niger-state corridor; links westward toward JNIM's expanding zone.","eco":"Ransom kidnapping and taxation of the areas it holds.","assess":"The bridge between two wars. Ansaru's al-Qaeda alignment and northwestern geography put it exactly where JNIM's southward expansion is heading — if the Sahelian and Nigerian jihadist theatres merge, this is the seam they merge along."}, {"id":"jnim-nigeria","prov":"VERIFIED","src":"JNIM component-unit reporting","name":"JNIM Nigerian Brigade","full":"Katiba Nigeria · JNIM's Nigerian unit","affil":"AL-QAEDA · Sahel-to-Nigeria expansion","icon":"▲","color":"#b83d3d","tier":"SEVERE","strength":"The Sahel war arriving in Nigeria under its own flag","theaters":["nigeria","lakurawa","niger"],"mil":"JNIM maintains a designated NIGERIAN BRIGADE among its component units — formal organisational recognition that its war now extends into Nigeria rather than merely spilling over. It operates alongside the Lakurawa implant on the Nigeria-Niger frontier.","log":"The Sokoto-Kebbi-Niger border corridor and the same routes Lakurawa uses.","eco":"Cattle levies, transit taxation and the pastoral economy of the frontier.","assess":"Ends the argument about whether the Sahel insurgency is 'coming south'. Al-Qaeda's Sahelian coalition has stood up a named Nigerian formation — the coastal-expansion thesis this platform tracks in Benin and Togo has a Nigerian chapter too."}, {"id":"ipob-esn","prov":"VERIFIED","src":"EUAA; Imo State reporting","name":"IPOB / ESN","full":"Indigenous People of Biafra · Eastern Security Network","affil":"NIGERIAN IGBO · SEPARATIST","icon":"✧","color":"#5aa86e","tier":"ELEVATED","strength":"The southeast's secessionist front","theaters":["nigeria"],"mil":"The ESN is the armed wing of the proscribed INDIGENOUS PEOPLE OF BIAFRA, which seeks secession of the Southeast and parts of the South-South. Formed in 2020 nominally to protect Igbo farmers from herder attacks, it now fights Nigerian security forces directly; EUAA classes ESN-state conflict as a distinct armed conflict strand. Its 'sit-at-home' enforcement has shut down the region's economy on Mondays for years.","log":"Southeastern forests, diaspora financing, and local recruitment.","eco":"Diaspora remittance funding and local levies — the most externally-financed of Nigeria's insurgencies.","assess":"THE FOURTH FRONT, AND THE OLDEST WOUND. This is the Biafra question — unresolved since 1970 and the war that killed a million people — returning in armed form. It has nothing to do with jihadism, banditry or minerals: it is a sovereignty and memory conflict, and it is the clearest evidence that Nigeria's crises share a state rather than a cause."}, {"id":"askarawa","prov":"VERIFIED","src":"ACLED; Zamfara CPG reporting","name":"Askarawa & vigilantes","full":"Zamfara Community Protection Guards · Vigilante Group of Nigeria · CJTF","affil":"NIGERIAN · STATE-SANCTIONED","icon":"⚑","color":"#c7a54a","tier":"ELEVATED","strength":"The state's answer to a force it cannot defeat","theaters":["nigeria"],"mil":"State-backed community forces: the ASKARAWA (Zamfara Community Protection Guards) were re-formed in early 2024 after an earlier iteration was BANNED OVER ITS OWN VIOLENCE, with training added to prevent a repeat. Alongside them sit the Vigilante Group of Nigeria and, in the northeast, the Civilian Joint Task Force. ACLED codes Zamfara communal militias as parties to the majority of violence-against-civilians incidents in the state.","log":"State-issued and locally-sourced weapons; community recruitment.","eco":"Checkpoints and protection levies in the communities they hold.","assess":"The same trade Burkina made with the VDP and Kinshasa made with the Wazalendo: manpower now, an armed constituency later. A vigilante force banned for atrocities and then re-formed is a state admitting it has no alternative."}, {"id":"herder-farmer","prov":"VERIFIED","src":"EUAA; ACLED communal violence data","name":"Herder-farmer militias","full":"Middle Belt communal militias · Plateau, Benue, Nasarawa","affil":"NIGERIAN · COMMUNAL","icon":"●","color":"#a8763d","tier":"SEVERE","strength":"The conflict most often mislabelled","theaters":["nigeria"],"mil":"Armed communal militias of FARMERS and HERDERS across the North-Central, North-West and South-South. EUAA treats these as distinct armed conflicts in their own right. The violence is reciprocal — both farming communities and pastoralist communities field militias and both suffer massacres. In 2026 a Fulani group in Plateau State alleged a rival militia was using DRONES.","log":"Local weapons markets, community mobilisation, and increasingly commercial drones.","eco":"LAND AND WATER. Desertification pushes herders south into farmland as farmland expands north — the resource conflict is the substance, ethnicity and religion the identity through which it is fought.","assess":"The front most consistently misreported abroad as religious persecution. It is a climate-and-land conflict fought between communities that happen to differ in faith and livelihood — ACLED's data does not support a one-directional persecution narrative, which is precisely what the platform's InfoOps board tracks about how this violence is framed."}, {"id":"us-nigeria-op","prov":"VERIFIED","src":"Joint operation reporting May 2026","name":"US intervention force","full":"US-Nigeria joint operation (from May 2026)","affil":"UNITED STATES · external","icon":"▣","color":"#4a7dc7","tier":"CRITICAL","strength":"SEALs and airstrikes — ~175 militants killed in the first three days","theaters":["nigeria"],"mil":"On 16 MAY 2026 the US and Nigeria began joint operations against ISWAP and Boko Haram in the northeast — special forces raids (US Navy SEALs) plus multiple rounds of airstrikes. ISWAP senior leader ABU-BILAL AL-MINUKI was killed with several other commanders; Nigerian authorities counted ~175 militants killed by 19 May. Reported force ratio: roughly two dozen US personnel against three dozen fighters in the initial raid. No US casualties reported.","log":"US air and ISR assets, Nigerian basing, and a narrow northeastern focus.","eco":"Not a revenue actor — but the intervention arrived alongside US interest in Nigerian critical minerals and a public 'Christian genocide' justification the data does not support.","assess":"THE INTERVENTION AND ITS FRAME. Operationally it targets the jihadist northeast — which is real, and which the Nigerian state has failed to defeat for fifteen years. But the humanitarian framing used to sell it describes a persecution pattern ACLED's numbers contradict, and the northwest banditry that kills more Nigerians is not the target. The platform logs the operation as effective against ISWAP and the justification as a separate question."}, {"id":"ansar-dine","prov":"VERIFIED","src":"Africa Center for Strategic Studies; ICC warrant","name":"Ansar Dine","full":"Ansar Dine · Iyad Ag Ghali · JNIM's core","affil":"MALIAN TUAREG · al-Qaeda","icon":"⚔","color":"#b83d3d","tier":"CRITICAL","strength":"The command that now runs JNIM","theaters":["mali","burkina","niger"],"mil":"Founded by IYAD AG GHALI, a TUAREG from northern Mali and a veteran of the 1990s rebellions who turned to Salafism. Ansar Dine was one of four groups that merged into JNIM in 2017; after the deaths of the AQIM-Sahara and al-Mourabitoun leaders, its command absorbed their operations — so Ag Ghali is now JNIM's emir and its dominant faction. The ICC has issued an ARREST WARRANT for him for war crimes and crimes against humanity. Second-in-command: Sedane Ag Hita. HQ: Tinzaouaten, on the Algerian border.","log":"The Algeria-Mali frontier and the old Tuareg smuggling routes Ag Ghali has known since the 1990s.","eco":"Kidnap ransom, transit taxation and gold sites along the northern routes.","assess":"The single most consequential fact about JNIM: its emir is a TUAREG NATIONALIST who became a jihadist, not a foreign import. The insurgency's leadership is Malian, its grievances predate the Salafism, and treating it as al-Qaeda's franchise misses that the franchise came second."}, {"id":"katiba-macina","prov":"VERIFIED","src":"Africa Center for Strategic Studies","name":"Katiba Macina / FLM","full":"Macina Liberation Front · Amadou Koufa","affil":"MALIAN FULANI-ASSOCIATED · JNIM","icon":"▲","color":"#c77d4a","tier":"CRITICAL","strength":"~3,000 fighters · the engine of central Mali's violence","theaters":["mali","burkina"],"mil":"Led by AMADOU KOUFA, operating across central Mali and northern Burkina Faso. Its name invokes the 19th-century FULANI MACINA EMPIRE — a deliberate claim to a pre-colonial political order. It runs the sieges and blockades that now strangle Bamako's supply routes. Offshoot: Katiba Serma under Abu Jalil al Fulani.","log":"Inland Niger Delta and the central Mali pastoral zone; recruitment through herder communities under pressure.","eco":"Cattle taxation, blockade tolls, and control of the roads into central Mali.","assess":"THE STIGMATISATION LOOP, DOCUMENTED. Fulani are disproportionately represented among Sahelian militant fighters — but the Africa Center is explicit that FLM is NOT an exclusively Fulani group and that most Fulani reject Koufa. The PERCEPTION that it is Fulani has driven ethnic profiling and reprisal killings by state forces and militias, which Koufa then exploits for recruitment. This is the mechanism the platform's Burkina and Mali Competing Reads name: the counter-insurgency manufactures the insurgency's next cohort."}, {"id":"fla","prov":"VERIFIED","src":"2026 Mali offensives reporting; RFI","name":"FLA / Azawad Liberation Front","full":"Front de Libération de l'Azawad · Alghabass Ag Intalla","affil":"MALIAN TUAREG · SECULAR SEPARATIST","icon":"✧","color":"#4a9dc7","tier":"SEVERE","strength":"Claimed Kidal and parts of Gao in the April 2026 offensive","theaters":["mali"],"mil":"The principal vehicle for TUAREG SECESSIONIST ambition, uniting surviving elements of the MNLA, the High Council for the Unity of Azawad and parts of the Arab Movement of Azawad under ALGHABASS AG INTALLA and Bilal Ag Acherif. It is SECULAR, frames its struggle in nationalist rather than religious terms, and professes adherence to international humanitarian law. Its objective is independence or substantial autonomy for Azawad. In APRIL 2026 it began COORDINATING OPERATIONS WITH JNIM — joint attacks across Bourem, Kati, Sévaré, Senou and Mopti in the largest offensive since the 2012 rebellion.","log":"Northern Mali's desert space and the Algerian frontier; long-standing community networks.","eco":"Northern trade routes and the political economy of Kidal.","assess":"THE MOST DANGEROUS DEVELOPMENT IN THE SAHEL. A secular nationalist movement and a Salafi-jihadist coalition have opposite end-states — they fought each other in 2012-13 — and are now attacking together because both want Bamako's army gone first. The junta's principal achievement has been to unite the two things that were never united."}, {"id":"africa-corps","prov":"VERIFIED","src":"Global Centre for R2P; Bellingcat","name":"Africa Corps","full":"Russian Africa Corps (formerly Wagner Group)","affil":"RUSSIAN STATE","icon":"⚑","color":"#8a4a4a","tier":"CRITICAL","strength":"Moscow's direct instrument — and a documented atrocity actor","theaters":["mali","burkina","niger","libya"],"mil":"Wagner's successor, now RUSSIAN STATE-CONTROLLED under the defence ministry; commanders include Andrey Averyanov and Vladimir Selivyorstov. It fights alongside FAMa in Mali and has been documented by the Global Centre for R2P committing possible WAR CRIMES AND CRIMES AGAINST HUMANITY — summary executions, indiscriminate airstrikes, rape and sexual violence, pillaging and torture. Bellingcat and Jeune Afrique documented the FIRST CONFIRMED USE OF RUSSIAN CLUSTER MUNITIONS in Mali. It lost a Mi-35 helicopter with its crew in the 2026 offensives.","log":"Russian military airlift, drones and air support; a small deployed force relative to its influence.","eco":"PAID IN MINING CONCESSIONS AND GOLD, not cash — the model this platform tracks: security services rendered against resource rights, so the junta's protection is financed by the sale of the thing it is protecting.","assess":"Sovereignty rhetoric with a foreign army inside it. The AES states expelled France and the US on anti-colonial grounds, then contracted a European power that takes payment in minerals and answers to no Malian court."}, {"id":"vdp","prov":"VERIFIED","src":"Global Centre for R2P","name":"VDP","full":"Volontaires pour la défense de la patrie · Burkina Faso","affil":"BURKINABÈ STATE MILITIA · Mossi-majority","icon":"◆","color":"#c7a54a","tier":"SEVERE","strength":"Recruitment drive sought 50,000 — drew 90,000+ applications","theaters":["burkina"],"mil":"A STATE PARAMILITARY created by decree in 2020 under Kaboré and expanded aggressively by Traoré after his 2022 coup. Drawn largely from KOGLWEOGO and DOZO self-defence traditions, and predominantly MOSSI. The Global Centre for R2P records VDP units implicated in GRAVE CRIMES ALONG ETHNIC LINES; analysts document extortion, looting, land seizure, extrajudicial killings, ethnic cleansing against Fulani — and in places, deals with the jihadists they were raised to fight.","log":"State-issued weapons, local recruitment, minimal training relative to the army.","eco":"Local extraction: checkpoints, land seizure and control of gold sites in the zones they hold.","assess":"The counter-insurgency has produced a second insurgency problem. VDP units carve out QUASI-INDEPENDENT ENCLAVES with only nominal loyalty to Ouagadougou — 'mini statelets' — and their search for collaborators fuels the communal tension jihadists recruit on. Burkina armed 90,000 people to defeat an insurgency and created a parallel armed order it does not command."}, {"id":"dozo","prov":"VERIFIED","src":"Africa Center for Strategic Studies","name":"Dozo militias","full":"Dozo · traditional hunter-warrior brotherhoods","affil":"MALIAN/BURKINABÈ · pre-colonial institution","icon":"●","color":"#a8763d","tier":"ELEVATED","strength":"One of the three pillars the Malian junta rests on","theaters":["mali","burkina","cote-divoire"],"mil":"Hunter-warrior brotherhoods with PRE-COLONIAL roots across Mande West Africa, historically responsible for community protection and initiated through their own hierarchies. Analysts count the Dozo as one of THREE PILLARS of the Malian junta's security — alongside the ~25,000-strong FAMa and Africa Corps. Dozo formations have been implicated in massacres of Fulani civilians.","log":"Community-based, self-equipping, with state tolerance and periodic supply.","eco":"Hunting, artisanal mining and local levies.","assess":"The state is outsourcing security to an institution older than the state itself — which works tactically and corrodes strategically: when a pre-colonial brotherhood becomes a counter-insurgency force, communal massacre becomes state policy by proxy."}, {"id":"msa-gatia","prov":"VERIFIED","src":"Africa Center for Strategic Studies","name":"MSA & GATIA","full":"Mouvement pour le Salut de l'Azawad · GATIA","affil":"MALIAN TUAREG · PRO-BAMAKO","icon":"◇","color":"#5aa86e","tier":"ELEVATED","strength":"~3,000 and ~1,000 fighters — Tuareg against Tuareg","theaters":["mali","niger"],"mil":"Two MONO-ETHNIC TUAREG formations LOYAL TO BAMAKO: the MSA drawn from the DAOUSSAHAK community (~3,000) and GATIA from the IMGHAD (~1,000). They fight both the jihadists and, at times, the separatist FLA — which is also Tuareg.","log":"Community recruitment in the Gao and Ménaka regions; state and occasionally French-era support.","eco":"Livestock and control of local trade corridors.","assess":"The clearest refutation of 'the Tuareg want independence'. Tuareg society is stratified — Imghad and Daoussahak communities have their own reasons to oppose the Ifoghas-led separatist project — and Bamako has used those internal divisions as a security instrument for a decade. The war within the war."}, {"id":"saf","prov":"VERIFIED","src":"EUAA actor mapping; ACLED","name":"SAF","full":"Sudanese Armed Forces","affil":"SUDANESE STATE · Burhan","icon":"⚑","color":"#5a8dc7","tier":"CRITICAL","strength":"The state army — fighting with the old regime's militias inside it","theaters":["sudan"],"mil":"Sudan's regular army under Abdel Fattah al-Burhan, holding Khartoum, the north and the east. Its momentum stalled in mid-2025 as the war moved toward RSF strongholds in Darfur and West Kordofan; the fall of EL FASHER in October 2025 after an 18-month siege was its worst reversal. It retains the decisive asset the RSF lacks: an air force, used for strikes across Darfur and Kordofan.","log":"State arsenals, Egyptian and Iranian-supplied drones, and an air arm. Command over its own coalition is loose — allied militias have clashed with each other.","eco":"Control of the central state, the banking system, and Port Sudan — the customs and remittance economy. Gold revenue it does NOT control is the RSF's counterweight.","assess":"THE TELL: to hold the line the SAF has increasingly relied on ISLAMIST MILITIAS ORIGINALLY MOBILISED UNDER THE BASHIR REGIME. The revolution of 2019 removed Bashir; the war is restoring the networks that sustained him. Whoever wins, that constituency returns armed."}, {"id":"jfasm","prov":"VERIFIED","src":"EUAA; El Fasher siege reporting","name":"Joint Force (JFASM)","full":"Joint Force of Armed Struggle Movements","affil":"DARFURI REBELS · now SAF-allied","icon":"◈","color":"#c7a54a","tier":"SEVERE","strength":"Held El Fasher for 18 months","theaters":["sudan"],"mil":"A coalition of DARFURI rebel movements that signed the 2020 Juba Peace Agreement — principally JEM and SLM-Minnawi under Minni Arko Minnawi, plus smaller factions. It stayed NEUTRAL for the war's first year, then declared against the RSF and allied with the SAF in early 2024. It was the backbone of the 18-month defence of El Fasher, repulsing dozens of assaults until the city fell in October 2025. Since then its forces have been redeployed to other fronts; in January 2026 it claimed the recapture of Jargeira in North Darfur.","log":"Darfuri recruitment base, SAF coordination, and the Chad border corridor.","eco":"Juba Agreement entitlements and territorial revenue in the areas it holds.","assess":"Former rebels against Khartoum now dying for it. The Juba Peace Agreement converted insurgents into stakeholders, and the war converted stakeholders into the state's most effective infantry — an argument for peace agreements working, and for what they cost the communities that signed them."}, {"id":"splmn-hilu","prov":"VERIFIED","src":"EUAA; Kordofan reporting 2026","name":"SPLM-N (al-Hilu)","full":"Sudan People's Liberation Movement-North · al-Hilu faction","affil":"NUBA MOUNTAINS · RSF-allied","icon":"▲","color":"#b83d3d","tier":"SEVERE","strength":"Besieging Dilling and Kadugli","theaters":["sudan"],"mil":"A SUDANESE movement rooted in the NUBA MOUNTAINS and South Kordofan, holding territory it has governed autonomously since the 1980s. Neutral early in the war, it is now aligned with the RSF: as of 2026 the fiercest fighting is in Kordofan where SPLM-N forces besiege the SAF-held cities of DILLING and KADUGLI. In January 2026 it joined an RSF push into Blue Nile launched from SOUTH SUDANESE territory.","log":"Long-established Nuba base areas, cross-border routes through South Sudan, and RSF coordination.","eco":"Subsistence and local taxation in the Nuba areas; the alliance supplies the heavier materiel.","assess":"The war has re-activated Sudan's OLDEST unresolved question — the periphery's status — by giving its most durable rebel movement a powerful new patron. A Nuba movement fighting for self-determination since before either belligerent existed is now a subcontractor in someone else's war."}, {"id":"sudan-shield","prov":"VERIFIED","src":"EUAA; Gezira defection reporting","name":"Sudan Shield Forces","full":"Sudan Shield Forces · Abu Aqla Kaikal","affil":"SUDANESE MILITIA · defected to SAF","icon":"◆","color":"#8a6db8","tier":"ELEVATED","strength":"The defection that changed Gezira","theaters":["sudan"],"mil":"A militia led by ABU AQLA KAIKAL, originally aligned with the RSF in Gezira state, which DEFECTED TO THE SAF — a switch that helped unravel RSF control of the farming heartland. Formally incorporated into SAF operations from April 2026, including the Blue Nile campaign. Its camps have been hit by RSF drone strikes in the Butana plains.","log":"Gezira and Butana networks; now SAF-supplied.","eco":"Agricultural Gezira — Sudan's breadbasket — and the tax that comes with holding it.","assess":"Proof that Sudan's war is fought by units whose allegiance is transactional, not ideological. Kaikal's defection moved a front line; nothing about the cause changed."}, {"id":"slm-aw","prov":"VERIFIED","src":"EUAA; Jebel Marra reporting Jan 2026","name":"SLM-AW","full":"Sudan Liberation Movement · Abdel Wahid al-Nur","affil":"DARFURI · NEUTRAL","icon":"○","color":"#5aa86e","tier":"WATCH","strength":"The faction that refused both sides — and governs anyway","theaters":["sudan"],"mil":"A DARFURI movement, historically Fur-based, that refused to sign the Juba Peace Agreement and has stayed OUT of the SAF-RSF war. In January 2026 it ordered Sudanese state symbols replaced with its own across the 'Liberated Areas' it controls in Central and North Darfur — declaring administrative sovereignty without joining the fight.","log":"Jebel Marra highlands — the terrain that has kept it independent for two decades.","eco":"Local administration and taxation in the areas it holds.","assess":"The most interesting actor on the board precisely because it does nothing. While two armies destroy the country contesting the centre, SLM-AW is quietly building a third answer in the mountains: not victory, not surrender — exit."}, {"id":"tribal-militias","prov":"VERIFIED","src":"EUAA (241 armed actors); ACLED","name":"Tribal militias","full":"Zaghawa Council · Dar al-Hamar · Misseriya and others","affil":"SUDANESE COMMUNITIES · SPLIT","icon":"✧","color":"#c77d4a","tier":"SEVERE","strength":"The layer where allegiance fractures","theaters":["sudan"],"mil":"Community militias that mostly operate as home-region defence forces while supplying one side or the other. The ZAGHAWA COUNCIL helped hold North Darfur for the SAF early on. The RSF recruits heavily from the MISSERIYA. The DAR AL-HAMAR militia of Kordofan has ELEMENTS FIGHTING ON BOTH SIDES — and has historic tensions with the Misseriya. Clashes have occurred BETWEEN SAF-aligned groups.","log":"Local, communal, and cheap — which is why both belligerents rely on them.","eco":"Livestock, land, and control of local routes; the grievances predate the war and will outlast it.","assess":"This is where 'who is fighting whom' stops being answerable at the level of two generals. Sudan's war runs on roughly 241 identified armed actors; allegiance splits by FACTION and sometimes by VILLAGE, not by movement. Any settlement negotiated between Burhan and Hemedti addresses a fraction of the men with guns."}, {"id":"rsf-parallel","prov":"VERIFIED","src":"RSF declaration Apr 2025; UK sanctions Jul 2026","name":"Government of Peace and Unity","full":"RSF parallel government (from April 2025)","affil":"RSF POLITICAL WING","icon":"▣","color":"#e06a5f","tier":"CRITICAL","strength":"The partition, formalised","theaters":["sudan"],"mil":"The RSF's parallel administration, declared in April 2025, claiming to govern the territory it holds — most of Darfur and parts of Kordofan. It gives the RSF's conquests an administrative face: ministries, appointments, and the machinery of a rival state.","log":"Runs on the same UAE-linked gold corridor and Chadian and Libyan supply routes that arm the RSF.","eco":"DARFUR'S GOLD. The parallel government's viability rests on exporting it — which is why the UK's July 2026 sanctions on gold and finance networks target the structure rather than the commanders.","assess":"Sudan is no longer heading toward partition; it has a second government with a treasury, a territory and a foreign patron. Recognition is the only variable left, and El Obeid is the next city that would harden the line."}, {"id":"fdlr","prov":"VERIFIED","src":"UN Group of Experts; HRW; ICG (2026)","name":"FDLR","full":"Forces démocratiques de libération du Rwanda","affil":"RWANDAN origin · Hutu","icon":"⚔","color":"#c77d4a","tier":"SEVERE","strength":"Rwanda's stated casus belli — and now Kinshasa's co-belligerent","theaters":["drc"],"mil":"A largely RWANDAN HUTU armed group based on Congolese soil, some of whose leaders took part in the 1994 genocide in Rwanda (HRW). Its presence is Rwanda's PRIMARY STATED JUSTIFICATION for backing M23. Sanctioned under UNSC Resolution 1533. Operationally it now fights ALONGSIDE the Congolese army and Wazalendo militias against M23 — UN Group of Experts reporting confirms joint FARDC-FDLR-Wazalendo lines around Kibirizi and Bwito, which Kinshasa denies.","log":"Entrenched in North Kivu's Virunga fringe; conducts incursions into M23-held areas. Sustained by local taxation and alliance with Nyatura and Wazalendo formations.","eco":"Artisanal mining, charcoal from Virunga National Park, and roadblock taxation — the low-margin end of the same extraction economy M23 monetises at scale.","assess":"THE PIVOT OF THE WHOLE WAR. If FDLR did not exist, Rwanda would need another justification; because it does exist, and because Kinshasa fights beside it, Kigali's security argument cannot be dismissed as pretext alone. The platform's Competing Read on the DRC rests here: minerals finance the war (HIGH confidence), but this group is why the security logic is real too."}, {"id":"adf","prov":"VERIFIED","src":"UNSC Res 1533; Shujaa operation reporting","name":"ADF / ISCAP","full":"Allied Democratic Forces / Islamic State Central Africa Province","affil":"UGANDAN origin · IS-affiliated","icon":"☠","color":"#b83d3d","tier":"CRITICAL","strength":"The only IS-branded force in the Congo basin — and it strikes Uganda too","theaters":["drc"],"mil":"Founded in UGANDA in the 1990s as an anti-Museveni Islamist insurgency, pushed into eastern DRC, and formally recognised by Islamic State as its Central Africa Province in 2019. Responsible for repeated mass-casualty massacres of Congolese civilians in North Kivu and Ituri, and has intensified attacks INSIDE UGANDA. Sanctioned under UNSC Resolution 1533. Ugandan and Congolese forces run joint operations (Shujaa) against it, with limited effect.","log":"Dispersed cells in the Rwenzori forests across the DRC-Uganda border; the frontier itself is the logistics asset.","eco":"Gold, timber, and abduction-for-labour. IS affiliation brings branding and some finance, but the group predates and exceeds it — the money is local.","assess":"The group most often mis-framed. It is NOT a Rwanda-DRC issue and not primarily a minerals story: it is a Ugandan insurgency exported to Congolese territory that has since found an IS franchise. Counting it in the M23 conflict confuses two separate wars sharing one map."}, {"id":"codeco","prov":"VERIFIED","src":"UN Joint Human Rights Office; ACLED Ituri","name":"CODECO","full":"Coopérative pour le développement du Congo","affil":"CONGOLESE · Lendu","icon":"◆","color":"#8a6db8","tier":"SEVERE","strength":"Ituri's deadliest actor for civilians","theaters":["drc"],"mil":"A CONGOLESE Lendu-community militia network in Ituri, framing itself as protector of Lendu farmers against Hema pastoralist militias. Fragmented into competing factions. Attacks on displacement sites have killed hundreds. With FARDC redeployed to the M23 front, CODECO has expanded in the vacuum.","log":"Rural Ituri base; local recruitment; no external state patron identified.","eco":"Ituri's ARTISANAL GOLD — the province is one of Africa's richest goldfields and CODECO taxes pits and routes directly.","assess":"A purely internal conflict lineage — the Hema-Lendu antagonism runs to the colonial administration's ethnic classification and the 1999-2003 Ituri war. No foreign sponsor is needed to explain it, which is exactly why it tests the platform's external-actor lens."}, {"id":"zaire","prov":"VERIFIED","src":"UN Joint Human Rights Office; ACLED Ituri","name":"Zaire militia","full":"Zaire / Force de résistance patriotique","affil":"CONGOLESE · Hema","icon":"◇","color":"#c7a54a","tier":"ELEVATED","strength":"CODECO's mirror image","theaters":["drc"],"mil":"A CONGOLESE HEMA-aligned militia in Ituri formed in direct opposition to CODECO. The two groups' reciprocal massacres define Ituri's violence; both claim community self-defence.","log":"Local Ituri networks; periodic informal cooperation with elements of the state security forces.","eco":"Gold sites and cattle; the same Ituri goldfields CODECO contests.","assess":"Together with CODECO it demonstrates the platform's own caution: two Congolese communal militias, no foreign patron, fighting over land and gold — a conflict the extraction lens explains only partially and the identity lens explains better."}, {"id":"wazalendo","prov":"VERIFIED","src":"HRW abuse documentation; UN Group of Experts","name":"Wazalendo","full":"Wazalendo (‘patriots’) — pro-government militia coalition","affil":"CONGOLESE · state-aligned","icon":"⚑","color":"#5aa86e","tier":"SEVERE","strength":"Kinshasa's irregular army — and an abuse problem","theaters":["drc"],"mil":"A loose coalition of CONGOLESE Mai-Mai and community self-defence militias fighting alongside the FARDC against M23. Formerly labelled rebels, rebranded as 'patriots' after the state armed them. HRW documents WIDESPREAD ABUSES against civilians; after the army's retreat they took control of several South Kivu localities in their own right.","log":"State-supplied weapons plus captured stocks; fights beside FARDC, Burundian troops and, per UN experts, FDLR.","eco":"Roadblocks, mining-site taxation and protection payments — the militia economy the state has licensed rather than replaced.","assess":"The clearest case of a government solving a security problem by creating a governance one. Arming community militias bought manpower against M23 and produced a network of armed actors Kinshasa does not command — the Haiti pattern in a different register."}, {"id":"twirwaneho","prov":"VERIFIED","src":"UN Group of Experts; Minembwe reporting Jun 2026","name":"Twirwaneho","full":"Twirwaneho — Banyamulenge self-defence movement","affil":"CONGOLESE · Banyamulenge Tutsi · M23-aligned","icon":"✧","color":"#4a9dc7","tier":"ELEVATED","strength":"Holds Minembwe against a three-army offensive","theaters":["drc"],"mil":"A CONGOLESE BANYAMULENGE (Tutsi) armed movement in the South Kivu highlands, formed to defend a community whose Congolese citizenship has been contested for decades. UN experts confirm collaboration with M23. In June 2026 the FARDC, BURUNDIAN army (FDNB) and Wazalendo launched an offensive to encircle Minembwe; Twirwaneho counterattacked around 19 June under commander Charles Sematama, held the town centre, and reportedly captured BELGIAN MERCENARIES fighting on the government side.","log":"Highland terrain, community base, and M23 alignment for materiel.","eco":"Cattle economy and highland trade routes rather than minerals — among the least extraction-driven actors in the war.","assess":"The citizenship question in armed form. This is the Banyamulenge answer to decades of contested belonging — and the presence of foreign mercenaries on the other side shows how thoroughly the 'local militia' framing has broken down."}, {"id":"nyatura","prov":"VERIFIED","src":"UN Group of Experts; North Kivu monitoring","name":"Nyatura","full":"Nyatura — Congolese Hutu militia network","affil":"CONGOLESE · Hutu · FDLR-aligned","icon":"▲","color":"#a8763d","tier":"ELEVATED","strength":"The FDLR's Congolese partner","theaters":["drc"],"mil":"CONGOLESE HUTU militias in North Kivu, aligned with the Rwandan-origin FDLR. Multiple factions with shifting names and leaders.","log":"North Kivu highlands; shares territory and supply with FDLR formations.","eco":"Local taxation, charcoal, small mining sites.","assess":"Shows how the 1994 spillover became permanent Congolese politics: a Congolese community militia defined by alliance with a Rwandan exile force, three decades on."}, {"id":"foreign-forces","prov":"VERIFIED","src":"UN Group of Experts; SAMIDRC withdrawal reporting","name":"Foreign forces in the DRC","full":"State armies, missions and contractors on Congolese soil","affil":"MULTI-STATE","icon":"⚑","color":"#c74a7d","tier":"CRITICAL","strength":"At least five foreign militaries and two contractor sets","theaters":["drc"],"mil":"RWANDA (RDF): documented by successive UN Groups of Experts as providing troops, equipment and command support to M23 — denied by Kigali. BURUNDI (FDNB): deployed in support of the Congolese army, engaged directly against Twirwaneho at Minembwe. UGANDA (UPDF): joint operations against the ADF. SAMIDRC (South Africa, Malawi, Tanzania): SADC mission deployed Dec 2023, suffered fatalities at Goma including 14 South Africans, since withdrawn. MONUSCO: UN peacekeeping mission, winding down but still present. PRIVATE MILITARY COMPANIES: Romanian and other contractors employed by Kinshasa; BELGIAN mercenaries reportedly captured by Twirwaneho in June 2026.","log":"Cross-border resupply on both sides; Kigali and Bujumbura sustain opposing coalitions across the same frontier.","eco":"Rwanda's mineral exports rose in step with M23's territorial control — the UN Panel's central finding, and the platform's evidence for financing (HIGH confidence).","assess":"THE ANSWER TO 'WHOSE WAR IS THIS'. Eastern Congo hosts a Rwandan-backed rebellion, a Rwandan-origin exile army fighting for Kinshasa, a Ugandan-origin jihadist franchise, Burundian troops, a withdrawn SADC mission, a departing UN force, and European mercenaries on contract — all inside one country's borders. Sovereignty here is not weak; it is subdivided."}, {"id": "al-shabaab", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "Al-Shabaab", "full": "Harakat al-Shabaab al-Mujahideen", "affil": "al-Qaeda", "icon": "🏴", "color": "#b83d3d", "tier": "CRITICAL", "strength": "The WEALTHIEST al-Qaeda affiliate on earth — the benchmark", "theaters": ["somalia", "ethiopia"], "mil": "Al-Qaeda's strongest and most successful affiliate. Goal: destroy the Federal Government, expel foreign forces, and build a 'Greater Somalia' uniting ethnic Somalis across East Africa under strict Islamic rule. It is exploiting the ATMIS withdrawal vacuum — retook at least 5 districts in Lower Shabelle and Middle Jubba by late 2025, with the offensive intensifying into 2026. Attack tempo rose from 68 to 116 per month (+70%); attacks on civilians surged 306%; attacks on the US-trained Danab and Gorgor special forces surged 1,764%. Attempted to assassinate the president by IED in March 2025. Controls large rural swathes of south-central Somalia plus strongholds in the northern Al-Madow mountains, and mounts cross-border raids into Kenya and Ethiopia.", "log": "Deep clan integration makes it nearly impossible to dislodge from areas where it has roots. Its intelligence network PENETRATES Somali government and security institutions — enabling targeted assassinations and insider attacks, and meaning offensives are often known in advance. Controls key routes across south-central Somalia. When peacekeepers vacate a position, it reoccupies within weeks.", "eco": "THE BENCHMARK. Al-Shabaab is the wealthiest al-Qaeda affiliate in the world — the standard against which every other group's economy is measured (JNIM ranks second). It runs a genuine taxation and extortion STATE: levies on businesses, checkpoints, ports, agricultural produce, and the telecoms/hawala money-transfer economy that Somalia runs on. It taxes both the formal and informal economy, including businesses in government-held Mogadishu — meaning the state's own commercial base pays it. This is why counterinsurgency fails: it is not funded by patrons who can be cut off, but by the economy itself.", "assess": "Al-Shabaab is the proof-of-concept for every other group on this board: a jihadist organization that became a fiscal state, taxing the very economy the government depends on. It also delivers the platform's clearest strategic warning — when ATMIS drew down before the Somali army could replace it, 'liberated' territory fell within months. That is a lesson with direct bearing on every theater where a foreign force is holding a line."}, {"id": "jnim", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "JNIM", "full": "Jama'at Nusrat al-Islam wal-Muslimin", "affil": "al-Qaeda", "icon": "🏴", "color": "#4a9d5f", "tier": "CRITICAL", "strength": "~6,000 fighters — largest militant force in the Sahel", "theaters": ["mali", "burkina", "niger", "benin-togo", "cote-divoire", "ghana"], "mil": "Formed 2017 from the merger of Ansar Dine, Katibat Macina, Al-Mourabitoun, Ansarul Islam, and AQIM's Sahara branch. Doubled its attack tempo in 2025 vs 2024. Burkina Faso alone recorded 280+ JNIM attacks in H1 2025. Structured in three tiers — central leadership, regional commanders, local area commanders — anchored by a Majlis al-Shura that sets strategy and approves high-value operations. Now pressing southward toward the Gulf of Guinea littoral: a new senior leader (Sekou Muslimu) was appointed to expand into Benin, Côte d'Ivoire, Ghana, Niger, and Togo, with a separate emir for Benin. Carried out its first documented attack in Nigeria (Oct 2025, Kwara State).", "log": "A 'franchise model' — local autonomy under central strategic oversight, adapting taxation and recruitment to regional conditions. Mines double as logistics hubs: recruitment grounds, weapons-storage sites, and staging points. Cross-border mobility across the Mali-Burkina-Niger tri-border and now into the coastal states. Sanctioned commanders coordinate specific functions (Sidan ag Hitta ran Western-hostage negotiations; Jafar Dicko oversaw Burkina kidnappings via Ansarul Islam).", "eco": "A war economy worth roughly $100M+/yr — the wealthiest al-Qaeda affiliate after al-Shabaab. FOUR PILLARS: (1) ARTISANAL GOLD — the most profitable sector. JNIM doesn't dig; it controls the chokepoints (road to the mine, road from it, the riverbank where ore is washed, the market where it's sold) and levies a toll at each. Sites under its influence produce up to 725kg/yr (~$34M), exported to the UAE, Turkey, and Switzerland. Over 2,000 miners work the N'Abaw goldfields in Mali. It undercuts pro-government militias on price, building legitimacy. (2) KIDNAPPING — 845 of 1,100 recorded Sahel abductions (2017-23). Local businessmen fetch $3,000-5,000; foreigners can command millions (a member of Dubai's ruling family reportedly yielded $20M+). Kidnappings spike on first entering an area — to intimidate, gather intelligence, and remove local authority figures — then shift to forced recruitment of skilled workers (doctors, nurses). (3) CATTLE RUSTLING — men on motorbikes force Fulani herders to surrender livestock; the cattle are trucked to markets in Ghana, Mali, or Senegal and blended into legitimate stock. A single cow sells for ~$346 in a country where annual GDP per capita is under $3,000. (4) MONEY LAUNDERING + ECONOMIC WARFARE — lends to merchants, underwrites shops, uses formal banking; assassinates those who interfere with its investments. Systematically attacks foreign (esp. Chinese-run) mining sites — Narena, Morila — as a racketeering campaign to extort operators and delegitimize the state. Notably, little evidence of crypto adoption, unlike ISWAP.", "assess": "JNIM is the platform's most economically sophisticated non-state actor and the clearest proof of the extraction thesis: it does not need to own the gold, only to tax every chokepoint between the ore and the market. Its southward push toward the Gulf of Guinea is the single most important trend line in West Africa — it threatens to convert the Sahel's landlocked insurgency into a coastal one with access to ports."}, {"id": "iswap", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "ISWAP", "full": "Islamic State West Africa Province", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "CRITICAL", "strength": "Largest IS affiliate in Africa (US State Dept)", "theaters": ["nigeria", "cameroon", "niger", "lakurawa"], "mil": "Formed March 2015 when Boko Haram's Shekau pledged allegiance to IS; split from him over indiscriminate violence, defeated his faction in 2021, and absorbed many of his fighters. Carried out 500+ attacks in Borno State between January and October 2025. Drone attacks rose from 1 (2024) to 7 (2025). Reinforced its Gargash and Sambisa bases with ~100 additional trained fighters each and elevated Sambisa to a formal IS administrative province headed by a wali — a shift toward territorial governance. Active cells in Kogi, Zamfara, Sokoto, and Katsina states, plus Cameroon's Far North, Niger's Diffa, and Chad's Lac province.", "log": "Controls many of the hundreds of islands in Lake Chad — the rear base, logistics hub, and staging ground for attacks across all four basin countries. Captures and redeploys government heavy weapons (IS pays reward bounties for equipment seized from the Nigerian military). Rising leadership weight inside global IS: after the death of IS deputy Abu Khadija (Iraq, Mar 2025), West Africa's al-Furqan office head took a more prominent role, possibly heading IS's General Directorate of Provinces — meaning West Africa is now a command center, not a periphery.", "eco": "THE SIGNATURE STATISTIC: ISWAP's taxation take is roughly $191 MILLION — against Borno State's entire 2024 revenue of $18.4 million. The jihadist group out-taxes the government it fights by more than 10 to 1. And that figure excludes revenue from elsewhere in Nigeria, kidnapping proceeds, and IS bounty payments for captured military equipment. Broader analyses put total taxation revenue well over $100M/yr, sustaining operations across Niger, Chad, Mali, and Burkina Faso — effectively making Nigeria the financial hub of the wider IS network. The model: taxation of farming, fishing, herding, and trade routes; some services provided free (water, boats, basic healthcare) to build legitimacy — but rates are arbitrary and set at leaders' discretion, 'creating opportunities for abuse.' A fisherman in ISWAP waters without proof of payment can be flogged to death; a fish dealer who refuses loses his shipment, his life, or is abducted; herders face arbitrary cattle taxes that can wipe them out. Entire communities have been massacred for non-payment. ISWAP has experimented with cryptocurrency (Tether). US sanctions have targeted its financing architecture — including Lagos and Kano bureaux de change — and a joint US-Nigerian operation killed Abu-Bilal al-Minuki, the architect of ISWAP's financing.", "assess": "ISWAP is the most important counter-example to the idea that jihadist groups are merely destructive: it is a functioning parallel state with a revenue base ten times its government rival's. That fiscal asymmetry — not battlefield strength — is why it cannot be dislodged. It is also the connective tissue of the Lake Chad Basin, operating across Nigeria, Cameroon, Niger, and Chad simultaneously, which is precisely why the platform now tracks Cameroon."}, {"id": "boko-haram", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "Boko Haram (JAS)", "full": "Jama'atu Ahlis Sunna Lidda'awati wal-Jihad", "affil": "Independent (ex-IS)", "icon": "🏴", "color": "#8c4a9d", "tier": "SEVERE", "strength": "Diminished vs ISWAP but resurgent in capability", "theaters": ["nigeria", "cameroon", "lakurawa"], "mil": "The original Lake Chad insurgency. Lost the intra-jihadist war to ISWAP (Shekau killed himself in May 2021 during an ISWAP assault) but remains lethal and is closing the capability gap: in the March 2025 Wulgo attack on a Cameroonian base it killed 20 soldiers and SEIZED Soviet-made ZSU-23-4 Shilka radar-guided anti-aircraft guns, and it now employs explosive-laden drones. Distinguished from ISWAP by indiscriminate violence against Muslim civilians — the very issue that caused the 2016 split.", "log": "Operates from Lake Chad and Sambisa remnant areas; cross-border raids into Cameroon's Far North (Mayo-Tsanaga, Mayo-Sava, Logone-et-Chari). Captured government heavy weaponry is now a meaningful part of its arsenal, and drone acquisition marks a step-change. Cooperates opportunistically with Lakurawa in the northwest.", "eco": "Kidnap-for-ransom is the core earner — a Boko Haram-linked group netted ~$500,000 for a single judge. Nigeria's abduction economy is vast: 4,722 people taken in 997 incidents between July 2024 and June 2025, with ~$1.66M in ransoms paid and 762 victims killed. Also relies on raiding, cattle theft, and extortion of farming and fishing communities. Less sophisticated than ISWAP's taxation state — more predatory, less governmental — which is why it commands less territory but remains violent.", "assess": "Boko Haram is the cautionary tale about 'defeated' groups: militarily eclipsed by ISWAP, yet it just seized radar-guided anti-aircraft systems and fields attack drones. Its resurgence is the clearest driver of the new Cameroon theater."}, {"id": "issp", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "ISSP / IS-Sahel", "full": "Islamic State Sahel Province", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "SEVERE", "strength": "JNIM's principal rival in the Sahel", "theaters": ["niger", "mali", "burkina", "lakurawa"], "mil": "The Islamic State's Sahel arm and JNIM's direct competitor — the two fight each other as well as the states. Concentrated in the Mali-Niger-Burkina tri-border. Increasingly linked to the northwest Nigeria corridor: the UN reports IS-Sahel fighters operating in Nigeria's rear zones and working to connect with ISWAP.", "log": "Tri-border sanctuary; rear bases now extending into northwest Nigeria via the Lakurawa corridor. The strategic objective is a contiguous IS space linking the Sahel to the Lake Chad Basin.", "eco": "Shifted toward high-value foreign abductions to raise cash — in early 2025 it conducted or sponsored the kidnapping of six foreign nationals, including an Austrian woman in Agadez and four Moroccan truck drivers in Burkina Faso. ACLED assesses the shift is 'driven by the group's need for resources, given that foreigners command higher ransom fees than local abductees.' Also taxes gold sites and trade routes in its zones, competing directly with JNIM for the same revenue base.", "assess": "ISSP matters most as the other half of a two-front jihadist competition: JNIM and ISSP fight each other for the same taxation base, which sometimes slows both — but their rivalry is also what drives expansion into new territory, including the Nigerian northwest."}, {"id": "lakurawa", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "Lakurawa", "full": "Lakurawa (NW Nigeria tri-border)", "affil": "Hybrid jihadist-criminal", "icon": "🏴", "color": "#d4884a", "tier": "ELEVATED", "strength": "Tri-border hybrid; the ISSP-ISWAP conduit", "theaters": ["lakurawa", "nigeria", "niger", "benin-togo"], "mil": "Emerged ~2017-18 from a merger of Malian Macina/JNIM-linked Fulani fighters and a Nigerien herder self-defense faction — invited by Sokoto communities to fight bandits, then turned predatory. Declared a terrorist group by Nigeria (Nov 2024/Jan 2025). Hit by US airstrikes on Christmas Day 2025 (Sokoto/Bauni Forest camps). Massacred 162 civilians in Woro and Nuku, Kwara State (Feb 2026), after villagers refused to let it preach. Expanding south into Niger State's Borgu axis. Leader Amir Tajudeen moves between Nigeria, Niger, Mali, and Chad.", "log": "Sanctuary in the ungoverned Nigeria-Niger-Benin tri-border. ISS assesses it functions as a STRATEGIC CONDUIT — the link connecting the Sahel's IS/AQ franchises (ISSP, JNIM) toward Nigeria and the Gulf of Guinea. Cooperates with both Boko Haram/JAS and ISWAP. Niger's post-2023-coup tension with Nigeria blocks the joint operations needed to close the corridor.", "eco": "Governance-through-extraction across roughly 500 villages: coercive 'zakat' taxation, livestock confiscation, produce seizure, and a forced religious code, with rival vigilantes suppressed. High-value kidnapping demonstrates cross-border financial reach — the Kebbi deputy speaker was ransomed for ~$140,600, partly paid in CFA francs. The crime-terror nexus makes it self-financing and less dependent on external patrons than the larger franchises.", "assess": "Lakurawa's significance is structural, not its size: it is the seam. If the Sahel's jihadist economy and Lake Chad's taxation state ever fully connect, Lakurawa is the corridor through which it happens — which is why US airstrikes came to northwest Nigeria."}, {"id": "rsf", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "RSF", "full": "Rapid Support Forces", "affil": "State-backed paramilitary", "icon": "⚔", "color": "#d43d3d", "tier": "CRITICAL", "strength": "Genocide-designated; controls Darfur + besieging Kordofan", "theaters": ["sudan"], "mil": "Descended from the Janjaweed militias that killed as many as 400,000 in Darfur two decades ago. The US State Department has FORMALLY DETERMINED the RSF is committing genocide — murdering men and boys and systematically raping women and girls on ethnic grounds. El Fasher fell in October 2025 with ~6,000 killed in the first three days. The identical siege is now closing on El Obeid, where ~500,000 civilians are trapped. Fields drones supplied via its patron network.", "log": "THE UAE PIPELINE — the platform's best-documented external-supply chain. Arms flow from UAE bases to Amdjarass in Chad (officially a 'field hospital'; UN investigators found 'credible evidence' it was an arms-transfer front), then into RSF-held Sudan. Chad allows the transit in exchange for ~$2B in Emirati loans (2023-24). Alternative routes run through Libya (al-Kufra) and, increasingly, Ethiopia. In January 2026 Egypt, Saudi Arabia, and Somalia began denying the UAE overflight permission, squeezing the network and making Chad more vital.", "eco": "GOLD. Sudan is one of Africa's largest gold producers and most of its gold flows to Dubai — the UAE officially imported 39 tons in 2022, with perhaps another 60 tons smuggled via Chad, Egypt, and Ethiopia. The war has only increased the smuggling, letting the RSF (and the SAF) trade gold for weapons. This is the purest gold-for-guns economy on the platform, and it is why the UAE's patronage persists despite the genocide determination.", "assess": "The RSF is the clearest case in the platform of an armed group functioning as the delivery mechanism for someone else's extraction: it fights, and the gold flows to Dubai. Senator Sanders has now named the UAE directly as having 'financed and enabled this genocide for years' — while it remains a US 'major defense partner.'"}, {"id": "m23", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "M23 / AFC", "full": "March 23 Movement / Alliance Fleuve Congo", "affil": "Rwanda-backed", "icon": "⚔", "color": "#4a7dc7", "tier": "SEVERE", "strength": "Holds Goma + Bukavu; Rwanda-equipped", "theaters": ["drc"], "mil": "Rwanda-backed rebel coalition that seized Goma and Bukavu in early 2025 — the most significant territorial conquest in the eastern DRC in a generation. Under US pressure it fully withdrew from Uvira in South Kivu, but the Washington and Doha peace processes remain fragile and the African Union is trying to reassert a facilitation role.", "log": "Direct Rwandan Defence Force support (troops, equipment, command) — documented repeatedly by UN Group of Experts panels despite Kigali's denials. Supply lines run across the Rwandan border.", "eco": "COLTAN AND COBALT. The eastern DRC holds the world's critical-minerals prize, and M23's territorial control sits atop it. Minerals are smuggled through Rwanda and enter global supply chains laundered as Rwandan-origin — the mechanism by which a country with modest deposits became a significant coltan exporter. This is the extraction thesis in its most literal form: the conflict is the mechanism, the minerals are the point, and the end user is the global electronics and EV supply chain.", "assess": "M23 is the DRC theater's engine and the platform's most direct link between an armed group and the critical-minerals system. Every EV battery and smartphone touches this war somewhere upstream."}, {"id": "al-shabaab-moz", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "Al-Shabaab (Mozambique)", "full": "Ahlu Sunnah Wa-Jama (ISIS-Mozambique)", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "ELEVATED", "strength": "Persistent in Cabo Delgado despite Rwandan/SADC forces", "theaters": ["mozambique"], "mil": "An ISIS-linked insurgency in gas-rich Cabo Delgado since 2017 — locally called 'Al-Shabaab' but unrelated to Somalia's. Over 6,400 killed, 1.3 million displaced. The 2021 Palma attack (~800 dead) froze the LNG megaprojects. Rwandan and SADC forces secured the Afungi enclave, enabling TotalEnergies' January 2026 restart, but the insurgency persists in the north with beheadings and kidnappings.", "log": "Rural sanctuary in northern Cabo Delgado, outside the secured 'closed enclave' around the gas site. The enclave model protects the $20B project while leaving surrounding communities exposed — a security architecture built around capital, not people.", "eco": "Gas-adjacent grievance rather than a taxation state. The insurgency was triggered in part by the gas discovery itself and the conviction among Cabo Delgado's population — over 80% below the poverty line — that they would be excluded from the benefits. It funds itself through raiding, kidnapping, and local extortion rather than a sophisticated revenue architecture.", "assess": "This group exists because of extraction, not despite it: a resource discovery generated an insurgency, foreign troops secured the enclave, foreign majors take the gas, and the local population bears the cost. It is the platform's cleanest extraction-conflict causal chain."}];
const BLOCS = [{"id": "aes-ecowas", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "AES vs ECOWAS", "icon": "⬡", "color": "#d4884a", "what": "The Sahel's rupture with West Africa's regional order", "sideA": "AES (Alliance of Sahel States): Mali, Burkina Faso, Niger — military juntas, exited ECOWAS (Jan 2025), formed a mutual-defense confederation", "sideB": "ECOWAS: Nigeria, Ghana, Senegal, Côte d'Ivoire + the coastal states — plus France/EU backing", "contest": "Sovereignty and security orientation. The AES states expelled French forces, turned to Russia's Africa Corps, and rejected ECOWAS's democratic-restoration demands. ECOWAS lost its leverage — sanctions failed, and the juntas consolidated.", "faultline": "The jihadist insurgency doesn't respect the split: JNIM and ISSP operate across both blocs and are now pushing south into ECOWAS coastal states (Benin, Togo, Côte d'Ivoire, Ghana). The rupture destroyed the cross-border cooperation needed to fight them — Niger's coup broke joint operations with Nigeria, which is precisely why the Lakurawa corridor stays open. · INFORMATION WAR: the fault line is now being exploited by coordinated coup-disinformation campaigns targeting Côte d'Ivoire — the region's key French-aligned economy — fabricating a military takeover to manufacture the appearance of AES-style rupture. Ivorian authorities call it 'a deliberate and coordinated disinformation campaign'; analysts describe a broader push promoting coups across West Africa. Attribution unresolved.", "theaters": ["mali", "burkina", "niger", "benin-togo", "lakurawa", "nigeria", "ghana", "cote-divoire"]}, {"id": "gulf-rivalry", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "The Gulf Rivalry", "icon": "⬡", "color": "#c74545", "what": "UAE vs Qatar/Saudi/Turkey/Egypt — fought through African proxies", "sideA": "UAE: backs the RSF (Sudan), Abiy's Ethiopia, Haftar's Libya; buys the gold", "sideB": "Saudi Arabia, Egypt, Turkey, Qatar, Iran: back Sudan's SAF; Egypt aligns with Eritrea vs Ethiopia", "contest": "Red Sea and Horn primacy, ports, gold, and agricultural land. The UAE has become the single most important foreign power keeping the RSF in the fight — arms via Amdjarass (Chad) and Libya — while Egypt, Saudi Arabia, and Turkey back the army. Egypt's rivalry with Ethiopia over the GERD dam pulls the Nile into the same contest.", "faultline": "Sudan is the battlefield, but the fault line runs through Chad (which takes ~$2B in UAE loans to permit the arms transit), Libya (the al-Kufra route), and Ethiopia (a UAE-financed RSF training camp near the GERD, per Reuters). In January 2026, Egypt, Saudi Arabia, and Somalia began denying the UAE overflight rights — an escalation of the proxy war into airspace denial. Somalia CANCELLED all bilateral UAE agreements (Jan 2026) over the RSF pipeline — while the UAE simultaneously patronizes Puntland with airstrikes. The same Red Sea port strategy drives both.", "theaters": ["sudan", "ethiopia", "chokepoints", "iran-us", "somalia"]}, {"id": "russia-africa", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "Russia's Africa Corps", "icon": "⬡", "color": "#8c4a9d", "what": "The post-Wagner state takeover of Russian influence in Africa", "sideA": "Russia (Africa Corps, MoD-controlled): Mali, Burkina, Niger, CAR, Libya", "sideB": "France (expelled), the EU, the US — the displaced Western security architecture", "contest": "Regime survival services in exchange for mining concessions and diplomatic alignment. Russia offers what the West won't: no governance conditions. In return it takes gold and mineral rights and gains UN votes.", "faultline": "The security results are poor — jihadist violence rose after Russian deployment in Mali and Burkina — but the political bargain holds because it's about regime survival, not counter-terrorism. Meanwhile Russia's DPRK alliance (troops and shells for the Ukraine war) shows the same logic operating globally: patrons who ask no questions.", "theaters": ["mali", "burkina", "niger", "ukraine", "korea"]}, {"id": "minerals-cold-war", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "The Minerals Cold War", "icon": "⬡", "color": "#4a9d5f", "what": "China's processing monopoly vs the Western de-risking bloc", "sideA": "China: ~90% of rare-earth processing, dominant in DRC cobalt (CMOC), Indonesian nickel JVs, Kazakh reactors (CNNC); buys Myanmar's heavy-REE feedstock", "sideB": "US/EU/G7 ('Pax Silica'): IRA/CRMA de-risking, the DRC EGC/Trafigura deal, Kazakh/Ukrainian minerals agreements, Middle Corridor investment", "contest": "Not the mines — the PROCESSING and the chokepoints. China's leverage is that it refines what everyone else digs. The Western counter is to build parallel supply chains, but it has forfeited key ground: the US 'wasn't even in the room' for Kazakhstan's reactor bids, and Indonesia's export ban handed downstream capacity largely to Chinese firms.", "faultline": "Every conflict theater with a mineral is a front: Myanmar (KIA controls ~94% of China's heavy-REE feedstock), DRC (M23 sits on the coltan), Indonesia (nickel), Kazakhstan (uranium), Ukraine (the minerals deal). The Caucasus TRIPP corridor is the connectivity front — a US-controlled route bypassing Russia and Iran.", "theaters": ["myanmar", "drc", "indonesia", "kazakhstan", "taiwan", "caucasus", "ukraine", "geopolitical"]}, {"id": "donroe", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "The Donroe Doctrine", "icon": "⬡", "color": "#e0a030", "what": "US hemispheric reassertion — Venezuela, Cuba, Colombia, Haiti", "sideA": "US: captured Maduro (Jan 2026), administers Venezuelan oil, sanctions Cuba, architected Haiti's GSF, aligns with Colombia's incoming Espriella government", "sideB": "China, Russia, Cuba, Nicaragua — plus Petro's outgoing Colombia; China/Russia/Pakistan abstained on the Haiti mandate", "contest": "Hemispheric primacy and resources — Venezuelan oil now flows through an opaque Qatari account under US administration; Cuba is being strangled into 100+ market reforms.", "faultline": "The tell is Haiti: the US architected and financed the Gang Suppression Force but kept it AFRICAN-LED by design — Chad (1,500), Benin (up to 2,000), Bangladesh, Mongolia — stabilizing the hemisphere without US boots. The same Chad simultaneously hosts the UAE's RSF arms pipeline. Colombia's incoming government will close its Havana and Managua embassies, tightening the ring.", "theaters": ["venezuela", "cuba", "colombia", "haiti", "mexico", "jamaica"]}, {"id": "sanctions-bloc", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "The Sanctions Bloc", "icon": "⬡", "color": "#5b9bd5", "what": "Iran-Russia-DPRK-Venezuela-Cuba: the mutual-survival network", "sideA": "Iran, Russia, North Korea, Venezuela, Cuba — sanctioned states trading with each other", "sideB": "The US-led sanctions architecture + the G7 financial system", "contest": "Survival outside the dollar system. Russia supplies DPRK with tech/energy/food for troops and shells; Iran supplied Russia with drones; DPRK's tungsten exports to China rose 13-fold; Venezuela's oil moves through opaque channels.", "faultline": "The Hormuz crisis is the sharpest edge — Iran is enforcing a transit regime (IRGC authorization, 'maritime service fees') that would be a permanent revenue stream and a permanent lever. New Supreme Leader Mojtaba Khamenei has enshrined 'the lever of closing the Strait of Hormuz' as strategic doctrine. Sanctions-evasion gold (Russia, Sudan) and DPRK coal move through the same shadow networks.", "theaters": ["iran-us", "ukraine", "korea", "venezuela", "cuba", "chokepoints", "sudan"]}, {"id": "indo-pacific", "prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name": "First Island Chain", "icon": "⬡", "color": "#4a7dc7", "what": "US alliance system vs Chinese expansion in the Western Pacific", "sideA": "US, Japan, ROK, Philippines, Australia, Taiwan — treaty alliances + AUKUS", "sideB": "China (+ Russia and DPRK as the northern anchor)", "contest": "Taiwan (~90% of advanced chips) and the South China Sea ($3.4T trade artery). China's gray-zone tactics — coast guards, water cannon, ramming — are calibrated to stay below the US Mutual Defense Treaty tripwire.", "faultline": "The alliance is showing strain: the US curtailed intelligence sharing with Seoul after a lawmaker exposed the Kusong enrichment site, and the Russia-DPRK war alliance (troops for tech) has converted a frozen Korean standoff into a live node of the Ukraine war. Myanmar's rare earths flow into the same Chinese supply chain that the Taiwan contest is ultimately about.", "theaters": ["taiwan", "south-china-sea", "korea", "myanmar", "indonesia"]},{"id":"saudi-axis","prov":"LEGACY","src":"Pre-v59 entry — provenance not recorded at authoring","name":"The Saudi-Led Axis","icon":"☪","color":"#4cc98a","what":"Saudi Arabia + Qatar + Turkey + Pakistan + Egypt — a post-Iran-war security bloc meeting at quarterly FM level (Cairo, Jun 21 2026), dubbed an 'Islamic NATO' in Israeli reports. Pakistan's nuclear arsenal underpins it via the Saudi-Pakistani defense framework; Turkey brings NATO's second army and the KAAN fighter (Saudi SAMI co-invested); Qatar brings money and mediation; Egypt brings 438k troops.","contest":"Twin objectives that don't fully cohere: contain IRAN (and reclaim influence in Syria/Lebanon from its proxies) while also capping ISRAEL's 'military adventurism' — the Doha strike convinced Gulf capitals that 'we could be next.' Members split on whether to normalize with Israel or brace against it.","faultline":"The UAE is conspicuously EXCLUDED — Riyadh-Abu Dhabi mistrust now has institutional form, with both competing for the same post-oil investment. The deeper premise (Chatham House, May 2026): Gulf states 'should no longer rely on America for security guarantees' — and China won't fill the vacancy. The axis is what hedging looks like when the umbrella wobbles.","theaters":["saudi","turkey","pak-afg","egypt","uae-gulf","iran-us","syria","lebanon"]}];
const SEV={critical:'var(--red)',high:'var(--amber)',medium:'var(--gold)',low:'var(--grn)',watch:'var(--gov)'};
const SLBL={active:'ACTIVE',escalating:'ESCALATING',stalemate:'STALEMATE',declining:'EASING',frozen:'FROZEN',ceasefire:'CEASEFIRE',volatile:'VOLATILE',ongoing:'ONGOING',critical:'CRITICAL',watch:'WATCH'};
const TCLS={up:'trend-up',dn:'trend-dn',ss:'trend-ss',vl:'trend-vl'};
const TLBL={up:'▲ ESCALATING',dn:'▼ EASING',ss:'► STEADY',vl:'◆ VOLATILE'};
const CCLR={military:'var(--red)',political:'var(--violet)',economic:'var(--econ)',energy:'var(--amber)',strategic:'var(--gov)'};
const CICON={military:'⚔',political:'⬡',economic:'▤',energy:'⬢',strategic:'◎'};

const CORDER=['military','political','economic','energy','strategic'];
