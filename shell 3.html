<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — Strategic Intelligence · by Leverage</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Situation Room palette — slate-navy base, signal-cyan accent, disciplined severity scale */
  --void:#0a0e14; --void2:#0c1119; --panel:#111722; --panel2:#141b28; --raised:#18202f;
  --line:#1e2836; --line2:#273449; --line3:#324258;
  --ice:#e8eef5; --text:#b8c6d6; --mute:#6b7d92; --dim:#43536a; --faint:#2a3646;
  --cyan:#3dd6d0; --cyan-d:rgba(61,214,208,.10); --cyan-g:rgba(61,214,208,.35);
  --amber:#e0a030; --amber-d:rgba(224,160,48,.10);
  --red:#e2564e; --red-d:rgba(226,86,78,.11);
  --grn:#4cc98a; --grn-d:rgba(76,201,138,.10);
  --violet:#9a7ff0; --violet-d:rgba(154,127,240,.10);
  --gold:#d4b24a; --gold-d:rgba(212,178,74,.10);
  --gov:#5b9bd5; --gov-d:rgba(91,155,213,.11);
  --econ:#4cc98a; --econ-d:rgba(76,201,138,.10);
  --ext:#e07a5f; --ext-d:rgba(224,122,95,.11);
  --FD:'Barlow Condensed',sans-serif; --FB:'Inter',sans-serif; --FM:'JetBrains Mono',monospace;
  --r:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--void);color:var(--text);font-family:var(--FB);font-size:13px;line-height:1.5;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 55% at 15% -5%,rgba(61,214,208,.04),transparent 60%),radial-gradient(ellipse 70% 50% at 100% 105%,rgba(91,155,213,.035),transparent 60%);}

/* ── TOP BAR ── */
.topbar{position:relative;z-index:60;height:56px;min-height:56px;flex-shrink:0;background:rgba(12,17,25,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:14px;}
.brand{display:flex;flex-direction:column;gap:1px;}
.brand-main{font-family:var(--FD);font-size:21px;letter-spacing:4px;font-weight:700;color:var(--ice);line-height:1;}
.brand-sub b{color:var(--cyan);font-weight:700;letter-spacing:1.5px;}
.brand-sub{font-family:var(--FM);font-size:8px;letter-spacing:2.5px;color:var(--dim);}
.live-chip{display:flex;align-items:center;gap:6px;font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--cyan);padding:4px 9px;border:1px solid var(--cyan-g);border-radius:100px;background:var(--cyan-d);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.wk-chip{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--amber);padding:4px 9px;border:1px solid rgba(224,160,48,.3);border-radius:100px;background:var(--amber-d);}
.search{margin-left:6px;display:flex;align-items:center;gap:7px;background:var(--void2);border:1px solid var(--line2);border-radius:var(--r);padding:6px 11px;transition:border-color .2s;}
.search:focus-within{border-color:var(--cyan-g);}
.search svg{width:12px;height:12px;stroke:var(--dim);}
.search input{background:none;border:none;outline:none;color:var(--ice);font-family:var(--FM);font-size:10px;letter-spacing:.5px;width:130px;}
.search input::placeholder{color:var(--dim);}
.stats{display:flex;gap:14px;margin-left:auto;align-items:center;}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.stat b{font-family:var(--FM);font-size:16px;font-weight:600;line-height:1;}
.stat span{font-family:var(--FM);font-size:7px;letter-spacing:1.5px;color:var(--dim);}
.s-crit{color:var(--red)}.s-esc{color:var(--amber)}.s-desc{color:var(--grn)}.s-tot{color:var(--ice)}
.clock{font-family:var(--FM);font-size:8px;letter-spacing:1px;color:var(--dim);text-align:right;line-height:1.5;padding-left:6px;border-left:1px solid var(--line);}

/* ── TICKER / ALERT ── */
.ticker{position:relative;z-index:55;flex-shrink:0;height:30px;background:var(--void2);border-bottom:1px solid var(--line);display:flex;align-items:center;overflow:hidden;}
.ticker-tag{flex-shrink:0;height:100%;display:flex;align-items:center;gap:6px;padding:0 14px;font-family:var(--FM);font-size:8px;letter-spacing:2px;color:var(--amber);background:var(--amber-d);border-right:1px solid rgba(224,160,48,.25);}
.ticker-tag::before{content:'';width:5px;height:5px;background:var(--amber);border-radius:50%;}
.ticker-scroll{flex:1;overflow:hidden;white-space:nowrap;position:relative;}
.ticker-track{display:inline-block;padding-left:100%;animation:scroll 90s linear infinite;font-family:var(--FM);font-size:9px;letter-spacing:.5px;color:var(--mute);}
.ticker-track b{color:var(--text);font-weight:500;}
.ticker-track .up{color:var(--red);}.ticker-track .dn{color:var(--grn);}
.ticker:hover .ticker-track{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* ── TOOLBAR ── */
.toolbar{position:relative;z-index:50;flex-shrink:0;background:rgba(12,17,25,.9);border-bottom:1px solid var(--line);padding:8px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;row-gap:7px;overflow-x:visible;}
.toolbar::-webkit-scrollbar{display:none;}
.tb-label{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);white-space:nowrap;flex-shrink:0;}
.btn{font-family:var(--FM);font-size:9px;letter-spacing:.5px;padding:6px 12px;border:1px solid var(--line2);border-radius:var(--r);background:var(--void2);color:var(--text);cursor:pointer;transition:all .16s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.btn:hover{border-color:var(--line3);background:var(--raised);color:var(--ice);}
.btn-gov:hover{border-color:var(--gov);color:var(--gov);}
.btn-econ:hover{border-color:var(--econ);color:var(--econ);}
.btn-ext:hover{border-color:var(--ext);color:var(--ext);}
.btn-cyan{color:var(--cyan);border-color:var(--cyan-g);}.btn-cyan:hover{background:var(--cyan-d);}
.divider{width:1px;height:18px;background:var(--line2);flex-shrink:0;margin:0 2px;}
.chip{font-family:var(--FM);font-size:8.5px;letter-spacing:.5px;padding:5px 11px;border:1px solid var(--line);border-radius:100px;background:none;color:var(--mute);cursor:pointer;transition:all .16s;white-space:nowrap;}
.chip:hover{color:var(--text);border-color:var(--line3);}
.chip.on{color:var(--void);background:var(--cyan);border-color:var(--cyan);font-weight:600;}
.chip.on[data-f=critical]{background:var(--red);border-color:var(--red);}
.chip.on[data-f=escalating]{background:var(--amber);border-color:var(--amber);}
.chip.on[data-f=deescalating]{background:var(--grn);border-color:var(--grn);}
.sub-row{position:relative;z-index:49;flex-shrink:0;background:var(--void);border-bottom:1px solid var(--line);padding:7px 18px;display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none;}
.sub-row::-webkit-scrollbar{display:none;}
.sub-chip{font-family:var(--FM);font-size:7.5px;letter-spacing:.5px;padding:4px 9px;border-radius:var(--r);background:none;color:var(--dim);cursor:pointer;transition:all .16s;white-space:nowrap;border:1px solid transparent;}
.sub-chip:hover{color:var(--text);background:var(--void2);}
.sub-chip.on{color:var(--cyan);background:var(--cyan-d);border-color:var(--cyan-g);}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:436px 1fr;flex:1;min-height:0;position:relative;z-index:10;}
.list-pane{border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;background:var(--void);}
.list-scroll{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.list-scroll::-webkit-scrollbar{width:6px}.list-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

/* category + subregion headers */
.cat-group{border-bottom:1px solid var(--line);}
.cat-head{padding:11px 16px 9px;display:flex;align-items:center;gap:9px;cursor:pointer;position:sticky;top:0;z-index:15;background:var(--void2);transition:background .15s;}
.cat-head:hover{background:var(--panel);}
.cat-icon{width:22px;height:22px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.ci-military{background:var(--red-d);color:var(--red)}.ci-political{background:var(--violet-d);color:var(--violet)}
.ci-economic{background:var(--econ-d);color:var(--econ)}.ci-energy{background:var(--amber-d);color:var(--amber)}
.ci-strategic{background:var(--gov-d);color:var(--gov)}
.cat-name{font-family:var(--FD);font-size:13px;letter-spacing:1.5px;font-weight:600;color:var(--ice);}
.cat-count{font-family:var(--FM);font-size:9px;color:var(--dim);margin-left:auto;background:var(--void);padding:2px 8px;border-radius:100px;}
.cat-caret{font-size:9px;color:var(--dim);transition:transform .2s;}
.cat-group.closed .cat-caret{transform:rotate(-90deg)}.cat-group.closed .cat-body{display:none}
.sub-head{padding:7px 16px 6px 18px;display:flex;align-items:center;gap:8px;background:var(--void);cursor:pointer;position:sticky;top:42px;z-index:12;}
.sub-head:hover{background:var(--void2)}
.sub-mark{width:4px;height:4px;border-radius:1px;background:var(--cyan);opacity:.7;}
.sub-name{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--mute);text-transform:uppercase;}
.sub-count{font-family:var(--FM);font-size:8px;color:var(--dim);margin-left:auto;}

/* theater row */
.row{padding:11px 16px;display:grid;grid-template-columns:26px 1fr auto;gap:11px;align-items:center;cursor:pointer;border-bottom:1px solid var(--faint);transition:background .12s;position:relative;}
.row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .15s;}
.row:hover{background:var(--void2);}
.row:hover::before{background:var(--line3);}
.row.active{background:var(--panel);}
.row.active::before{background:var(--cyan);}
.row-flag{font-size:17px;line-height:1;text-align:center;}
.row-main{min-width:0;}
.row-name{font-family:var(--FB);font-weight:600;font-size:12.5px;color:var(--ice);line-height:1.3;letter-spacing:-.1px;}
.row-sub{font-size:10.5px;color:var(--mute);margin-top:2px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
.row-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.tag{font-family:var(--FM);font-size:7px;letter-spacing:.5px;padding:2px 5px;border-radius:3px;line-height:1;}
.tag-gov{color:var(--gov);background:var(--gov-d)}
.tag-econ{color:var(--econ);background:var(--econ-d)}
.tag-ext{color:var(--ext);background:var(--ext-d)}
.tag-dip{color:var(--cyan);background:var(--cyan-d)}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.row-idx{font-family:var(--FM);font-size:19px;font-weight:600;line-height:1;letter-spacing:-.5px;}
.row-delta{font-family:var(--FM);font-size:9px;font-weight:600;display:flex;align-items:center;gap:2px;}
.d-up{color:var(--red)}.d-dn{color:var(--grn)}.d-fl{color:var(--dim)}
.row-spark{display:flex;align-items:flex-end;gap:1.5px;height:18px;margin-top:2px;}
.sbar{width:3px;border-radius:1px;background:var(--faint);min-height:2px;}

/* ── DETAIL PANE ── */
.detail-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--void2);}
.mobile-back{display:none;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--dim);text-align:center;padding:40px;}
.empty-mark{width:64px;height:64px;border:1px solid var(--line2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--line3);}
.empty h2{font-family:var(--FD);font-size:16px;letter-spacing:2px;color:var(--mute);font-weight:500;}
.empty p{font-family:var(--FM);font-size:9px;letter-spacing:1px;color:var(--dim);max-width:320px;line-height:1.6;}
.detail{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.detail::-webkit-scrollbar{width:6px}.detail::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

.tabs{display:flex;background:rgba(12,17,25,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;padding:0 10px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:var(--FM);font-size:9px;letter-spacing:1px;padding:13px 13px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--ice);border-bottom-color:var(--cyan);}
.panel{display:none;}.panel.on{display:block;}

.hero{padding:22px 24px 18px;border-bottom:1px solid var(--line);}
.hero-eyebrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.pill{font-family:var(--FM);font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:100px;border:1px solid;}
.pill-cat{border-color:var(--line2);color:var(--mute);}
.pill-sev{font-weight:600;}
.sev-critical{color:var(--red);border-color:rgba(226,86,78,.4);background:var(--red-d)}
.sev-high{color:var(--amber);border-color:rgba(224,160,48,.4);background:var(--amber-d)}
.sev-medium{color:var(--gold);border-color:rgba(212,178,74,.4);background:var(--gold-d)}
.sev-watch{color:var(--gov);border-color:rgba(91,155,213,.4);background:var(--gov-d)}
.hero-title{font-family:var(--FD);font-size:27px;letter-spacing:.5px;font-weight:700;color:var(--ice);line-height:1.08;margin-bottom:6px;display:flex;align-items:center;gap:11px;}
.hero-flag{font-size:26px;}
.hero-sub{font-size:12px;color:var(--mute);line-height:1.4;}
.hero-meta{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.hm{display:flex;flex-direction:column;gap:2px;}
.hm-label{font-family:var(--FM);font-size:7px;letter-spacing:1.5px;color:var(--dim);}
.hm-val{font-family:var(--FM);font-size:11px;color:var(--text);font-weight:500;}

/* index gauge */
.gauge{display:flex;align-items:center;gap:16px;margin-top:16px;padding:14px 16px;background:var(--void);border:1px solid var(--line);border-radius:8px;}
.gauge-num{font-family:var(--FM);font-size:38px;font-weight:600;line-height:.9;letter-spacing:-1px;}
.gauge-info{flex:1;}
.gauge-bar{height:5px;background:var(--faint);border-radius:100px;overflow:hidden;margin-bottom:7px;}
.gauge-fill{height:100%;border-radius:100px;}
.gauge-scale{display:flex;justify-content:space-between;font-family:var(--FM);font-size:7px;color:var(--dim);letter-spacing:.5px;}
.gauge-trend{font-family:var(--FM);font-size:9px;padding:4px 9px;border-radius:var(--r);white-space:nowrap;}
.trend-up{color:var(--red);background:var(--red-d)}.trend-dn{color:var(--grn);background:var(--grn-d)}
.trend-ss{color:var(--gold);background:var(--gold-d)}.trend-vl{color:var(--amber);background:var(--amber-d)}

/* history sparkline big */
.hist{padding:16px 24px;border-bottom:1px solid var(--line);}
.hist-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;}
.hist-bars{display:flex;align-items:flex-end;gap:5px;height:56px;}
.hist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.hist-v{font-family:var(--FM);font-size:7px;color:var(--mute);}
.hist-b{width:100%;max-width:20px;border-radius:2px 2px 0 0;min-height:3px;transition:height .3s;}
.hist-w{font-family:var(--FM);font-size:6.5px;color:var(--dim);letter-spacing:.3px;}

/* intel columns */
.intel{display:grid;grid-template-columns:1fr;gap:0;}
.icol{padding:16px 24px;border-bottom:1px solid var(--line);}
.icol-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.icol-head::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.ih-mil{color:var(--red)}.ih-pol{color:var(--violet)}.ih-eco{color:var(--econ)}
.icol-body{font-size:13px;line-height:1.68;color:var(--text);}
.icol-body p{margin-bottom:9px}.icol-body p:last-child{margin-bottom:0}

.section{padding:16px 24px;border-bottom:1px solid var(--line);}
.section-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;}
.assess-box{background:var(--void);border:1px solid var(--line);border-left:2px solid var(--cyan);border-radius:0 8px 8px 0;padding:15px 17px;font-size:13px;line-height:1.72;color:var(--text);}

/* data cards (gov/lev/econ/ext) */
.cards{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--void);border:1px solid var(--line);border-radius:8px;padding:12px 14px;transition:border-color .15s;}
.card:hover{border-color:var(--line2);}
.card-gov{border-left:2px solid var(--gov)}
.card-lev{border-left:2px solid var(--amber)}
.card-econ{border-left:2px solid var(--econ)}
.card-ext{border-left:2px solid var(--ext)}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
.card-actor{font-family:var(--FM);font-size:10px;color:var(--ice);font-weight:500;letter-spacing:.2px;}
.card-actor .sub{font-family:var(--FM);font-size:7px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.card-body{font-size:12px;line-height:1.5;color:var(--text);}
.card-extract{font-size:11px;line-height:1.45;color:var(--mute);margin-top:5px;}
.pt-thesis{font-size:12px;line-height:1.5;color:var(--fg);opacity:.9;margin:2px 0 10px;padding:9px 11px;background:var(--card2,rgba(255,255,255,.03));border-radius:8px;font-style:italic;}
.pl-wrap{padding:4px 0 2px;}
.pl-stage{border-left:2px solid var(--line);padding:2px 0 2px 12px;margin:0 0 2px 6px;}
.pl-stg-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase;}
.pl-node{background:var(--card2,rgba(255,255,255,.02));border:1px solid var(--line);border-radius:7px;padding:7px 9px;margin-bottom:5px;position:relative;}
.pl-actor{font-size:12.5px;font-weight:650;color:var(--fg);margin-bottom:2px;}
.pl-detail{font-size:11px;line-height:1.45;color:var(--mute);}
.pl-who{font-size:10.5px;color:var(--red);margin-top:4px;font-weight:600;}
.pl-node .badge{margin-top:5px;}
.pl-arrow{font-size:14px;color:var(--mute);text-align:left;margin:0 0 2px 12px;line-height:1;opacity:.55;}
.hist-roots{font-size:13px;line-height:1.7;color:var(--text);}
.htl{position:relative;margin-top:4px;}
.htl-row{display:grid;grid-template-columns:92px 16px 1fr;gap:0;align-items:start;}
.htl-date{font-family:var(--FM);font-size:11px;color:var(--amber);font-weight:600;padding:6px 8px 6px 0;text-align:right;white-space:nowrap;}
.htl-line{position:relative;display:flex;justify-content:center;}
.htl-line:before{content:'';position:absolute;top:0;bottom:-6px;width:1px;background:var(--line2);left:50%;transform:translateX(-50%);}
.htl-row:last-child .htl-line:before{bottom:auto;height:14px;}
.htl-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);margin-top:9px;position:relative;z-index:1;box-shadow:0 0 0 3px var(--void2);}
.htl-e{font-size:12px;line-height:1.5;color:var(--text);padding:6px 0 12px 10px;}
.hact{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.hact-card{background:var(--void2);border:1px solid var(--line);border-left:3px solid var(--ext);border-radius:8px;padding:10px 12px;}
.hact-name{font-size:12.5px;font-weight:700;color:var(--fg);margin-bottom:3px;}
.hact-bio{font-size:11.5px;line-height:1.55;color:var(--mute);}
.hist-bridge{font-size:12.5px;line-height:1.65;color:var(--text);border-left:3px solid var(--red);padding:8px 12px;background:var(--void2);border-radius:0 8px 8px 0;}

role": "Host/source", "detail": "~1M Rohingya in camps; minority-displacement pressure; India deportation friction"}, {"theater": "lakurawa", "role": "Source", "detail": "~500 villages under pressure in Sokoto/Kebbi; settlement clearance in the NW tri-border"}, {"theater": "cameroon", "role": "Source/Host", "detail": "500k+ IDPs (Anglophone); hosts 400k+ refugees from CAR/Nigeria/Chad; Far North raids driving new displacement"}, {"theater": "somalia", "role": "Source", "detail": "~3.8M internally displaced; recurrent famine risk; Al-Shabaab forced recruitment"}], "reverse": "Host-state political capital, border-cooperation leverage, remittances.", "significance": "Displacement is both a humanitarian output and a political input — the same flows that measure a war's severity become bargaining chips in destination-state politics."}, {"id": "info-ops", "name": "Information Operations Network", "type": "Narrative Warfare", "icon": "◉", "color": "#9d7fc7", "summary": "Coordinated disinformation as a strategic instrument — manufacturing coups, laundering atrocities, and shaping alignment without firing a shot. The cheapest form of leverage on the board.", "significance": "This system tracks a method rather than a resource. Its signature is repetition: the same fabricated beats recur across theaters (a leader 'missing,' an army chief 'assassinated,' the internet 'cut'), amplified across platforms and often in a language foreign to the target country — a tell that the audience is external, not domestic. The strategic objective is to make rupture look inevitable, so that it becomes so.", "nodes": [{"theater": "cote-divoire", "role": "Primary target", "detail": "Recurring fabricated-coup campaigns (May 2025, ~Apr 2026); Ivorian agency: 'a deliberate and coordinated disinformation campaign'; posts largely in English in a Francophone state; exploits real 4th-term + AES-sympathy grievances"}, {"theater": "balkans", "role": "Target", "detail": "Russian hybrid information operations backing Serbian non-recognition of Kosovo and Republika Srpska secession"}, {"theater": "sudan", "role": "Atrocity laundering", "detail": "RSF/UAE narrative management around the genocide determination; the HRC motion still declines to name the UAE"}, {"theater": "us-politics", "role": "Contested space", "detail": "The information environment itself as a domain of great-power competition"}, {"theater": "mali", "role": "Vector", "detail": "Russia/Africa Corps narrative operations supporting the juntas and framing France as the enemy — the template the Ivorian campaigns imitate"}, {"theater": "burkina", "role": "Vector", "detail": "Junta-aligned messaging; the AES model whose appeal the coup-disinformation campaigns are engineered to spread"}]}];
const INVEST = [{"id":"cobalt","commodity":"Cobalt","icon":"⬢","color":"#4cc98a","use":"EV batteries, aerospace superalloys, defense","chokehold":"DRC ~70% of global reserves; China (CMOC) controls most mining + processing","theaters":["drc"],"signal":"DRC instability or a China export-policy shift moves cobalt prices; US-led de-risking (EGC/Trafigura MoU) is the counter-trend to watch","vectors":"Battery-metal miners, EV supply-chain ETFs, cobalt-exposed majors; China-processing concentration is the key risk variable"},{"id":"uranium","commodity":"Uranium","icon":"☢","color":"#e0a030","use":"Nuclear fuel, naval propulsion, weapons feedstock","chokehold":"Kazakhstan ~40% of global supply (Kazatomprom); Niger a secondary source; Russia+China lock in reactor/processing","theaters":["kazakhstan","niger"],"signal":"Non-Russian enrichment capacity is the bottleneck. Watch Niger-Rosatom offtake confirmation, Kazakh multi-vector deals (Axpo/CEZ/Kansai), and any Western enrichment buildout.","vectors":"Uranium miners, nuclear-fuel ETFs, utilities with fuel exposure; the Russia/China reactor lock-in is the strategic overhang","catalyst":"JUL 2026 — Niger yellowcake still stranded (ICSID block; Rosatom the only buyer); Kazakhstan splits new reactors Rosatom/CNNC; the Iran war revives the nuclear-security premium. Western utilities remain structurally short non-Russian enrichment."},{"id":"rare-earths","commodity":"Rare Earths","icon":"◈","color":"#e07a5f","use":"EV motors, wind turbines, missiles, robotics, F-35s","chokehold":"China ~90% of processing; Myanmar supplies ~94% of China's HEAVY-REE feedstock (KIA-controlled)","theaters":["myanmar","taiwan"],"signal":"The Nov-2026 control-pause expiry and Jan-2027 Pentagon ban are the calendar catalysts. Watch Western separation/magnet capacity (mine-to-magnet integration) and Myanmar supply disruptions.","vectors":"Ex-China rare-earth miners/processors, magnet makers, defense primes exposed to REE inputs; 'Pax Silica' diversification plays","catalyst":"JUL 2026 — China's Nov-2026 export-control pause expiry + Jan-1-2027 Pentagon ban on Chinese-origin REEs approach; Myanmar heavy-REE supply runs through KIA-taxed mines into Chinese separation. The mine-to-magnet Western gap remains the structural short."},{"id":"nickel","commodity":"Nickel","icon":"⬡","color":"#5b9bd5","use":"EV batteries (high-nickel cathodes), stainless steel","chokehold":"Indonesia ~50% of global supply; export ban forced onshore processing, largely Chinese-controlled","theaters":["indonesia"],"signal":"Indonesian export-policy shifts + Prabowo statism move nickel prices; Western IRA de-risking targets Chinese-controlled Indonesian supply","vectors":"Nickel miners, battery-metal ETFs, EV-cathode supply chain; Indonesia policy + Chinese-JV control are the swing factors"},{"id":"energy","commodity":"Oil & Gas / Chokepoints","icon":"◊","color":"#d4b24a","use":"Global energy supply; the master variable","chokehold":"Hormuz (~20-25% of seaborne oil), Bab el-Mandeb; Venezuela (largest reserves, US-administered); Mozambique LNG (top-10 potential)","theaters":["iran-us","chokepoints","venezuela","mozambique"],"signal":"Any sustained Hormuz closure OR a credible all-Gulf-export threat = the oil-spike scenario. Watch tanker insurance rates, SPR-release signals, and whether Saudi/UAE east-west pipelines can bypass the strait.","vectors":"Energy majors, oil/tanker/shipping equities, LNG developers, war-risk-sensitive insurers; Hormuz is the fastest-moving price trigger","catalyst":"JUL 16 2026 — IRGC threatens to choke off ALL regional oil & gas (not just Hormuz); US striking Iran around-the-clock as convoy protection; Iran hitting Gulf US bases. A simultaneous Hormuz + Bab-el-Mandeb + Gulf-loadport disruption is now the tail risk being priced. War-premium live; tanker war-risk insurance spiking."},{"id":"gold","commodity":"Gold","icon":"◉","color":"#d4b24a","use":"Safe-haven, conflict-finance, sanctions-evasion store of value","chokehold":"African conflict gold (Sudan/Sahel) laundered via UAE; Russia using gold to fund the Ukraine war","theaters":["sudan","mali","geopolitical"],"signal":"Record central-bank gold accumulation is the de-dollarization/trust gauge. Watch for any UAE-conduit sanction (would disrupt physical flows) and safe-haven flows on each Iran-war escalation.","vectors":"Gold miners, bullion ETFs, safe-haven allocation; rises with systemic geopolitical stress across the whole platform","catalyst":"JUL 2026 — EU banned Sudanese gold (Jul 13) but NOT the UAE conduit; war-premium + record central-bank buying keep gold elevated. The Dubai laundering circuit (Sudan/DRC/Sahel) stays open — sanctions hit the periphery, not the refiner. Gold remains the system-distrust hedge as the Iran war escalates."},{"id":"defense","commodity":"Defense & Drones","icon":"⚔","color":"#e2564e","use":"Arms demand driven by every conflict theater","chokehold":"Turkey (Baykar drones), US/EU primes, China volume arms; the Iranian drone ecosystem on the other side","theaters":["ukraine","iran-us","sudan","kashmir","korea"],"signal":"Air-defense + counter-UAS + munitions replenishment is the demand center as three theaters (Iran, Ukraine, Red Sea) consume interceptors. Watch the NDAA resolution and Patriot-tech-transfer follow-through.","vectors":"Defense primes, drone/UAV makers, missile-defense; broad conflict escalation across the platform is the tailwind","catalyst":"JUL 13-16 2026 — US to SHARE Patriot air-defense TECHNOLOGY with Ukraine (not just batteries); Blanche AG hearing opens; NDAA ($1.15T) blocked 50-46 over the unauthorized Iran war. Around-the-clock Iran strikes = live munitions burn + air-defense demand. The Saudi axis diversifies to non-NATO suppliers (Korean/Ukrainian)."}];
const GROUPS = [{"id":"tpnpb-opm","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"TPNPB-OPM","full":"West Papua National Liberation Army · Free Papua Movement","affil":"PAPUAN · INDONESIAN state · separatist","icon":"✧","color":"#5aa86e","tier":"SEVERE","strength":"Fighting the world's largest gold mine","theaters":["indonesia"],"mil":"The armed wing of the Free Papua Movement, waging a low-intensity insurgency in Indonesia's Papuan provinces since the 1960s. Its tactics include attacks on security forces, migrant workers and infrastructure, and high-profile hostage-taking — a New Zealand pilot was held for over a year. Indonesia has designated it a terrorist organisation and deployed heavy force; access for journalists and independent monitors is severely restricted, so casualty figures are contested and displacement is undercounted.","log":"Highland terrain, porous Papua New Guinea border, and weapons bought or captured from Indonesian forces.","eco":"THE POINT OF THE WAR. Papua hosts the GRASBERG COMPLEX — among the largest gold and copper deposits on earth, operated by Freeport-McMoRan with the Indonesian state now the majority holder. Papua is simultaneously Indonesia's most resource-rich and poorest region. Nickel, timber and palm oil expansion drive further dispossession.","assess":"THE OMISSION THIS BOARD HAD TO FIX. A platform arguing that extraction drives conflict, which tracked fifty-five theaters without listing the insurgency fighting over the world's biggest goldmine, had a blind spot shaped exactly like its own thesis — in Asia rather than Africa. The 1969 'Act of Free Choice', in which 1,025 hand-picked electors voted unanimously to join Indonesia under military supervision, is the decolonisation fraud at the root; Freeport's contract predates it by two years."}, {"id":"is-sinai","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"IS-Sinai","full":"Wilayat Sinai · formerly Ansar Bayt al-Maqdis","affil":"EGYPTIAN · Islamic State province","icon":"☠","color":"#b83d3d","tier":"ELEVATED","strength":"Degraded, not eliminated — and unobservable","theaters":["egypt","gaza"],"mil":"Egypt's Islamic State affiliate in NORTH SINAI, formed as Ansar Bayt al-Maqdis and pledged to IS in 2014. Responsible for the 2015 Metrojet airliner bombing and the 2017 al-Rawda mosque massacre that killed over 300 worshippers. Egypt's counter-insurgency has substantially degraded it, at the cost of mass displacement, home demolitions and a near-total INFORMATION BLACKOUT across North Sinai. Tribal militias, notably the Tarabin, were armed against it.","log":"Tunnels and smuggling routes along the Gaza frontier; local recruitment among marginalised Sinai Bedouin.","eco":"Smuggling taxation — the same tunnel economy Egypt's Gaza policy is built around controlling.","assess":"THE THEATER NOBODY CAN VERIFY. Journalists and independent monitors are effectively barred from North Sinai, so both Cairo's success claims and the true civilian cost are unauditable. This platform logs the group AND the blackout: an insurgency in an information vacuum is a governance fact as much as a security one, and it sits directly on the Gaza border that Egypt's entire regional position depends on."}, {"id":"arsa-rso","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"ARSA & RSO","full":"Arakan Rohingya Salvation Army · Rohingya Solidarity Organisation","affil":"ROHINGYA · Myanmar/Bangladesh","icon":"◆","color":"#c77d4a","tier":"ELEVATED","strength":"Armed groups inside the world's largest refugee camp","theaters":["bangladesh","myanmar"],"mil":"ARSA's 2017 attacks on Myanmar police posts triggered the military clearance operations that drove over 700,000 Rohingya into Bangladesh — an act UN investigators found bore the hallmarks of genocide. Both ARSA and the rival RSO now operate inside and around the COX'S BAZAR camps, fighting each other, assassinating community leaders, and recruiting — including reports of forced recruitment of camp residents to fight in Myanmar.","log":"The camps themselves as recruitment base, cross-border movement, and criminal networks in the camp economy.","eco":"Extortion within the camps, and involvement in the methamphetamine trade transiting from Myanmar.","assess":"THE COMPOUNDING FAILURE. A million stateless people confined for nine years with no right to work, no citizenship path and shrinking rations — the WFP has cut them repeatedly as donor funding fell — have become a recruitment pool for the armed groups preying on them. Refugee-camp militarisation is the predictable downstream cost of an unresolved statelessness the world stopped funding."}, {"id":"jamaica-gangs","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Jamaican gang networks","full":"Klansman, One Order and successor 'posses'","affil":"JAMAICAN · criminal-political lineage","icon":"●","color":"#8a6db8","tier":"WATCH","strength":"Among the highest homicide rates on earth","theaters":["jamaica"],"mil":"Organised criminal networks descended from the 'garrison' system in which Kingston constituencies were controlled by armed enforcers tied to the two main political parties from the 1970s. Successive states of emergency and the 2010 Tivoli Gardens incursion — which killed over 70 people while security forces sought Christopher 'Dudus' Coke — mark the state's approach.","log":"Weapons trafficked overwhelmingly FROM THE UNITED STATES — the same Florida pipeline that arms Haiti's gangs.","eco":"Lottery-scamming targeting US victims, extortion, and drug transhipment on the cocaine route north.","assess":"The Caribbean's shared structure, visible twice on this board. Jamaica and Haiti both host armed networks with political parentage, financed by trafficking to the US and armed by weapons FROM the US — a hemispheric system in which the same country is the primary market, the primary arms source, and the primary author of the interdiction policy."}, {"id":"fano","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Fano","full":"Fano · Amhara popular militia","affil":"ETHIOPIAN · Amhara","icon":"⚔","color":"#c7a54a","tier":"SEVERE","strength":"Fought for Addis, then against it","theaters":["ethiopia"],"mil":"An AMHARA popular militia — not a single organisation but a name shared by many local formations with no unified command, which is what makes it hard to defeat and impossible to negotiate with. Fano fought ALONGSIDE the federal army against the TPLF in the Tigray war, then turned on the government in 2023 when Addis moved to dissolve regional special forces. Since then Amhara region has been under recurrent states of emergency and drone strikes by its own government.","log":"Community mobilisation, weapons retained from the Tigray war, and the absence of a command structure to decapitate.","eco":"Minimal external financing — a grievance insurgency rather than a resource one.","assess":"THE ALLY THAT BECAME THE INSURGENCY. Amhara forces were essential to the federal victory in Tigray and were then asked to disarm; they refused, and the state that armed them now bombs them. It is the clearest Ethiopian case of the pattern this board tracks from Burkina to Kinshasa: the auxiliary you raise for one war becomes the problem in the next."}, {"id":"ola","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"OLA","full":"Oromo Liberation Army","affil":"ETHIOPIAN · Oromo","icon":"▲","color":"#5aa86e","tier":"SEVERE","strength":"Insurgency in Ethiopia's largest region — and the prime minister's own","theaters":["ethiopia"],"mil":"The armed wing that split from the Oromo Liberation Front when the OLF returned to legal politics in 2018, designated a terrorist organisation by Ethiopia's parliament in 2021. It operates across OROMIA — the country's largest and most populous region, and Abiy Ahmed's own — fighting for Oromo self-determination against a government that came to power on the back of Oromo protest.","log":"Rural western and southern Oromia, community support in contested districts, and periodic reported contact with other insurgent movements.","eco":"Local levies; among the least resource-financed actors on this board.","assess":"The revolution that put an Oromo prime minister in office did not settle the Oromo question — it relocated it. An armed movement fighting the first Oromo leader of Ethiopia is the sharpest available evidence that the country's crisis is constitutional rather than ethnic: the dispute is over what the federation IS, not over who holds the chair."}, {"id":"tplf","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"TPLF","full":"Tigray People's Liberation Front","affil":"ETHIOPIAN · Tigrayan","icon":"◆","color":"#8a6db8","tier":"CRITICAL","strength":"Ruled Ethiopia for 27 years · now split against itself","theaters":["ethiopia"],"mil":"Dominant party of Ethiopia's ruling coalition from 1991 to 2018, then belligerent in the 2020-22 Tigray war that killed an estimated several hundred thousand people. The November 2022 PRETORIA AGREEMENT ended the fighting but left disarmament, the status of WESTERN TIGRAY and the return of displaced people unresolved. The movement has since SPLIT INTO RIVAL FACTIONS contesting control of the interim administration — a fracture Addis has been accused of exploiting.","log":"Post-Pretoria demobilisation incomplete; the force structure was never fully dismantled.","eco":"A region under federal ECONOMIC RESTRICTIONS with roughly four-fifths of its population needing food assistance — the fiscal instrument replacing the military one.","assess":"THE UNFINISHED WAR. Pretoria stopped the shooting without answering any of the questions the shooting was about. With the TPLF fractured, Eritrean troops still a factor on the border, and Addis applying economic pressure, this platform's Watchlist treats Tigray as the most likely site of Ethiopia's next open conflict rather than a post-conflict zone."}, {"id":"is-somalia","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Islamic State in Somalia","full":"IS-Somalia · Al-Karrar office","affil":"SOMALI · Islamic State","icon":"☠","color":"#b83d3d","tier":"SEVERE","strength":"Small in numbers · outsized in the global IS financial system","theaters":["somalia"],"mil":"A few hundred fighters based in the BARI MOUNTAINS of PUNTLAND, far smaller than al-Shabaab and in open conflict with it. Puntland's forces have run sustained offensives against its mountain strongholds. Its significance is not military: the AL-KARRAR regional office based here has been assessed by UN monitors as a FINANCIAL AND COORDINATION HUB for Islamic State affiliates across Africa.","log":"Coastal smuggling routes, foreign fighters arriving through Puntland's ports, and extortion of Bosaso businesses.","eco":"MONEY MOVEMENT ITSELF is the function — taxing local business to fund affiliates elsewhere on the continent.","assess":"The reason a few hundred fighters matter. If Al-Karrar routes finance to IS affiliates in the Sahel, the Congo basin and Mozambique, then Puntland is not a peripheral front — it is a node, and the platform's Africa-wide jihadist map has a treasury in northeastern Somalia."}, {"id":"aswj-clan","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"ASWJ & clan militias","full":"Ahlu Sunna Wal Jama'a · macawisley community risings","affil":"SOMALI · Sufi and clan-based","icon":"✧","color":"#5a8dc7","tier":"ELEVATED","strength":"The local forces that actually rolled al-Shabaab back","theaters":["somalia"],"mil":"AHLU SUNNA WAL JAMA'A is a SUFI paramilitary movement formed to resist al-Shabaab's destruction of Sufi shrines, at times allied with and at times fighting the federal government over control of Galmudug. Alongside it, the MACAWISLEY — clan-based community militias — drove the 2022-23 risings that produced the most significant territorial losses al-Shabaab has suffered in a decade.","log":"Clan mobilisation, government weapons where relations allow, and intimate local knowledge.","eco":"Local resources; these are community forces, not enterprises.","assess":"THE CORRECTIVE TO THE INTERVENTION STORY. The gains against al-Shabaab that actually held came from CLAN MILITIAS defending their own districts, not from AMISOM, ATMIS or airstrikes. And when federal politics soured clan relations, those gains reversed. Somalia's security is a function of clan settlement, which is exactly the variable external missions cannot supply."}, {"id":"ambazonia","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Ambazonia separatists","full":"Ambazonia Defence Forces · ADF, IG, AGovC and other factions","affil":"CAMEROONIAN · Anglophone","icon":"◇","color":"#4a9dc7","tier":"SEVERE","strength":"Fragmented beyond negotiation · 700,000+ displaced","theaters":["cameroon"],"mil":"Armed groups fighting for independence of Cameroon's ANGLOPHONE Northwest and Southwest regions as 'Ambazonia', following the 2016-17 lawyers' and teachers' strikes and the state's violent response. They are DEEPLY FRAGMENTED — the Ambazonia Defence Forces, the Interim Government's forces, the Ambazonia Governing Council and numerous local commanders with no unified command — which has made both military defeat and negotiated settlement elusive. Tactics include enforced 'ghost town' lockdowns and a SCHOOL BOYCOTT that has kept a generation of Anglophone children out of education, enforced by attacks on schools and teachers.","log":"Diaspora financing from North America and Europe, weapons from Nigeria's border region, and forest terrain.","eco":"Diaspora remittances and local levies — one of the most externally-financed insurgencies on this board.","assess":"THE COLONIAL SEAM, REOPENED. The Anglophone regions were British-administered Southern Cameroons joined to French Cameroun in 1961 under terms Anglophones have contested ever since. This is a partition dispute inherited directly from decolonisation, fought sixty years later — and the platform's Cameroon file treats the succession question as the trigger that could make it far worse."}, {"id":"aswj-mozambique","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Ansar al-Sunna (Cabo Delgado)","full":"Ahlu Sunnah Wa-Jama · ISIS-Mozambique · locally 'al-Shabaab'","affil":"MOZAMBICAN · Islamic State affiliate","icon":"☠","color":"#c74a4a","tier":"SEVERE","strength":"Sits on $20B+ of gas","theaters":["mozambique"],"mil":"An insurgency that emerged in CABO DELGADO in 2017 from local grievance among Mwani and Makonde communities, later pledging to Islamic State. Its 2021 assault on PALMA forced TotalEnergies to declare force majeure on the $20B+ Afungi LNG project. Rwandan and SADC forces deployed in response; Rwandan troops remain, and the LNG project has moved toward restart.","log":"Coastal and forest terrain, ruby- and timber-smuggling routes, and cross-border movement into Tanzania.","eco":"Illicit trade in rubies, timber and heroin transiting the coast — and the province holds one of the largest gas discoveries of the century, which is the reason foreign troops arrived.","assess":"THE CLEANEST EXTRACTION CASE ON THE BOARD. A province producing rubies and gas is among Mozambique's poorest; an insurgency emerged from that grievance, attacked the gas project, and the response was RWANDAN TROOPS PAID FOR BY EUROPEAN ENERGY INTERESTS securing a French company's concession. The sequence is the thesis — and Kigali's ability to sell that service is the same capability it exercises in eastern Congo."}, {"id":"hamas","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Hamas","full":"Harakat al-Muqawama al-Islamiyya · Izz ad-Din al-Qassam Brigades","affil":"PALESTINIAN · Muslim Brotherhood lineage","icon":"⚔","color":"#5aa86e","tier":"CRITICAL","strength":"Degraded militarily, undefeated politically","theaters":["gaza"],"mil":"Founded 1987, won the 2006 Palestinian legislative election, took sole control of Gaza in 2007. Its armed wing has been severely degraded since October 2023, but it retains the capacity to police, tax and reconstitute in areas the IDF leaves. Under Resolution 2803 it is required to DISARM — and REFUSES, on the grounds that Israel is itself in breach through continued strikes and aid restrictions.","log":"Domestic manufacture, tunnels, smuggled components; external political backing from Qatar and Turkey rather than sustained resupply.","eco":"Taxation of goods entering Gaza, control of aid distribution where it persists, and diaspora finance.","assess":"THE DISARMAMENT DEADLOCK IS THE WHOLE TRANSITION. Resolution 2803's Board of Peace and International Stabilization Force exist to supervise a decommissioning Hamas will not perform, and no external actor will forcibly disarm it. Every 'day after' plan is downstream of this refusal — which is the platform's point that the governance question, not the military one, is unresolved."}, {"id":"pij-gaza","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"PIJ & smaller factions","full":"Palestinian Islamic Jihad · PFLP · local clan militias","affil":"PALESTINIAN · mixed","icon":"◆","color":"#8a6db8","tier":"SEVERE","strength":"The actors no framework accounts for","theaters":["gaza"],"mil":"Palestinian Islamic Jihad is the second-largest armed faction and more directly Iran-aligned than Hamas, with no governing responsibility to moderate it. Alongside it operate the PFLP and, increasingly, LOCAL CLAN MILITIAS — some armed with Israeli acquiescence as counterweights to Hamas, notably the group around Yasser Abu Shabab in Rafah.","log":"PIJ receives Iranian support; clan militias have been supplied locally, in some cases from seized aid.","eco":"Aid diversion and control of distribution points — which is why aid access is a military as well as humanitarian question.","assess":"The clan militias are the detail that breaks the two-party frame. Arming local factions against Hamas creates exactly the fragmented armed landscape Libya and Haiti demonstrate — a decision taken for tactical reasons whose structural consequence is a Gaza with many guns and no single address."}, {"id":"ttp","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"TTP","full":"Tehrik-i-Taliban Pakistan","affil":"PAKISTANI · Afghan Taliban-sheltered","icon":"⚔","color":"#b83d3d","tier":"CRITICAL","strength":"The blowback, operating from the sanctuary Pakistan built","theaters":["pak-afg"],"mil":"A Pakistani jihadist coalition seeking to overthrow the Pakistani state, resurgent since the Afghan Taliban's 2021 return gave it sanctuary and captured NATO weapons. Its attacks on Pakistani security forces are the principal driver of Islamabad's cross-border strikes into Afghanistan and of the 2026 fighting.","log":"Afghan territory as sanctuary, US-origin equipment abandoned in 2021, and recruitment in the tribal districts.","eco":"Extortion, kidnapping and taxation in the frontier areas.","assess":"THE CIRCLE CLOSED. Pakistan's security establishment cultivated the Afghan Taliban for strategic depth; the Afghan Taliban now shelters the movement attacking Pakistan and will not expel it. This is the platform's blowback thesis with a documented chain of custody."}, {"id":"bla-baloch","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"BLA & Baloch groups","full":"Baloch Liberation Army · BLF · Majeed Brigade","affil":"PAKISTANI BALOCH · separatist","icon":"✧","color":"#4a9dc7","tier":"SEVERE","strength":"Attacking the corridor, not just the state","theaters":["pak-afg","kashmir"],"mil":"Baloch separatist organisations fighting for independence from Pakistan, with the BLA's Majeed Brigade conducting high-profile suicide operations including the 2025 Jaffar Express hijacking. Three attacks in Balochistan since 6 July 2026 killed 42 army and police personnel; security forces reported killing 54 militants.","log":"Mountainous terrain, Afghan and Iranian border areas, local recruitment among a population that considers itself colonised.","eco":"Minimal — among the least resource-financed insurgencies on this board, which is itself the point.","assess":"THEY ATTACK CHINESE PROJECTS AND CHINESE NATIONALS DELIBERATELY. Gwadar port and CPEC run through Balochistan, and Baloch groups frame the corridor as extraction without consent — mineral and port wealth exported while the province stays Pakistan's poorest. This is the platform's extraction thesis articulated by the insurgents themselves."}, {"id":"iea-taliban","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Islamic Emirate (Taliban)","full":"Islamic Emirate of Afghanistan","affil":"AFGHAN STATE · unrecognised","icon":"⚑","color":"#8a6db8","tier":"CRITICAL","strength":"Governs a country, recognised by almost no one","theaters":["pak-afg"],"mil":"The de facto government of Afghanistan since 2021, now fighting its former sponsor Pakistan across the DURAND LINE it has never recognised, while suppressing ISKP internally. It refuses to expel the TTP.","log":"Captured US-supplied equipment, customs revenue, and expanding trade with China, Russia and Central Asia.","eco":"Customs and mining concessions — including lithium and copper talks with Chinese firms — plus a partial narcotics ban that raised prices for existing stockpiles.","assess":"The border it will not recognise is the border its neighbour insists on. The Durand Line has been the region's unfinished colonial business since 1893, and it is now the axis of an interstate war between a nuclear state and an unrecognised emirate."}, {"id":"let-jem","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"LeT, JeM & TRF","full":"Lashkar-e-Taiba · Jaish-e-Mohammed · The Resistance Front","affil":"PAKISTAN-LINKED · anti-India","icon":"⚔","color":"#c74a4a","tier":"CRITICAL","strength":"The groups that can start a war between nuclear states","theaters":["kashmir"],"mil":"Lashkar-e-Taiba and Jaish-e-Mohammed are UN-designated organisations with documented historical links to Pakistan's security establishment; THE RESISTANCE FRONT emerged as a rebranded front designed to appear indigenous. The 2025 PAHALGAM attack triggered India's Operation Sindoor and the most serious India-Pakistan exchange in decades.","log":"Cross-LoC infiltration, and — per Indian and Western assessments — sanctuary and historical sponsorship inside Pakistan, which Islamabad denies.","eco":"Charitable-front financing and state-adjacent patronage rather than territorial revenue.","assess":"THE ESCALATION TRIGGER. These are the only actors on this board whose single operation can move two nuclear-armed states to exchange fire within days. The platform's Kashmir Competing Read holds HIGH confidence on the both/and: documented sponsorship AND documented indigenous alienation — each capital's single-cause story fails the record."}, {"id":"kashmir-indigenous","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Indigenous Kashmiri militancy","full":"Hizbul Mujahideen and successor networks","affil":"KASHMIRI · indigenous","icon":"◇","color":"#c7a54a","tier":"ELEVATED","strength":"Diminished in arms, undiminished in grievance","theaters":["kashmir"],"mil":"Hizbul Mujahideen and smaller successor networks represent the indigenous strand of Kashmiri militancy, substantially degraded since 2019 by Indian security operations and the constitutional changes that followed the abrogation of Article 370. Recruitment has fallen; alienation has not.","log":"Local, and increasingly thin — which is why Pakistan-linked groups dominate operationally.","eco":"Negligible.","assess":"Their decline is what makes the Competing Read necessary. As indigenous capability falls and externally-linked capability persists, Delhi's 'it is all sponsored' argument gets stronger operationally while its 'there is no grievance' argument gets weaker politically. Both things are becoming more true at once."}, {"id":"eln","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"ELN","full":"Ejército de Liberación Nacional","affil":"COLOMBIAN · Guevarist · cross-border","icon":"⚔","color":"#b83d3d","tier":"SEVERE","strength":"The last standing guerrilla army — and it operates in two countries","theaters":["colombia","venezuela"],"mil":"Founded 1964 by radical priests and students, the ELN refused the 2016 peace accord the FARC signed and is now Colombia's largest remaining guerrilla force. It operates on BOTH SIDES OF THE VENEZUELAN BORDER, with substantial presence in Venezuelan territory that Caracas has tolerated. Its federated structure — semi-autonomous fronts — makes negotiated demobilisation structurally harder than the FARC's centralised command.","log":"Cross-border sanctuary in Venezuela, local recruitment, and captured or trafficked weapons.","eco":"COCA taxation, ILLEGAL GOLD MINING — now rivalling cocaine as a revenue source — extortion, and control of the Catatumbo and Aráuca corridors.","assess":"The reason 'post-conflict Colombia' was always premature. The Truth Commission's finding applies exactly here: the war persists where its returns survive. Gold and coca fund a movement whose federated structure means no single signature can end it."}, {"id":"farc-dissidents","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"FARC dissidents","full":"Estado Mayor Central · Segunda Marquetalia","affil":"COLOMBIAN · accord refusers and returnees","icon":"◆","color":"#c77d4a","tier":"SEVERE","strength":"The demobilisation that partially reversed","theaters":["colombia","venezuela"],"mil":"Two main blocs: the ESTADO MAYOR CENTRAL under 'Iván Mordisco', which never demobilised, and the SEGUNDA MARQUETALIA under 'Iván Márquez', formed by commanders who signed the 2016 accord and then returned to arms. They fight each other as well as the state and the ELN, contesting the territories the FARC vacated.","log":"Former FARC networks, Venezuelan border sanctuary, and cartel supply relationships.","eco":"Coca cultivation and processing, illegal mining, and the Pacific trafficking corridors.","assess":"The strongest evidence for the platform's read that Colombia's war is sustained by its economics rather than its politics. Men who signed a peace agreement went back to war not over ideology but because the territories they left were worth returning to."}, {"id":"clan-del-golfo","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Clan del Golfo","full":"Autodefensas Gaitanistas de Colombia","affil":"COLOMBIAN · paramilitary successor","icon":"◇","color":"#8a6db8","tier":"SEVERE","strength":"The paramilitary demobilisation that never took","theaters":["colombia"],"mil":"The largest of Colombia's neo-paramilitary organisations, descended from the AUC blocs that formally demobilised in the 2000s. It exercises armed governance across Antioquia, Córdoba and the Uraba region — including 'armed strikes' that shut down entire departments on command.","log":"Former paramilitary networks, corrupt state links, and the Urábaa-to-Caribbean smuggling geography.","eco":"COCAINE EXPORT above all, plus illegal gold, extortion, and land control — the AUC's original business model with a new name.","assess":"Two demobilisations, two reconstitutions. The FARC's produced dissidents; the AUC's produced this. Colombia's recurring lesson is that disarming a structure without dismantling its economy just changes the letterhead."}, {"id":"rus-forces","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Russian forces & auxiliaries","full":"Russian Armed Forces · Rosgvardia · Chechen units · Storm-Z","affil":"RUSSIAN STATE","icon":"⚑","color":"#8a4a4a","tier":"CRITICAL","strength":"Attritional advance, operational stalemate","theaters":["ukraine","russia-domestic"],"mil":"Regular forces plus a layered auxiliary system: Rosgvardia internal troops, Chechen Akhmat units under Kadyrov, penal 'Storm-Z' assault formations, and the remnants of the Wagner structure absorbed after 2023. It took Pokrovsk and Myrnohrad in early 2026 and has since failed to convert tactical gains into operational advance — independent assessments describe exploitation becoming 'progressively more difficult'.","log":"North Korean munitions and troops, Iranian drone designs now domestically produced, and a war economy running at unsustainable fiscal cost.","eco":"Hydrocarbon revenue under a sanctions ceiling, plus seized Ukrainian industry and grain in occupied territory.","assess":"The auxiliary layer is the tell. A state that must recruit convicts, subcontract to a republic's personal army, and import munitions from Pyongyang is winning ground at a price its budget records even when its rhetoric does not."}, {"id":"ukr-forces","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"Ukrainian forces","full":"ZSU · territorial defence · drone units","affil":"UKRAINIAN STATE","icon":"⚑","color":"#4a9dc7","tier":"CRITICAL","strength":"Holding at attrition with a technological edge","theaters":["ukraine"],"mil":"Regular armed forces, territorial defence brigades, and a distinctive layer of specialised DRONE UNITS that have made Ukraine the world's leading practitioner of cheap precision strike — including deep strikes into Russian refining and airbase infrastructure. Manpower, not materiel, is now the binding constraint.","log":"Western systems, and increasingly a domestic drone and missile industry — the Patriot technology-sharing arrangement was a shift toward co-production rather than donation.","eco":"Financed externally: EU facilities, G7 ERA loans and the IMF's $8.1B EFF cover a $136.5B four-year gap.","assess":"THE SOVEREIGNTY PARADOX THIS PLATFORM TRACKS. Ukraine's survival depends on financing whose terms are set abroad, and the debt and reconstruction architecture being negotiated now will shape its economic sovereignty for a generation. Fighting for independence while mortgaging the peace is the condition, not a criticism of it."}, {"id":"lna","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"LNA / Haftar","full":"Libyan National Army · Haftar family","affil":"LIBYAN EASTERN · Russia/UAE/Egypt-backed","icon":"⚔","color":"#c7a54a","tier":"SEVERE","strength":"Holds the east, the oil crescent, and the succession question","theaters":["libya"],"mil":"Khalifa Haftar's eastern coalition, increasingly run as a family enterprise with sons Saddam and Khalid in senior command. Backed by Russia — Africa Corps uses eastern Libya as its logistics hub for the Sahel — and historically by the UAE and Egypt. Controls the OIL CRESCENT terminals.","log":"Russian airlift through eastern bases, Emirati funding, Egyptian border cooperation.","eco":"OIL TERMINAL CONTROL as political leverage — the ability to shut exports is the LNA's principal instrument against Tripoli — plus smuggling and reconstruction contracts.","assess":"Libya's partition is functionally administered. Haftar's succession planning matters more than any election roadmap: an armed family business with foreign patrons is not a faction awaiting a settlement, it is a parallel state arranging its inheritance."}, {"id":"gnu-militias","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"GNU-aligned militias","full":"Tripoli militia coalitions · SSA · 444 Brigade · RADA","affil":"LIBYAN WESTERN · Turkey-aligned","icon":"◆","color":"#5aa86e","tier":"SEVERE","strength":"The capital is held by competing payrolls","theaters":["libya"],"mil":"A shifting set of armed groups nominally under the Tripoli government — the Stability Support Apparatus, the 444 Brigade, the Special Deterrence Force (RADA) and others — which periodically fight EACH OTHER for control of state institutions and revenue nodes. Turkey provides the western government's external military backing.","log":"State salaries, Turkish support, and control of ministries that fund rivals.","eco":"CAPTURE OF STATE INSTITUTIONS: central bank access, letters of credit, fuel subsidy arbitrage and the coastal migrant-interception economy the EU funds.","assess":"The most literal case on this board of Tilly's argument inverted. These groups do not build a state by making war; they make war to capture the state's revenue functions. Libya's institutions were never destroyed — they were divided as assets."}, {"id":"pmf","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"PMF / Hashd al-Shaabi","full":"Popular Mobilisation Forces","affil":"IRAQI STATE-INCORPORATED · Iran-aligned factions","icon":"⚑","color":"#b8863d","tier":"SEVERE","strength":"On the state payroll, outside state command","theaters":["iraq","iran-us"],"mil":"An umbrella of militias formed against Islamic State in 2014 and subsequently INCORPORATED INTO THE IRAQI STATE with legal status and budget lines. Its Iran-aligned components — Kataib Hezbollah, Asaib Ahl al-Haq, Harakat Hezbollah al-Nujaba — have struck US positions and act on Tehran's strategic guidance, while Baghdad pays their salaries. The 2026 war has constrained rather than unleashed them.","log":"Iraqi state budget, Iranian training and weapons, and cross-border logistics into Syria.","eco":"Budget allocations, checkpoint economies, control of border crossings and reconstruction contracting — institutional capture as a revenue model.","assess":"THE STRUCTURE THE 2003 INVASION BUILT. Iraq pays, arms and legitimises forces that answer partly to another government. This is what the platform means by subdivided sovereignty: not a state too weak to control its territory, but a state whose own institutions contain a rival's instruments."}, {"id":"cjng-sinaloa","prov":"STRUCTURAL","src":"Established organisational history; current status not verified this cycle","name":"CJNG & Sinaloa factions","full":"Cartel Jalisco Nueva Generación · Sinaloa (Chapitos / Mayitos)","affil":"MEXICAN · criminal","icon":"◆","color":"#c74a4a","tier":"CRITICAL","strength":"Two systems, and one of them is at civil war","theaters":["mexico"],"mil":"CJNG is the most territorially expansive Mexican organisation, fielding armoured vehicles, drones with explosives and anti-aircraft weapons. The Sinaloa federation has been in open internal war since the 2024 capture of Ismael 'El Mayo' Zambada, with the CHAPITOS and MAYITOS factions fighting across Sinaloa state — violence that followed a US law-enforcement operation.","log":"Precursor chemicals from Asia, weapons trafficked SOUTH FROM THE UNITED STATES, and drone components bought commercially.","eco":"FENTANYL and methamphetamine above all, plus extortion of agriculture, mining and transport — and increasingly control of legitimate sectors as tax bases.","assess":"The platform's Mexico Competing Read holds this at HIGH confidence as criminal-market fragmentation rather than extraction politics — and the Sinaloa split proves it: a decapitation produced a civil war, exactly as the fragmentation literature predicts. ~400,000 homicides and 100,000+ disappeared since 2006, a casualty scale exceeding most declared wars and classified as crime."}, {"id":"houthis","prov":"VERIFIED","src":"UN Panel of Experts; Grundberg briefings","name":"Houthis / Ansar Allah","full":"Ansar Allah · Zaidi Shia movement","affil":"YEMENI · Iran-aligned · US-designated FTO","icon":"⚔","color":"#b83d3d","tier":"CRITICAL","strength":"Hold Sana'a and most of Yemen's population","theaters":["yemen","chokepoints","saudi"],"mil":"A ZAIDI SHIA movement from the northern highlands that took Sana'a in 2014 and now governs most of western Yemen — where most Yemenis live. Part of the Iran-aligned 'axis of resistance'; hundreds of attacks on Israel and Red Sea shipping since October 2023. On 28 March 2026 they fired missiles at southern Israel, their first strike since the US-Israel war with Iran began, and in July broke the four-year Saudi truce by hitting ABHA AIRPORT.","log":"Iranian components and training, domestic assembly, and a drone industry cheap enough to be expendable — attack drones reportedly cost as little as $10,000.","eco":"Taxation of Sana'a and the ports, a parallel CENTRAL BANK with its own currency, fuel imports, and now extraction ventures with al-Shabaab documented by UN monitors.","assess":"THE MOVEMENT THAT OUTGREW ITS PATRON'S NETWORK. As Hezbollah, the Iraqi militias and Hamas were degraded, the Houthis became Iran's most autonomous partner — and started building their own network southward into Somalia. Grundberg's warning is the right frame: the danger is Yemen being drawn INTO the regional war, not merely reflecting it."}, {"id":"stc-dissolved","prov":"VERIFIED","src":"STC dissolution reporting Jan 2026","name":"STC (dissolved)","full":"Southern Transitional Council · UAE-backed separatists","affil":"YEMENI SOUTHERN · UAE-backed","icon":"◇","color":"#8a6db8","tier":"WATCH","strength":"Reached for independence and lost everything in five weeks","theaters":["yemen","uae-gulf"],"mil":"A southern separatist coalition founded 2017, UAE-backed, with the ~13,000-strong SECURITY BELT as its core. On 2 DEC 2025 it launched a large offensive across southern Yemen, seizing Hadhramaut including Seiyun and Tarim, and announced plans for an INDEPENDENCE REFERENDUM within two years. A Saudi-backed government counteroffensive with airstrikes retook Hadhramaut; on 7 JAN 2026 government forces entered Aden as STC resistance collapsed. Leader AIDARUS AL-ZOUBAIDI was expelled from the Presidential Leadership Council, CHARGED WITH TREASON, and fled to the UAE. On 9 JAN the STC ANNOUNCED ITS DISSOLUTION.","log":"Was UAE-supplied — and the UAE WITHDREW ITS REMAINING FORCES FROM YEMEN in January 2026.","eco":"Aden's port and customs, and a bid for the Masila oil fields that triggered the tribal confrontation.","assess":"THE CLEAREST PATRON-ABANDONMENT CASE ON THE BOARD. A separatist project existed exactly as long as Abu Dhabi funded it; when Riyadh pushed back, the UAE folded its hand and left. Southern secessionism did not die — STC demonstrators were shot in Ataq in February — but its institutional vehicle was dismantled in five weeks. Proxy status is not sovereignty."}, {"id":"aqap","prov":"VERIFIED","src":"UN Monitoring Team (Feb 2026)","name":"AQAP","full":"Al-Qaeda in the Arabian Peninsula","affil":"YEMENI · al-Qaeda global leadership","icon":"☠","color":"#8a4a4a","tier":"SEVERE","strength":"2,000-3,000 fighters · now the global network's centre of gravity","theaters":["yemen","somalia"],"mil":"Under SAAD BEN ATEF AL-AWLAKI, UN monitors assess AQAP is 'increasingly asserting its ideological and operational leadership of the GLOBAL al-Qaeda network' — the franchise has become the headquarters. Most active in Abyan, Shabwa, Marib and Hadramout. The external-attack threat is judged 'increasing' but 'opportunistic'.","log":"Local tribal ties in the southern and eastern governorates; a 'covert pragmatic relationship' with the Houthis despite sectarian opposition.","eco":"Smuggling, kidnapping and taxation in the remote governorates.","assess":"UN monitors document an AQAP-AL-SHABAAB ALLIANCE sustaining 'a logistical and operational network across the GULF OF ADEN'. Read with the Somalia entries, this is the same finding from the other shore: two al-Qaeda affiliates and one Iranian-aligned movement are all building capability across the same water — which is the strait this platform tracks."}, {"id":"plc-irg","prov":"VERIFIED","src":"PLC reporting 2026","name":"PLC / government forces","full":"Presidential Leadership Council · internationally recognised government","affil":"YEMENI · Saudi-backed","icon":"⚑","color":"#5a8dc7","tier":"SEVERE","strength":"Reunified the south by force — and inherited its grievances","theaters":["yemen","saudi"],"mil":"An eight-member council formed in 2022 from Saudi- and UAE-backed figures, nominally governing non-Houthi Yemen from Saudi Arabia. Analysts call it fractured. In Dec 2025-Jan 2026 it destroyed the STC's bid with Saudi air support, expelled STC ministers, and is now trying to unify factions and consolidate command — while the Houthis, unaffected by all of it, broke the Saudi truce in July.","log":"Saudi funding, airpower and political cover; component forces with distinct loyalties.","eco":"The recognised central bank, oil exports where they function, and donor finance.","assess":"It won the south and cannot hold the north. The PLC's consolidation is real but it was achieved by Saudi airstrikes against a fellow anti-Houthi faction — which is the anti-Houthi coalition's core problem in one sentence."}, {"id":"hadhramaut-tribes","prov":"VERIFIED","src":"Masila deployment reporting Nov 2025","name":"Hadhramaut tribal forces","full":"Hadhramaut Tribal Alliance · Hadhramaut Protection Forces","affil":"YEMENI · Saudi-aligned tribal","icon":"●","color":"#c7a54a","tier":"ELEVATED","strength":"Deployed to the oil fields before the shooting started","theaters":["yemen"],"mil":"A Saudi-backed tribal alliance under AMR BIN HABRISH whose military wing, the Hadhramaut Protection Forces, deployed around the MASILA OIL FIELDS operated by PetroMasila — Yemen's largest oil company — on 29 November 2025, days before the STC offensive, to 'defend national resources from external interference'.","log":"Tribal mobilisation with Saudi backing.","eco":"THE OIL. Hadhramaut holds Yemen's principal producing fields; whoever holds them holds the only substantial export revenue in the country.","assess":"The tribal deployment to the oil fields PRECEDED the offensive by three days — the resource was positioned over before the political fight began. The clearest illustration in this theater that Yemen's war is fought over revenue geography, whatever the flags say."}, {"id":"hts-gov","prov":"VERIFIED","src":"EUAA Syria actor mapping","name":"HTS / transitional government","full":"Hay'at Tahrir al-Sham · al-Sharaa government","affil":"SYRIAN · former al-Qaeda affiliate","icon":"⚑","color":"#5aa86e","tier":"CRITICAL","strength":"The insurgency that became the state","theaters":["syria"],"mil":"Ahmed al-Sharaa's movement, formerly Jabhat al-Nusra and formerly al-Qaeda's Syrian branch, which took Damascus in Dec 2024 and now forms the transitional government. It is attempting to absorb other factions into a national army, has interdicted Iranian weapons shipments bound for HEZBOLLAH, and is negotiating with the SDF over integration.","log":"Captured Syrian army stocks, Turkish tolerance, and Gulf financing.","eco":"Customs, the reconstruction economy, and control of what remains of state revenue.","assess":"THE OPEN QUESTION THE PLATFORM REFUSES TO CLOSE. Either a jihadist movement genuinely became a governing project, or the rebrand is tactical and the 2025 sectarian massacres were preview rather than aberration. The Competing Read holds both at MOD confidence; the treatment of Alawites, Druze and Kurds is the deciding evidence, and it is still accumulating."}, {"id":"sdf","prov":"VERIFIED","src":"EUAA Syria actor mapping","name":"SDF","full":"Syrian Democratic Forces · YPG/YPJ-led","affil":"SYRIAN KURDISH-LED · multi-ethnic · US-partnered","icon":"✧","color":"#4a9dc7","tier":"CRITICAL","strength":"Holds the northeast, the oil, and the ISIS camps","theaters":["syria","turkey"],"mil":"A Kurdish-led coalition built around the YPG and the women's YPJ, incorporating the Syriac Military Council, Arab tribal militias (al-Sanadid of the Shammar, Deir ez-Zor Military Council, Baggara and other tribal forces) and local military councils. Washington's partner against Islamic State; Ankara's declared enemy through the YPG's PKK lineage. Now negotiating integration terms with Damascus.","log":"US support, captured stocks, and the northeast's own manufacturing.","eco":"SYRIA'S OIL AND WHEAT. The northeast holds the majority of both — which is the SDF's actual negotiating position with Damascus, and the reason integration talks are really revenue talks.","assess":"THE THREE-WAY SQUEEZE. The SDF must satisfy Damascus, deter Turkey, and retain American cover — while guarding tens of thousands of ISIS detainees and family members in al-Hol and elsewhere, a responsibility no other actor will assume. Its Arab tribal components are the seam Turkey and Damascus both press on."}, {"id":"sna","prov":"VERIFIED","src":"EUAA; UN abuse documentation","name":"SNA","full":"Syrian National Army · Turkish-backed factions","affil":"SYRIAN · TURKEY-backed","icon":"◆","color":"#c77d4a","tier":"SEVERE","strength":"Ankara's instrument in the north","theaters":["syria","turkey"],"mil":"A coalition of Turkish-backed factions holding the northern border strip, used repeatedly against the SDF. Documented by UN bodies for abuses in the areas it administers, including against Kurdish civilians. Its integration into the new national army is one of the transition's hardest problems.","log":"Turkish salaries, weapons, and operational direction.","eco":"Border crossings, olive and agricultural revenue from Afrin, and checkpoint taxation.","assess":"The test of whether the new Syria is a state or a set of patronage networks under one flag. If Damascus can absorb the SNA it can absorb anyone; if Turkey retains a parallel command, the transition has a foreign veto inside its own army."}, {"id":"sweida-daraa","prov":"VERIFIED","src":"EUAA; 2025 southern violence reporting","name":"Sweida & Dar'a factions","full":"Druze self-defence · southern local factions","affil":"SYRIAN · Druze and southern communal","icon":"◇","color":"#8a6db8","tier":"SEVERE","strength":"The communities that armed themselves against the new order","theaters":["syria","lebanon"],"mil":"Local factions in SWEIDA (predominantly DRUZE) and DAR'A that mobilised during and after the transition, in several cases fighting government-aligned forces. The 2025 sectarian violence in the south — and Israeli strikes framed as protecting the Druze — made this the transition's most internationalised internal fault line.","log":"Local weapons, community mobilisation, and in Sweida's case an explicit external patron claim.","eco":"Local trade and the Jordanian border economy, including captagon routes the new government says it is dismantling.","assess":"Where the transition's legitimacy is actually being tested. A government that cannot protect minorities produces minorities that arm themselves, which produces foreign patrons who claim to protect them — the exact sequence that dismembered Syria the first time."}, {"id":"viv-ansanm","prov":"VERIFIED","src":"UN Panel of Experts; US FTO designation","name":"Viv Ansanm","full":"Viv Ansanm gang coalition · G9 and G-Pep","affil":"HAITIAN · criminal-political","icon":"◆","color":"#c74a4a","tier":"CRITICAL","strength":"Holds 70-90% of Port-au-Prince","theaters":["haiti"],"mil":"The coalition formed in 2023 uniting the previously warring G9 (led by Jimmy 'Barbecue' Chérizier) and G-Pep federations. It controls most of the capital, has attacked prisons, the airport and the port, and forced the prime minister's resignation in 2024. The US designated it a terrorist organisation. Internal fighting resumed within the coalition in 2025-26 — the alliance is not stable.","log":"Weapons overwhelmingly trafficked FROM THE UNITED STATES, principally Florida; ammunition resupply is the coalition's binding constraint.","eco":"Port and road TAXATION, kidnapping-for-ransom, extortion of businesses and aid convoys — a war economy that funds itself from the movement of everything into and out of the capital.","assess":"THE AUTONOMY QUESTION. Haiti's gangs were armed by political and business elites; the platform's Competing Read holds it MOD whether they are still instruments or now self-sustaining. The 2025-26 infighting suggests genuine autonomy; the continuing elite links suggest otherwise. Either way, the entity that governs Port-au-Prince is this one."}, {"id":"gsf-haiti","prov":"VERIFIED","src":"UNSC Res 2793; deployment reporting","name":"Gang Suppression Force","full":"GSF · UNSC Resolution 2793","affil":"MULTINATIONAL · UN-authorised","icon":"⚑","color":"#5a8dc7","tier":"CRITICAL","strength":"~1,000 deployed of 5,550 authorised","theaters":["haiti","chad","kenya"],"mil":"Authorised at 5,550 personnel; roughly 1,000 are actually on the ground. First CHADIAN officers arrived 1 April 2026 — Chad has pledged 1,500 troops — and Mongolian force commander Erdenebat Batsuuri arrived 14 May. The Dominican Republic has ruled out contributing troops. It replaced the Kenyan-led MSS mission.","log":"Voluntary contributions, chronically under-funded and under-staffed.","eco":"Not a revenue actor — but its under-resourcing is a funding decision made in donor capitals.","assess":"THE STALL, CONFIRMED. This platform's Watchlist tripwire asked whether the GSF would launch a real offensive or stall unde
