<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — Strategic Intelligence · by Leverage</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Situation Room palette — slate-navy base, signal-cyan accent, disciplined severity scale */
  --void:#0a0e14; --void2:#0c1119; --panel:#111722; --panel2:#141b28; --raised:#18202f;
  --line:#1e2836; --line2:#273449; --line3:#324258;
  --ice:#e8eef5; --text:#b8c6d6; --mute:#6b7d92; --dim:#43536a; --faint:#2a3646;
  --cyan:#3dd6d0; --cyan-d:rgba(61,214,208,.10); --cyan-g:rgba(61,214,208,.35);
  --amber:#e0a030; --amber-d:rgba(224,160,48,.10);
  --red:#e2564e; --red-d:rgba(226,86,78,.11);
  --grn:#4cc98a; --grn-d:rgba(76,201,138,.10);
  --violet:#9a7ff0; --violet-d:rgba(154,127,240,.10);
  --gold:#d4b24a; --gold-d:rgba(212,178,74,.10);
  --gov:#5b9bd5; --gov-d:rgba(91,155,213,.11);
  --econ:#4cc98a; --econ-d:rgba(76,201,138,.10);
  --ext:#e07a5f; --ext-d:rgba(224,122,95,.11);
  --FD:'Barlow Condensed',sans-serif; --FB:'Inter',sans-serif; --FM:'JetBrains Mono',monospace;
  --r:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--void);color:var(--text);font-family:var(--FB);font-size:13px;line-height:1.5;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 55% at 15% -5%,rgba(61,214,208,.04),transparent 60%),radial-gradient(ellipse 70% 50% at 100% 105%,rgba(91,155,213,.035),transparent 60%);}

/* ── TOP BAR ── */
.topbar{position:relative;z-index:60;height:56px;min-height:56px;flex-shrink:0;background:rgba(12,17,25,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:14px;}
.brand{display:flex;flex-direction:column;gap:1px;}
.brand-main{font-family:var(--FD);font-size:21px;letter-spacing:4px;font-weight:700;color:var(--ice);line-height:1;}
.brand-sub b{color:var(--cyan);font-weight:700;letter-spacing:1.5px;}
.brand-sub{font-family:var(--FM);font-size:8px;letter-spacing:2.5px;color:var(--dim);}
.live-chip{display:flex;align-items:center;gap:6px;font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--cyan);padding:4px 9px;border:1px solid var(--cyan-g);border-radius:100px;background:var(--cyan-d);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.wk-chip{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--amber);padding:4px 9px;border:1px solid rgba(224,160,48,.3);border-radius:100px;background:var(--amber-d);}
.search{margin-left:6px;display:flex;align-items:center;gap:7px;background:var(--void2);border:1px solid var(--line2);border-radius:var(--r);padding:6px 11px;transition:border-color .2s;}
.search:focus-within{border-color:var(--cyan-g);}
.search svg{width:12px;height:12px;stroke:var(--dim);}
.search input{background:none;border:none;outline:none;color:var(--ice);font-family:var(--FM);font-size:10px;letter-spacing:.5px;width:130px;}
.search input::placeholder{color:var(--dim);}
.stats{display:flex;gap:14px;margin-left:auto;align-items:center;}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.stat b{font-family:var(--FM);font-size:16px;font-weight:600;line-height:1;}
.stat span{font-family:var(--FM);font-size:7px;letter-spacing:1.5px;color:var(--dim);}
.s-crit{color:var(--red)}.s-esc{color:var(--amber)}.s-desc{color:var(--grn)}.s-tot{color:var(--ice)}
.clock{font-family:var(--FM);font-size:8px;letter-spacing:1px;color:var(--dim);text-align:right;line-height:1.5;padding-left:6px;border-left:1px solid var(--line);}

/* ── TICKER / ALERT ── */
.ticker{position:relative;z-index:55;flex-shrink:0;height:30px;background:var(--void2);border-bottom:1px solid var(--line);display:flex;align-items:center;overflow:hidden;}
.ticker-tag{flex-shrink:0;height:100%;display:flex;align-items:center;gap:6px;padding:0 14px;font-family:var(--FM);font-size:8px;letter-spacing:2px;color:var(--amber);background:var(--amber-d);border-right:1px solid rgba(224,160,48,.25);}
.ticker-tag::before{content:'';width:5px;height:5px;background:var(--amber);border-radius:50%;}
.ticker-scroll{flex:1;overflow:hidden;white-space:nowrap;position:relative;}
.ticker-track{display:inline-block;padding-left:100%;animation:scroll 90s linear infinite;font-family:var(--FM);font-size:9px;letter-spacing:.5px;color:var(--mute);}
.ticker-track b{color:var(--text);font-weight:500;}
.ticker-track .up{color:var(--red);}.ticker-track .dn{color:var(--grn);}
.ticker:hover .ticker-track{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* ── TOOLBAR ── */
.toolbar{position:relative;z-index:50;flex-shrink:0;background:rgba(12,17,25,.9);border-bottom:1px solid var(--line);padding:8px 18px;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;}
.toolbar::-webkit-scrollbar{display:none;}
.tb-label{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);white-space:nowrap;flex-shrink:0;}
.btn{font-family:var(--FM);font-size:9px;letter-spacing:.5px;padding:6px 12px;border:1px solid var(--line2);border-radius:var(--r);background:var(--void2);color:var(--text);cursor:pointer;transition:all .16s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.btn:hover{border-color:var(--line3);background:var(--raised);color:var(--ice);}
.btn-gov:hover{border-color:var(--gov);color:var(--gov);}
.btn-econ:hover{border-color:var(--econ);color:var(--econ);}
.btn-ext:hover{border-color:var(--ext);color:var(--ext);}
.btn-cyan{color:var(--cyan);border-color:var(--cyan-g);}.btn-cyan:hover{background:var(--cyan-d);}
.divider{width:1px;height:18px;background:var(--line2);flex-shrink:0;margin:0 2px;}
.chip{font-family:var(--FM);font-size:8.5px;letter-spacing:.5px;padding:5px 11px;border:1px solid var(--line);border-radius:100px;background:none;color:var(--mute);cursor:pointer;transition:all .16s;white-space:nowrap;}
.chip:hover{color:var(--text);border-color:var(--line3);}
.chip.on{color:var(--void);background:var(--cyan);border-color:var(--cyan);font-weight:600;}
.chip.on[data-f=critical]{background:var(--red);border-color:var(--red);}
.chip.on[data-f=escalating]{background:var(--amber);border-color:var(--amber);}
.chip.on[data-f=deescalating]{background:var(--grn);border-color:var(--grn);}
.sub-row{position:relative;z-index:49;flex-shrink:0;background:var(--void);border-bottom:1px solid var(--line);padding:7px 18px;display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none;}
.sub-row::-webkit-scrollbar{display:none;}
.sub-chip{font-family:var(--FM);font-size:7.5px;letter-spacing:.5px;padding:4px 9px;border-radius:var(--r);background:none;color:var(--dim);cursor:pointer;transition:all .16s;white-space:nowrap;border:1px solid transparent;}
.sub-chip:hover{color:var(--text);background:var(--void2);}
.sub-chip.on{color:var(--cyan);background:var(--cyan-d);border-color:var(--cyan-g);}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:436px 1fr;flex:1;min-height:0;position:relative;z-index:10;}
.list-pane{border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;background:var(--void);}
.list-scroll{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.list-scroll::-webkit-scrollbar{width:6px}.list-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

/* category + subregion headers */
.cat-group{border-bottom:1px solid var(--line);}
.cat-head{padding:11px 16px 9px;display:flex;align-items:center;gap:9px;cursor:pointer;position:sticky;top:0;z-index:15;background:var(--void2);transition:background .15s;}
.cat-head:hover{background:var(--panel);}
.cat-icon{width:22px;height:22px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.ci-military{background:var(--red-d);color:var(--red)}.ci-political{background:var(--violet-d);color:var(--violet)}
.ci-economic{background:var(--econ-d);color:var(--econ)}.ci-energy{background:var(--amber-d);color:var(--amber)}
.ci-strategic{background:var(--gov-d);color:var(--gov)}
.cat-name{font-family:var(--FD);font-size:13px;letter-spacing:1.5px;font-weight:600;color:var(--ice);}
.cat-count{font-family:var(--FM);font-size:9px;color:var(--dim);margin-left:auto;background:var(--void);padding:2px 8px;border-radius:100px;}
.cat-caret{font-size:9px;color:var(--dim);transition:transform .2s;}
.cat-group.closed .cat-caret{transform:rotate(-90deg)}.cat-group.closed .cat-body{display:none}
.sub-head{padding:7px 16px 6px 18px;display:flex;align-items:center;gap:8px;background:var(--void);cursor:pointer;position:sticky;top:42px;z-index:12;}
.sub-head:hover{background:var(--void2)}
.sub-mark{width:4px;height:4px;border-radius:1px;background:var(--cyan);opacity:.7;}
.sub-name{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--mute);text-transform:uppercase;}
.sub-count{font-family:var(--FM);font-size:8px;color:var(--dim);margin-left:auto;}

/* theater row */
.row{padding:11px 16px;display:grid;grid-template-columns:26px 1fr auto;gap:11px;align-items:center;cursor:pointer;border-bottom:1px solid var(--faint);transition:background .12s;position:relative;}
.row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .15s;}
.row:hover{background:var(--void2);}
.row:hover::before{background:var(--line3);}
.row.active{background:var(--panel);}
.row.active::before{background:var(--cyan);}
.row-flag{font-size:17px;line-height:1;text-align:center;}
.row-main{min-width:0;}
.row-name{font-family:var(--FB);font-weight:600;font-size:12.5px;color:var(--ice);line-height:1.3;letter-spacing:-.1px;}
.row-sub{font-size:10.5px;color:var(--mute);margin-top:2px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
.row-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.tag{font-family:var(--FM);font-size:7px;letter-spacing:.5px;padding:2px 5px;border-radius:3px;line-height:1;}
.tag-gov{color:var(--gov);background:var(--gov-d)}
.tag-econ{color:var(--econ);background:var(--econ-d)}
.tag-ext{color:var(--ext);background:var(--ext-d)}
.tag-dip{color:var(--cyan);background:var(--cyan-d)}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.row-idx{font-family:var(--FM);font-size:19px;font-weight:600;line-height:1;letter-spacing:-.5px;}
.row-delta{font-family:var(--FM);font-size:9px;font-weight:600;display:flex;align-items:center;gap:2px;}
.d-up{color:var(--red)}.d-dn{color:var(--grn)}.d-fl{color:var(--dim)}
.row-spark{display:flex;align-items:flex-end;gap:1.5px;height:18px;margin-top:2px;}
.sbar{width:3px;border-radius:1px;background:var(--faint);min-height:2px;}

/* ── DETAIL PANE ── */
.detail-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--void2);}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--dim);text-align:center;padding:40px;}
.empty-mark{width:64px;height:64px;border:1px solid var(--line2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--line3);}
.empty h2{font-family:var(--FD);font-size:16px;letter-spacing:2px;color:var(--mute);font-weight:500;}
.empty p{font-family:var(--FM);font-size:9px;letter-spacing:1px;color:var(--dim);max-width:320px;line-height:1.6;}
.detail{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.detail::-webkit-scrollbar{width:6px}.detail::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

.tabs{display:flex;background:rgba(12,17,25,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;padding:0 10px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:var(--FM);font-size:9px;letter-spacing:1px;padding:13px 13px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--ice);border-bottom-color:var(--cyan);}
.panel{display:none;}.panel.on{display:block;}

.hero{padding:22px 24px 18px;border-bottom:1px solid var(--line);}
.hero-eyebrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.pill{font-family:var(--FM);font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:100px;border:1px solid;}
.pill-cat{border-color:var(--line2);color:var(--mute);}
.pill-sev{font-weight:600;}
.sev-critical{color:var(--red);border-color:rgba(226,86,78,.4);background:var(--red-d)}
.sev-high{color:var(--amber);border-color:rgba(224,160,48,.4);background:var(--amber-d)}
.sev-medium{color:var(--gold);border-color:rgba(212,178,74,.4);background:var(--gold-d)}
.sev-watch{color:var(--gov);border-color:rgba(91,155,213,.4);background:var(--gov-d)}
.hero-title{font-family:var(--FD);font-size:27px;letter-spacing:.5px;font-weight:700;color:var(--ice);line-height:1.08;margin-bottom:6px;display:flex;align-items:center;gap:11px;}
.hero-flag{font-size:26px;}
.hero-sub{font-size:12px;color:var(--mute);line-height:1.4;}
.hero-meta{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.hm{display:flex;flex-direction:column;gap:2px;}
.hm-label{font-family:var(--FM);font-size:7px;letter-spacing:1.5px;color:var(--dim);}
.hm-val{font-family:var(--FM);font-size:11px;color:var(--text);font-weight:500;}

/* index gauge */
.gauge{display:flex;align-items:center;gap:16px;margin-top:16px;padding:14px 16px;background:var(--void);border:1px solid var(--line);border-radius:8px;}
.gauge-num{font-family:var(--FM);font-size:38px;font-weight:600;line-height:.9;letter-spacing:-1px;}
.gauge-info{flex:1;}
.gauge-bar{height:5px;background:var(--faint);border-radius:100px;overflow:hidden;margin-bottom:7px;}
.gauge-fill{height:100%;border-radius:100px;}
.gauge-scale{display:flex;justify-content:space-between;font-family:var(--FM);font-size:7px;color:var(--dim);letter-spacing:.5px;}
.gauge-trend{font-family:var(--FM);font-size:9px;padding:4px 9px;border-radius:var(--r);white-space:nowrap;}
.trend-up{color:var(--red);background:var(--red-d)}.trend-dn{color:var(--grn);background:var(--grn-d)}
.trend-ss{color:var(--gold);background:var(--gold-d)}.trend-vl{color:var(--amber);background:var(--amber-d)}

/* history sparkline big */
.hist{padding:16px 24px;border-bottom:1px solid var(--line);}
.hist-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;}
.hist-bars{display:flex;align-items:flex-end;gap:5px;height:56px;}
.hist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.hist-v{font-family:var(--FM);font-size:7px;color:var(--mute);}
.hist-b{width:100%;max-width:20px;border-radius:2px 2px 0 0;min-height:3px;transition:height .3s;}
.hist-w{font-family:var(--FM);font-size:6.5px;color:var(--dim);letter-spacing:.3px;}

/* intel columns */
.intel{display:grid;grid-template-columns:1fr;gap:0;}
.icol{padding:16px 24px;border-bottom:1px solid var(--line);}
.icol-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.icol-head::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.ih-mil{color:var(--red)}.ih-pol{color:var(--violet)}.ih-eco{color:var(--econ)}
.icol-body{font-size:13px;line-height:1.68;color:var(--text);}
.icol-body p{margin-bottom:9px}.icol-body p:last-child{margin-bottom:0}

.section{padding:16px 24px;border-bottom:1px solid var(--line);}
.section-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;}
.assess-box{background:var(--void);border:1px solid var(--line);border-left:2px solid var(--cyan);border-radius:0 8px 8px 0;padding:15px 17px;font-size:13px;line-height:1.72;color:var(--text);}

/* data cards (gov/lev/econ/ext) */
.cards{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--void);border:1px solid var(--line);border-radius:8px;padding:12px 14px;transition:border-color .15s;}
.card:hover{border-color:var(--line2);}
.card-gov{border-left:2px solid var(--gov)}
.card-lev{border-left:2px solid var(--amber)}
.card-econ{border-left:2px solid var(--econ)}
.card-ext{border-left:2px solid var(--ext)}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
.card-actor{font-family:var(--FM);font-size:10px;color:var(--ice);font-weight:500;letter-spacing:.2px;}
.card-actor .sub{font-family:var(--FM);font-size:7px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.card-body{font-size:12px;line-height:1.5;color:var(--text);}
.card-extract{font-size:11px;line-height:1.45;color:var(--mute);margin-top:5px;}
.card-extract b{color:var(--amber);font-weight:600;}
.badge{font-family:var(--FM);font-size:7px;letter-spacing:.4px;padding:3px 6px;border-radius:4px;border:1px solid;white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.2;}
.b-hi{color:var(--red);border-color:rgba(226,86,78,.4);background:var(--red-d)}
.b-md{color:var(--amber);border-color:rgba(224,160,48,.4);background:var(--amber-d)}
.b-lo{color:var(--grn);border-color:rgba(76,201,138,.4);background:var(--grn-d)}
.b-documented{color:var(--red);border-color:rgba(226,86,78,.4);background:var(--red-d)}
.b-alleged-credible{color:var(--amber);border-color:rgba(224,160,48,.4);background:var(--amber-d)}
.b-denied{color:var(--violet);border-color:rgba(154,127,240,.4);background:var(--violet-d)}
.b-HIGH{color:var(--red);border-color:rgba(226,86,78,.4);background:var(--red-d)}
.b-MED{color:var(--amber);border-color:rgba(224,160,48,.4);background:var(--amber-d)}
.b-LOW{color:var(--grn);border-color:rgba(76,201,138,.4);background:var(--grn-d)}
.intro-note{font-size:12px;line-height:1.6;color:var(--mute);margin-bottom:12px;padding:11px 13px;border-radius:8px;background:var(--void);border:1px solid var(--line);}
.intro-note b{color:var(--text);font-weight:600;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;z-index:900;background:rgba(6,9,14,.96);backdrop-filter:blur(6px);display:none;flex-direction:column;}
.overlay.show{display:flex;}
.ov-head{display:flex;align-items:center;padding:16px 22px;border-bottom:1px solid var(--line);flex-shrink:0;}
.ov-title{font-family:var(--FD);font-size:17px;letter-spacing:1.5px;color:var(--ice);font-weight:600;}
.ov-close{margin-left:auto;font-family:var(--FM);font-size:9px;color:var(--mute);border:1px solid var(--line2);padding:7px 13px;border-radius:var(--r);cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.ov-close:hover{color:var(--ice);border-color:var(--line3);}
.ov-scroll{flex:1;overflow-y:auto;padding:18px 22px;scrollbar-width:thin;}
.ov-scroll::-webkit-scrollbar{width:6px}.ov-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
.ov-group{margin-bottom:22px;}
.ov-ghead{font-family:var(--FD);font-size:15px;letter-spacing:1px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:9px;color:var(--ice);}
.ov-gflag{font-size:17px;}

trend": "up", "w14": false, "esc_history": [54, 54, 54, 54, 54, 54, 54, 54, 62, 62], "cas": "No current conflict deaths; 2010-11 post-election civil war killed ~3,000 — the precedent driving present fear", "disp": "Northern border communities under JNIM pressure; no mass displacement currently", "flag": "🇨🇮", "note": "REFRAMED (Wk15) — the theater's live risk is POLITICAL + INFORMATIONAL, not (yet) kinetic · COUP DISINFORMATION: recurring coordinated campaigns (May 2025, again ~Apr 2026) falsely claim a military takeover — same fabricated beats each time (army chief Lassina Doumbia 'assassinated,' Ouattara 'missing/dead,' 'internet cut') · Ivorian news agency: claims are 'completely unfounded... the result of a deliberate and coordinated disinformation campaign' · Ouattara chaired a routine cabinet meeting + public ceremony during the alleged 'coup'; NO credible Ivorian outlet (state or private) reported the violence; most viral posts written in ENGLISH in a Francophone country — a tell · fact-checkers flagged the videos as misleading; ~9,700 Facebook users discussed the fake coup in one day · analysts describe 'a campaign to promote military coups across West Africa' · REAL UNDERLYING TENSION: Ouattara nominated by RHDP for a 4TH TERM (widely resented); opposition leader Tidjane Thiam (ex-Credit Suisse CEO) STRUCK from the electoral roll (Apr 2025) over a French-nationality technicality — he's appealing, calls it political; Gbagbo + others barred over past convictions · 2010 election spiraled into civil war (~3,000 dead) — that memory drives the fear · widespread sympathy for the AES juntas (Mali/Burkina), who are anti-France unlike the Paris-aligned Ouattara · protesters call the govt a puppet of France + the US; criticism of expanding AFRICOM presence · JNIM pressure on the northern border continues (the original theater rationale)", "leverage": [{"actor": "Ouattara / RHDP", "asset": "Incumbency + control of the courts/electoral roll (used to bar Thiam and Gbagbo litary dimension is JNIM's continuing pressure on the northern border as it pushes toward the Gulf of Guinea.", "pol": "The genuine crisis is electoral. Ouattara was nominated by his RHDP party for a fourth term that many Ivorians resent, while the courts struck opposition leader Tidjane Thiam from the electoral roll over a French-nationality technicality (he is appealing and calls it political) and barred Gbagbo and others over past convictions. The memory of 2010 — when a disputed election spiraled into a civil war that killed roughly 3,000 — is what gives the fear its charge. Analysts note widespread Ivorian sympathy for the young military leaders who seized power in Mali and Burkina Faso, who are hostile to France, unlike the Paris-aligned Ouattara. Protesters call the government a puppet of France and the United States, with growing criticism of the expanding AFRICOM presence.", "eco": "Côte d'Ivoire is the world's largest cocoa producer and West Africa's economic hub — Ouattara is genuinely credited with a decade and a half of rapid growth and relative political peace, which is the strongest argument for the status quo and the reason a rupture here would transmit far beyond its borders.", "assess": "Côte d'Ivoire is re-scored to 62 (ELEVATED, watch-class) and reframed: its live risk is political and informational rather than kinetic. The coup that keeps being announced is not happening — Ivorian authorities call it a deliberate, coordinated disinformation campaign, and every verification test confirms that. But the campaigns are themselves the signal worth tracking: they are engineered to exploit a real fault line — resentment of a fourth term, an opposition excluded by the courts, and open sympathy for the anti-France juntas next door — in the region's most important French-aligned economy. Analysts describe a broader effort to promote military coups across West Africa. This is the AES-vs-ECOWAS contest fought through information rather than arms, which is why the theater now sits in that bloc. Attribution remains unresolved and is labeled as such. Watch the Thiam appeal, whether Ouattara formally stands, the election timetable, and whether the disinformation campaigns escalate around key dates.", "econlev": [{"holder": "Côte d'Ivoire", "channel": "Cocoa", "exp": "HIGH", "detail": "World's largest cocoa producer — the regional economic hub; political rupture here would transmit directly into global cocoa markets and West African stability"}, {"holder": "France / West", "channel": "Patronage + AFRICOM", "exp": "MED", "detail": "Ouattara's Paris alignment and the expanding US military presence are the exact grievances the coup-disinformation campaigns weaponize"}], "tclass": "watch", "tier": "ELEVATED", "hist_real": true, "as_of": "13 Jul 2026", "tracked_since": "Wk4 (2026)", "domain_tag": "Political", "external": [{"actor": "🇫🇷 France", "side": "Ouattara", "flow": "Former colonial power; close ties to Ouattara; backed his forces in the 2011 civil war", "tier": "documented", "for": "Retain its last major West African anchor after expulsion from the Sahel"}, {"actor": "🇺🇸 US (AFRICOM)", "side": "Ouattara", "flow": "Expanding regional military presence — increasingly the target of protest criticism", "tier": "documented", "for": "Fill the counter-terror vacuum left by France's Sahel expulsion; hold the coastal line"}, {"actor": "❓ Unattributed info-ops", "side": "anti-Ouattara / pro-coup narrative", "flow": "Coordinated multi-platform campaigns fabricating a military takeover; analysts describe a broader push promoting coups across West Africa", "tier": "alleged-credible", "for": "Manufacture the appearance of AES-style rupture in the region's key French-aligned state [ATTRIBUTION UNRESOLVED]"}, {"actor": "🏴 JNIM", "side": "insurgents", "flow": "Northern-border pressure from the Sahel; would exploit any political rupture", "tier": "documented", "for": "Coastal expansion toward Gulf of Guinea ports"}], "contested": {"summary": "The coup that keeps being announced and keeps not happening. The campaign is the event.", "claims": [{"claim": "Coordinated posts claim a military coup has taken place; the army chief is assassinated; Ouattara is missing or dead.", "who": "Whoever benefits from making AES-style rupture look inevitable in the region's key French-aligned economy. Attribution unresolved.", "evid": "DISPROVEN. Ouattara chaired a routine cabinet meeting during the alleged coup. Doumbia was not assassinated. No credible Ivorian outlet — state or private — reported the violence. Most viral posts were in ENGLISH in a Francophone country: the audience was never Ivorian.", "status": "DISPROVEN"}, {"claim": "The government frames all opposition grievance as foreign-driven disinformation.", "who": "Ouattara — conflating fabricated coups with legitimate protest delegitimizes both.", "evid": "The disinformation is real AND the grievances are real: Thiam was struck from the ballot on a citizenship technicality, Gbagbo is barred, and the fourth term is widely resented. Both things are true at once.", "status": "CONTESTED — don't let the fake coup bury the real crisis"}]}}, {"id": "nigeria", "cat": "military", "region": "West / Central Africa", "subregion": "Central Africa", "name": "Nigeria — ISWAP + Ansaru + Bandits + IPOB", "sub": "JNIM first Nigeria attacks · Ansaru re-emergence · Lakurawa", "domain": "Multi-Threat Insurgency", "sev": "high", "status": "escalating", "since": "2009", "esc": 68, "lat": 11.5, "lon": 9.5, "trend": "up", "w14": false, "esc_history": [67, 68, 68, 68, 68, 68, 68, 68, 68, 68], "cas": "Tumfa airstrike: Amnesty alleges 100+ civilians; Niger/Kwara fatalities doubled", "disp": "2.2M+ Lake Chad Basin", "flag": "🇳🇬", "note": "UPDATED · JNIM claimed its FIRST Nigeria attacks (killed soldiers, Kwara/Niger border) · Ansaru re-emergence (AQIM/JNIM-allied), shifted to Kwara/Niger States · Lakurawa (ISGS-linked) in Kebbi/Sokoto, cooperating w/ Boko Haram Sadiku faction · ISWAP attery supply chain"}, {"actor": "🇺🇸 US", "side": "economic counter", "flow": "EGC/EVelution/Trafigura tripartite MoU (May 2026) to counter China cobalt lead", "tier": "documented", "for": "Critical-minerals de-risking"}], "ext_flag": true, "tclass": "conflict", "tier": "SEVERE", "hist_real": true, "as_of": "13 Jul 2026", "tracked_since": "Wk4 (2026)", "domain_tag": "Military", "contested": {"summary": "Everyone knows where the coltan goes. The paperwork says otherwise.", "claims": [{"claim": "Rwanda denies backing M23.", "who": "Rwanda — and every downstream buyer who needs the minerals to be Rwandan-origin.", "evid": "UN Group of Experts panels have documented Rwandan Defence Force troops, equipment, and command support repeatedly. Rwanda's coltan exports exceed what its own deposits can plausibly produce.", "status": "DOCUMENTED-BUT-DENIED"}, {"claim": "Minerals entering global supply chains are certified conflict-free.", "who": "The electronics and EV industries; the certification schemes themselves.", "evid": "Laundering through Rwanda is the documented mechanism by which conflict coltan becomes compliant coltan. The certification is downstream of the fraud.", "status": "CONTESTED — the paperwork is the problem"}]}}, {"id": "haiti", "cat": "military", "region": "Caribbean", "subregion": "Caribbean", "name": "Haiti — Viv Ansanm / State Collapse", "sub": "Gang Suppression Force deploying · Chad 1,500 lead · gangs still hold ~90% of capital", "domain": "Criminal Insurgency / State Collapse", "sev": "critical", "status": "escalating", "since": "2020", "esc": 94, "lat": 18.5, "lon": -72.3, "trend": "up", "w14": false, "diplomacy_active": true, "esc_history": [0, 94, 94, 94, 94, 94, 94, 94, 94, 94], "cas": "~16,000 killed since 2022; 1,200+ killed in drone strikes (60 civilians); recent gang attacks 70+ dead", "disp": "1.5M+ displaced; famine-level food insecurity", "flag": "🇭🇹", "note": "UN-backed GANG SUPPRESSION FORCE (GSF) now deploying — replaces the Kenya-led M report alleged sexual violence by Kenyan MSS members"}], "mil": "Haiti is effectively a state-collapse theater. The gang federation Viv Ansanm — a US-designated Foreign Terrorist Organization led by Jimmy 'Barbecue' Chérizier — controls an estimated 70-90% of Port-au-Prince and the strategic corridors into the Artibonite and Centre departments. The country has had no president since Moïse's 2021 assassination. The UN-authorized Gang Suppression Force (Chad, Kenya contingents) has begun combat operations but with fewer than 1,000 of a planned 5,550 troops, and is badly underfunded. Even the Defense Ministry's cabinet director was kidnapped.", "pol": "UN figures: 2,300 killed and 1.5 million displaced in 2026 alone — more than 1 in 10 Haitians homeless. Guterres visited in June, citing 'glimmers of hope' against a harder reality. Crisis Group calls Viv Ansanm 'the most severe threat Haiti has faced in decades' and documents its ideological pivot — Chérizier reframing the gangs as anti-elite, anti-colonial 'revolutionaries,' even announcing a political party, while seeking a general amnesty as the transitional government winds down.", "eco": "Extortion, kidnapping-for-ransom, and drug/arms trafficking are the core revenue; gang blockades of roads, the airport, and the seaport have isolated the country and choked humanitarian aid. In Artibonite, gangs burn crops and hound farmers.", "assess": "Haiti holds critical (94) but the variable has shifted from pure collapse to a contested intervention. The UN-backed Gang Suppression Force — authorized by Resolution 2793 and replacing the ineffective Kenya-led MSS — is now deploying, with Chad the lead contributor (1,500 troops, first to arrive April 1) alongside pledges from Benin (up to 2,000), Bangladesh (1,500), and Mongolia (which supplies the force commander). Unlike its predecessor, the GSF can make arrests and run intelligence-led operations, and it is funded from the UN budget rather than voluntary contributions. Two th rgency — 20+ since 2018 — and ACLED's cross-Caribbean analysis warns SoEs produce temporary reductions without durably suppressing gangs, while carrying rising police-brutality and human-rights costs.", "eco": "Improved security underpins tourism, investment, and growth — Holness frames it as central to development. The US State Dept notes non-violent crime (robbery, break-ins) actually rose even as violent crime fell.", "assess": "Jamaica enters at 42, trend down — the platform's clearest de-escalation and a methodological anchor: it proves the framework tracks improvement, not just crisis. The turnaround is real and government-data-verified, but fragile — built on emergency powers ACLED judges non-durable, and still leaving Jamaica among the hemisphere's highest per-capita murder rates. The counter-case to Haiti's collapse next door.", "tclass": "watch", "tier": "GUARDED", "hist_real": true, "as_of": "13 Jul 2026", "tracked_since": "Wk4 (2026)", "domain_tag": "Military", "econlev": [{"holder": "Jamaica", "channel": "Counter-case", "exp": "LOW", "detail": "Tracked as the region's positive counter-example: homicides down sharply — proof that Caribbean state collapse is not inevitable"}], "contested": {"summary": "No significant narrative-war dimension identified in this theater at present. The main claims are broadly consistent with the evidence, or the disputes are policy disagreements rather than contested facts. This is stated affirmatively rather than left blank — the absence of an information operation is itself a finding.", "claims": []}}, {"id": "south-africa", "cat": "political", "region": "Southern Africa", "subregion": "Southern Africa", "name": "South Africa — Xenophobic Mobilization", "sub": "Jun 30 deadline passed without mass eruption · mobilization persists", "domain": "Xenophobic Unrest / Political Violence", "sev": "high", "status": "volatile", "since": "2008", "esc": 58, "lat": -26.2, "lon": 28.0, "trend": "dn", "w14": false, "esc_history": [0, 61, nked staff and the Mozambican military, while the UK and Netherlands withdrew financing in December 2025.", "eco": "This is a pure extraction theater. TotalEnergies' $20B project (first gas 2029), ExxonMobil's $30B Rovuma, and ENI's Coral could make Mozambique a top-10 gas producer supplying 20% of African output by 2040 — a European and Asian energy-security prize. The economics drive everything: the government is pressured to fund the project's security at its own cost, and the majors' capital is what makes an impoverished province geopolitically strategic.", "assess": "Mozambique enters at 63 (ELEVATED, conflict-class), trend up — the clearest extraction-conflict case in the platform. It's the textbook expression of the framework's thesis: a resource discovery generating an insurgency, foreign troops securing the enclave, foreign majors extracting the value, and the local population bearing the cost. It ties to the critical-minerals/energy logic and the external-actor web (Rwanda, France). Watch the restart's security through construction, insurgent moves toward Palma/Afungi, and the Exxon Rovuma FID.", "tier": "ELEVATED", "hist_real": false, "as_of": "13 Jul 2026", "tracked_since": "Wk13 (Jul 2026)", "domain_tag": "Energy", "contested": {"summary": "The gas restarted. The insurgency didn't stop. Only the enclave is safe.", "claims": [{"claim": "TotalEnergies frames the LNG restart as evidence that security has been restored.", "who": "TotalEnergies ($20B), the majors behind Rovuma and Coral, and a government that needs the revenue.", "evid": "The Afungi ENCLAVE is secured by Rwandan and SADC troops. The insurgency persists in the north — beheadings, kidnappings continue. UK and Netherlands WITHDREW financing (Dec 2025) over security and human-rights concerns. A UN report documents GBV by the military and project-linked staff; TotalEnergies faces a French war-crimes-complicity complaint.", "status": "CONTESTED — 'secure' describes the perimeter, not the province" ity (2024 crackdown)"}, {"src": "Crisis Group", "detail": "Suspicion lingers between Dhaka and New Delhi post-Hasina; Feb 2026 elections a chance to reset or deepen the rupture"}], "external": [{"actor": "🇵🇰 Pakistan", "side": "interim govt", "flow": "Diplomatic rapprochement (rare public thaw); alignment vs shared India antagonism", "tier": "documented", "for": "Strategic depth on India's eastern flank"}, {"actor": "🇮🇳 India", "side": "anti-interim / pro-Hasina", "flow": "Shelters Hasina; refuses extradition; deportation crackdown on Bangladeshis; border push-ins", "tier": "documented", "for": "Restore a friendly Dhaka; secure the eastern border"}, {"actor": "🇨🇳 China", "side": "interim govt", "flow": "Investment + BRI courtship of the new government", "tier": "alleged-credible", "for": "Fill the vacuum left by India's lost influence"}], "mil": "Not a kinetic theater — a political-transition and realignment watch. The violence dimension is domestic and communal: the 2024 uprising that ousted Sheikh Hasina killed roughly 1,000, and anti-minority (Hindu) violence has spiked, spilling into protests and diplomatic friction with India. Border 'push-in' incidents between Bangladesh's BGB and India's BSF are the main interstate friction.", "pol": "Bangladesh's realignment is the strategic story. The ouster of India-ally Hasina, her in-absentia death sentence, and India's refusal to extradite her have ruptured a once-close relationship — while Dhaka's interim government (and the parties leading the February 2026 elections) tilt toward Pakistan and China. A Jaishankar-Pakistan handshake at a Dhaka funeral was a rare thaw signal in an otherwise antagonistic regional picture.", "eco": "India retains economic leverage (trade, border, shared rivers) and is using deportation of undocumented Bangladeshis as pressure, while China courts the new government with investment. The ~1M Rohingya in camps remain a standing humanitarian and security burden.", "assess": "Bangladesh enters a roup in the Nigeria-Niger-Benin tri-border (Sokoto, Kebbi + expanding to Niger State's Borgu axis + Kwara) · origin: emerged ~2017-18 from a merger of Malian Macina/JNIM-linked Fulani fighters + a Nigerien herder self-defense faction; invited by communities to fight bandits, then turned predatory · declared a terrorist group by Nigeria (Nov 2024/Jan 2025) · US AIRSTRIKES Dec 25 2025 (Trump-announced, Tinubu-approved) on Sokoto/Bauni Forest camps — 'ISIS terrorist scum' · Feb 4 2026: massacred 162 civilians in Woro & Nuku (Kwara) after villagers refused to let them preach · governance model = extortion/'zakat' taxation, livestock confiscation, forced religious code, suppression of rival vigilantes · leader Amir Tajudeen moves between Nigeria/Niger/Mali/Chad · ISS: cooperates with Boko Haram/JAS + ISSP/ISWAP as a 'strategic conduit'; Niger post-2023-coup tension blocks joint ops", "leverage": [{"actor": "Lakurawa", "asset": "Tri-border sanctuary (ungoverned Nigeria-Niger-Benin space); embedded governance over ~500 villages; Sahel reinforcement pipeline", "str": "md"}, {"actor": "Nigeria (Op Fansan Yamma)", "asset": "Air force + JTF North West offensives; US airstrike backing; but overstretched vs Boko Haram/ISWAP/bandits", "str": "md"}, {"actor": "United States", "asset": "AFRICOM airstrikes (Dec 2025) — signaling willingness to hit NW Nigeria directly; intel/ISR", "str": "md"}, {"actor": "ISSP / ISWAP / JNIM", "asset": "Lakurawa as a conduit linking Sahel IS/AQ franchises toward the Nigerian littoral", "str": "md"}], "gov": [{"src": "Nigerian military (Op Fansan Yamma)", "detail": "Declared Lakurawa terrorist (Jan 2025); Dec 2025 Borgu camp strike killed 46 fighters; ongoing Sokoto/Kebbi/Niger air + ground ops"}, {"src": "US AFRICOM / White House", "detail": "Dec 25 2025 airstrikes on Sokoto camps (Trump-announced, Tinubu-approved); Feb 2026 US military team deployment confirmed"}, {"src": "ACLED / Amnesty International", "detail": "Attributed 250+ deaths to Lakurawa a) intensified from late 2025, but tension with Niger since its 2023 coup blocks the cross-border cooperation needed to defeat a group whose leader, Amir Tajudeen, moves freely between Nigeria, Niger, Mali, and Chad.", "eco": "Lakurawa funds itself through the extraction it frames as religious obligation — taxation, extortion, livestock and produce confiscation, and high-value kidnapping (the Kebbi deputy speaker was ransomed for ~$140,600, partly in CFA francs, showing its cross-border reach). This crime-terror nexus makes it financially self-sustaining and less dependent on external patrons than the Sahel's larger franchises.", "assess": "Lakurawa enters at 74 (ELEVATED, conflict-class), trend up — a distinct and rising Sahel threat the platform needed to break out from the broader Nigeria picture. Its significance is structural: it functions as a conduit linking the central Sahel's IS and al-Qaeda franchises (ISSP, JNIM) toward the Nigerian littoral and the Gulf of Guinea, threatening to connect the Sahel and Lake Chad theaters. The Christmas 2025 US airstrikes mark a notable escalation of direct American involvement in northwest Nigeria. It ties to the Nigeria, Niger, and Benin-Togo theaters and the Sahel security-vacuum dynamic. Watch the Borgu/Kwara southward expansion, the pace of Sahel reinforcement, and Nigeria-Niger cooperation. Trend estimate — newly entered tracking.", "tier": "ELEVATED", "domain_tag": "Military", "econlev": [{"holder": "Lakurawa", "channel": "'Zakat' taxation + livestock", "exp": "HIGH", "detail": "Governance-through-extraction across ~500 villages: coercive zakat, livestock confiscation, produce seizure; high-value kidnapping (Kebbi deputy speaker ~$140,600, partly in CFA francs) — self-financing, not patron-dependent"}], "contested": {"summary": "No significant narrative-war dimension identified in this theater at present. The main claims are broadly consistent with the evidence, or the disputes are policy disagreements rather than co n it for supply — betting Déby needs Emirati money too badly to retaliate seriously", "str": "md"}], "gov": [{"src": "UN Panel of Experts", "detail": "Found 'credible evidence' the UAE's Amdjarass 'field hospital' facility was used for arms transfers to the RSF"}, {"src": "Crisis Group (On the Horizon, Jul-Dec 2026)", "detail": "'The longer the Sudan war continues, the harder it may become for Déby to balance ties with the UAE, communal grievances and elite fragmentation. His grip on power could weaken' — though no Zaghawa figure yet commands enough support to challenge him"}, {"src": "Africa Center for Strategic Studies", "detail": "'Chad Risks Greater Instability from Engagement in Sudan's Conflict'; documents the $500M Abu Dhabi Fund loan (1%, 18yr) and border closure"}, {"src": "Chad Presidency (Mar 18 2026)", "detail": "Déby ordered the military to retaliate against any Sudanese forces attacking Chadian territory after the Mabrouka drone strike killed 16; convened emergency Defence and Security Council"}, {"src": "ISW / Critical Threats (Africa File, Jan 22 2026)", "detail": "Chadian security officials have criticized Déby for allowing UAE weapons transit; Egypt/Saudi/Somalia began denying UAE overflight, raising the stakes of the Chad route"}], "econlev": [{"holder": "UAE", "channel": "Sovereign loans + patronage", "exp": "HIGH", "detail": "~$2B (incl. $500M Abu Dhabi Fund at 1%/18yr) — for a ~$3,000 GDP/capita state this is regime-defining money, and it buys transit rights. This is the purchase price of a corridor."}, {"holder": "Chad (Déby)", "channel": "Territorial transit rights", "exp": "HIGH", "detail": "The commodity Chad sells is geography — the 1,400km Darfur frontier. Adré and Amdjarass are the nodes; illicit economies have boomed since 2023."}, {"holder": "Gold smuggling networks", "channel": "Sudanese gold → Dubai", "exp": "HIGH", "detail": "Chad is a primary smuggling route for RSF-controlled Sudanese gold heading to the UAE — the loop that pays f aggression,' convened an emergency Defence and Security Council, and ordered retaliation. Chad closed its 1,400km border with Sudan in February and deployed thousands of troops — and the weapons kept moving anyway. A second front is opening in Lake province, where Boko Haram's JAS faction and ISWAP are re-establishing a foothold after months of retrenchment, prompting a state of emergency in May.", "pol": "The trap is ethnic and it runs through the president's own army. The RSF is exterminating the Zaghawa in Darfur — and the Zaghawa dominate Chad's military and security elite. Déby is Zaghawa. When the RSF massacres Zaghawa communities in El Fasher, Chadian Zaghawa officers watch their own kin slaughtered by a force their president permits to be armed across his territory. One officer described the war as increasingly 'a war between Zaghawa and Arabs' — combustible language in a state defined by a delicate ethnic balance. Chadian Zaghawa militias now defy government disarmament orders and fight alongside Sudanese Zaghawa in the SAF-aligned Joint Force, using Chad as a rear base. Déby's own cousin, Ousmane Dillo, is a Zaghawa rebel fighting the RSF in Darfur. Meanwhile Hemedti's cousin, General Bichara Issa Djadalla, serves as Déby's special adviser. Crisis Group's assessment is blunt: the longer the war runs, the harder it becomes for Déby to balance Emirati money against communal grievance and elite fragmentation — and his grip could weaken, though no Zaghawa figure yet commands enough support to replace him.", "eco": "Chad sells geography. The UAE built an airport at Amdjarass in 2023, officially a field hospital for refugees; UN investigators and journalists found it functioning as an arms-transfer node into RSF-held Darfur. In exchange Chad reportedly received roughly $2 billion in loans — including a $500 million Abu Dhabi Fund facility at 1% interest over eighteen years. For a country with GDP per capita around $3,000, that is regime-defining money, and it is
