const METHOD = {"updated": "Week 16 · 13 Jul 2026", "purpose": "MERIDIAN is a strategic-intelligence platform built on a single analytical spine: power is best understood through leverage — who can compel whom, and what they extract for it. It tracks active conflicts and strategically critical situations through that lens, applying open-source intelligence tradecraft to separate documented fact from interpretation at every step.", "classes": [{"k": "⚔ CONFLICT", "d": "Active armed conflict, insurgency, state collapse, or acute crisis with ongoing violence. Tracked for escalation trajectory and humanitarian impact."}, {"k": "◎ STRATEGIC-WATCH", "d": "No active large-scale violence, but the leverage/extraction framework applies: resource chokeholds, great-power competition, sanctions regimes, electoral ruptures, or structural instability. Tracked for the same reasons even when quiet."}], "index": [{"k": "How to read it", "d": "The escalation index (0-100) is a structured analytic judgment of relative severity and trajectory, not a computed metric. It is grouped into tiers so that small numeric differences are not over-interpreted, and it is revised as reporting develops."}, {"k": "CRITICAL (90-100)", "d": "Mass-atrocity risk, state collapse, or war at peak intensity."}, {"k": "SEVERE (75-89)", "d": "Major active conflict or acute strategic crisis."}, {"k": "ELEVATED (55-74)", "d": "Significant instability or high strategic stakes, contained."}, {"k": "GUARDED (35-54)", "d": "Watch conditions; structural risk without acute crisis."}, {"k": "STABLE (0-34)", "d": "Low active risk; tracked for context or improvement."}], "sourcing": [{"k": "ANALYST TIER", "d": "Independent research institutions: ISW/CTP, ACLED, Crisis Group, Africa Center, Yale HRL, RUSI, CSIS, IISS. The default evidentiary base."}, {"k": "▣ GOV-SRC TIER", "d": "State and official data: UN Security Council listings, national statistics offices, ministries, WHO. Carries authority but also interest — shown alongside analyst data, not above it."}], "external": [{"k": "DOCUMENTED", "d": "Confirmed by investigators, official bodies, or on-record admission. The strongest tier."}, {"k": "ALLEGED", "d": "Credible reporting or expert assessment, not independently confirmed. Logged as a claim."}, {"k": "DENIED", "d": "Credible allegations that the named actor publicly denies. Shown to record the dispute, not to assert guilt."}], "principles": ["Separate what is known from what is assessed. Every claim is tagged by evidentiary strength; analytic judgment is never presented as established fact.", "Source triangulation. Corroborate across independent reporting before treating a claim as documented; a single source is logged as a claim, not a finding.", "Weight sources by reliability and access, and account for each source's interest — official data carries authority but also motive, and is shown alongside independent analysis rather than above it.", "Trace structural drivers, not just events. Track who backs whom and what they extract — leverage and resource dependence are more durable and more predictive than any single incident.", "Follow the connective tissue across theaters. Arms pipelines, financing chains, and sanctions-evasion networks that cross borders are tracked as systems, not isolated dots.", "Recency governs. Where older and newer reporting conflict, current sourcing wins; legacy and historical layers are dated to their origin and labeled as reference.", "Guard against bias. Steelman competing explanations, flag disputed claims explicitly, and distinguish absence of evidence from evidence of absence.", "Allegations are logged with their evidentiary tier — documented, alleged, or denied — and never laundered into fact."]};
const SYSTEMS = [{"id": "drone-ecosystem", "name": "Iranian Drone-Supply Ecosystem", "icon": "◇", "color": "#e07a5f", "type": "Arms Pipeline", "tier": "documented", "summary": "A single sanctions-bloc UAV supply line — the Mohajer-6 / Shahed / Ababil family — running from Iranian production across three continents. The same airframes appear in the Sahel, Sudan, Venezuela, and (alleged) Cuba, plus the reverse flow of gold and uranium back to Tehran.", "nodes": [{"theater": "iran-us", "role": "Source", "detail": "IRGC/Quds production + technical advisors; the manufacturing origin"}, {"theater": "mali", "role": "Recipient", "detail": "Mohajer-6/Shahed to the junta; drones-for-gold"}, {"theater": "niger", "role": "Recipient", "detail": "Drones-for-uranium (~300t yellowcake alleged)"}, {"theater": "burkina", "role": "Recipient", "detail": "Ababil-2/Mohajer supply agreements (2024)"}, {"theater": "sudan", "role": "Recipient", "detail": "Mohajer-6 to SAF (documented)"}, {"theater": "venezuela", "role": "Hub", "detail": "El Libertador AB: CAVIM assembly of the same Mohajer line"}, {"theater": "cuba", "role": "Recipient (alleged)", "detail": "300+ Russia/Iran attack drones (Axios/US intel; Cuba denies)"}, {"theater": "myanmar", "role": "Recipient", "detail": "Iranian jet fuel powering the junta's aerial bombing campaign"}], "reverse": "Gold (Sahel artisanal) + uranium (Niger yellowcake) flow back to Iran as payment.", "significance": "Turns four separate theaters into one procurement network. Degrading the source (Iran) or the Venezuela assembly hub has cascading effects; it also means a Hormuz escalation and a Sahel drone strike draw on the same supply chain."}, {"id": "gold-laundering", "name": "Conflict-Gold Laundering Chain", "icon": "◈", "color": "#d4b24a", "type": "Financing Network", "tier": "documented", "summary": "African conflict gold — mined under RSF, Wagner/Africa Corps, and jihadist control — laundered through Gulf refineries (principally the UAE) into legitimate global markets, financing both the wars that produce it and external sponsors' wider aims.", "nodes": [{"theater": "sudan", "role": "Source", "detail": "RSF-controlled Darfur/Kordofan gold → Dubai (Hemedti's decade-old channel) · ~60t/yr also smuggled via Chad/Egypt/Ethiopia into Dubai"}, {"theater": "mali", "role": "Source", "detail": "Junta gold refineries; Wagner/Africa Corps concessions"}, {"theater": "burkina", "role": "Source", "detail": "Gold-refinery support underwriting Africa Corps presence"}, {"theater": "geopolitical", "role": "Launderer", "detail": "UAE as the principal Gulf refining/transit point into global markets"}, {"theater": "ukraine", "role": "End-use", "detail": "$2.5B+ African gold has funded Russia's war machine since 2022"}], "reverse": "Arms, mercenaries, and regime security flow back to the source states.", "significance": "Explains WHY the external sponsors are present — gold is the extraction that pays for the patronage. Sanctions on refiners/transit (not just fighters) are the unused lever."}, {"id": "sanctions-evasion", "name": "Sanctions-Evasion & Shadow Shipping", "icon": "◊", "color": "#5b9bd5", "type": "Evasion Network", "tier": "documented", "summary": "The maritime and financial infrastructure that moves sanctioned oil and goods — shadow tankers, ship-to-ship transfers, rebranded crude, and third-country routing — linking Iran, Russia, Venezuela, and Cuba into a shared evasion architecture.", "nodes": [{"theater": "iran-us", "role": "Core", "detail": "Hormuz control + designated-route regime; oil-waiver now revoked (Jul 7)"}, {"theater": "venezuela", "role": "Core", "detail": "Crude rebranded via third countries; ~$8B routed through opaque Qatar account"}, {"theater": "cuba", "role": "Dependent", "detail": "Relies on the same networks for the one Russian tanker/year keeping the grid alive"}, {"theater": "ukraine", "role": "Beneficiary-target", "detail": "Russia's shadow fleet moves sanctioned crude; +$15B revenue during Hormuz crisis"}, {"theater": "chokepoints", "role": "Terrain", "detail": "Hormuz, Bab el-Mandeb, Cape routing — where evasion is enforced or interdicted"}, {"theater": "korea", "role": "Evader", "detail": "DPRK coal/iron-ore/tungsten sanctions evasion; Russia-DPRK arms-for-tech trade"}], "reverse": "Hard currency flows back to the sanctioned states, sustaining the regimes.", "significance": "One enforcement architecture governs four theaters. The UK/France Hormuz armada (Jul 7) is an attempt to break the maritime layer of it."}, {"id": "critical-minerals", "name": "Critical-Minerals Dependency Map", "icon": "⬡", "color": "#4cc98a", "type": "Resource Chokehold", "tier": "documented", "summary": "The concentration of battery-metal, nuclear-fuel, rare-earth, and semiconductor supply in a handful of contested jurisdictions — and the great-power scramble to secure or de-risk it. The investment-relevant spine of the platform, spanning Africa, Southeast Asia, and Central Asia.", "nodes": [{"theater": "drc", "role": "Cobalt", "detail": "~70% of global reserves; CMOC (China) ships raw metal for processing; US countering via tripartite MoU"}, {"theater": "myanmar", "role": "Heavy rare earths", "detail": "~94% of China's heavy-REE imports (dysprosium/terbium); KIA-controlled Kachin mines"}, {"theater": "indonesia", "role": "Nickel", "detail": "World's dominant nickel producer+refiner; EV-battery supply-chain anchor"}, {"theater": "niger", "role": "Uranium", "detail": "SOMAÏR nationalized; Russia MoU; feeds the drones-for-yellowcake swap"}, {"theater": "taiwan", "role": "Semiconductors", "detail": "90%+ advanced chips (TSMC) vs China rare-earth/magnet dominance — the mutual hold"}, {"theater": "geopolitical", "role": "De-risking", "detail": "G7 Critical Minerals Alliance targeting Chinese processing concentration"}, {"theater": "venezuela", "role": "Oil reserves", "detail": "World's largest proven crude reserves, now US-administered"}, {"theater": "kazakhstan", "role": "Uranium", "detail": "~40% of global uranium; output cuts move world prices; Russia+China reactor lock-in"}, {"theater": "caucasus", "role": "Trade corridor", "detail": "TRIPP/Zangezur plugs the Middle Corridor gap — China-Europe minerals/trade bypassing Russia+Iran"}, {"theater": "mozambique", "role": "LNG gas", "detail": "$50B+ Total/Exxon/ENI projects; potential 20% of African gas by 2040 — Europe/Asia energy security"}], "reverse": "Capital, infrastructure, and security guarantees flow to resource holders.", "significance": "The 'why it matters to markets' layer — connects the conflict map to commodity/defense investment exposure. Chinese processing dominance is the single biggest chokepoint."}, {"id": "displacement-corridors", "name": "Displacement & Migration Corridors", "icon": "◉", "color": "#9a7ff0", "type": "Human Movement", "tier": "documented", "summary": "The mass-displacement routes generated by the conflict theaters, and how they become political leverage — at borders, in host-state politics, and as instruments of pressure.", "nodes": [{"theater": "sudan", "role": "Source", "detail": "14M+ displaced — world's largest crisis; Chad/Egypt/South Sudan spillover"}, {"theater": "mali", "role": "Source", "detail": "245k+ refugees into Mauritania (~5% of its population)"}, {"theater": "venezuela", "role": "Source", "detail": "~8M emigrated since 2015; 3M+ in Colombia"}, {"theater": "haiti", "role": "Source", "detail": "1.5M displaced; regional (DR/US) migration pressure"}, {"theater": "south-africa", "role": "Destination", "detail": "Migration weaponized into xenophobic electoral mobilization"}, {"theater": "mexico", "role": "Transit", "detail": "Migration cooperation as the US-leverage stabilizer"}, {"theater": "ethiopia", "role": "Source", "detail": "5.1M displaced in 2021 (record); 1M+ refugees hosted; Tigray/Amhara/Oromia"}, {"theater": "mozambique", "role": "Source", "detail": "1.3M displaced from Cabo Delgado by the gas-belt insurgency"}, {"theater": "bangladesh", "role": "Host/source", "detail": "~1M Rohingya in camps; minority-displacement pressure; India deportation friction"}, {"theater": "lakurawa", "role": "Source", "detail": "~500 villages under pressure in Sokoto/Kebbi; settlement clearance in the NW tri-border"}, {"theater": "cameroon", "role": "Source/Host", "detail": "500k+ IDPs (Anglophone); hosts 400k+ refugees from CAR/Nigeria/Chad; Far North raids driving new displacement"}, {"theater": "somalia", "role": "Source", "detail": "~3.8M internally displaced; recurrent famine risk; Al-Shabaab forced recruitment"}], "reverse": "Host-state political capital, border-cooperation leverage, remittances.", "significance": "Displacement is both a humanitarian output and a political input — the same flows that measure a war's severity become bargaining chips in destination-state politics."}, {"id": "info-ops", "name": "Information Operations Network", "type": "Narrative Warfare", "icon": "◉", "color": "#9d7fc7", "summary": "Coordinated disinformation as a strategic instrument — manufacturing coups, laundering atrocities, and shaping alignment without firing a shot. The cheapest form of leverage on the board.", "significance": "This system tracks a method rather than a resource. Its signature is repetition: the same fabricated beats recur across theaters (a leader 'missing,' an army chief 'assassinated,' the internet 'cut'), amplified across platforms and often in a language foreign to the target country — a tell that the audience is external, not domestic. The strategic objective is to make rupture look inevitable, so that it becomes so.", "nodes": [{"theater": "cote-divoire", "role": "Primary target", "detail": "Recurring fabricated-coup campaigns (May 2025, ~Apr 2026); Ivorian agency: 'a deliberate and coordinated disinformation campaign'; posts largely in English in a Francophone state; exploits real 4th-term + AES-sympathy grievances"}, {"theater": "balkans", "role": "Target", "detail": "Russian hybrid information operations backing Serbian non-recognition of Kosovo and Republika Srpska secession"}, {"theater": "sudan", "role": "Atrocity laundering", "detail": "RSF/UAE narrative management around the genocide determination; the HRC motion still declines to name the UAE"}, {"theater": "us-politics", "role": "Contested space", "detail": "The information environment itself as a domain of great-power competition"}, {"theater": "mali", "role": "Vector", "detail": "Russia/Africa Corps narrative operations supporting the juntas and framing France as the enemy — the template the Ivorian campaigns imitate"}, {"theater": "burkina", "role": "Vector", "detail": "Junta-aligned messaging; the AES model whose appeal the coup-disinformation campaigns are engineered to spread"}]}];

rgely Chinese-controlled", "theaters": ["indonesia"], "signal": "Indonesian export-policy shifts + Prabowo statism move nickel prices; Western IRA de-risking targets Chinese-controlled Indonesian supply", "vectors": "Nickel miners, battery-metal ETFs, EV-cathode supply chain; Indonesia policy + Chinese-JV control are the swing factors"}, {"id": "energy", "commodity": "Oil & Gas / Chokepoints", "icon": "◊", "color": "#d4b24a", "use": "Global energy supply; the master variable", "chokehold": "Hormuz (~20-25% of seaborne oil), Bab el-Mandeb; Venezuela (largest reserves, US-administered); Mozambique LNG (top-10 potential)", "theaters": ["iran-us", "chokepoints", "venezuela", "mozambique"], "signal": "Hormuz escalation spikes Brent + war-risk insurance (the Jul 7-8 strikes did); Venezuela oil flows + Mozambique LNG FIDs shift medium-term supply", "vectors": "Energy majors, oil/tanker/shipping equities, LNG developers, war-risk-sensitive insurers; Hormuz is the fastest-moving price trigger"}, {"id": "gold", "commodity": "Gold", "icon": "◉", "color": "#d4b24a", "use": "Safe-haven, conflict-finance, sanctions-evasion store of value", "chokehold": "African conflict gold (Sudan/Sahel) laundered via UAE; Russia using gold to fund the Ukraine war", "theaters": ["sudan", "mali", "geopolitical"], "signal": "Broad-conflict escalation + sanctions-evasion demand support gold; the RSF/Wagner→UAE laundering chain is the illicit-supply story", "vectors": "Gold miners, bullion ETFs, safe-haven allocation; rises with systemic geopolitical stress across the whole platform"}, {"id": "defense", "commodity": "Defense & Drones", "icon": "⚔", "color": "#e2564e", "use": "Arms demand driven by every conflict theater", "chokehold": "Turkey (Baykar drones), US/EU primes, China volume arms; the Iranian drone ecosystem on the other side", "theaters": ["ukraine", "iran-us", "sudan", "kashmir", "korea"], "signal": "Multi-theater escalation (Iran-US, Ukraine, Korea axis) drives defense procurement + drone demand; the Iran drone-supply system is the adversary-side signal", "vectors": "Defense primes, drone/UAV makers, missile-defense; broad conflict escalation across the platform is the tailwind"}];
const GROUPS = [{"id": "al-shabaab", "name": "Al-Shabaab", "full": "Harakat al-Shabaab al-Mujahideen", "affil": "al-Qaeda", "icon": "🏴", "color": "#b83d3d", "tier": "CRITICAL", "strength": "The WEALTHIEST al-Qaeda affiliate on earth — the benchmark", "theaters": ["somalia", "ethiopia"], "mil": "Al-Qaeda's strongest and most successful affiliate. Goal: destroy the Federal Government, expel foreign forces, and build a 'Greater Somalia' uniting ethnic Somalis across East Africa under strict Islamic rule. It is exploiting the ATMIS withdrawal vacuum — retook at least 5 districts in Lower Shabelle and Middle Jubba by late 2025, with the offensive intensifying into 2026. Attack tempo rose from 68 to 116 per month (+70%); attacks on civilians surged 306%; attacks on the US-trained Danab and Gorgor special forces surged 1,764%. Attempted to assassinate the president by IED in March 2025. Controls large rural swathes of south-central Somalia plus strongholds in the northern Al-Madow mountains, and mounts cross-border raids into Kenya and Ethiopia.", "log": "Deep clan integration makes it nearly impossible to dislodge from areas where it has roots. Its intelligence network PENETRATES Somali government and security institutions — enabling targeted assassinations and insider attacks, and meaning offensives are often known in advance. Controls key routes across south-central Somalia. When peacekeepers vacate a position, it reoccupies within weeks.", "eco": "THE BENCHMARK. Al-Shabaab is the wealthiest al-Qaeda affiliate in the world — the standard against which every other group's economy is measured (JNIM ranks second). It runs a genuine taxation and extortion STATE: levies on businesses, checkpoints, ports, agricultural produce, and the telecoms/hawala money-transfer economy that Somalia runs on. It taxes both the formal and informal economy, including businesses in government-held Mogadishu — meaning the state's own commercial base pays it. This is why counterinsurgency fails: it is not funded by patrons who can be cut off, but by the economy itself.", "assess": "Al-Shabaab is the proof-of-concept for every other group on this board: a jihadist organization that became a fiscal state, taxing the very economy the government depends on. It also delivers the platform's clearest strategic warning — when ATMIS drew down before the Somali army could replace it, 'liberated' territory fell within months. That is a lesson with direct bearing on every theater where a foreign force is holding a line."}, {"id": "jnim", "name": "JNIM", "full": "Jama'at Nusrat al-Islam wal-Muslimin", "affil": "al-Qaeda", "icon": "🏴", "color": "#4a9d5f", "tier": "CRITICAL", "strength": "~6,000 fighters — largest militant force in the Sahel", "theaters": ["mali", "burkina", "niger", "benin-togo", "cote-divoire", "ghana"], "mil": "Formed 2017 from the merger of Ansar Dine, Katibat Macina, Al-Mourabitoun, Ansarul Islam, and AQIM's Sahara branch. Doubled its attack tempo in 2025 vs 2024. Burkina Faso alone recorded 280+ JNIM attacks in H1 2025. Structured in three tiers — central leadership, regional commanders, local area commanders — anchored by a Majlis al-Shura that sets strategy and approves high-value operations. Now pressing southward toward the Gulf of Guinea littoral: a new senior leader (Sekou Muslimu) was appointed to expand into Benin, Côte d'Ivoire, Ghana, Niger, and Togo, with a separate emir for Benin. Carried out its first documented attack in Nigeria (Oct 2025, Kwara State).", "log": "A 'franchise model' — local autonomy under central strategic oversight, adapting taxation and recruitment to regional conditions. Mines double as logistics hubs: recruitment grounds, weapons-storage sites, and staging points. Cross-border mobility across the Mali-Burkina-Niger tri-border and now into the coastal states. Sanctioned commanders coordinate specific functions (Sidan ag Hitta ran Western-hostage negotiations; Jafar Dicko oversaw Burkina kidnappings via Ansarul Islam).", "eco": "A war economy worth roughly $100M+/yr — the wealthiest al-Qaeda affiliate after al-Shabaab. FOUR PILLARS: (1) ARTISANAL GOLD — the most profitable sector. JNIM doesn't dig; it controls the chokepoints (road to the mine, road from it, the riverbank where ore is washed, the market where it's sold) and levies a toll at each. Sites under its influence produce up to 725kg/yr (~$34M), exported to the UAE, Turkey, and Switzerland. Over 2,000 miners work the N'Abaw goldfields in Mali. It undercuts pro-government militias on price, building legitimacy. (2) KIDNAPPING — 845 of 1,100 recorded Sahel abductions (2017-23). Local businessmen fetch $3,000-5,000; foreigners can command millions (a member of Dubai's ruling family reportedly yielded $20M+). Kidnappings spike on first entering an area — to intimidate, gather intelligence, and remove local authority figures — then shift to forced recruitment of skilled workers (doctors, nurses). (3) CATTLE RUSTLING — men on motorbikes force Fulani herders to surrender livestock; the cattle are trucked to markets in Ghana, Mali, or Senegal and blended into legitimate stock. A single cow sells for ~$346 in a country where annual GDP per capita is under $3,000. (4) MONEY LAUNDERING + ECONOMIC WARFARE — lends to merchants, underwrites shops, uses formal banking; assassinates those who interfere with its investments. Systematically attacks foreign (esp. Chinese-run) mining sites — Narena, Morila — as a racketeering campaign to extort operators and delegitimize the state. Notably, little evidence of crypto adoption, unlike ISWAP.", "assess": "JNIM is the platform's most economically sophisticated non-state actor and the clearest proof of the extraction thesis: it does not need to own the gold, only to tax every chokepoint between the ore and the market. Its southward push toward the Gulf of Guinea is the single most important trend line in West Africa — it threatens to convert the Sahel's landlocked insurgency into a coastal one with access to ports."}, {"id": "iswap", "name": "ISWAP", "full": "Islamic State West Africa Province", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "CRITICAL", "strength": "Largest IS affiliate in Africa (US State Dept)", "theaters": ["nigeria", "cameroon", "niger", "lakurawa"], "mil": "Formed March 2015 when Boko Haram's Shekau pledged allegiance to IS; split from him over indiscriminate violence, defeated his faction in 2021, and absorbed many of his fighters. Carried out 500+ attacks in Borno State between January and October 2025. Drone attacks rose from 1 (2024) to 7 (2025). Reinforced its Gargash and Sambisa bases with ~100 additional trained fighters each and elevated Sambisa to a formal IS administrative province headed by a wali — a shift toward territorial governance. Active cells in Kogi, Zamfara, Sokoto, and Katsina states, plus Cameroon's Far North, Niger's Diffa, and Chad's Lac province.", "log": "Controls many of the hundreds of islands in Lake Chad — the rear base, logistics hub, and staging ground for attacks across all four basin countries. Captures and redeploys government heavy weapons (IS pays reward bounties for equipment seized from the Nigerian military). Rising leadership weight inside global IS: after the death of IS deputy Abu Khadija (Iraq, Mar 2025), West Africa's al-Furqan office head took a more prominent role, possibly heading IS's General Directorate of Provinces — meaning West Africa is now a command center, not a periphery.", "eco": "THE SIGNATURE STATISTIC: ISWAP's taxation take is roughly $191 MILLION — against Borno State's entire 2024 revenue of $18.4 million. The jihadist group out-taxes the government it fights by more than 10 to 1. And that figure excludes revenue from elsewhere in Nigeria, kidnapping proceeds, and IS bounty payments for captured military equipment. Broader analyses put total taxation revenue well over $100M/yr, sustaining operations across Niger, Chad, Mali, and Burkina Faso — effectively making Nigeria the financial hub of the wider IS network. The model: taxation of farming, fishing, herding, and trade routes; some services provided free (water, boats, basic healthcare) to build legitimacy — but rates are arbitrary and set at leaders' discretion, 'creating opportunities for abuse.' A fisherman in ISWAP waters without proof of payment can be flogged to death; a fish dealer who refuses loses his shipment, his life, or is abducted; herders face arbitrary cattle taxes that can wipe them out. Entire communities have been massacred for non-payment. ISWAP has experimented with cryptocurrency (Tether). US sanctions have targeted its financing architecture — including Lagos and Kano bureaux de change — and a joint US-Nigerian operation killed Abu-Bilal al-Minuki, the architect of ISWAP's financing.", "assess": "ISWAP is the most important counter-example to the idea that jihadist groups are merely destructive: it is a functioning parallel state with a revenue base ten times its government rival's. That fiscal asymmetry — not battlefield strength — is why it cannot be dislodged. It is also the connective tissue of the Lake Chad Basin, operating across Nigeria, Cameroon, Niger, and Chad simultaneously, which is precisely why the platform now tracks Cameroon."}, {"id": "boko-haram", "name": "Boko Haram (JAS)", "full": "Jama'atu Ahlis Sunna Lidda'awati wal-Jihad", "affil": "Independent (ex-IS)", "icon": "🏴", "color": "#8c4a9d", "tier": "SEVERE", "strength": "Diminished vs ISWAP but resurgent in capability", "theaters": ["nigeria", "cameroon", "lakurawa"], "mil": "The original Lake Chad insurgency. Lost the intra-jihadist war to ISWAP (Shekau killed himself in May 2021 during an ISWAP assault) but remains lethal and is closing the capability gap: in the March 2025 Wulgo attack on a Cameroonian base it killed 20 soldiers and SEIZED Soviet-made ZSU-23-4 Shilka radar-guided anti-aircraft guns, and it now employs explosive-laden drones. Distinguished from ISWAP by indiscriminate violence against Muslim civilians — the very issue that caused the 2016 split.", "log": "Operates from Lake Chad and Sambisa remnant areas; cross-border raids into Cameroon's Far North (Mayo-Tsanaga, Mayo-Sava, Logone-et-Chari). Captured government heavy weaponry is now a meaningful part of its arsenal, and drone acquisition marks a step-change. Cooperates opportunistically with Lakurawa in the northwest.", "eco": "Kidnap-for-ransom is the core earner — a Boko Haram-linked group netted ~$500,000 for a single judge. Nigeria's abduction economy is vast: 4,722 people taken in 997 incidents between July 2024 and June 2025, with ~$1.66M in ransoms paid and 762 victims killed. Also relies on raiding, cattle theft, and extortion of farming and fishing communities. Less sophisticated than ISWAP's taxation state — more predatory, less governmental — which is why it commands less territory but remains violent.", "assess": "Boko Haram is the cautionary tale about 'defeated' groups: militarily eclipsed by ISWAP, yet it just seized radar-guided anti-aircraft systems and fields attack drones. Its resurgence is the clearest driver of the new Cameroon theater."}, {"id": "issp", "name": "ISSP / IS-Sahel", "full": "Islamic State Sahel Province", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "SEVERE", "strength": "JNIM's principal rival in the Sahel", "theaters": ["niger", "mali", "burkina", "lakurawa"], "mil": "The Islamic State's Sahel arm and JNIM's direct competitor — the two fight each other as well as the states. Concentrated in the Mali-Niger-Burkina tri-border. Increasingly linked to the northwest Nigeria corridor: the UN reports IS-Sahel fighters operating in Nigeria's rear zones and working to connect with ISWAP.", "log": "Tri-border sanctuary; rear bases now extending into northwest Nigeria via the Lakurawa corridor. The strategic objective is a contiguous IS space linking the Sahel to the Lake Chad Basin.", "eco": "Shifted toward high-value foreign abductions to raise cash — in early 2025 it conducted or sponsored the kidnapping of six foreign nationals, including an Austrian woman in Agadez and four Moroccan truck drivers in Burkina Faso. ACLED assesses the shift is 'driven by the group's need for resources, given that foreigners command higher ransom fees than local abductees.' Also taxes gold sites and trade routes in its zones, competing directly with JNIM for the same revenue base.", "assess": "ISSP matters most as the other half of a two-front jihadist competition: JNIM and ISSP fight each other for the same taxation base, which sometimes slows both — but their rivalry is also what drives expansion into new territory, including the Nigerian northwest."}, {"id": "lakurawa", "name": "Lakurawa", "full": "Lakurawa (NW Nigeria tri-border)", "affil": "Hybrid jihadist-criminal", "icon": "🏴", "color": "#d4884a", "tier": "ELEVATED", "strength": "Tri-border hybrid; the ISSP-ISWAP conduit", "theaters": ["lakurawa", "nigeria", "niger", "benin-togo"], "mil": "Emerged ~2017-18 from a merger of Malian Macina/JNIM-linked Fulani fighters and a Nigerien herder self-defense faction — invited by Sokoto communities to fight bandits, then turned predatory. Declared a terrorist group by Nigeria (Nov 2024/Jan 2025). Hit by US airstrikes on Christmas Day 2025 (Sokoto/Bauni Forest camps). Massacred 162 civilians in Woro and Nuku, Kwara State (Feb 2026), after villagers refused to let it preach. Expanding south into Niger State's Borgu axis. Leader Amir Tajudeen moves between Nigeria, Niger, Mali, and Chad.", "log": "Sanctuary in the ungoverned Nigeria-Niger-Benin tri-border. ISS assesses it functions as a STRATEGIC CONDUIT — the link connecting the Sahel's IS/AQ franchises (ISSP, JNIM) toward Nigeria and the Gulf of Guinea. Cooperates with both Boko Haram/JAS and ISWAP. Niger's post-2023-coup tension with Nigeria blocks the joint operations needed to close the corridor.", "eco": "Governance-through-extraction across roughly 500 villages: coercive 'zakat' taxation, livestock confiscation, produce seizure, and a forced religious code, with rival vigilantes suppressed. High-value kidnapping demonstrates cross-border financial reach — the Kebbi deputy speaker was ransomed for ~$140,600, partly paid in CFA francs. The crime-terror nexus makes it self-financing and less dependent on external patrons than the larger franchises.", "assess": "Lakurawa's significance is structural, not its size: it is the seam. If the Sahel's jihadist economy and Lake Chad's taxation state ever fully connect, Lakurawa is the corridor through which it happens — which is why US airstrikes came to northwest Nigeria."}, {"id": "rsf", "name": "RSF", "full": "Rapid Support Forces", "affil": "State-backed paramilitary", "icon": "⚔", "color": "#d43d3d", "tier": "CRITICAL", "strength": "Genocide-designated; controls Darfur + besieging Kordofan", "theaters": ["sudan"], "mil": "Descended from the Janjaweed militias that killed as many as 400,000 in Darfur two decades ago. The US State Department has FORMALLY DETERMINED the RSF is committing genocide — murdering men and boys and systematically raping women and girls on ethnic grounds. El Fasher fell in October 2025 with ~6,000 killed in the first three days. The identical siege is now closing on El Obeid, where ~500,000 civilians are trapped. Fields drones supplied via its patron network.", "log": "THE UAE PIPELINE — the platform's best-documented external-supply chain. Arms flow from UAE bases to Amdjarass in Chad (officially a 'field hospital'; UN investigators found 'credible evidence' it was an arms-transfer front), then into RSF-held Sudan. Chad allows the transit in exchange for ~$2B in Emirati loans (2023-24). Alternative routes run through Libya (al-Kufra) and, increasingly, Ethiopia. In January 2026 Egypt, Saudi Arabia, and Somalia began denying the UAE overflight permission, squeezing the network and making Chad more vital.", "eco": "GOLD. Sudan is one of Africa's largest gold producers and most of its gold flows to Dubai — the UAE officially imported 39 tons in 2022, with perhaps another 60 tons smuggled via Chad, Egypt, and Ethiopia. The war has only increased the smuggling, letting the RSF (and the SAF) trade gold for weapons. This is the purest gold-for-guns economy on the platform, and it is why the UAE's patronage persists despite the genocide determination.", "assess": "The RSF is the clearest case in the platform of an armed group functioning as the delivery mechanism for someone else's extraction: it fights, and the gold flows to Dubai. Senator Sanders has now named the UAE directly as having 'financed and enabled this genocide for years' — while it remains a US 'major defense partner.'"}, {"id": "m23", "name": "M23 / AFC", "full": "March 23 Movement / Alliance Fleuve Congo", "affil": "Rwanda-backed", "icon": "⚔", "color": "#4a7dc7", "tier": "SEVERE", "strength": "Holds Goma + Bukavu; Rwanda-equipped", "theaters": ["drc"], "mil": "Rwanda-backed rebel coalition that seized Goma and Bukavu in early 2025 — the most significant territorial conquest in the eastern DRC in a generation. Under US pressure it fully withdrew from Uvira in South Kivu, but the Washington and Doha peace processes remain fragile and the African Union is trying to reassert a facilitation role.", "log": "Direct Rwandan Defence Force support (troops, equipment, command) — documented repeatedly by UN Group of Experts panels despite Kigali's denials. Supply lines run across the Rwandan border.", "eco": "COLTAN AND COBALT. The eastern DRC holds the world's critical-minerals prize, and M23's territorial control sits atop it. Minerals are smuggled through Rwanda and enter global supply chains laundered as Rwandan-origin — the mechanism by which a country with modest deposits became a significant coltan exporter. This is the extraction thesis in its most literal form: the conflict is the mechanism, the minerals are the point, and the end user is the global electronics and EV supply chain.", "assess": "M23 is the DRC theater's engine and the platform's most direct link between an armed group and the critical-minerals system. Every EV battery and smartphone touches this war somewhere upstream."}, {"id": "al-shabaab-moz", "name": "Al-Shabaab (Mozambique)", "full": "Ahlu Sunnah Wa-Jama (ISIS-Mozambique)", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "ELEVATED", "strength": "Persistent in Cabo Delgado despite Rwandan/SADC forces", "theaters": ["mozambique"], "mil": "An ISIS-linked insurgency in gas-rich Cabo Delgado since 2017 — locally called 'Al-Shabaab' but unrelated to Somalia's. Over 6,400 killed, 1.3 million displaced. The 2021 Palma attack (~800 dead) froze the LNG megaprojects. Rwandan and SADC forces secured the Afungi enclave, enabling TotalEnergies' January 2026 restart, but the insurgency persists in the north with beheadings and kidnappings.", "log": "Rural sanctuary in northern Cabo Delgado, outside the secured 'closed enclave' around the gas site. The enclave model protects the $20B project while leaving surrounding communities exposed — a security architecture built around capital, not people.", "eco": "Gas-adjacent grievance rather than a taxation state. The insurgency was triggered in part by the gas discovery itself and the conviction among Cabo Delgado's population — over 80% below the poverty line — that they would be excluded from the benefits. It funds itself through raiding, kidnapping, and local extortion rather than a sophisticated revenue architecture.", "assess": "This group exists because of extraction, not despite it: a resource discovery generated an insurgency, foreign troops secured the enclave, foreign majors take the gas, and the local population bears the cost. It is the platform's cleanest extraction-conflict causal chain."}];
const BLOCS = [{"id": "aes-ecowas", "name": "AES vs ECOWAS", "icon": "⬡", "color": "#d4884a", "what": "The Sahel's rupture with West Africa's regional order", "sideA": "AES (Alliance of Sahel States): Mali, Burkina Faso, Niger — military juntas, exited ECOWAS (Jan 2025), formed a mutual-defense confederation", "sideB": "ECOWAS: Nigeria, Ghana, Senegal, Côte d'Ivoire + the coastal states — plus France/EU backing", "contest": "Sovereignty and security orientation. The AES states expelled French forces, turned to Russia's Africa Corps, and rejected ECOWAS's democratic-restoration demands. ECOWAS lost its leverage — sanctions failed, and the juntas consolidated.", "faultline": "The jihadist insurgency doesn't respect the split: JNIM and ISSP operate across both blocs and are now pushing south into ECOWAS coastal states (Benin, Togo, Côte d'Ivoire, Ghana). The rupture destroyed the cross-border cooperation needed to fight them — Niger's coup broke joint operations with Nigeria, which is precisely why the Lakurawa corridor stays open. · INFORMATION WAR: the fault line is now being exploited by coordinated coup-disinformation campaigns targeting Côte d'Ivoire — the region's key French-aligned economy — fabricating a military takeover to manufacture the appearance of AES-style rupture. Ivorian authorities call it 'a deliberate and coordinated disinformation campaign'; analysts describe a broader push promoting coups across West Africa. Attribution unresolved.", "theaters": ["mali", "burkina", "niger", "benin-togo", "lakurawa", "nigeria", "ghana", "cote-divoire"]}, {"id": "gulf-rivalry", "name": "The Gulf Rivalry", "icon": "⬡", "color": "#c74545", "what": "UAE vs Qatar/Saudi/Turkey/Egypt — fought through African proxies", "sideA": "UAE: backs the RSF (Sudan), Abiy's Ethiopia, Haftar's Libya; buys the gold", "sideB": "Saudi Arabia, Egypt, Turkey, Qatar, Iran: back Sudan's SAF; Egypt aligns with Eritrea vs Ethiopia", "contest": "Red Sea and Horn primacy, ports, gold, and agricultural land. The UAE has become the single most important foreign power keeping the RSF in the fight — arms via Amdjarass (Chad) and Libya — while Egypt, Saudi Arabia, and Turkey back the army. Egypt's rivalry with Ethiopia over the GERD dam pulls the Nile into the same contest.", "faultline": "Sudan is the battlefield, but the fault line runs through Chad (which takes ~$2B in UAE loans to permit the arms transit), Libya (the al-Kufra route), and Ethiopia (a UAE-financed RSF training camp near the GERD, per Reuters). In January 2026, Egypt, Saudi Arabia, and Somalia began denying the UAE overflight rights — an escalation of the proxy war into airspace denial. Somalia CANCELLED all bilateral UAE agreements (Jan 2026) over the RSF pipeline — while the UAE simultaneously patronizes Puntland with airstrikes. The same Red Sea port strategy drives both.", "theaters": ["sudan", "ethiopia", "chokepoints", "iran-us", "somalia"]}, {"id": "russia-africa", "name": "Russia's Africa Corps", "icon": "⬡", "color": "#8c4a9d", "what": "The post-Wagner state takeover of Russian influence in Africa", "sideA": "Russia (Africa Corps, MoD-controlled): Mali, Burkina, Niger, CAR, Libya", "sideB": "France (expelled), the EU, the US — the displaced Western security architecture", "contest": "Regime survival services in exchange for mining concessions and diplomatic alignment. Russia offers what the West won't: no governance conditions. In return it takes gold and mineral rights and gains UN votes.", "faultline": "The security results are poor — jihadist violence rose after Russian deployment in Mali and Burkina — but the political bargain holds because it's about regime survival, not counter-terrorism. Meanwhile Russia's DPRK alliance (troops and shells for the Ukraine war) shows the same logic operating globally: patrons who ask no questions.", "theaters": ["mali", "burkina", "niger", "ukraine", "korea"]}, {"id": "minerals-cold-war", "name": "The Minerals Cold War", "icon": "⬡", "color": "# , Mongolia — stabilizing the hemisphere without US boots. The same Chad simultaneously hosts the UAE's RSF arms pipeline. Colombia's incoming government will close its Havana and Managua embassies, tightening the ring.", "theaters": ["venezuela", "cuba", "colombia", "haiti", "mexico", "jamaica"]}, {"id": "sanctions-bloc", "name": "The Sanctions Bloc", "icon": "⬡", "color": "#5b9bd5", "what": "Iran-Russia-DPRK-Venezuela-Cuba: the mutual-survival network", "sideA": "Iran, Russia, North Korea, Venezuela, Cuba — sanctioned states trading with each other", "sideB": "The US-led sanctions architecture + the G7 financial system", "contest": "Survival outside the dollar system. Russia supplies DPRK with tech/energy/food for troops and shells; Iran supplied Russia with drones; DPRK's tungsten exports to China rose 13-fold; Venezuela's oil moves through opaque channels.", "faultline": "The Hormuz crisis is the sharpest edge — Iran is enforcing a transit regime (IRGC authorization, 'maritime service fees') that would be a permanent revenue stream and a permanent lever. New Supreme Leader Mojtaba Khamenei has enshrined 'the lever of closing the Strait of Hormuz' as strategic doctrine. Sanctions-evasion gold (Russia, Sudan) and DPRK coal move through the same shadow networks.", "theaters": ["iran-us", "ukraine", "korea", "venezuela", "cuba", "chokepoints", "sudan"]}, {"id": "indo-pacific", "name": "First Island Chain", "icon": "⬡", "color": "#4a7dc7", "what": "US alliance system vs Chinese expansion in the Western Pacific", "sideA": "US, Japan, ROK, Philippines, Australia, Taiwan — treaty alliances + AUKUS", "sideB": "China (+ Russia and DPRK as the northern anchor)", "contest": "Taiwan (~90% of advanced chips) and the South China Sea ($3.4T trade artery). China's gray-zone tactics — coast guards, water cannon, ramming — are calibrated to stay below the US Mutual Defense Treaty tripwire.", "faultline": "The alliance is showing strain: the US curtailed intelligence sharing with Seoul after a lawmaker exposed the Kusong enrichment site, and the Russia-DPRK war alliance (troops for tech) has converted a frozen Korean standoff into a live node of the Ukraine war. Myanmar's rare earths flow into the same Chinese supply chain that the Taiwan contest is ultimately about.", "theaters": ["taiwan", "south-china-sea", "korea", "myanmar", "indonesia"]}];
const SEV={critical:'var(--red)',high:'var(--amber)',medium:'var(--gold)',low:'var(--grn)',watch:'var(--gov)'};
const SLBL={active:'ACTIVE',escalating:'ESCALATING',stalemate:'STALEMATE',declining:'EASING',frozen:'FROZEN',ceasefire:'CEASEFIRE',volatile:'VOLATILE',ongoing:'ONGOING',critical:'CRITICAL',watch:'WATCH'};
const TCLS={up:'trend-up',dn:'trend-dn',ss:'trend-ss',vl:'trend-vl'};
const TLBL={up:'▲ ESCALATING',dn:'▼ EASING',ss:'► STEADY',vl:'◆ VOLATILE'};
const CCLR={military:'var(--red)',political:'var(--violet)',economic:'var(--econ)',energy:'var(--amber)',strategic:'var(--gov)'};
const CICON={military:'⚔',political:'⬡',economic:'▤',energy:'⬢',strategic:'◎'};
const CNAME={military:'MILITARY',political:'POLITICAL',economic:'ECONOMIC',energy:'ENERGY',strategic:'STRATEGIC'};
const CORDER=['military','political','economic','energy','strategic'];
const LEV={hi:['HIGH','b-hi'],md:['MED','b-md'],lo:['LOW','b-lo']};
const TIER={'documented':'DOCUMENTED','alleged-credible':'ALLEGED','denied':'DENIED'};
const AFRICA=['Horn / NE Africa','Sahel Core','Coastal Frontier','Central Africa','Southern Africa'];
const SUBS=['Horn / NE Africa','Sahel Core','Coastal Frontier','Central Africa','Caribbean','Southern Africa','South America','North America','Middle East','Europe','Caucasus','South Asia','Central Asia','East Asia','Southeast Asia','Global'];
const WEEKS=['W4','W5','W6','W7','W8','W9','W10','W11','W12','W15'];
let flt='all',sel=null,q='',subFlt='all';

function color(d){return CCLR[d.cat]||SEV[d.sev]||'#888';}
function grp(a,k){return a.reduce((m,i)=>((m[i[k]]=m[i[k]]||[]).push(i),m),{});}
function dlt(d){const h=d.esc_history,nz=h.filter(v=>v>0);if(nz.length<2)return 0;return h[h.length-1]-h[h.length-2];}
function dstr(x){return x>0?'+'+x:x<0?''+x:'0';}
function dcls(x){return x>0?'d-up':x<0?'d-dn':'d-fl';}

function matchWhere(d){
  // returns array of match locations, or [] if no match
  if(!q) return ['all'];
  const s=q.toLowerCase(); const hits=[];
  if([d.name,d.sub,d.region,d.subregion,d.domain,d.note,d.mil,d.pol,d.eco,d.assess].join(' ').toLowerCase().includes(s)) hits.push('theater');
  if((d.gov||[]).some(g=>(g.src+' '+g.detail).toLowerCase().includes(s))) hits.push('gov');
  if((d.leverage||[]).some(l=>(l.actor+' '+l.asset).toLowerCase().includes(s))) hits.push('leverage');
  if((d.econlev||[]).some(e=>(e.holder+' '+e.channel+' '+e.detail).toLowerCase().includes(s))) hits.push('econ');
  if((d.external||[]).some(x=>(x.actor+' '+x.side+' '+x.flow+' '+x.for).toLowerCase().includes(s))) hits.push('external');
  // systems: does this theater appear as a node in a matching system, or does a system match by name?
  (typeof SYSTEMS!=='undefined'?SYSTEMS:[]).forEach(sys=>{
    const sysText=(sys.name+' '+sys.type+' '+sys.summary+' '+sys.significance).toLowerCase();
    const nodeHit=(sys.nodes||[]).some(n=>n.theater===d.id && sysText.includes(s));
    const nameHit=(sys.nodes||[]).some(n=>n.theater===d.id) && sysText.includes(s);
    if(nodeHit||nameHit) hits.push('system');
  });
  (typeof INVEST!=='undefined'?INVEST:[]).forEach(inv=>{
    const invText=(inv.commodity+' '+inv.use+' '+inv.chokehold+' '+inv.signal+' '+inv.vectors).toLowerCase();
    if((inv.theaters||[]).includes(d.id) && invText.includes(s)) hits.push('investment');
  });
  (typeof GROUPS!=='undefined'?GROUPS:[]).forEach(g=>{
    const gText=(g.name+' '+g.full+' '+g.affil+' '+g.military+' '+g.logistics+' '+g.economy+' '+g.note).toLowerCase();
    if((g.theaters||[]).includes(d.id) && gText.includes(s)) hits.push('group');
  });
  (typeof BLOCS!=='undefined'?BLOCS:[]).forEach(b=>{
    const bText=(b.name+' '+b.arena+' '+b.members+' '+b.contest+' '+b.fault).toLowerCase();
    if((b.theaters||[]).includes(d.id) && bText.includes(s)) hits.push('bloc');
  });
  return hits;
}
function matches(d){ return matchWhere(d).length>0; }
function fdb(){
  let d=DB.filter(matches);
  if(subFlt!=='all')d=d.filter(x=>x.subregion===subFlt);
  if(flt==='critical')return d.filter(x=>x.sev==='critical');
  if(flt==='escalating')return d.filter(x=>x.trend==='up');
  if(flt==='deescalating')return d.filter(x=>x.trend==='dn');
  if(flt==='africa')return d.filter(x=>AFRICA.includes(x.subregion));
  if(flt==='latam')return d.filter(x=>['South America','Caribbean','North America'].includes(x.subregion)&&x.id!=='us-politics');
  if(flt==='conflict')return d.filter(x=>x.tclass==='conflict');
  if(flt==='watch')return d.filter(x=>x.tclass==='watch');
  return d;
}
function spark(h,c){return `<div class="row-spark">${h.map((v,i)=>{const ht=Math.max(2,Math.round(v/100*18));const now=i===h.length-1;return `<div class="sbar" style="height:${ht}px;${now?'background:'+c:''}"></div>`;}).join('')}</div>`;}

function renderSubFilter(){
  const present=[...new Set(DB.map(d=>d.subregion))];
  document.getElementById('subFilter').innerHTML=SUBS.filter(s=>present.includes(s)).map(s=>
    `<button class="sub-chip${subFlt===s?' on':''}" onclick="setSub('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
}
function setSub(s){subFlt=(subFlt===s?'all':s);clearSel();renderSubFilter();renderList();}

function renderTicker(){
  const items=[...DB].sort((a,b)=>b.esc-a.esc).map(d=>{
    const dl=dlt(d);const arrow=dl>0?`<span class="up">▲${dl}</span>`:dl<0?`<span class="dn">▼${Math.abs(dl)}</span>`:'';
    return `${d.flag} <b>${d.name.split('—')[0].trim()}</b> ${d.esc} ${arrow}`;
  }).join('  ·  ');
  document.getElementById('ticker').innerHTML=items+'  ·  ';
}

function renderList(){
  const data=fdb();
  document.getElementById('sc').textContent=data.filter(x=>x.sev==='critical').length;
  document.getElementById('se').textContent=data.filter(x=>x.trend==='up').length;
  document.getElementById('sd').textContent=data.filter(x=>x.trend==='dn').length;
  document.getElementById('st').textContent=data.length;
  const wrap=document.getElementById('listWrap');
  if(!data.length){wrap.innerHTML='<div style="padding:30px;text-align:center;font-family:var(--FM);font-size:10px;color:var(--dim);letter-spacing:1px">NO MATCHES</div>';return;}
  const byCat=grp(data,'cat');
  wrap.innerHTML=CORDER.filter(c=>byCat[c]).map(cat=>{
    const items=byCat[cat].sort((a,b)=>b.esc-a.esc);
    const bySub=grp(items,'subregion');
    const subHtml=SUBS.filter(s=>bySub[s]).map(sub=>{
      const rows=bySub[sub].map(d=>{
        const dl=dlt(d),c=color(d);

        tags.push(d.tclass==='conflict'?'<span class="tag tag-conflict">⚔ CONFLICT</span>':'<span class="tag tag-watch">◎ WATCH</span>');

        if(d.gov&&d.gov.length)tags.push('<span class="tag tag-gov">GOV</span>');
        if(d.econlev&&d.econlev.length)tags.push('<span class="tag tag-econ">ECON</span>');

        return `<div class="row${d.id===sel?' active':''}" onclick="pick('${d.id}')">
          <div class="row-flag">${d.flag||'●'}</div>
          <div class="row-main">
            <div class="row-name">${d.name}</div>
            <div class="row-sub">${d.sub}</div>

            <div class="row-idx" style="color:${c}">${d.esc}</div>
            <div class="row-delta ${dcls(dl)}">${dl>0?'▲':dl<0?'▼':'►'} ${dstr(dl)}</div>
            ${spark(d.esc_history,c)}
          </div>
        </div>`;
      }).join('');
      return `<div class="sub-head" onclick="event.stopPropagation()"><span class="sub-mark"></span><span class="sub-name">${sub}</span><span class="sub-count">${bySub[sub].length}</span></div>${rows}`;
    }).join('');
    return `<div class="cat-group">
      <div class="cat-head" onclick="this.parentElement.classList.toggle('closed')">
        <div class="cat-icon ci-${cat}">${CICON[cat]}</div>

        <div class="cat-caret">▾</div>

    </div>`;
  }).join('');
}

function bigHist(d){
  const c=color(d);
  const bars=`<div class="hist-bars">${d.esc_history.map((v,i)=>{
    const h=Math.max(3,Math.round(v/100*42));const now=i===d.esc_history.length-1;
    return `<div class="hist-col"><div class="hist-v">${v||'·'}</div><div class="hist-b" style="height:${h}px;background:${now?c:'var(--faint)'}"></div><div class="hist-w">${WEEKS[i]}</div></div>`;
  }).join('')}</div>`;
  const note=d.hist_real
    ? `<div class="hist-note real">Tracked week-over-week since ${d.tracked_since||'2026'}.</div>`
    : `<div class="hist-note">⚠ Trend estimate — this theater entered tracking ${d.tracked_since||'recently'}. Only the current value is independently verified; earlier bars are an analytic estimate of trajectory, not a recorded series.</div>`;
  return bars+note;
}

function stCls(s){
  if(s.startsWith('DISPROVEN'))return 'st-dis';
  if(s.startsWith('DOCUMENTED'))return 'st-doc';
  if(s.startsWith('UNRESOLVED'))return 'st-unr';
  if(s.startsWith('CONTESTED'))return 'st-con';
  if(s.startsWith('UNSUPPORTED'))return 'st-uns';
  if(s.startsWith('ALLEGED'))return 'st-unr';
  return 'st-con';
}
function contestedPanel(d){
  const c=d.contested;
  if(!c) return '<div class="ct-none">No contested-claims data for this theater.</div>';

function xlinks(d){
  const gs=(typeof GROUPS!=='undefined'?GROUPS:[]).filter(g=>(g.theaters||[]).includes(d.id));
  const bs=(typeof BLOCS!=='undefined'?BLOCS:[]).filter(b=>(b.theaters||[]).includes(d.id));
  const ss=(typeof SYSTEMS!=='undefined'?SYSTEMS:[]).filter(s=>(s.nodes||[]).some(n=>n.theater===d.id));
  if(!gs.length&&!bs.length&&!ss.length) return '';
  let h='<div class="xl-wrap">';
  if(gs.length){h+=`<div class="xl-k">ARMED GROUPS ACTIVE HERE</div><div class="xl-chips">${gs.map(g=>`<span class="xl-chip xl-g" onclick="openGroups()">${g.icon} ${g.name}</span>`).join('')}</div>`;}

  h+='</div>';
  return h;
}

function openContested(){
  const withC=DB.filter(d=>d.contested&&d.contested.claims&&d.contested.claims.length).sort((a,b)=>b.esc-a.esc);
  const none=DB.filter(d=>d.contested&&(!d.contested.claims||!d.contested.claims.length));
  // tally statuses
  const tally={};
  withC.forEach(d=>d.contested.claims.forEach(c=>{const k=c.status.split('\u2014')[0].trim();tally[k]=(tally[k]||0)+1;}));
  const nClaims=Object.values(tally).reduce((a,b)=>a+b,0);
  const chips=Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<span class="ct-st ${stCls(k)}" style="margin:0 5px 5px 0">${k} \u00b7 ${v}</span>`).join('');
  const cards=withC.map(d=>`
    <div class="ctb-card" onclick="closeOverlay();pick('${d.id}')">
      <div class="ctb-head">
        <div class="ctb-n">${d.flag||''} ${d.name}</div>
        <div class="ctb-e ${d.esc>=90?'e-crit':(d.esc>=75?'e-sev':'e-elev')}">${d.esc}</div>
      </div>
      <div class="ctb-sum">${d.contested.summary}</div>
      ${d.contested.claims.map(c=>`<div class="ctb-cl">
        <span class="ct-st ${stCls(c.status)}">${c.status.split('\u2014')[0].trim()}</span>
        <div class="ctb-ct">${c.claim}</div>
      </div>`).join('')}
    </div>`).join('');
  board('\u25c9 CONTESTED \u00b7 THE NARRATIVE WAR',
    `<div class="intro-note">Where the story and the ground don't match. Every claim is scored on what the evidence actually supports \u2014 not on who said it. <b>${withC.length} of ${DB.length} theaters</b> carry an active narrative war (${nClaims} contested claims). The other ${none.length} are marked as having none: <b>the absence of an information operation is itself a finding</b>, so it is stated rather than left blank.</div>
     <div class="ctb-tally">${chips}</div>
     ${cards}
     <div class="ctb-clean"><div class="ctb-ch">\u2713 NO SIGNIFICANT NARRATIVE WAR (${none.length})</div>
       <div class="ctb-cl2">${none.map(d=>`<span class="grp-th" onclick="closeOverlay();pick('${d.id}')">${d.flag||''} ${d.name.split('\u2014')[0].trim()}</span>`).join('')}</div></div>`);
}
function openMovers(){
  const real=DB.filter(d=>d.hist_real!==false);
  const seeded=DB.filter(d=>d.hist_real===false);
  const wd=d=>{const h=d.esc_history;return h[h.length-1]-h[h.length-2];};
  const up=real.filter(d=>wd(d)>0).sort((a,b)=>wd(b)-wd(a));
  const dn=real.filter(d=>wd(d)<0).sort((a,b)=>wd(a)-wd(b));
  const fl=real.filter(d=>wd(d)===0).sort((a,b)=>b.esc-a.esc);
  const row=d=>{const x=wd(d);const s=x>0?'+'+x:(x<0?''+x:'0');
    return `<div class="mv-row" onclick="closeOverlay();pick('${d.id}')">
      <div class="mv-d ${x>0?'mv-up':(x<0?'mv-dn':'mv-fl')}">${s}</div>
      <div class="mv-n">${d.flag||''} ${d.name}</div>
      <div class="mv-e">${d.esc}</div></div>`;};
  const srow=d=>`<div class="mv-row mv-seed" onclick="closeOverlay();pick('${d.id}')">
      <div class="mv-d mv-est">EST</div>
      <div class="mv-n">${d.flag||''} ${d.name}</div>
      <div class="mv-e">${d.esc}</div></div>`;
  board('\u21c5 MOVERS \u00b7 WEEK-OVER-WEEK',
    `<div class="intro-note">Ranked by change since last week. <b>Only theaters with real tracked history appear in the movement columns</b> \u2014 newly-seeded theaters have estimated back-history and cannot show meaningful deltas, so they are listed separately below rather than polluting the signal.</div>
     <div class="mv-sec"><div class="mv-h mv-hu">\u25b2 ESCALATING (${up.length})</div>${up.map(row).join('')||'<div class="mv-empty">None this week.</div>'}</div>
     <div class="mv-sec"><div class="mv-h mv-hd">\u25bc EASING (${dn.length})</div>${dn.map(row).join('')||'<div class="mv-empty">None this week.</div>'}</div>
     <div class="mv-sec"><div class="mv-h mv-hf">\u2014 HOLDING (${fl.length})</div>${fl.map(row).join('')}</div>
     <div class="mv-sec"><div class="mv-h mv-hs">\u25c8 NOT YET TRACKABLE (${seeded.length}) \u00b7 estimated back-history</div>
       <div class="mv-note">These theaters entered tracking recently. Their 10-week curves are analyst estimates, not observed movement \u2014 so no delta is claimed until two real weeks accumulate.</div>
       ${seeded.map(srow).join('')}</div>`);
}
function buildKML(data){
  const cm={military:'ff4e56e2',political:'fff07f9a',economic:'ff8ac94c',energy:'ff30a0e0',strategic:'ffd59b5b'};
  const ic={military:'red',political:'purple',economic:'grn',energy:'wht',strategic:'ltblu'};
  const st=Object.keys(cm).map(k=>`<Style id="s-${k}"><IconStyle><color>${cm[k]}</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/paddle/${ic[k]}-circle.png</href></Icon></IconStyle><LabelStyle><scale>.7</scale></LabelStyle></Style>`).join('');
  const bs=grp(data,'subregion');
  const folders=SUBS.filter(s=>bs[s]).map(sub=>`<Folder><name>${sub}</name>${bs[sub].map(d=>{
    const dl=dlt(d);const ext=(d.external||[]).map(x=>`${x.actor}→${x.side} [${TIER[x.tier]}]: ${x.flow}`).join(' | ');
    return `<Placemark><name>${d.flag||''} ${d.name}${d.external?' ◆':''}</name><description><![CDATA[<b>${d.name}</b><br/>Index: ${d.esc}/100 (Δ${dstr(dl)})<br/>Status: ${SLBL[d.status]||d.status}<br/>${d.note}<br/>${ext?'<b>External:</b> '+ext:''}<br/><i>v18 · Week 15</i>]]></description><styleUrl>#s-${d.cat}</styleUrl><Point><coordinates>${d.lon},${d.lat},0</coordinates></Point></Placemark>`;
  }).join('')}</Folder>`).join('');
  return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>MERIDIAN by Leverage — Week 15</name>${st}${folders}</Document></kml>`;
}
function dl(c,n,m){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:m}));a.download=n;a.click();}
function exportKML(){dl(buildKML(fdb()),'MERIDIAN-Leverage-W16.kml','application/vnd.google-earth.kml+xml');}
function exportCSV(){
  const data=fdb();const h=['Name','Category','Subregion','Domain','Severity','Status','Index','Delta','Lat','Lon'];
  const rows=data.map(d=>[`"${d.name}"`,d.cat,`"${d.subregion}"`,`"${d.domain}"`,d.sev,SLBL[d.status]||d.status,d.esc,dstr(dlt(d)),d.lat,d.lon].join(','));
  dl([h.join(','),...rows].join('\n'),'MERIDIAN-Leverage-W16.csv','text/csv');
}
