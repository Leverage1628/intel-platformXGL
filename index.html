b el-Mandeb if they do", "tier": "documented", "for": "Avoid a return to the Yemen war it spent a decade trying to exit"}], "mil": "The capability is proven, not theoretical. Between November 2023 and October 2025 the Houthis conducted more than 100 attacks on commercial vessels affecting over 60 nations, and in July 2025 they sank two bulk carriers — the Magic Seas and the Eternity C — near Hodeidah. Their arsenal spans one-way attack drones, unmanned surface and underwater vehicles, ballistic and cruise anti-ship missiles, naval mines, explosive boats, and armed boardings. The geography does the rest: Bab el-Mandeb is 26 to 29 kilometres wide, ships must slow and funnel into predictable lanes, and they pass within range of a coastline the Houthis control. The US ran Operation Rough Rider in 2025 — hundreds of strikes — and the group is still there, still armed, and now back at war.", "pol": "The strategic picture changed on July 13. A member of Ansar Allah's political bureau, Mohammed al-Farah, declared the Houthis intend to block Bab el-Mandeb simultaneously with Iran's closure of Hormuz: 'Bab el-Mandeb will join with Hormuz, and the price of oil will rise to $200.' That is the doctrine IRGC Quds Force commander Esmail Qaani had already named in June — an Axis 'security belt' running from the Strait of Hormuz to the Bab el-Mandeb Strait. With Hezbollah degraded and Hamas dismantled, the Houthis are the Axis arm that survived the 2026 war intact, which makes Yemen Tehran's most functional forward capability. The counter-read is worth logging honestly: Ambassador Qubaty argues Iran and the Houthis have consistently avoided full closure despite having the capability, because sustained closure is too costly and risks direct confrontation with international naval power. Capability is not intent — but the threat is now explicit and the second chokepoint is live.", "eco": "Roughly 12% of global maritime trade and a comparable share of seaborne oil passes through Bab el-Mandeb, and the earlier campaign already cut throughput from 8.8 million to around 4 million barrels per day. The scenario that matters is the combination: Hormuz (about a fifth of the world's seaborne oil) and Bab el-Mandeb closed at the same time. Gibson Shipping has warned that a prolonged dual closure, against already-declining global oil reserves, would create far more difficult supply conditions, higher prices, and a shortage of available tankers. The Houthis have now put a number on it themselves — $200 a barrel.", "assess": "Yemen enters at 84 (SEVERE, conflict-class), trend up — and it closes a gap that mattered: the platform tracked Bab el-Mandeb inside Chokepoints while the actor who controls it went untracked. That is no longer tenable, because on July 13 Ansar Allah declared it will close Bab el-Mandeb simultaneously with Hormuz, naming $200 oil as the intended result. Read alongside Iran's declared Hormuz closure at 94, this is the single largest tail risk on the board: two chokepoints, one axis, roughly a third of seaborne energy trade. The capability is demonstrated — two ships sunk, a hundred attacked, a US air campaign that did not remove it. The honest caveat is that Iran and the Houthis have historically stopped short of full closure precisely because it invites the confrontation they cannot win, so the threat may be leverage rather than plan. Watch the UNSC reporting renewal (15 Jul), any strike on a non-Israeli-linked vessel, whether Gulf states enter the Iran war (the Houthis' stated trigger), and Bab el-Mandeb transit volumes — that number is the ground truth. Trend estimate — newly entered tracking.", "tier": "SEVERE", "domain_tag": "Military", "contested": {"summary": "A threat to close the strait, from a group that has always stopped short of closing it.", "claims": [{"claim": "The Houthis will block Bab el-Mandeb simultaneously with Hormuz, driving oil to $200.", "who": "The Houthis and Iran — the threat itself is leverage, and costs nothing to make.", "evid": "The capability is real (100+ attacks, 2 ships sunk, throughput already halved). But Amb. Qubaty notes Iran and the Houthis have consistently AVOIDED full closure despite capability, because sustained closure invites direct confrontation with naval powers they cannot defeat. Stated intent, proven capability, and a track record of stopping short — all three are true.", "status": "CONTESTED — capability is not intent"}, {"claim": "Houthi attacks are framed as targeting only Israeli-linked shipping.", "who": "The Houthis — a limited frame keeps neutral states and their navies out of the fight.", "evid": "MARAD's advisory covers vessels with Israeli, US, or UK association AND any vessel in a fleet whose company has called at Israeli ports — a definition broad enough to catch most global carriers. The Magic Seas and Eternity C sinkings killed and stranded seafarers with no stake in the war.", "status": "CONTESTED — the stated target set and the actual one differ"}]}}, {"id": "libya", "cat": "military", "region": "North Africa", "subregion": "Horn / NE Africa", "tclass": "conflict", "name": "Libya — The Second RSF Corridor + Russia's Africa Bridge", "sub": "al-Kufra arms route · Haftar-Russia-UAE triangle · Tobruk basing · divided state", "domain": "Divided State / Arms Corridor", "sev": "high", "status": "volatile", "since": "2011 (collapse) / 2014 (division)", "esc": 67, "lat": 26.3, "lon": 17.2, "trend": "up", "esc_history": [63, 64, 65, 65, 66, 66, 67, 67, 67, 67], "hist_real": false, "as_of": "13 Jul 2026", "tracked_since": "Wk16 (Jul 2026)", "cas": "No mass-casualty events currently; the harm is exported — Libya is a transit state whose cargo kills in Darfur", "disp": "Migration corridor to Europe; internally displaced from the 2011-2020 wars", "flag": "🇱🇾", "note": "NEW THEATER (Wk16 · the OTHER half of the RSF pipeline — the platform tracked Chad but not the corridor that runs parallel to it) · TWO CORRIDORS, ONE WAR: the UAE runs RSF supply on two air routes — a NORTHERN one through Egyptian/Saudi airspace to LIBYA, and a SOUTHERN one through Ethiopian/Somali/South Sudanese airspace to Chad and Libya (ISW) · AL-KUFRA: the airport in Haftar-controlled southeastern Libya is the northern node — IL-76 and AN-26 cargo flights documented by satellite imagery and flight tracking moving arms to RSF-held Darfur; became the MAIN RSF supply node after Chad scaled back in 2025 · Jan 19 2026: eastern Libyan authorities temporarily CLOSED al-Kufra under Egyptian diplomatic pressure — which is why the Chad route matters more now · THE TRIANGLE: Haftar's LNA controls the southeast; his backers are the UAE and RUSSIA; Wagner/Africa Corps has moved SAM-7s and anti-aircraft systems through Kufra · RUSSIA'S BRIDGE: Feb 2025 tripartite agreement (Haftar-Russia-Belarus) on joint use of LNA logistics at TOBRUK (air base + port); satellite imagery shows reconstruction at al-Jufra air base through Apr 2026 — Moscow is building the North Africa foothold that supplies the Sahel Africa Corps deployments (Mali, Burkina, Niger) · CONTRADICTION: Moscow has shifted most Sudan support from the RSF to the SAF — but its forces in Libya do not interfere with Haftar's arms flow to the RSF (Jamestown) · Libya remains split: Tripoli (GNU, UN-recognized) vs Tobruk/Benghazi (Haftar/LNA); elections perpetually deferred · al-Wigh, Maaten al-Sarra, Brak al-Shati, al-Khadim, al-Jufra = the airbase network", "leverage": [{"actor": "Haftar / LNA", "asset": "Controls southeastern Libya incl. al-Kufra — the northern gate of the RSF pipeline; rents territory to the UAE and Russia simultaneously", "str": "hi"}, {"actor": "Russia (Africa Corps)", "asset": "Tobruk basing agreement + al-Jufra reconstruction — the logistics bridge from the Mediterranean to the Sahel deployments", "str": "hi"}, {"actor": "UAE", "asset": "Runs the northern arms route through Libyan airspace and airfields; Haftar's principal financier", "str": "hi"}, {"actor": "Egypt", "asset": "Diplomatic pressure that briefly CLOSED al-Kufra (Jan 2026) — proof the corridor can be shut, and that no one has sustained the effort", "str": "md"}, {"actor": "GNU (Tripoli)", "asset": "UN recognition and the west — but no control over the south, where the corridor runs", "str": "lo"}], "gov": [{"src": "ISW / Critical Threats (Jan 2026)", "detail": "Documents the two UAE air routes to the RSF (northern via Libya, southern via Chad); eastern Libyan authorities closed al-Kufra Airport Jan 19 2026 under Egyptian pressure"}, {"src": "NGA/Tearline OSINT (Jun 2026)", "detail": "Satellite imagery: Russia developing air-base infrastructure (al-Jufra hangar reconstruction through Apr 2026) to secure a North Africa and Sahel foothold; Feb 2025 Haftar-Russia-Belarus tripartite agreement on Tobruk"}, {"src": "Jamestown Foundation", "detail": "Moscow shifted most Sudan backing to the SAF, yet its forces in Libya do not interfere with Haftar's arms supply to the RSF"}, {"src": "UN Panel of Experts / CNN flight-tracking", "detail": "IL-76 and AN-26 cargo flights from Kufra to RSF-controlled Sudan documented repeatedly since 2023"}], "econlev": [{"holder": "Haftar / LNA", "channel": "Territorial rent + oil", "exp": "HIGH", "detail": "Sells transit rights to the UAE and basing to Russia; the LNA also controls much of Libya's oil crescent — leverage over a state whose entire economy is hydrocarbons"}, {"holder": "Russia", "channel": "Basing-for-influence", "exp": "HIGH", "detail": "Tobruk port + al-Jufra air base = the logistics bridge sustaining Africa Corps in Mali, Burkina and Niger. Libya is how Russia's Sahel deployments get resupplied."}, {"holder": "UAE", "channel": "Arms transit", "exp": "HIGH", "detail": "The northern RSF route; Haftar's financier. Same pattern as Chad — buy a corridor, deny it exists."}], "external": [{"actor": "🇷🇺 Russia", "side": "Haftar / LNA", "flow": "Africa Corps (ex-Wagner) presence; Feb 2025 Tobruk basing agreement with Belarus; al-Jufra reconstruction; moved SAM-7s and AA systems through Kufra to the RSF", "tier": "documented", "for": "A Mediterranean+Sahel logistics bridge — the supply line for Africa Corps in Mali/Burkina/Niger"}, {"actor": "🇦🇪 UAE", "side": "Haftar / LNA + RSF", "flow": "Haftar's principal backer; runs the northern RSF arms route through Libyan airspace and al-Kufra", "tier": "alleged-credible", "for": "Sudanese gold; a client state astride the central Mediterranean"}, {"actor": "🇪🇬 Egypt", "side": "Haftar (but anti-RSF)", "flow": "Backs Haftar politically while pressuring eastern Libya to CLOSE the RSF route — Cairo backs the SAF against the UAE's client", "tier": "documented", "for": "Border security; Nile/Sudan alignment against the UAE-RSF axis"}, {"actor": "🇹🇷 Turkey", "side": "GNU (Tripoli)", "flow": "Drones and military support that defeated Haftar's 2020 Tripoli offensive; maintains the western balance", "tier": "documented", "for": "Maritime EEZ claims; a foothold opposite Haftar's patrons"}], "mil": "Libya is not fighting a war so much as hosting one. The state has been split since 2014 between the UN-recognized GNU in Tripoli and Khalifa Haftar's LNA in the east and south, with elections perpetually deferred. The consequential military fact is the corridor: the UAE runs RSF resupply on two air routes, and the northern one lands in Haftar's Libya. Al-Kufra airport in the southeast is the node — IL-76 and AN-26 cargo flights documented by satellite imagery and flight tracking, carrying arms into RSF-held Darfur, including SAM-7s and anti-aircraft systems moved by Wagner. It became the RSF's main supply node after Chad scaled back in 2025, and eastern Libyan authorities briefly closed it on 19 January 2026 under Egyptian diplomatic pressure — which is precisely why the Chad route has become more critical.", "pol": "The deeper story is Russia building its Africa bridge. In February 2025 Haftar signed a tripartite agreement with Russia and Belarus on joint use of LNA logistics facilities at Tobruk — an air base and a port — and satellite imagery through April 2026 shows reconstruction at al-Jufra air base. This is the infrastructure that sustains Africa Corps deployments in Mali, Burkina Faso and Niger: Libya is how Russia's Sahel presence gets resupplied. The contradiction is instructive. Moscow has shifted most of its Sudan support from the RSF to the SAF — yet its forces in Libya do not interfere with Haftar's arms flow to the RSF. Flow beats alignment, the same lesson the Myanmar theater teaches.", "eco": "Haftar's business is renting geography. He sells transit rights to the UAE, basing to Russia, and sits on much of Libya's oil crescent in a state whose entire economy is hydrocarbons. Egypt backs him politically while simultaneously pressuring him to close the RSF route — because Cairo backs Sudan's army against Abu Dhabi's client. Libya is where three patrons' contradictory interests are all being served by the same man at the same time.", "assess": "Libya enters at 67 (ELEVATED, conflict-class), trend up — the other half of a pipeline the board was tracking only half of. The Sudan theater's central scandal is who arms the RSF; the answer runs through two corridors, and until now MERIDIAN mapped Chad and missed Libya. Al-Kufra is the northern gate, and it was the RSF's main node after Chad scaled back. The January 2026 closure under Egyptian pressure proves the corridor can be shut — and that no one has sustained the effort. Layered on top is Russia's Africa bridge: Tobruk basing, al-Jufra reconstruction, and the logistics chain that keeps Africa Corps supplied in Mali, Burkina and Niger. That single fact ties Libya to five other theaters on this board. Watch al-Kufra's status, Russian construction at al-Jufra and Tobruk, whether Egypt sustains the pressure, and any move on the perpetually-deferred elections. Trend estimate — newly entered tracking.", "tier": "ELEVATED", "domain_tag": "Military", "contested": {"summary": "Everyone denies the flights. The satellites keep photographing them.", "claims": [{"claim": "Haftar denies taking sides in Sudan's war.", "who": "Haftar — and the UAE and Russia, who need the corridor deniable.", "evid": "Satellite imagery and flight tracking document IL-76 and AN-26 cargo flights from al-Kufra to RSF-held Sudan (CNN, Libya Observer, Agenzia Nova, repeatedly since 2023). The aircraft types are also Libyan-operated, which is exactly the ambiguity the route is designed to exploit — but the pattern, timing and destination are consistent.", "status": "DOCUMENTED-BUT-DENIED"}, {"claim": "Russia has shifted its Sudan support to the SAF.", "who": "Moscow — the SAF offers a Red Sea naval base the RSF cannot.", "evid": "True at the diplomatic level, and simultaneously irrelevant on the ground: Russian forces in Libya do not interfere with Haftar's arms flow to the RSF (Jamestown). Moscow backs the army in Port Sudan while its Libyan client supplies the militia. The alignment changed; the flow did not.", "status": "CONTESTED — the policy and the pipeline point different directions"}]}}, {"id": "syria", "cat": "political", "region": "Middle East", "subregion": "Middle East", "tclass": "conflict", "name": "Syria — Post-Assad Consolidation + SDF Absorption", "sub": "al-Sharaa consolidating · SDF forced into integration · Israel occupying the south · Iran expelled", "domain": "Post-Regime Consolidation", "sev": "high", "status": "volatile", "since": "Dec 2024 (Assad's fall)", "esc": 71, "lat": 33.5, "lon": 36.3, "trend": "ss", "esc_history": [74, 73, 73, 72, 72, 71, 71, 71, 71, 71], "hist_real": false, "as_of": "13 Jul 2026", "tracked_since": "Wk16 (Jul 2026)", "cas": "Jan 2026 NE offensive: SDF-government fighting incl. 40+ SDF suicide-drone strikes in 3 days; Jordanian strikes on Suwayda captagon infrastructure; sectarian killings (Alawite coast, Druze south) since Assad's fall", "disp": "Millions still displaced from the 2011-2024 war; returns beginning but incomplete", "flag": "🇸🇾", "note": "NEW THEATER (Wk16 · Syria was referenced across Lebanon/Iran/Gaza but untracked — the hinge of the whole regional realignment) · THE HINGE: Assad fell Dec 2024; Ahmed al-Sharaa (ex-HTS) now president; the Iranian land bridge to Hezbollah was SEVERED — which is why Lebanon's Hezbollah is degraded and why the Axis lost its depth · SDF ABSORBED: Jan 8 2026 the Syrian army attacked SDF positions in Aleppo (Ashrafieh/Sheikh Maqsoud); within 10 days the SDF was beaten and signed a 14-POINT CEASEFIRE AND FULL INTEGRATION AGREEMENT (brokered by US envoy Tom Barrack) handing over Raqqa, Deir ez-Zor, ALL border crossings, the OIL FIELDS, and the ISIS prisoner-of-war camps · 40+ SDF suicide-drone strikes on government targets Jan 24-26; Hasakeh remains SDF-held and contested · a longstanding US ALLY was pressured by its own patron into surrendering to a former al-Qaeda affiliate — Washington, Ankara, and Israel all pushed for it · US delisted al-Sharaa (Res 2799, Nov 2025); Trump-Sharaa call Jan 19; Putin congratulated Sharaa on 'restoring territorial integrity' (Moscow, Jan 28) — Russia, Turkey and the US all backing the same consolidation · ISRAEL occupies southern Syria and strikes at will — a standing Council dispute · JORDAN struck Suwayda (captagon labs, weapons warehouses, smuggling infrastructure) — the drug economy Assad built outliving him · Druze (al-Hijri, Suwayda) and Alawite coastal communities remain unabsorbed; ISIS camps now a government responsibility", "leverage": [{"actor": "al-Sharaa government", "asset": "Won the SDF war in 10 days; now holds the oil fields, border crossings, and international backing from the US, Turkey AND Russia simultaneously", "str": "hi"}, {"actor": "Turkey", "asset": "The decisive external backer; got the SDF (its PKK-linked enemy) dismantled without firing a shot itself", "str": "hi"}, {"actor": "Israel", "asset": "Occupies southern Syria, strikes freely, and vetoes any threat consolidating on its border", "str": "hi"}, {"actor": "SDF (Mazloum Abdi)", "asset": "Residual force + Hasakeh + Kurdish population — but abandoned by its US patron and absorbed on Damascus's terms", "str": "lo"}, {"actor": "United States", "asset": "Brokered the integration (Barrack), delisted Sharaa, and traded its Kurdish ally for a unified Syria aligned against Iran", "str": "hi"}], "gov": [{"src": "UNSC Res 2799 (Nov 2025)", "detail": "US-authored; delisted al-Sharaa and his interior minister from the sanctions list — formal Western rehabilitation"}, {"src": "US Special Envoy Thomas Barrack", "detail": "Brokered the January 2026 SDF integration agreement (credited by the UK at the 18 Mar Council meeting); chaired the Council session"}, {"src": "14-Point Ceasefire and Full Integration Agreement (Jan 2026)", "detail": "SDF integrates into the Syrian state; Raqqa and Deir ez-Zor handed over immediately, along with border crossings, oil fields, and ISIS POW camps"}, {"src": "Middle East Institute (Jan 2026)", "detail": "Government resorted to hostilities after repeated 'constructive talks → SDF consultation → zero implementation'; Hasakeh's status remains the contentious unresolved issue"}], "econlev": [{"holder": "Damascus (al-Sharaa)", "channel": "Oil fields + border crossings", "exp": "HIGH", "detail": "The integration agreement transferred the northeast's OIL FIELDS and all border crossings to the government — the SDF's economic base, handed over. This is what the 10-day war was actually about."}, {"holder": "Captagon networks", "channel": "Narcotics", "exp": "MED", "detail": "Suwayda remains the production hub for the amphetamine trade Assad built; Jordan struck the labs and warehouses directly — the regime fell but its drug economy didn't"}], "external": [{"actor": "🇹🇷 Turkey", "side": "Damascus", "flow": "Decisive backer; celebrated the government's advance into SDF territory; got its PKK-linked enemy dismantled by proxy", "tier": "documented", "for": "Destroy the SDF/PKK border threat; a client state on its southern flank"}, {"actor": "🇺🇸 US", "side": "Damascus (pivot)", "flow": "Delisted al-Sharaa (Res 2799); Barrack brokered the SDF's integration; Trump-Sharaa call affirming 'a strong and unified Syria'", "tier": "documented", "for": "A Syria permanently outside Iran's orbit — worth trading the Kurdish alliance for"}, {"actor": "🇮🇱 Israel", "side": "occupier/spoiler", "flow": "Occupies southern Syria; strikes at will; a standing UNSC dispute", "tier": "documented", "for": "A weak, fragmented neighbour; permanent freedom of action"}, {"actor": "🇷🇺 Russia", "side": "Damascus (accommodation)", "flow": "Putin congratulated Sharaa on restoring territorial integrity (Jan 2026); seeking to keep Tartus/Hmeimim basing under the new order", "tier": "documented", "for": "Retain its Mediterranean naval and air bases after backing the losing side"}, {"actor": "🇯🇴 Jordan", "side": "counter-narcotics", "flow": "Struck captagon labs, weapons warehouses and smuggling infrastructure in Suwayda; new security coordination with Damascus", "tier": "documented", "for": "Kill the drug trade flooding across its border"}], "mil": "The consolidation war was short and decisive. On 8 January 2026 the Syrian army attacked SDF positions in the Ashrafieh and Sheikh Maqsoud districts of Aleppo; within ten days the SDF was beaten and Mazloum Abdi had signed a fourteen-point Ceasefire and Full Integration Agreement with President Ahmed al-Sharaa. The terms were comprehensive: Raqqa and Deir ez-Zor handed over immediately, along with every border crossing, the oil fields, and administration of the Islamic State prisoner-of-war camps. The SDF fought back hard — more than forty suicide-drone strikes on government targets between 24 and 26 January alone — but the outcome was already fixed. Hasakeh remains in SDF hands and remains the unresolved flashpoint. Israel meanwhile occupies southern Syria and strikes when it chooses, and Jordan has bombed captagon infrastructure in Suwayda.", "pol": "This is the hinge of the entire regional realignment, and it explains half the board. Assad's fall in December 2024 severed Iran's land bridge to Hezbollah — which is why Lebanon's Hezbollah is degraded, why the Axis of Resistance lost its strategic depth, and why Iran fights the 2026 war without its forward arm. What followed is stranger: a former al-Qaeda affiliate now runs Damascus with the simultaneous backing of the United States, Turkey and Russia. Washington delisted al-Sharaa by Security Council resolution, its envoy brokered the SDF's surrender, and Putin congratulated him on restoring territorial integrity. The cost was paid by the Kurds: a longstanding US ally was pressured by its own patron into absorption by the government it had spent a decade resisting. The Middle East Institute's account is unsentimental — repeated cycles of talks, consultation, and zero implementation gave Damascus its pretext, and it took it.", "eco": "The ten-day war was about the oil. The integration agreement transferred the northeast's oil fields and all border crossings from the SDF to Damascus — the economic base of Kurdish autonomy, signed away. Meanwhile the captagon economy Assad built has outlived him: Suwayda remains the production hub, and Jordan has resorted to airstrikes on the labs and smuggling infrastructure directly.", "assess": "Syria enters at 71 (ELEVATED, conflict-class) — the theater the board most quietly depended on. It was referenced inside Lebanon ('supply lines degraded after Syria's fall'), inside Iran, inside Gaza, and tracked nowhere. Yet Assad's fall is the single event that explains the Axis of Resistance's collapse: cut the land bridge and Hezbollah withers, which is why Iran entered the 2026 war without its forward deterrent. The 2026 story is consolidation and its price. Al-Sharaa won the SDF war in ten days and took the oil fields, the crossings, and the ISIS camps — and he did it with the US, Turkey and Russia all backing him at once, which meant Washington brokered the surrender of its own Kurdish ally. Israel occupies the south and strikes at will; Jordan bombs the drug labs; the Druze and Alawite communities remain unabsorbed. Watch Hasakeh (the unresolved flashpoint), whether SDF integration actually implements or fractures, Israeli strike tempo, and any Alawite or Druze rupture. Trend estimate — newly entered tracking.", "tier": "ELEVATED", "domain_tag": "Political", "contested": {"summary": "An integration agreement that was a surrender, brokered by the loser's own patron.", "claims": [{"claim": "The SDF's absorption is framed as a negotiated 'integration agreement.'", "who": "Damascus, Turkey, and the US — all three needed it to look voluntary.", "evid": "It followed a 10-day military defeat. The Syrian army attacked Aleppo on 8 January; the SDF signed within days, handing over Raqqa, Deir ez-Zor, all border crossings, the oil fields and the ISIS camps. Abdi arrived in Damascus asking for the return of territory he had just lost. It was a capitulation with a signature on it.", "status": "CONTESTED — 'integration' describes the paperwork, not the process"}, {"claim": "The US supports 'a strong and unified Syria.'", "who": "Washington — a unified Syria outside Iran's orbit is worth more than a Kurdish militia.", "evid": "True, and it required Washington to pressure its own decade-long ally into surrendering to a former al-Qaeda affiliate it had itself delisted two months earlier. The UK explicitly credited the US, and Barrack personally, with brokering it. Both the policy and its cost are documented.", "status": "DOCUMENTED"}]}}, {"id":"russia-domestic","cat":"economic","region":"Europe / Russia","subregion":"Europe","tclass":"watch","name":"Russia — War Economy at Structural Exhaustion","sub":"Kiel: 'structural exhaustion' · NWF liquid 6.5%→1.8% of GDP · VAT hiked · China dependency","domain":"War Economy / Regime Sustainability","sev":"high","status":"escalating","since":"2022 (war footing)","esc":72,"lat":55.75,"lon":37.62,"trend":"up","esc_history":[66,67,68,69,70,71,71,72,72,72],"hist_real":false,"as_of":"14 Jul 2026","tracked_since":"Wk16 (Jul 2026)","cas":"Military casualties estimated in excess of 1.38M personnel since 2022; several hundred thousand skilled workers emigrated","disp":"Labour market structurally scarred — unemployment at 2.4% because the military absorbed the workers the civilian economy shed","flag":"🇷🇺","note":"NEW THEATER (Wk16 · the board tracked the WAR but not the STATE WAGING IT — the single largest structural gap in Europe coverage) · KIEL INSTITUTE (Jun 2026): Russia now faces 'STRUCTURAL EXHAUSTION' — the liquid portion of the National Wealth Fund has fallen from 6.5% of GDP (Feb 2022) to 1.8% (Apr 2026); federal deficit has exceeded full-year targets · SIPRI (Apr 2026): Russia spent $190B on its military in 2025 = 7.5% of GDP, the highest share since the USSR's collapse; now the world's 3rd-largest military spender · Q1 2026 military spending hit a RECORD 5.9tn roubles (~$75-80B), +30% y/y, nearly 5x the pre-invasion level — for the first time since Feb 2022, almost every SECOND rouble of federal spending went to military purposes; >1/3 of all budget expenditure is now CLASSIFIED (~84% of defence spending sits in classified lines) · THE BILL IS COMING DUE: GDP growth collapsed from 4%+ (2023-24) to ~1% (2025-26); the 'military Keynesianism' sugar rush is over · social spending fell from 38% to 25% of the federal budget; economic-development programmes cut to 10.9% (lowest in 2 decades) · VAT raised 20%→22% on Jan 1 2026; the SME VAT threshold slashed 60M→10M roubles; a new levy on electronics · interest rates 15-21% have collapsed capital investment; debt servicing now ~9% of public funds · Putin has begun asking OLIGARCHS to 'donate' to the budget · World Bank: Brent averaging ~$60 in 2026 (5-yr low) — BUT the Iran war and Hormuz closure are an unexpected oil windfall easing the budget (SIPRI notes this explicitly) · Ukrainian deep-strikes have cut refining to a 16-yr low; fuel stations in Belgorod stopped selling entirely (Jun 2026) · CARNEGIE: by 2026-27 the fiscal and social challenges could 'fully metastasise into a crisis' · COUNTER-READ LOGGED: this is not collapse — no bank runs, shelves stocked, and Connolly notes Russian inflation does not reliably produce mass dissatisfaction. Structurally exhausted ≠ broken.","leverage":[{"actor":"Putin / the Kremlin","asset":"Can still extract more — tax hikes, oligarch 'donations', classified reallocation, the President's Reserve Fund spendable at his sole discretion","str":"hi"},{"actor":"China","asset":"The oxygen supply — technology, dual-use components, and the oil market that keeps the war financed. The dependency is asymmetric and deepening","str":"hi"},{"actor":"Ukraine (deep-strike)","asset":"Refining at a 16-yr low; ~40% of export capacity intermittently halted — the one lever directly attacking the revenue base","str":"hi"},{"actor":"Gulf oil windfall (Hormuz)","asset":"The Iran war's price spike is the external lifeline nobody planned — it eases the 2026 budget precisely when it was tightest","str":"md"},{"actor":"Western sanctions architecture","asset":"Shrank oil-and-gas from 42% of budget revenue (2022) to ~22% (2026) — but SITE notes even harsher energy sanctions would not by themselves stop the war financing","str":"md"}],"gov":[{"src":"SIPRI (Apr 2026 + Insights 2026/01)","detail":"$190B spent in 2025 = 7.5% of GDP, highest share since the Soviet collapse; 2026 budget plans 14.9tn roubles (6.3% GDP) — but the budget was amended twice in 2025 and will likely be amended again"},{"src":"Kiel Institute for the World Economy (Jun 2026)","detail":"Russia faces 'structural exhaustion'; NWF liquid share down from 6.5% of GDP (Feb 2022) to 1.8% (Apr 2026); deficit exceeded full-year targets"},{"src":"Bank of Finland / BOFIT","detail":"Growth has returned to its long-term potential (~1%); external and internal risks 'significantly' up; recession a real possibility"},{"src":"Russian Presidential Academy economists","detail":"Warned the National Wealth Fund 'could be exhausted by 2026 if current economic trends persist' — extraordinary bluntness from inside the system"},{"src":"Defence Minister Belousov (Dec 2025)","detail":"Put 2025 defence spending at 7.3% of GDP — implying ~15.86tn roubles, well ABOVE the published budget figure"}],"econlev":[{"holder":"China","channel":"Technology + oil market","exp":"HIGH","detail":"The dependency asymmetry is the structural story: Beijing supplies the components and buys the crude that keep the war running, on terms it sets. Russia's survival is now a Chinese decision as much as a Russian one."},{"holder":"Russia","channel":"Gold + shadow-fleet oil","exp":"HIGH","detail":"Funding the war outside the dollar system — including African conflict gold routed via Africa Corps concessions in Mali, Burkina and Sudan. The Sahel theaters on this board are, in part, Russian war finance."},{"holder":"Russian households","channel":"Tax + inflation transfer","exp":"HIGH","detail":"VAT 20→22%, SME threshold cut 6x, electronics levy, social spending down 38%→25% of budget — the population is the financing mechanism of last resort"}],"external":[{"actor":"🇨🇳 China","side":"Russia (economic)","flow":"Dual-use components, machine tools, and the purchase of sanctioned crude; declines 'lethal aid' by a narrow definition","tier":"documented","for":"A dependent great-power partner and discounted energy — Russia's weakness is China's leverage"},{"actor":"🇰🇵 North Korea","side":"Russia","flow":"Troops fighting and dying in Ukraine, plus artillery and missiles, traded for technology, energy and food","tier":"documented","for":"Regime revenue and military technology from a great-power patron"},{"actor":"🇮🇷 Iran","side":"Russia","flow":"Shahed drone supply and production-line transfer — and now, indirectly, an oil-price windfall via the Hormuz closure","tier":"documented","for":"Anti-Western axis depth; combat-testing its drone ecosystem"},{"actor":"🇺🇸🇪🇺 US/EU","side":"sanctioning","flow":"Sanctions cut oil-and-gas from 42% (2022) to ~22% (2026) of budget revenue; the shadow fleet and Chinese purchases blunt the rest","tier":"documented","for":"Deny the war its financing — a lever that constrains without breaking"}],"ext_flag":true,"mil":"Not a front — this is the engine room of the front. In the first quarter of 2026 Russian military spending hit a record 5.9 trillion roubles (roughly $75-80 billion), nearly 30% higher than a year earlier and almost five times the pre-invasion level; for the first time since February 2022, close to every second rouble the federal government spent went to military purposes. SIPRI puts 2025 spending at $190 billion — 7.5% of GDP, the highest share since the Soviet Union collapsed, and third in the world behind only the United States and China. That ranking was not earned by growth; it was chosen, at the expense of nearly everything else. More than a third of all budget expenditure is now classified, with roughly 84% of defence spending hidden in closed lines, which means the published figures are a floor, not a measurement.","pol":"The Kremlin's fiscal room is narrowing and it is passing the bill to the population. VAT rose from 20% to 22% on 1 January 2026, the threshold at which small businesses must pay it was cut sixfold, and a new levy landed on electronics. Social spending has fallen from 38% to 25% of the federal budget and economic-development programmes to 10.9%, the lowest in at least two decades. Putin has begun asking oligarchs to 'donate' to the budget — a sign the state is no longer looking only downward for the money. Russia's own Presidential Academy economists warned that the National Wealth Fund could be exhausted in 2026, a remarkable admission from inside the system. What the budget does not show is a pivot to peace: defence and internal security together take roughly 38-40% of all spending, and the formal 'cut' to the defence line is an accounting convention, not a decision.","eco":"The Kiel Institute's June 2026 report is the anchor finding: Russia has reached 'structural exhaustion.' The liquid portion of the National Wealth Fund has collapsed from 6.5% of GDP in February 2022 to 1.8% in April 2026. Growth has fallen from over 4% in the wartime boom years to roughly 1%, which BOFIT judges to be simply the economy's long-run potential — the sugar rush of military Keynesianism is spent. Interest rates of 15-21% have crushed capital investment, debt service now consumes about 9% of public funds, and labour shortages are structural rather than cyclical after 1.38 million-plus military casualties and the emigration of several hundred thousand skilled workers. Two things are holding the ceiling up: China, which supplies the technology and buys the crude, and — with grim irony for this board — the Iran war, whose Hormuz closure has handed Moscow an oil-price windfall precisely when its budget needed one.","assess":"Russia enters at 72 (ELEVATED, strategic-watch), trend up — and it closes the largest single gap in the platform's Europe coverage: MERIDIAN tracked the war and not the state waging it. The finding is not that Russia is collapsing. It is that Russia is being consumed. Kiel calls it structural exhaustion; Carnegie warns the fiscal and social strains could metastasise into a crisis by 2026-27; and yet there are no bank runs, the shelves are stocked, and unemployment sits at 2.4% — because the military absorbed the workers the civilian economy shed. Endgames in authoritarian resource states do not arrive as events; they arrive as accumulating constraints punctuated by windfalls that create false dawns. The Hormuz oil spike is exactly such a windfall. The two variables that actually decide this theater are external: whether China keeps supplying the oxygen, and whether Ukraine's deep-strike campaign keeps cutting the revenue. Watch the NWF liquid balance, the classified-spending share, oil above or below $60, and any second mobilisation — each round of extraction now costs Putin more politically than the last.","tier":"ELEVATED","domain_tag":"Economic","contested":{"summary":"Everyone agrees the numbers are bad. Nobody agrees what they mean — and the loudest claim on both sides is wrong.","claims":[{"claim":"Russia's 2026 budget shows a REDUCTION in defence spending — evidence of restraint or of running out of money.","who":"Both sides read this one wrong. Moscow likes the optics of discipline; Western commentators like the optics of exhaustion.","evid":"It is an accounting artefact. Since 2023 the detailed expenditure structure has been classified, and the government may reallocate between lines without amending the budget law. Extra revenue can go straight into the President's Reserve Fund and be spent at his discretion. Meanwhile Q1 2026 actual military spending hit a RECORD 5.9tn roubles. The line went down; the spending went up.","status":"CONTESTED — the published cut is not a real cut"},{"claim":"The Russian war economy is collapsing / about to crash.","who":"Those who need sanctions to be working faster than they are.","evid":"Kiel says 'structural exhaustion'; BOFIT says recession is possible. But there are no bank runs, shelves are stocked, unemployment is 2.4%, and Connolly notes Russian inflation does not reliably translate into mass dissatisfaction. Structurally exhausted is not the same as broken — and the Hormuz oil windfall just bought another year.","status":"CONTESTED — deterioration is real, collapse is not imminent"},{"claim":"Sanctions have failed because Russia is still fighting.","who":"Sanctions sceptics — and Moscow, which has every reason to project invulnerability.","evid":"Oil-and-gas fell from 42% of budget revenue (2022) to ~22% (2026); the NWF's liquid cushion is nearly gone; taxes are rising on a population that was promised the war was free. SITE's point is sharper: sanctions did not stop the war, but they converted it from something Russia could afford into something Russia must extract from its own people to sustain.","status":"CONTESTED — judge the lever by what it actually does"}]}}, {"id":"nato-flank","cat":"military","region":"Europe / Russia","subregion":"Europe","tclass":"conflict","name":"NATO Eastern Flank — Eastern Sentry + the Drone Gap","sub":"Article 4 twice · airspace violated across 7 allies · $Mn jets vs $10k drones · 'drone wall' 2-3 yrs away","domain":"Gray-Zone Probing / Alliance Deterrence","sev":"high","status":"escalating","since":"Sep 2025 (Eastern Sentry)","esc":68,"lat":52.23,"lon":21.01,"trend":"up","esc_history":[62,63,64,65,66,67,67,68,68,68],"hist_real":false,"as_of":"14 Jul 2026","tracked_since":"Wk16 (Jul 2026)","cas":"No fatalities — by design. The entire campaign is calibrated to stay below the threshold that would trigger Article 5","disp":"N/A — airspace closures, airport shutdowns, and civil-aviation disruption across the eastern flank","flag":"🛡️","note":"NEW THEATER (Wk16 · Europe had 2 theaters on a board of 45 — this is the NATO-Russia friction surface itself) · THE TRIGGER: 10 Sep 2025 — around 19-20 Russian drones penetrated POLISH airspace during strikes on Ukraine; allied aircraft shot several down — the FIRST known kinetic action by a NATO member against Russian assets in the war · Poland invoked ARTICLE 4; NATO launched OPERATION EASTERN SENTRY within 48 hours (12 Sep 2025, announced by SecGen Rutte + SACEUR Gen. Alexus Grynkewich) — multidomain, 'from the High North to the Black Sea,' no stated end date · a week later Russian MiG-31s violated ESTONIAN airspace → Estonia invoked ARTICLE 4 TOO · NATO's own count: Sept 2025 saw Russian drones and aircraft violate the airspace of ESTONIA, FINLAND, LATVIA, LITHUANIA, NORWAY, POLAND and ROMANIA — seven allies · builds on BALTIC SENTRY (launched 14 Jan 2025 after undersea-cable sabotage; NATO officials privately call it a success — no new cable cuts since) · FORCE: 9 multinational Forward Land Forces battlegroups (Bulgaria, Estonia, Finland, Hungary, Latvia, Lithuania, Poland, Romania, Slovakia); Canada to 2,200 troops in Latvia by 2026; 10,000+ US troops in Poland; France/Germany/Denmark/UK committed jets · THE STRUCTURAL PROBLEM — COST EXCHANGE: NATO is intercepting $10-20k Shahed-type drones with multimillion-dollar fighters and missiles. That trade loses even when every shot hits · THE FIX IS YEARS OUT: a European 'DRONE WALL' is 2-3 years away in the BEST case; interim measures = Latvia's acoustic sensors, cheaper air-launched munitions, and Ukrainian-style mobile fire teams · POLITICAL TELL: Trump suggested the Polish incursion 'could have been a mistake'; Tusk publicly contradicted him — a rare open break by a close ally · Russia's Nebenzya claimed the drones physically could not have reached Poland","leverage":[{"actor":"Russia","asset":"Deniable, cheap, repeatable probing — measuring NATO's language ('violation' vs 'aggression'), response times, and cohesion at a cost of a few drones","str":"hi"},{"actor":"NATO (SACEUR Grynkewich)","asset":"Eastern Sentry + 9 battlegroups + Article 5 — overwhelming at the top of the ladder, poorly matched at the bottom rung where the fighting actually is","str":"hi"},{"actor":"Poland","asset":"The alliance's frontline state and biggest defence spender by GDP share; hosts 10,000+ US troops; chose Article 4 CONSULTATION over escalation — keeping decision-space open while signalling resolve","str":"hi"},{"actor":"The cost-exchange gap","asset":"The real vulnerability: a $10k drone against a $2M interceptor is a losing trade at scale, and Moscow knows the arithmetic","str":"md"},{"actor":"Belarus","asset":"The launch platform and staging ground — Oreshnik-hosting, drone-corridor providing; the flank's threat geography runs through Minsk","str":"md"}],"gov":[{"src":"NATO / SecGen Rutte (12 Sep 2025)","detail":"Launched Eastern Sentry after Poland's Article 4 request; called the incursion 'the largest concentration of violations of NATO airspace' and 'not an isolated incident'"},{"src":"NATO (as of Jun 2026)","detail":"Nine multinational battlegroups on the eastern flank; Russian drones and planes violated the airspace of Estonia, Finland, Latvia, Lithuania, Norway, Poland and Romania in Sept 2025"},{"src":"SACEUR Gen. Alexus Grynkewich","detail":"Eastern Sentry is flexible and multidomain, covering the flank from the High North to the Black Sea and Mediterranean; 'NATO will defend every inch of its territory'"},{"src":"Polish government (Tusk / Pres. Nawrocki)","detail":"Called the incursion an 'attack,' rejected the suggestion it was a mistake; Nawrocki formalised consent for allied forces to deploy on Polish soil"}],"econlev":[{"holder":"Russia","channel":"Cost-imposition","exp":"HIGH","detail":"Each cheap drone forces a multimillion-dollar interception, an airspace closure, and an alliance-wide consultation. The economics of the probe are the point of the probe."},{"holder":"EU / NATO","channel":"Drone-wall procurement","exp":"MED","detail":"The EU has signalled readiness to fund a counter-UAS 'drone wall' — but it is 2-3 years away at best, which defines the window Moscow is currently operating inside"}],"external":[{"actor":"🇷🇺 Russia","side":"prober","flow":"Drone and fighter incursions across seven allies' airspace; undersea-cable sabotage in the Baltic; denies everything","tier":"documented","for":"Test alliance thresholds and cohesion below the Article 5 line — and find out what Washington will actually do"},{"actor":"🇧🇾 Belarus","side":"Russia","flow":"Territory used for drone routing into Ukraine (per Zelensky, Dec 2025) and now hosting Oreshnik IRBMs — 11 minutes from a Polish air base by Russian state media's own boast","tier":"documented","for":"Regime survival paid for in geography"},{"actor":"🇺🇸 US","side":"NATO","flow":"10,000+ troops in Poland; SACEUR is a US general; but Trump publicly floated that the incursion 'could have been a mistake'","tier":"documented","for":"Alliance leadership — while pressing Europe to carry more of it"},{"actor":"🇫🇷🇩🇪🇩🇰🇬🇧 France/Germany/Denmark/UK","side":"NATO","flow":"Rafales, Eurofighters, F-16s and an anti-air frigate committed to Eastern Sentry within days","tier":"documented","for":"Demonstrate that the flank defends the whole alliance — Rutte's line: Russian missiles could reach Madrid or London in minutes"}],"ext_flag":true,"mil":"On 10 September 2025 roughly nineteen to twenty Russian drones crossed into Polish airspace during a mass strike on Ukraine, and allied aircraft shot several of them down — the first known kinetic engagement between a NATO member and Russian assets in this war. Poland invoked Article 4. Within forty-eight hours NATO launched Operation Eastern Sentry, a multidomain reinforcement of the entire flank from the High North to the Black Sea, and a week later Russian MiG-31s violated Estonian airspace, prompting Tallinn to invoke Article 4 as well. NATO's own tally for that month lists airspace violations across seven allies: Estonia, Finland, Latvia, Lithuania, Norway, Poland and Romania. Nine multinational battlegroups now sit on the flank, and the operation has no stated end date.","pol":"The probing is political before it is military. Moscow is measuring language — whether allies say 'violation' or 'aggression' — along with response times and, above all, cohesion. It found a seam almost immediately: President Trump suggested the Polish incursion 'could have been a mistake,' and Prime Minister Tusk publicly contradicted him, a rare open break from one of Washington's closest allies. Poland's choice to consult under Article 4 rather than escalate kept decision-space open while signalling resolve — the correct move, and also an admission that the alliance has no good answer at this rung of the ladder. Russia's UN envoy simply denied the drones could physically have reached Poland.","eco":"The decisive fact is arithmetic. NATO is intercepting Shahed-type drones that cost ten to twenty thousand dollars using multimillion-dollar fighters and missiles — a trade the alliance loses even when every shot hits. That is the vulnerability the incursions are designed to expose, and closing it is slow: a European counter-drone 'wall' is two to three years away in the best case, even with EU funding. The interim fixes are borrowed from Ukraine and from the flank's own smallest states — Latvia's acoustic sensor work, cheaper air-launched munitions, and mobile fire teams. Baltic Sentry, launched in January 2025 after the undersea-cable sabotage, is the precedent that gives NATO officials some confidence: since it began, there have been no new cable cuts.","assess":"The NATO Eastern Flank enters at 68 (ELEVATED, conflict-class for the live kinetic engagements), trend up — and it is the theater the board's Europe coverage was built around without ever naming. Its defining feature is calibration: this is a campaign engineered to sit permanently one rung below Article 5, which makes miscalculation, not intent, the primary escalation risk — the same structure as the South China Sea, with the same danger. Two things make it worse than the Pacific analogue. First, the cost-exchange gap is a standing invitation: Russia can impose millions in cost and alliance-wide consultations for the price of a few drones, and the fix is years out. Second, the alliance's political cohesion is now itself a target, and Moscow has already found the seam between Warsaw and Washington. Watch the drone-wall procurement timeline, whether any incursion produces a fatality (the tripwire), the Belarus staging corridor, and any further public daylight between the US and the frontline states. Trend estimate — newly entered tracking.","tier":"ELEVATED","domain_tag":"Military","contested":{"summary":"Deny the drones, deny the intent, and let the alliance argue with itself about which word to use.","claims":[{"claim":"Russia denies the drone incursions — its UN envoy said the drones' 700km range made reaching Poland 'physically impossible.'","who":"Moscow — deniability is the entire operating principle of a probe. An admitted attack forces a response; an ambiguous one forces a debate.","evid":"Sixteen to twenty drones were recovered across hundreds of square miles of Polish territory. Poland shot several down. NATO recorded violations across seven allies in the same month. Rutte's formulation is the honest one: whether or not it was deliberate, Russia violated NATO airspace.","status":"DOCUMENTED-BUT-DENIED"},{"claim":"The incursion 'could have been a mistake.'","who":"Trump, who floated it — and Moscow, for whom an American president supplying the ambiguity is worth more than any denial it could issue itself.","evid":"Tusk publicly rejected it, calling the incursion an attack — a rare direct contradiction of a US president by a close ally. NATO called it the largest concentration of airspace violations of the war and 'not an isolated incident.' The pattern across seven allies is not consistent with error.","status":"CONTESTED — the alliance's own assessment says otherwise"}]}}, {"id":"moldova","cat":"political","region":"Europe / Russia","subregion":"Europe","tclass":"watch","name":"Moldova — Transnistria Passportisation + the Donbas Template","sub":"Putin decree (15 May) · Shoigu: '220,000 Russian citizens under threat' · law permitting force abroad to protect them","domain":"Frozen Conflict / Passportisation","sev":"high","status":"volatile","since":"1992 (ceasefire)","esc":61,"lat":46.84,"lon":29.62,"trend":"up","esc_history":[52,52,53,55,58,60,61,61,61,61],"hist_real":false,"as_of":"14 Jul 2026","tracked_since":"Wk16 (Jul 2026)","cas":"No current combat deaths — the 1992 war ended in a ceasefire that has held; ~1,500 Russian troops remain deployed","disp":"N/A — Transnistria's ~350,000-455,000 residents live under an unrecognised administration inside Moldova's borders","flag":"🇲🇩","note":"NEW THEATER (Wk16 · the Donbas playbook, running live, on a second border) · THE SEQUENCE IS THE STORY — (1) APR 2026: Sergei Shoigu warned that more than 220,000 RUSSIAN CITIZENS in Transnistria were 'under threat' and that Russia could use 'all available constitutional means' to protect them · (2) 15 MAY 2026: Putin signed a decree granting FAST-TRACK Russian citizenship to any adult resident of Transnistria — waiving the 5-year residency rule, the language test, and the history/law exams · (3) 20 MAY 2026: the Russian FEDERATION COUNCIL finalised legislation ALLOWING THE KREMLIN TO DEPLOY THE MILITARY ABROAD to protect Russian nationals facing legal action by foreign courts Moscow does not recognise · (4) Zakharova: 'Any aggression against our fellow citizens living in Transnistria will receive an immediate and adequate response' · that is the Donbas architecture assembled in five weeks: manufacture the citizens, declare them threatened, legislate the right to intervene · CONTEXT — of ~350,000-455,000 residents, an estimated 200,000-250,000 ALREADY hold Russian passports; ~1,500 Russian troops have been there since 1992, most of them locals with Russian passports · WHAT PROVOKED IT: Moldova is winning the slow war. Chișinău passed a Dec 2025 law stripping Moldovan citizenship from Transnistrians serving in its security organs; pushed VAT/excise/customs harmonisation; and circulated a reintegration 'non-paper' to European partners. Russian energy subsidies — the model that sustained Transnistria — have collapsed. Even the SHERIFF conglomerate, the region's economic spine, has reoriented toward EU markets · GMF's READ (Jun 2026): passportisation here is a sign of Russian WEAKNESS, not strength — Moscow rebuilding leverage precisely because its older instruments have failed · SANDU: the decree is probably about 'needing more people to send to the war in Ukraine' · ZELENSKY: it is 'Russia's way of staking a claim to Transnistria's territory' · PRECEDENT: the identical decree was issued for Abkhazia and South Ossetia in May 2025, and for occupied Ukraine in March","leverage":[{"actor":"Russia","asset":"An extraterritorial legal constituency of 220,000+ 'citizens' inside another state's borders — plus a fresh law authorising force to protect them. The pretext is now pre-built.","str":"hi"},{"actor":"Moldova (Sandu)","asset":"Economic strangulation that is working — customs duties, tax harmonisation, and a reintegration blueprint drawing Transnistria into Moldova's legal and fiscal space, step by step","str":"md"},{"actor":"Transnistria (Tiraspol) / Sheriff","asset":"The dominant conglomerate has reoriented toward EUROPEAN markets — the elite's own money is quietly voting against Moscow","str":"md"},{"actor":"Geography","asset":"The decisive constraint: Ukraine's border is CLOSED. Russia cannot physically reinforce Transnistria without going through Ukraine or Moldova. The threat is real; the logistics are not.","str":"hi"},{"actor":"Ukraine","asset":"Zelensky has ordered joint assessment and possible joint response with Chișinău — the 1,500 Russian troops sit on Ukraine's southwestern flank","str":"md"}],"gov":[{"src":"Russian Presidential Decree (15 May 2026)","detail":"Simplified citizenship for adults permanently resident in Transnistria; waives residency, language, and history/law exam requirements; justified as protecting 'rights and freedoms' under international law"},{"src":"Russian Federation Council (20 May 2026)","detail":"Finalised legislation permitting military deployment abroad to protect Russian nationals subject to legal action or detention by foreign courts Moscow does not recognise"},{"src":"Sergei Shoigu (Apr 2026)","detail":"Warned 220,000+ Russian citizens in Transnistria were 'under threat'; Russia could use 'all available constitutional means' to protect them"},{"src":"President Maia Sandu (16 May 2026)","detail":"'Probably they need more people to send to the war in Ukraine' — reads the decree as a mobilisation instrument"},{"src":"German Marshall Fund (Jun 2026)","detail":"Passportisation is Moscow rebuilding leverage at the moment Moldova's instruments against it are becoming consequential — a response to Russian weakness, not a plan born of strength"}],"econlev":[{"holder":"Moldova (Chișinău)","channel":"Customs + tax harmonisation","exp":"HIGH","detail":"Double duties, VAT and excise alignment, and a reintegration non-paper are pulling Transnistria into Moldova's fiscal space without a shot fired — the quiet annexation Russia is trying to interrupt"},{"holder":"Russia","channel":"Energy subsidy (collapsed)","exp":"MED","detail":"Free gas was the mechanism that sustained Transnistria for three decades. The war ended it. The passports are what Moscow reached for when the gas ran out."},{"holder":"Sheriff conglomerate","channel":"Market reorientation","exp":"MED","detail":"The region's dominant economic force has pivoted toward European markets — the elite's balance sheet is drifting west while its politics stay east"}],"external":[{"actor":"🇷🇺 Russia","side":"Transnistria","flow":"~1,500 troops since 1992; mass passportisation; a new law authorising force to protect 'citizens' abroad; Zakharova threatens 'immediate and adequate response'","tier":"documented","for":"A frozen conflict kept freezable — leverage over Moldova's EU trajectory, and possibly mobilisation manpower"},{"actor":"🇺🇦 Ukraine","side":"Moldova","flow":"Border with Transnistria closed since 2022 — the logistical fact that makes the Russian threat mostly rhetorical; Zelensky ordered joint response coordination with Chișinău","tier":"documented","for":"Deny Russia a second front on its southwestern flank"},{"actor":"🇪🇺 EU / 🇷🇴 Romania","side":"Moldova","flow":"Accession trajectory, financing, and energy substitution after Russian gas ended; Romania's ethno-linguistic tie gives Bucharest a direct stake","tier":"documented","for":"Complete the European integration of a state Russia considers its own sphere"}],"ext_flag":true,"mil":"There is no fighting — and that is exactly what makes the last three months alarming, because what was assembled instead was a legal architecture for intervention. In April 2026 Sergei Shoigu declared that more than 220,000 Russian citizens in Transnistria were under threat and that Moscow could use all available constitutional means to protect them. On 15 May Putin signed a decree granting fast-track Russian citizenship to any adult resident of the territory, waiving residency, language and civics requirements. On 20 May the Federation Council finalised a law permitting the deployment of the Russian military abroad to protect Russian nationals. Manufacture the citizens, declare them threatened, legislate the right to intervene — that is the Donbas playbook, executed in five weeks. The hard constraint is logistics: roughly 1,500 Russian troops sit in Transnistria, and with Ukraine's border closed there is no route to reinforce them.","pol":"The provocation was Moldova's success. Chișinău has been winning the slow war — a December 2025 law strips Moldovan citizenship from Transnistrians serving in the region's security organs, customs and VAT harmonisation is pulling the territory into Moldova's fiscal space, and a reintegration non-paper has been circulated to European partners. Russia's older instruments have failed: the free-gas subsidy that sustained Transnistria for thirty years collapsed with the war, and even the Sheriff conglomerate, the region's economic spine, has reoriented toward European markets. The German Marshall Fund's reading is the one to hold onto: this passportisation is a symptom of Russian weakness, not a demonstration of strength. President Sandu believes the decree is really about manpower for Ukraine; President Zelensky calls it Moscow staking a claim to territory. Both can be true.","eco":"Transnistria's economy was a Russian subsidy in the shape of a state, and the subsidy is gone. Heating and energy provision have degraded, public services have thinned, and the elite's own conglomerate is trading with Europe. Moldova's leverage is fiscal rather than military: double duties, tax harmonisation, and the slow legal absorption of a territory it never controlled. The Kremlin's counter-lever costs nothing to issue and creates an obligation it may not be able to honour — 220,000 passports, and no road to reach them.","assess":"Moldova enters at 61 (ELEVATED, strategic-watch), trend up — because the legal machinery of the Donbas was rebuilt on a second border in the space of five weeks, and this board should be tracking it while it is still paper. The correct read is dual and the board should hold both halves: the pretext is real and now fully constructed, and the capability to act on it is not there, because Ukraine's closed border strands the 1,500 Russian troops already inside. That is what makes this a watch theater rather than a conflict one. The deeper point is the one GMF makes: Moscow reached for passports precisely because the gas ran out, the Sheriff went west, and Chișinău's customs code was doing what tanks could not. It is a weakness move — which does not make it safe, because weakness moves are how frozen conflicts unfreeze. Watch the pace of passport uptake, any Russian attempt to open a land or air corridor, Moldova's reintegration timetable, and whether the new Federation Council law is invoked anywhere at all. Trend estimate — newly entered tracking.","tier":"ELEVATED","domain_tag":"Political","contested":{"summary":"A state manufactures citizens inside its neighbour, then legislates the right to defend them. Both sides are telling the truth about the other.","claims":[{"claim":"Russia frames passportisation as protecting the rights and freedoms of compatriots under international law.","who":"Moscow — 'protection of citizens' is the only frame under which intervention reads as obligation rather than aggression.","evid":"The decree text says exactly that. It is also the identical instrument used in Abkhazia, South Ossetia, occupied Ukraine, and the Donbas before 2022, followed within weeks by a law authorising military deployment abroad to protect those same citizens. The sequence is the evidence.","status":"DOCUMENTED — the pattern is the intent"},{"claim":"This is Donbas repeating on the Dniester.","who":"Kyiv and Chișinău — and it is a reasonable fear, not a manufactured one.","evid":"GMF cautions against reading it reductively. Ukraine's border is CLOSED; Russia cannot reinforce its 1,500 troops. The decree came after Moldova's economic strangulation was working and Russian patronage had collapsed. This is Moscow rebuilding leverage it has lost — the architecture of Donbas without the logistics of Donbas.","status":"CONTESTED — the pretext is Donbas; the capability is not"},{"claim":"Russia is simply responding to Moldova's own citizenship-stripping law and economic pressure on Transnistria.","who":"Moscow and Tiraspol — and the fact is real even if the conclusion isn't.","evid":"Moldova did pass a December 2025 law depriving Transnistrian security personnel of Moldovan citizenship, and has imposed duties that damaged the local budget. Both things are true at once: Chișinău is squeezing, and Moscow is answering with an instrument that has ended in war three times before.","status":"UNRESOLVED — both grievances are documented"}]}}, {"id":"belarus","cat":"military","region":"Europe / Russia","subregion":"Europe","tclass":"watch","name":"Belarus — Oreshnik Host + the Prisoner-for-Potash Trade","sub":"Oreshnik IRBM on combat duty · nuclear drills · 250 prisoners freed for potash sanctions relief","domain":"Nuclear Basing / Hostage Diplomacy","sev":"high","status":"volatile","since":"2022 (invasion staging)","esc":64,"lat":53.9,"lon":27.57,"trend":"ss","esc_history":[60,61,63,64,64,64,64,64,64,64],"hist_real":false,"as_of":"14 Jul 2026","tracked_since":"Wk16 (Jul 2026)","cas":"No combat casualties on Belarusian soil — the harm is exported (staging ground for the 2022 invasion; drone corridor into Ukraine)","disp":"1,000+ political prisoners still held on politically motivated grounds; opposition in exile under Tsikhanouskaya","flag":"🇧🇾","note":"NEW THEATER (Wk16 · Belarus was load-bearing in the Ukraine and NATO-flank theaters and tracked in neither) · THE NUCLEAR FACT: Russia deployed the ORESHNIK intermediate-range ballistic missile to Belarus in DEC 2025 — Lukashenko confirmed it entered combat duty; Russian MoD video (30 Dec) showed mobile launchers in Belarusian forests · Belarus already hosts several dozen Russian TACTICAL nuclear weapons; the 2024 Russian nuclear doctrine formally placed Belarus under Moscow's umbrella · Putin: Russia retains control of the warheads, but MINSK MAY SELECT THE TARGETS · Russian state media boasted Oreshnik needs 11 MINUTES to reach a Polish air base and 17 to reach NATO HQ in Brussels · MAY 2026: joint Russia-Belarus drills PRACTISING NUCLEAR WEAPONS USE (Asipovichy, Mogilev region) · JUL 2026 Lukashenko: the deployment 'can temper even the most heated minds' · THE OTHER TRACK — HOSTAGE DIPLOMACY: Lukashenko is simultaneously courting Washington. Dec 2025: freed 123 political prisoners incl. Nobel laureate ALES BIALIATSKI, and the US lifted sanctions on Belarusian POTASH — the country's key export earner. MAR 2026: 250 more released (largest single release to date) for further partial sanctions relief · 1,000+ remain imprisoned; critics say the releases amount to TRADING IN HUMAN LIVES — a hostage market with a price list · EU went the other way: Dec 2025 broadened sanctions to cover HYBRID activities incl. the deliberate instrumentalisation of migrants at the eastern border; extended Feb 2026 · UKRAINE PRESSURE WORKS: after a Ukrainian ultimatum, Zelensky said Belarus HALTED the equipment used to guide Russian strikes — 'as of today, the equipment is no longer operating' · TSIKHANOUSKAYA: 'The deployment of Oreshnik turns Belarus into a target and militarizes the country'","leverage":[{"actor":"Russia","asset":"Owns the warheads, the doctrine, and the regime's survival — Belarus is less an ally than a forward deployment zone with a flag","str":"hi"},{"actor":"Lukashenko","asset":"The hostage market — 1,000+ political prisoners as a renewable currency, redeemable against sanctions relief; plus the territory Moscow needs","str":"md"},{"actor":"United States","asset":"Potash sanctions — the single lever Lukashenko actually responds to, and the one Washington keeps spending on prisoner releases rather than on the war","str":"md"},{"actor":"Ukraine","asset":"Direct coercion that WORKED — an ultimatum shut down the strike-guidance equipment operating from Belarusian territory","str":"md"},{"actor":"Belarusian opposition (Tsikhanouskaya)","asset":"Moral standing and Western recognition — but no leverage over the arsenal now parked in the forests","str":"lo"}],"gov":[{"src":"Lukashenko (Dec 2025 + Jul 2026)","detail":"Confirmed Oreshnik arrived and entered combat duty; says the deployment plus tactical nuclear weapons 'significantly enhances our defence and can temper even the most heated minds'"},{"src":"Russian MoD (30 Dec 2025)","detail":"Released video showing multiple Oreshnik mobile launchers deployed in Belarusian forests"},{"src":"US–Belarus deal (Dec 2025 / Mar 2026)","detail":"123 political prisoners released incl. Ales Bialiatski, followed by 250 more — in exchange for lifting US sanctions on the Belarusian potash sector"},{"src":"EU Council (Dec 2025, extended Feb 2026)","detail":"Broadened the Belarus sanctions regime to cover hybrid activities including the deliberate instrumentalisation of migrants at the EU's eastern border"},{"src":"President Zelensky","detail":"Said Belarus halted the equipment used to guide Russian strikes following a Ukrainian ultimatum — 'as of today, the equipment is no longer operating'"}],"econlev":[{"holder":"United States","channel":"Potash sanctions","exp":"HIGH","detail":"Potash is Belarus's key export earner and the only lever Lukashenko has visibly responded to. Washington has spent it twice — on prisoners, not on the war effort or the missiles."},{"holder":"Lukashenko","channel":"Political prisoners","exp":"HIGH","detail":"1,000+ still held. Each release is priced. The supply is replenishable, which is precisely what makes it a market rather than a reform."},{"holder":"Russia","channel":"Subsidy + nuclear umbrella","exp":"HIGH","detail":"Energy subsidies and security guarantees keep the regime solvent; the price is territory, airspace, and now nuclear basing"}],"external":[{"actor":"🇷🇺 Russia","side":"regime","flow":"Oreshnik IRBMs (Dec 2025) + tactical nuclear weapons; the 2024 doctrine extends the nuclear umbrella over Belarus; joint nuclear-use drills (May 2026); staged the 2022 invasion from Belarusian soil","tier":"documented","for":"A forward nuclear platform 11 minutes from Polish airbases — and a client whose survival depends on Moscow"},{"actor":"🇺🇸 US","side":"transactional","flow":"Lifted potash sanctions in exchange for prisoner releases (123 in Dec 2025, 250 in Mar 2026); seeking a thaw even as the missiles arrive","tier":"documented","for":"Prisoner releases and a wedge — however small — between Minsk and Moscow"},{"actor":"🇪🇺 EU","side":"sanctioning","flow":"Extended sanctions to hybrid activities including weaponised migration at the eastern border; no thaw","tier":"documented","for":"Deny Minsk the reward Washington is offering — an open transatlantic split on Belarus policy"},{"actor":"🇺🇦 Ukraine","side":"coercing","flow":"Ultimatum forced Belarus to shut down strike-guidance equipment; accuses Belarusian territory of hosting drone corridors into Ukraine","tier":"documented","for":"Close the northern approach"}],"ext_flag":true,"mil":"Belarus is now a forward nuclear platform. Russia deployed the Oreshnik intermediate-range ballistic missile there in December 2025 — Lukashenko confirmed it entered combat duty, and the Russian Defence Ministry released video of mobile launchers in Belarusian forests on 30 December. The country already hosts several dozen Russian tactical nuclear weapons, and Moscow's 2024 doctrine formally placed it under the Russian nuclear umbrella. The arrangement is deliberately ambiguous: Putin says Russia keeps control of the warheads but Minsk may select the targets. Russian state media put the flight time at eleven minutes to a Polish air base and seventeen to NATO headquarters in Brussels, which is the entire point of saying it out loud. In May 2026 the two militaries ran joint drills practising nuclear weapons use.","pol":"Lukashenko is running two policies at once. While hosting the missiles, he has been selling political prisoners to Washington: 123 released in December 2025, including Nobel laureate Ales Bialiatski, in exchange for the lifting of US sanctions on Belarusian potash — the country's key export earner — followed by 250 more in March 2026, the largest single release to date, for further partial relief. More than a thousand remain imprisoned, which is what makes it a market rather than a reform: the currency is renewable. The EU has moved in the opposite direction, extending sanctions to cover hybrid operations including the weaponisation of migrants at its eastern border, leaving an open transatlantic split. Ukraine, meanwhile, demonstrated that direct coercion works — after an ultimatum, Zelensky reported that the equipment guiding Russian strikes from Belarusian territory had stopped operating.","eco":"Potash is the hinge. It is Belarus's principal export earner, the one sanction Lukashenko visibly feels, and the price Washington has now paid twice — for prisoners, not for the missiles and not for the drone corridors. Russian energy subsidies and security guarantees cover the rest of the regime's balance sheet, and the payment for those is territory, airspace, and now nuclear basing. Tsikhanouskaya's warning is the honest ledger: the deployment 'turns Belarus into a target and militarizes the country' — Minsk is accumulating risk it does not control in exchange for solvency it cannot generate.","assess":"Belarus enters at 64 (ELEVATED, strategic-watch) — a theater the board was already leaning on without tracking, since Belarus is the staging ground in the Ukraine theater and the launch geography in the NATO Eastern Flank theater. Its significance is the two-track contradiction: Lukashenko hosts Oreshnik missiles eleven minutes from Polish airbases while simultaneously trading political prisoners to Washington for potash relief — and both tracks are working. That contradiction is the finding. It tells you the US thaw is not buying strategic change (the missiles arrived anyway, the nuclear drills went ahead anyway), and it tells you Minsk has correctly identified that hostages are cheaper to produce than concessions. The one intervention that produced a real behavioural change was Ukraine's ultimatum on the strike-guidance equipment — coercion, not inducement. Watch the Oreshnik deployment posture, the next prisoner-release tranche and what it costs, the EU-US split on sanctions, and any Belarusian involvement in a NATO-flank incursion. Trend estimate — newly entered tracking.","tier":"ELEVATED","domain_tag":"Military","contested":{"summary":"Prisoners are released, sanctions are lifted, and the nuclear missiles arrive anyway. Ask what was actually bought.","claims":[{"claim":"The US prisoner-for-sanctions deals represent progress and a thaw with Minsk.","who":"Washington, which needs a win — and Lukashenko, who needs the potash revenue.","evid":"373 prisoners have been freed across two tranches, which is real and matters to 373 families. In the same window Belarus took delivery of Oreshnik IRBMs, ran joint nuclear-use drills with Russia, and kept 1,000+ prisoners in custody. Critics call it trading in human lives; the supply is renewable, so the price will be paid again. The Atlantic Council's position is that relief should have bought limits on Belarusian facilitation of the war — it did not.","status":"CONTESTED — the releases are real; the strategic return is not"},{"claim":"Lukashenko says the nuclear deployment is purely defensive — 'we're not raising these issues to scare anyone.'","who":"Minsk — a deterrent framing is the only one available to a state that has no say over the warheads on its own soil.","evid":"Russian state media itself advertised the flight times to Poland and Brussels. Putin says Moscow retains control of the weapons while Minsk may pick targets — an arrangement that gives Belarus the risk and Russia the decision. Tsikhanouskaya's counter is the plain one: it makes Belarus a target.","status":"CONTESTED — the deterrent belongs to Moscow; the target is Belarus"}]}}, {"id":"georgia","cat":"political","region":"South Caucasus","subregion":"Caucasus","tclass":"watch","name":"Georgia — Captured State + the Abkhazia Naval Base","sub":"EU accession frozen to 2028 · 365+ days of protest · Russia building a naval base at Ochamchire","domain":"Democratic Capture / Russian Re-absorption","sev":"medium","status":"escalating","since":"2024 (foreign agents law)","esc":57,"lat":41.72,"lon":44.79,"trend":"up","esc_history":[50,51,52,54,55,56,57,57,57,57],"hist_real":false,"as_of":"14 Jul 2026","tracked_since":"Wk16 (Jul 2026)","cas":"200+ reported injuries across protesters and police; no fatalities — the coercion is legal and administrative rather than lethal","disp":"20% of Georgian territory occupied (Abkhazia, South Ossetia) since 2008; activists, journalists and opposition figures detained","flag":"🇬🇪","note":"NEW THEATER (Wk16 · the Caucasus theater tracked the TRIPP corridor and Armenia-Azerbaijan — but not the country Russia is actually taking back) · THE CAPTURE: Georgian Dream (founded by billionaire BIDZINA IVANISHVILI, in power since 2012) passed a Russian-modelled 'FOREIGN AGENTS' law (May 2024), won an October 2024 c support for EU accession — genuine legitimacy, and no institutional route to convert it into power","str":"md"},{"actor":"EU","asset":"The accession carrot — which Georgian Dream has now DECLINED, converting the EU's main lever into a grievance it campaigns on","str":"lo"},{"actor":"China","asset":"The alternative patron Tbilisi is courting as Western funding and partnerships are withdrawn","str":"md"}],"gov":[{"src":"European Council (Dec 2024) / European Parliament","detail":"Formally suspended Georgia's accession process; the EP called the October 2024 election neither free nor fair and condemned 'Russia's systematic interference in Georgia's democratic processes'"},{"src":"Venice Commission (Opinion 1201/2024)","detail":"Criticised the 'Law on Transparency of Foreign Influence' as incompatible with European standards"},{"src":"US State Department","detail":"Suspended the strategic partnership and sanctioned officials responsible for violence against protesters; 'the Georgian people overwhelmingly support integration with Europe'"},{"src":"OSAC / Human Rights Watch (World Report 2026)","detail":"365+ days of protests; 200+ injuries; escalating fines, detentions of activists, opposition members and journalists; restrictions on criticism of officials"}],"econlev":[{"holder":"Russia","channel":"Trade + occupied territory","exp":"HIGH","detail":"Georgian Dream spent a decade threading favourable economic dealings with Moscow against a Western political alignment. The thread has snapped, and only the Russian half remains — with a naval base now going up on occupied Georgian soil."},{"holder":"EU","channel":"Accession + funding (withdrawn)","exp":"LOW","detail":"The accession carrot was the West's only real lever, and Georgian Dream chose to refuse it — which converted the lever into a campaign issue. Sanctions and funding cuts have not moved the government."},{"holder":"China","channel":"Alternative patronage","exp":"MED","detail":"Tbilisi's increasing outreach to Beijing and other autocratic partners is the exit route from Western conditionality — the same substitution the Sahel juntas made"}],"external":[{"actor":"🇷🇺 Russia","side":"Georgian Dream (de facto)","flow":"Occupies 20% of the country; building a naval base at Ochamchire in occupied Abkhazia; passportised Abkhazia and South Ossetia by decree (May 2025); systematic interference documented by the European Parliament","tier":"documented","for":"Re-absorb a state that spent two decades trying to leave — and gain a new Black Sea naval base outside Ukrainian reach"},{"actor":"🇪🇺 EU","side":"Georgian society","flow":"Froze accession, cut funding, threatened sanctions on those undermining Georgian democracy — and watched the pressure misfire into a sovereignty grievance","tier":"documented","for":"Complete the Euro-Atlantic integration ~80% of Georgians want"},{"actor":"🇺🇸 US","side":"pressure","flow":"Suspended the strategic partnership; sanctioned officials involved in the crackdown, including figures around Ivanishvili","tier":"documented","for":"Prevent a Black Sea state from flipping into Moscow's orbit"},{"actor":"🇨🇳 China","side":"Georgian Dream","flow":"Growing outreach and partnership as Western funding is withdrawn","tier":"alleged-credible","for":"A Black Sea / Middle Corridor foothold offered without democratic conditionality"}],"ext_flag":true,"mil":"Not a shooting war — a re-absorption. Twenty percent of Georgia has been under Russian occupation since 2008, and Moscow has now begun construction of a naval base at Ochamchire in occupied Abkhazia: the first new Russian Black Sea basing of the war era, built on Georgian sovereign territory, positioned beyond the reach of Ukrainian naval drones. In May 2025 Putin extended the same simplified-citizenship decree to Abkhazia and South Ossetia that he would issue for Transnistria a year later — one instrument, deployed on three borders. The domestic coercion is legal rather than lethal: fines, detentions of activists, opposition figures and journalists, and laws criminalising criticism of officials. Over 200 people have been injured in protests; nobody has been killed.","pol":"This is the clearest case of democratic capture on the board. Georgian Dream, founded by billionaire Bidzina Ivanishvili and in power since 2012, passed a Russian-modelled foreign-agents law in May 2024, won an October election the European Parliament judged neither free nor fair, and on 28 November 2024 suspended EU accession talks until at least 2028 — in a country whose constitution mandates Euro-Atlantic integration and roughly 80% of whose citizens support it. The government is in open breach of its own founding document, and it is winning. Western pressure misfired: the EU froze accession, Washington sanctioned officials and suspended the strategic partnership, and Georgian Dream simply reframed the whole thing as Brussels using membership as blackmail against Georgian sovereignty. Protesters have now been outside parliament for over a year.","eco":"Georgian Dream's original bargain was to thread favourable economic dealings with Russia through a pro-Western political alignment. The thread has snapped and only the Russian half is left. Western funding and partnership programmes have been cut, which removed the conditionality but also the leverage, and Tbilisi has increased outreach to China and other autocratic partners — the same substitution the Sahel juntas made when they expelled France. The EU's accession carrot was the only lever that ever worked here, and the government's answer was to refuse it and campaign on the refusal.","assess":"Georgia enters at 57 (ELEVATED, strategic-watch), trend up — and it fills the hole in the Caucasus: the platform tracked the TRIPP corridor and the Armenia-Azerbaijan settlement while missing the country Russia is quietly taking back. The finding that should unsettle the board is that Western pressure has been tried here and has failed. Sanctions, funding cuts,
