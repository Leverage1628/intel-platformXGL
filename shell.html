<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — Strategic Intelligence · by Leverage</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Situation Room palette — slate-navy base, signal-cyan accent, disciplined severity scale */
  --void:#0a0e14; --void2:#0c1119; --panel:#111722; --panel2:#141b28; --raised:#18202f;
  --line:#1e2836; --line2:#273449; --line3:#324258;
  --ice:#e8eef5; --text:#b8c6d6; --mute:#6b7d92; --dim:#43536a; --faint:#2a3646;
  --cyan:#3dd6d0; --cyan-d:rgba(61,214,208,.10); --cyan-g:rgba(61,214,208,.35);
  --amber:#e0a030; --amber-d:rgba(224,160,48,.10);
  --red:#e2564e; --red-d:rgba(226,86,78,.11);
  --grn:#4cc98a; --grn-d:rgba(76,201,138,.10);
  --violet:#9a7ff0; --violet-d:rgba(154,127,240,.10);
  --gold:#d4b24a; --gold-d:rgba(212,178,74,.10);
  --gov:#5b9bd5; --gov-d:rgba(91,155,213,.11);
  --econ:#4cc98a; --econ-d:rgba(76,201,138,.10);
  --ext:#e07a5f; --ext-d:rgba(224,122,95,.11);
  --FD:'Barlow Condensed',sans-serif; --FB:'Inter',sans-serif; --FM:'JetBrains Mono',monospace;
  --r:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--void);color:var(--text);font-family:var(--FB);font-size:13px;line-height:1.5;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 55% at 15% -5%,rgba(61,214,208,.04),transparent 60%),radial-gradient(ellipse 70% 50% at 100% 105%,rgba(91,155,213,.035),transparent 60%);}

/* ── TOP BAR ── */
.topbar{position:relative;z-index:60;height:56px;min-height:56px;flex-shrink:0;background:rgba(12,17,25,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:14px;}
.brand{display:flex;flex-direction:column;gap:1px;}
.brand-main{font-family:var(--FD);font-size:21px;letter-spacing:4px;font-weight:700;color:var(--ice);line-height:1;}
.brand-sub b{color:var(--cyan);font-weight:700;letter-spacing:1.5px;}
.brand-sub{font-family:var(--FM);font-size:8px;letter-spacing:2.5px;color:var(--dim);}
.live-chip{display:flex;align-items:center;gap:6px;font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--cyan);padding:4px 9px;border:1px solid var(--cyan-g);border-radius:100px;background:var(--cyan-d);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.wk-chip{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--amber);padding:4px 9px;border:1px solid rgba(224,160,48,.3);border-radius:100px;background:var(--amber-d);}
.search{margin-left:6px;display:flex;align-items:center;gap:7px;background:var(--void2);border:1px solid var(--line2);border-radius:var(--r);padding:6px 11px;transition:border-color .2s;}
.search:focus-within{border-color:var(--cyan-g);}
.search svg{width:12px;height:12px;stroke:var(--dim);}
.search input{background:none;border:none;outline:none;color:var(--ice);font-family:var(--FM);font-size:10px;letter-spacing:.5px;width:130px;}
.search input::placeholder{color:var(--dim);}
.stats{display:flex;gap:14px;margin-left:auto;align-items:center;}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.stat b{font-family:var(--FM);font-size:16px;font-weight:600;line-height:1;}
.stat span{font-family:var(--FM);font-size:7px;letter-spacing:1.5px;color:var(--dim);}
.s-crit{color:var(--red)}.s-esc{color:var(--amber)}.s-desc{color:var(--grn)}.s-tot{color:var(--ice)}
.clock{font-family:var(--FM);font-size:8px;letter-spacing:1px;color:var(--dim);text-align:right;line-height:1.5;padding-left:6px;border-left:1px solid var(--line);}

/* ── TICKER / ALERT ── */
.ticker{position:relative;z-index:55;flex-shrink:0;height:30px;background:var(--void2);border-bottom:1px solid var(--line);display:flex;align-items:center;overflow:hidden;}
.ticker-tag{flex-shrink:0;height:100%;display:flex;align-items:center;gap:6px;padding:0 14px;font-family:var(--FM);font-size:8px;letter-spacing:2px;color:var(--amber);background:var(--amber-d);border-right:1px solid rgba(224,160,48,.25);}
.ticker-tag::before{content:'';width:5px;height:5px;background:var(--amber);border-radius:50%;}
.ticker-scroll{flex:1;overflow:hidden;white-space:nowrap;position:relative;}
.ticker-track{display:inline-block;padding-left:100%;animation:scroll 90s linear infinite;font-family:var(--FM);font-size:9px;letter-spacing:.5px;color:var(--mute);}
.ticker-track b{color:var(--text);font-weight:500;}
.ticker-track .up{color:var(--red);}.ticker-track .dn{color:var(--grn);}
.ticker:hover .ticker-track{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* ── TOOLBAR ── */
.toolbar{position:relative;z-index:50;flex-shrink:0;background:rgba(12,17,25,.9);border-bottom:1px solid var(--line);padding:8px 18px;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;}
.toolbar::-webkit-scrollbar{display:none;}
.tb-label{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);white-space:nowrap;flex-shrink:0;}
.btn{font-family:var(--FM);font-size:9px;letter-spacing:.5px;padding:6px 12px;border:1px solid var(--line2);border-radius:var(--r);background:var(--void2);color:var(--text);cursor:pointer;transition:all .16s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.btn:hover{border-color:var(--line3);background:var(--raised);color:var(--ice);}
.btn-gov:hover{border-color:var(--gov);color:var(--gov);}
.btn-econ:hover{border-color:var(--econ);color:var(--econ);}
.btn-ext:hover{border-color:var(--ext);color:var(--ext);}
.btn-cyan{color:var(--cyan);border-color:var(--cyan-g);}.btn-cyan:hover{background:var(--cyan-d);}
.divider{width:1px;height:18px;background:var(--line2);flex-shrink:0;margin:0 2px;}
.chip{font-family:var(--FM);font-size:8.5px;letter-spacing:.5px;padding:5px 11px;border:1px solid var(--line);border-radius:100px;background:none;color:var(--mute);cursor:pointer;transition:all .16s;white-space:nowrap;}
.chip:hover{color:var(--text);border-color:var(--line3);}
.chip.on{color:var(--void);background:var(--cyan);border-color:var(--cyan);font-weight:600;}
.chip.on[data-f=critical]{background:var(--red);border-color:var(--red);}
.chip.on[data-f=escalating]{background:var(--amber);border-color:var(--amber);}
.chip.on[data-f=deescalating]{background:var(--grn);border-color:var(--grn);}
.sub-row{position:relative;z-index:49;flex-shrink:0;background:var(--void);border-bottom:1px solid var(--line);padding:7px 18px;display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none;}
.sub-row::-webkit-scrollbar{display:none;}
.sub-chip{font-family:var(--FM);font-size:7.5px;letter-spacing:.5px;padding:4px 9px;border-radius:var(--r);background:none;color:var(--dim);cursor:pointer;transition:all .16s;white-space:nowrap;border:1px solid transparent;}
.sub-chip:hover{color:var(--text);background:var(--void2);}
.sub-chip.on{color:var(--cyan);background:var(--cyan-d);border-color:var(--cyan-g);}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:436px 1fr;flex:1;min-height:0;position:relative;z-index:10;}
.list-pane{border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;background:var(--void);}
.list-scroll{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.list-scroll::-webkit-scrollbar{width:6px}.list-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

/* category + subregion headers */
.cat-group{border-bottom:1px solid var(--line);}
.cat-head{padding:11px 16px 9px;display:flex;align-items:center;gap:9px;cursor:pointer;position:sticky;top:0;z-index:15;background:var(--void2);transition:background .15s;}
.cat-head:hover{background:var(--panel);}
.cat-icon{width:22px;height:22px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.ci-military{background:var(--red-d);color:var(--red)}.ci-political{background:var(--violet-d);color:var(--violet)}
.ci-economic{background:var(--econ-d);color:var(--econ)}.ci-energy{background:var(--amber-d);color:var(--amber)}
.ci-strategic{background:var(--gov-d);color:var(--gov)}
.cat-name{font-family:var(--FD);font-size:13px;letter-spacing:1.5px;font-weight:600;color:var(--ice);}
.cat-count{font-family:var(--FM);font-size:9px;color:var(--dim);margin-left:auto;background:var(--void);padding:2px 8px;border-radius:100px;}
.cat-caret{font-size:9px;color:var(--dim);transition:transform .2s;}
.cat-group.closed .cat-caret{transform:rotate(-90deg)}.cat-group.closed .cat-body{display:none}
.sub-head{padding:7px 16px 6px 18px;display:flex;align-items:center;gap:8px;background:var(--void);cursor:pointer;position:sticky;top:42px;z-index:12;}
.sub-head:hover{background:var(--void2)}
.sub-mark{width:4px;height:4px;border-radius:1px;background:var(--cyan);opacity:.7;}
.sub-name{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--mute);text-transform:uppercase;}
.sub-count{font-family:var(--FM);font-size:8px;color:var(--dim);margin-left:auto;}

/* theater row */
.row{padding:11px 16px;display:grid;grid-template-columns:26px 1fr auto;gap:11px;align-items:center;cursor:pointer;border-bottom:1px solid var(--faint);transition:background .12s;position:relative;}
.row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .15s;}
.row:hover{background:var(--void2);}
.row:hover::before{background:var(--line3);}
.row.active{background:var(--panel);}
.row.active::before{background:var(--cyan);}
.row-flag{font-size:17px;line-height:1;text-align:center;}
.row-main{min-width:0;}
.row-name{font-family:var(--FB);font-weight:600;font-size:12.5px;color:var(--ice);line-height:1.3;letter-spacing:-.1px;}
.row-sub{font-size:10.5px;color:var(--mute);margin-top:2px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
.row-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.tag{font-family:var(--FM);font-size:7px;letter-spacing:.5px;padding:2px 5px;border-radius:3px;line-height:1;}
.tag-gov{color:var(--gov);background:var(--gov-d)}
.tag-econ{color:var(--econ);background:var(--econ-d)}
.tag-ext{color:var(--ext);background:var(--ext-d)}
.tag-dip{color:var(--cyan);background:var(--cyan-d)}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.row-idx{font-family:var(--FM);font-size:19px;font-weight:600;line-height:1;letter-spacing:-.5px;}
.row-delta{font-family:var(--FM);font-size:9px;font-weight:600;display:flex;align-items:center;gap:2px;}
.d-up{color:var(--red)}.d-dn{color:var(--grn)}.d-fl{color:var(--dim)}
.row-spark{display:flex;align-items:flex-end;gap:1.5px;height:18px;margin-top:2px;}
.sbar{width:3px;border-radius:1px;background:var(--faint);min-height:2px;}

/* ── DETAIL PANE ── */
.detail-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--void2);}
.mobile-back{display:none;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--dim);text-align:center;padding:40px;}
.empty-mark{width:64px;height:64px;border:1px solid var(--line2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--line3);}
.empty h2{font-family:var(--FD);font-size:16px;letter-spacing:2px;color:var(--mute);font-weight:500;}
.empty p{font-family:var(--FM);font-size:9px;letter-spacing:1px;color:var(--dim);max-width:320px;line-height:1.6;}
.detail{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.detail::-webkit-scrollbar{width:6px}.detail::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

.tabs{display:flex;background:rgba(12,17,25,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;padding:0 10px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:var(--FM);font-size:9px;letter-spacing:1px;padding:13px 13px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--ice);border-bottom-color:var(--cyan);}
.panel{display:none;}.panel.on{display:block;}

.hero{padding:22px 24px 18px;border-bottom:1px solid var(--line);}
.hero-eyebrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.pill{font-family:var(--FM);font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:100px;border:1px solid;}
.pill-cat{border-color:var(--line2);color:var(--mute);}
.pill-sev{font-weight:600;}
.sev-critical{color:var(--red);border-color:rgba(226,86,78,.4);background:var(--red-d)}
.sev-high{color:var(--amber);border-color:rgba(224,160,48,.4);background:var(--amber-d)}
.sev-medium{color:var(--gold);border-color:rgba(212,178,74,.4);background:var(--gold-d)}
.sev-watch{color:var(--gov);border-color:rgba(91,155,213,.4);background:var(--gov-d)}
.hero-title{font-family:var(--FD);font-size:27px;letter-spacing:.5px;font-weight:700;color:var(--ice);line-height:1.08;margin-bottom:6px;display:flex;align-items:center;gap:11px;}
.hero-flag{font-size:26px;}
.hero-sub{font-size:12px;color:var(--mute);line-height:1.4;}
.hero-meta{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.hm{display:flex;flex-direction:column;gap:2px;}
.hm-label{font-family:var(--FM);font-size:7px;letter-spacing:1.5px;color:var(--dim);}
.hm-val{font-family:var(--FM);font-size:11px;color:var(--text);font-weight:500;}

/* index gauge */
.gauge{display:flex;align-items:center;gap:16px;margin-top:16px;padding:14px 16px;background:var(--void);border:1px solid var(--line);border-radius:8px;}
.gauge-num{font-family:var(--FM);font-size:38px;font-weight:600;line-height:.9;letter-spacing:-1px;}
.gauge-info{flex:1;}
.gauge-bar{height:5px;background:var(--faint);border-radius:100px;overflow:hidden;margin-bottom:7px;}
.gauge-fill{height:100%;border-radius:100px;}
.gauge-scale{display:flex;justify-content:space-between;font-family:var(--FM);font-size:7px;color:var(--dim);letter-spacing:.5px;}
.gauge-trend{font-family:var(--FM);font-size:9px;padding:4px 9px;border-radius:var(--r);white-space:nowrap;}
.trend-up{color:var(--red);background:var(--red-d)}.trend-dn{color:var(--grn);background:var(--grn-d)}
.trend-ss{color:var(--gold);background:var(--gold-d)}.trend-vl{color:var(--amber);background:var(--amber-d)}

/* history sparkline big */
.hist{padding:16px 24px;border-bottom:1px solid var(--line);}
.hist-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;}
.hist-bars{display:flex;align-items:flex-end;gap:5px;height:56px;}
.hist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.hist-v{font-family:var(--FM);font-size:7px;color:var(--mute);}
.hist-b{width:100%;max-width:20px;border-radius:2px 2px 0 0;min-height:3px;transition:height .3s;}
.hist-w{font-family:var(--FM);font-size:6.5px;color:var(--dim);letter-spacing:.3px;}

/* intel columns */
.intel{display:grid;grid-template-columns:1fr;gap:0;}
.icol{padding:16px 24px;border-bottom:1px solid var(--line);}
.icol-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.icol-head::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.ih-mil{color:var(--red)}.ih-pol{color:var(--violet)}.ih-eco{color:var(--econ)}
.icol-body{font-size:13px;line-height:1.68;color:var(--text);}
.icol-body p{margin-bottom:9px}.icol-body p:last-child{margin-bottom:0}

.section{padding:16px 24px;border-bottom:1px solid var(--line);}
.section-head{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;}
.assess-box{background:var(--void);border:1px solid var(--line);border-left:2px solid var(--cyan);border-radius:0 8px 8px 0;padding:15px 17px;font-size:13px;line-height:1.72;color:var(--text);}

/* data cards (gov/lev/econ/ext) */
.cards{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--void);border:1px solid var(--line);border-radius:8px;padding:12px 14px;transition:border-color .15s;}
.card:hover{border-color:var(--line2);}
.card-gov{border-left:2px solid var(--gov)}
.card-lev{border-left:2px solid var(--amber)}
.card-econ{border-left:2px solid var(--econ)}
.card-ext{border-left:2px solid var(--ext)}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
.card-actor{font-family:var(--FM);font-size:10px;color:var(--ice);font-weight:500;letter-spacing:.2px;}
.card-actor .sub{font-family:var(--FM);font-size:7px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.card-body{font-size:12px;line-height:1.5;color:var(--text);}
.card-extract{font-size:11px;line-height:1.45;color:var(--mute);margin-top:5px;}
.pt-thesis{font-size:12px;line-height:1.5;color:var(--fg);opacity:.9;margin:2px 0 10px;padding:9px 11px;background:var(--card2,rgba(255,255,255,.03));border-radius:8px;font-style:italic;}
.pl-wrap{padding:4px 0 2px;}
.pl-stage{border-left:2px solid var(--line);padding:2px 0 2px 12px;margin:0 0 2px 6px;}
.pl-stg-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase;}
.pl-node{background:var(--card2,rgba(255,255,255,.02));border:1px solid var(--line);border-radius:7px;padding:7px 9px;margin-bottom:5px;position:relative;}
.pl-actor{font-size:12.5px;font-weight:650;color:var(--fg);margin-bottom:2px;}
.pl-detail{font-size:11px;line-height:1.45;color:var(--mute);}
.pl-who{font-size:10.5px;color:var(--red);margin-top:4px;font-weight:600;}
.pl-node .badge{margin-top:5px;}
.pl-arrow{font-size:14px;color:var(--mute);text-align:left;margin:0 0 2px 12px;line-height:1;opacity:.55;}
.hist-roots{font-size:13px;line-height:1.7;color:var(--text);}
.htl{position:relative;margin-top:4px;}
.htl-row{display:grid;grid-template-columns:92px 16px 1fr;gap:0;align-items:start;}
.htl-date{font-family:var(--FM);font-size:11px;color:var(--amber);font-weight:600;padding:6px 8px 6px 0;text-align:right;white-space:nowrap;}
.htl-line{position:relative;display:flex;justify-content:center;}
.htl-line:before{content:'';position:absolute;top:0;bottom:-6px;width:1px;background:var(--line2);left:50%;transform:translateX(-50%);}
.htl-row:last-child .htl-line:before{bottom:auto;height:14px;}
.htl-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);margin-top:9px;position:relative;z-index:1;box-shadow:0 0 0 3px var(--void2);}
.htl-e{font-size:12px;line-height:1.5;color:var(--text);padding:6px 0 12px 10px;}
.hact{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.hact-card{background:var(--void2);border:1px solid var(--line);border-left:3px solid var(--ext);border-radius:8px;padding:10px 12px;}
.hact-name{font-size:12.5px;font-weight:700;color:var(--fg);margin-bottom:3px;}
.hact-bio{font-size:11.5px;line-height:1.55;color:var(--mute);}
.hist-bridge{font-size:12.5px;line-height:1.65;color:var(--text);border-left:3px solid var(--red);padding:8px 12px;background:var(--void2);border-radius:0 8px 8px 0;}
.hsrc{display:flex;flex-direction:column;gap:7px;}

ns backing Serbian non-recognition of Kosovo and Republika Srpska secession"}, {"theater": "sudan", "role": "Atrocity laundering", "detail": "RSF/UAE narrative management around the genocide determination; the HRC motion still declines to name the UAE"}, {"theater": "us-politics", "role": "Contested space", "detail": "The information environment itself as a domain of great-power competition"}, {"theater": "mali", "role": "Vector", "detail": "Russia/Africa Corps narrative operations supporting the juntas and framing France as the enemy — the template the Ivorian campaigns imitate"}, {"theater": "burkina", "role": "Vector", "detail": "Junta-aligned messaging; the AES model whose appeal the coup-disinformation campaigns are engineered to spread"}]}];

const GROUPS = [{"id": "al-shabaab", "name": "Al-Shabaab", "full": "Harakat al-Shabaab al-Mujahideen", "affil": "al-Qaeda", "icon": "🏴", "color": "#b83d3d", "tier": "CRITICAL", "strength": "The WEALTHIEST al-Qaeda affiliate on earth — the benchmark", "theaters": ["somalia", "ethiopia"], "mil": "Al-Qaeda's strongest and most successful affiliate. Goal: destroy the Federal Government, expel foreign forces, and build a 'Greater Somalia' uniting ethnic Somalis across East Africa under strict Islamic rule. It is exploiting the ATMIS withdrawal vacuum — retook at least 5 districts in Lower Shabelle and Middle Jubba by late 2025, with the offensive intensifying into 2026. Attack tempo rose from 68 to 116 per month (+70%); attacks on civilians surged 306%; attacks on the US-trained Danab and Gorgor special forces surged 1,764%. Attempted to assassinate the president by IED in March 2025. Controls large rural swathes of south-central Somalia plus strongholds in the northern Al-Madow mountains, and mounts cross-border raids into Kenya and Ethiopia.", "log": "Deep clan integration makes it nearly impossible to dislodge from areas where it has roots. Its intelligence network PENETRATES Somali government and security institutions — enabling targeted assassinations and insider attacks, and meaning offensives are often known in advance. Controls key routes across south-central Somalia. When peacekeepers vacate a position, it reoccupies within weeks.", "eco": "THE BENCHMARK. Al-Shabaab is the wealthiest al-Qaeda affiliate in the world — the standard against which every other group's economy is measured (JNIM ranks second). It runs a genuine taxation and extortion STATE: levies on businesses, checkpoints, ports, agricultural produce, and the telecoms/hawala money-transfer economy that Somalia runs on. It taxes both the formal and informal economy, including businesses in government-held Mogadishu — meaning the state's own commercial base pays it. This is why counterinsurgency fails: it is not funded by patrons who can be cut off, but by the economy itself.", "assess": "Al-Shabaab is the proof-of-concept for every other group on this board: a jihadist organization that became a fiscal state, taxing the very economy the government depends on. It also delivers the platform's clearest strategic warning — when ATMIS drew down before the Somali army could replace it, 'liberated' territory fell within months. That is a lesson with direct bearing on every theater where a foreign force is holding a line."}, {"id": "jnim", "name": "JNIM", "full": "Jama'at Nusrat al-Islam wal-Muslimin", "affil": "al-Qaeda", "icon": "🏴", "color": "#4a9d5f", "tier": "CRITICAL", "strength": "~6,000 fighters — largest militant force in the Sahel", "theaters": ["mali", "burkina", "niger", "benin-togo", "cote-divoire", "ghana"], "mil": "Formed 2017 from the merger of Ansar Dine, Katibat Macina, Al-Mourabitoun, Ansarul Islam, and AQIM's Sahara branch. Doubled its attack tempo in 2025 vs 2024. Burkina Faso alone recorded 280+ JNIM attacks in H1 2025. Structured in three tiers — central leadership, regional commanders, local area commanders — anchored by a Majlis al-Shura that sets strategy and approves high-value operations. Now pressing southward toward the Gulf of Guinea littoral: a new senior leader (Sekou Muslimu) was appointed to expand into Benin, Côte d'Ivoire, Ghana, Niger, and Togo, with a separate emir for Benin. Carried out its first documented attack in Nigeria (Oct 2025, Kwara State).", "log": "A 'franchise model' — local autonomy under central strategic oversight, adapting taxation and recruitment to regional conditions. Mines double as logistics hubs: recruitment grounds, weapons-storage sites, and staging points. Cross-border mobility across the Mali-Burkina-Niger tri-border and now into the coastal states. Sanctioned commanders coordinate specific functions (Sidan ag Hitta ran Western-hostage negotiations; Jafar Dicko oversaw Burkina kidnappings via Ansarul Islam).", "eco": "A war economy worth roughly $100M+/yr — the wealthiest al-Qaeda affiliate after al-Shabaab. FOUR PILLARS: (1) ARTISANAL GOLD — the most profitable sector. JNIM doesn't dig; it controls the chokepoints (road to the mine, road from it, the riverbank where ore is washed, the market where it's sold) and levies a toll at each. Sites under its influence produce up to 725kg/yr (~$34M), exported to the UAE, Turkey, and Switzerland. Over 2,000 miners work the N'Abaw goldfields in Mali. It undercuts pro-government militias on price, building legitimacy. (2) KIDNAPPING — 845 of 1,100 recorded Sahel abductions (2017-23). Local businessmen fetch $3,000-5,000; foreigners can command millions (a member of Dubai's ruling family reportedly yielded $20M+). Kidnappings spike on first entering an area — to intimidate, gather intelligence, and remove local authority figures — then shift to forced recruitment of skilled workers (doctors, nurses). (3) CATTLE RUSTLING — men on motorbikes force Fulani herders to surrender livestock; the cattle are trucked to markets in Ghana, Mali, or Senegal and blended into legitimate stock. A single cow sells for ~$346 in a country where annual GDP per capita is under $3,000. (4) MONEY LAUNDERING + ECONOMIC WARFARE — lends to merchants, underwrites shops, uses formal banking; assassinates those who interfere with its investments. Systematically attacks foreign (esp. Chinese-run) mining sites — Narena, Morila — as a racketeering campaign to extort operators and delegitimize the state. Notably, little evidence of crypto adoption, unlike ISWAP.", "assess": "JNIM is the platform's most economically sophisticated non-state actor and the clearest proof of the extraction thesis: it does not need to own the gold, only to tax every chokepoint between the ore and the market. Its southward push toward the Gulf of Guinea is the single most important trend line in West Africa — it threatens to convert the Sahel's landlocked insurgency into a coastal one with access to ports."}, {"id": "iswap", "name": "ISWAP", "full": "Islamic State West Africa Province", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "CRITICAL", "strength": "Largest IS affiliate in Africa (US State Dept)", "theaters": ["nigeria", "cameroon", "niger", "lakurawa"], "mil": "Formed March 2015 when Boko Haram's Shekau pledged allegiance to IS; split from him over indiscriminate violence, defeated his faction in 2021, and absorbed many of his fighters. Carried out 500+ attacks in Borno State between January and October 2025. Drone attacks rose from 1 (2024) to 7 (2025). Reinforced its Gargash and Sambisa bases with ~100 additional trained fighters each and elevated Sambisa to a formal IS administrative province headed by a wali — a shift toward territorial governance. Active cells in Kogi, Zamfara, Sokoto, and Katsina states, plus Cameroon's Far North, Niger's Diffa, and Chad's Lac province.", "log": "Controls many of the hundreds of islands in Lake Chad — the rear base, logistics hub, and staging ground for attacks across all four basin countries. Captures and redeploys government heavy weapons (IS pays reward bounties for equipment seized from the Nigerian military). Rising leadership weight inside global IS: after the death of IS deputy Abu Khadija (Iraq, Mar 2025), West Africa's al-Furqan office head took a more prominent role, possibly heading IS's General Directorate of Provinces — meaning West Africa is now a command center, not a periphery.", "eco": "THE SIGNATURE STATISTIC: ISWAP's taxation take is roughly $191 MILLION — against Borno State's entire 2024 revenue of $18.4 million. The jihadist group out-taxes the government it fights by more than 10 to 1. And that figure excludes revenue from elsewhere in Nigeria, kidnapping proceeds, and IS bounty payments for captured military equipment. Broader analyses put total taxation revenue well over $100M/yr, sustaining operations across Niger, Chad, Mali, and Burkina Faso — effectively making Nigeria the financial hub of the wider IS network. The model: taxation of farming, fishing, herding, and trade routes; some services provided free (water, boats, basic healthcare) to build legitimacy — but rates are arbitrary and set at leaders' discretion, 'creating opportunities for abuse.' A fisherman in ISWAP waters without proof of payment can be flogged to death; a fish dealer who refuses loses his shipment, his life, or is abducted; herders face arbitrary cattle taxes that can wipe them out. Entire communities have been massacred for non-payment. ISWAP has experimented with cryptocurrency (Tether). US sanctions have targeted its financing architecture — including Lagos and Kano bureaux de change — and a joint US-Nigerian operation killed Abu-Bilal al-Minuki, the architect of ISWAP's financing.", "assess": "ISWAP is the most important counter-example to the idea that jihadist groups are merely destructive: it is a functioning parallel state with a revenue base ten times its government rival's. That fiscal asymmetry — not battlefield strength — is why it cannot be dislodged. It is also the connective tissue of the Lake Chad Basin, operating across Nigeria, Cameroon, Niger, and Chad simultaneously, which is precisely why the platform now tracks Cameroon."}, {"id": "boko-haram", "name": "Boko Haram (JAS)", "full": "Jama'atu Ahlis Sunna Lidda'awati wal-Jihad", "affil": "Independent (ex-IS)", "icon": "🏴", "color": "#8c4a9d", "tier": "SEVERE", "strength": "Diminished vs ISWAP but resurgent in capability", "theaters": ["nigeria", "cameroon", "lakurawa"], "mil": "The original Lake Chad insurgency. Lost the intra-jihadist war to ISWAP (Shekau killed himself in May 2021 during an ISWAP assault) but remains lethal and is closing the capability gap: in the March 2025 Wulgo attack on a Cameroonian base it killed 20 soldiers and SEIZED Soviet-made ZSU-23-4 Shilka radar-guided anti-aircraft guns, and it now employs explosive-laden drones. Distinguished from ISWAP by indiscriminate violence against Muslim civilians — the very issue that caused the 2016 split.", "log": "Operates from Lake Chad and Sambisa remnant areas; cross-border raids into Cameroon's Far North (Mayo-Tsanaga, Mayo-Sava, Logone-et-Chari). Captured government heavy weaponry is now a meaningful part of its arsenal, and drone acquisition marks a step-change. Cooperates opportunistically with Lakurawa in the northwest.", "eco": "Kidnap-for-ransom is the core earner — a Boko Haram-linked group netted ~$500,000 for a single judge. Nigeria's abduction economy is vast: 4,722 people taken in 997 incidents between July 2024 and June 2025, with ~$1.66M in ransoms paid and 762 victims killed. Also relies on raiding, cattle theft, and extortion of farming and fishing communities. Less sophisticated than ISWAP's taxation state — more predatory, less governmental — which is why it commands less territory but remains violent.", "assess": "Boko Haram is the cautionary tale about 'defeated' groups: militarily eclipsed by ISWAP, yet it just seized radar-guided anti-aircraft systems and fields attack drones. Its resurgence is the clearest driver of the new Cameroon theater."}, {"id": "issp", "name": "ISSP / IS-Sahel", "full": "Islamic State Sahel Province", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "SEVERE", "strength": "JNIM's principal rival in the Sahel", "theaters": ["niger", "mali", "burkina", "lakurawa"], "mil": "The Islamic State's Sahel arm and JNIM's direct competitor — the two fight each other as well as the states. Concentrated in the Mali-Niger-Burkina tri-border. Increasingly linked to the northwest Nigeria corridor: the UN reports IS-Sahel fighters operating in Nigeria's rear zones and working to connect with ISWAP.", "log": "Tri-border sanctuary; rear bases now extending into northwest Nigeria via the Lakurawa corridor. The strategic objective is a contiguous IS space linking the Sahel to the Lake Chad Basin.", "eco": "Shifted toward high-value foreign abductions to raise cash — in early 2025 it conducted or sponsored the kidnapping of six foreign nationals, including an Austrian woman in Agadez and four Moroccan truck drivers in Burkina Faso. ACLED assesses the shift is 'driven by the group's need for resources, given that foreigners command higher ransom fees than local abductees.' Also taxes gold sites and trade routes in its zones, competing directly with JNIM for the same revenue base.", "assess": "ISSP matters most as the other half of a two-front jihadist competition: JNIM and ISSP fight each other for the same taxation base, which sometimes slows both — but their rivalry is also what drives expansion into new territory, including the Nigerian northwest."}, {"id": "lakurawa", "name": "Lakurawa", "full": "Lakurawa (NW Nigeria tri-border)", "affil": "Hybrid jihadist-criminal", "icon": "🏴", "color": "#d4884a", "tier": "ELEVATED", "strength": "Tri-border hybrid; the ISSP-ISWAP conduit", "theaters": ["lakurawa", "nigeria", "niger", "benin-togo"], "mil": "Emerged ~2017-18 from a merger of Malian Macina/JNIM-linked Fulani fighters and a Nigerien herder self-defense faction — invited by Sokoto communities to fight bandits, then turned predatory. Declared a terrorist group by Nigeria (Nov 2024/Jan 2025). Hit by US airstrikes on Christmas Day 2025 (Sokoto/Bauni Forest camps). Massacred 162 civilians in Woro and Nuku, Kwara State (Feb 2026), after villagers refused to let it preach. Expanding south into Niger State's Borgu axis. Leader Amir Tajudeen moves between Nigeria, Niger, Mali, and Chad.", "log": "Sanctuary in the ungoverned Nigeria-Niger-Benin tri-border. ISS assesses it functions as a STRATEGIC CONDUIT — the link connecting the Sahel's IS/AQ franchises (ISSP, JNIM) toward Nigeria and the Gulf of Guinea. Cooperates with both Boko Haram/JAS and ISWAP. Niger's post-2023-coup tension with Nigeria blocks the joint operations needed to close the corridor.", "eco": "Governance-through-extraction across roughly 500 villages: coercive 'zakat' taxation, livestock confiscation, produce seizure, and a forced religious code, with rival vigilantes suppressed. High-value kidnapping demonstrates cross-border financial reach — the Kebbi deputy speaker was ransomed for ~$140,600, partly paid in CFA francs. The crime-terror nexus makes it self-financing and less dependent on external patrons than the larger franchises.", "assess": "Lakurawa's significance is structural, not its size: it is the seam. If the Sahel's jihadist economy and Lake Chad's taxation state ever fully connect, Lakurawa is the corridor through which it happens — which is why US airstrikes came to northwest Nigeria."}, {"id": "rsf", "name": "RSF", "full": "Rapid Support Forces", "affil": "State-backed paramilitary", "icon": "⚔", "color": "#d43d3d", "tier": "CRITICAL", "strength": "Genocide-designated; controls Darfur + besieging Kordofan", "theaters": ["sudan"], "mil": "Descended from the Janjaweed militias that killed as many as 400,000 in Darfur two decades ago. The US State Department has FORMALLY DETERMINED the RSF is committing genocide — murdering men and boys and systematically raping women and girls on ethnic grounds. El Fasher fell in October 2025 with ~6,000 killed in the first three days. The identical siege is now closing on El Obeid, where ~500,000 civilians are trapped. Fields drones supplied via its patron network.", "log": "THE UAE PIPELINE — the platform's best-documented external-supply chain. Arms flow from UAE bases to Amdjarass in Chad (officially a 'field hospital'; UN investigators found 'credible evidence' it was an arms-transfer front), then into RSF-held Sudan. Chad allows the transit in exchange for ~$2B in Emirati loans (2023-24). Alternative routes run through Libya (al-Kufra) and, increasingly, Ethiopia. In January 2026 Egypt, Saudi Arabia, and Somalia began denying the UAE overflight permission, squeezing the network and making Chad more vital.", "eco": "GOLD. Sudan is one of Africa's largest gold producers and most of its gold flows to Dubai — the UAE officially imported 39 tons in 2022, with perhaps another 60 tons smuggled via Chad, Egypt, and Ethiopia. The war has only increased the smuggling, letting the RSF (and the SAF) trade gold for weapons. This is the purest gold-for-guns economy on the platform, and it is why the UAE's patronage persists despite the genocide determination.", "assess": "The RSF is the clearest case in the platform of an armed group functioning as the delivery mechanism for someone else's extraction: it fights, and the gold flows to Dubai. Senator Sanders has now named the UAE directly as having 'financed and enabled this genocide for years' — while it remains a US 'major defense partner.'"}, {"id": "m23", "name": "M23 / AFC", "full": "March 23 Movement / Alliance Fleuve Congo", "affil": "Rwanda-backed", "icon": "⚔", "color": "#4a7dc7", "tier": "SEVERE", "strength": "Holds Goma + Bukavu; Rwanda-equipped", "theaters": ["drc"], "mil": "Rwanda-backed rebel coalition that seized Goma and Bukavu in early 2025 — the most significant territorial conquest in the eastern DRC in a generation. Under US pressure it fully withdrew from Uvira in South Kivu, but the Washington and Doha peace processes remain fragile and the African Union is trying to reassert a facilitation role.", "log": "Direct Rwandan Defence Force support (troops, equipment, command) — documented repeatedly by UN Group of Experts panels despite Kigali's denials. Supply lines run across the Rwandan border.", "eco": "COLTAN AND COBALT. The eastern DRC holds the world's critical-minerals prize, and M23's territorial control sits atop it. Minerals are smuggled through Rwanda and enter global supply chains laundered as Rwandan-origin — the mechanism by which a country with modest deposits became a significant coltan exporter. This is the extraction thesis in its most literal form: the conflict is the mechanism, the minerals are the point, and the end user is the global electronics and EV supply chain.", "assess": "M23 is the DRC theater's engine and the platform's most direct link between an armed group and the critical-minerals system. Every EV battery and smartphone touches this war somewhere upstream."}, {"id": "al-shabaab-moz", "name": "Al-Shabaab (Mozambique)", "full": "Ahlu Sunnah Wa-Jama (ISIS-Mozambique)", "affil": "Islamic State", "icon": "🏴", "color": "#c74545", "tier": "ELEVATED", "strength": "Persistent in Cabo Delgado despite Rwandan/SADC forces", "theaters": ["mozambique"], "mil": "An ISIS-linked insurgency in gas-rich Cabo Delgado since 2017 — locally called 'Al-Shabaab' but unrelated to Somalia's. Over 6,400 killed, 1.3 million displaced. The 2021 Palma attack (~800 dead) froze the LNG megaprojects. Rwandan and SADC forces secured the Afungi enclave, enabling TotalEnergies' January 2026 restart, but the insurgency persists in the north with beheadings and kidnappings.", "log": "Rural sanctuary in northern Cabo Delgado, outside the secured 'closed enclave' around the gas site. The enclave model protects the $20B project while leaving surrounding communities exposed — a security architecture built around capital, not people.", "eco": "Gas-adjacent grievance rather than a taxation state. The insurgency was triggered in part by the gas discovery itself and the conviction among Cabo Delgado's population — over 80% below the poverty line — that they would be excluded from the benefits. It funds itself through raiding, kidnapping, and local extortion rather than a sophisticated revenue architecture.", "assess": "This group exists because of extraction, not despite it: a resource discovery generated an insurgency, foreign troops secured the enclave, foreign majors take the gas, and the local population bears the cost. It is the platform's cleanest extraction-conflict causal chain."}];
const BLOCS = [{"id": "aes-ecowas", "name": "AES vs ECOWAS", "icon": "⬡", "color": "#d4884a", "what": "The Sahel's rupture with West Africa's regional order", "sideA": "AES (Alliance of Sahel States): Mali, Burkina Faso, Niger — military juntas, exited ECOWAS (Jan 2025), formed a mutual-defense confederation", "sideB": "ECOWAS: Nigeria, Ghana, Senegal, Côte d'Ivoire + the coastal states — plus France/EU backing", "contest": "Sovereignty and security orientation. The AES states expelled French forces, turned to Russia's Africa Corps, and rejected ECOWAS's democratic-restoration demands. ECOWAS lost its leverage — sanctions failed, and the juntas consolidated.", "faultline": "The jihadist insurgency doesn't respect the split: JNIM and ISSP operate across both blocs and are now pushing south into ECOWAS coastal states (Benin, Togo, Côte d'Ivoire, Ghana). The rupture destroyed the cross-border cooperation needed to fight them — Niger's coup broke joint operations with Nigeria, which is precisely why the Lakurawa corridor stays open. · INFORMATION WAR: the fault line is now being exploited by coordinated coup-disinformation campaigns targeting Côte d'Ivoire — the region's key French-aligned economy — fabricating a military takeover to manufacture the appearance of AES-style rupture. Ivorian authorities call it 'a deliberate and coordinated disinformation campaign'; analysts describe a broader push promoting coups across West Africa. Attribution unresolved.", "theaters": ["mali", "burkina", "niger", "benin-togo", "lakurawa", "nigeria", "ghana", "cote-divoire"]}, {"id": "gulf-rivalry", "name": "The Gulf Rivalry", "icon": "⬡", "color": "#c74545", "what": "UAE vs Qatar/Saudi/Turkey/Egypt — fought through African proxies", "sideA": "UAE: backs the RSF (Sudan), Abiy's Ethiopia, Haftar's Libya; buys the gold", "sideB": "Saudi Arabia, Egypt, Turkey, Qatar, Iran: back Sudan's SAF; Egypt aligns with Eritrea vs Ethiopia", "contest": "Red Sea and Horn primacy, ports, gold, and agricultural land. The UAE has become the single most important foreign power keeping the RSF in the fight — arms via Amdjarass (Chad) and Libya — while Egypt, Saudi Arabia, and Turkey back the army. Egypt's rivalry with Ethiopia over the GERD dam pulls the Nile into the same contest.", "faultline": "Sudan is the battlefield, but the fault line runs through Chad (which takes ~$2B in UAE loans to permit the arms transit), Libya (the al-Kufra route), and Ethiopia (a UAE-financed RSF training camp near the GERD, per Reuters). In January 2026, Egypt, Saudi Arabia, and Somalia began denying the UAE overflight rights — an escalation of the proxy war into airspace denial. Somalia CANCELLED all bilateral UAE agreements (Jan 2026) over the RSF pipeline — while the UAE simultaneously patronizes Puntland with airstrikes. The same Red Sea port strategy drives both.", "theaters": ["sudan", "ethiopia", "chokepoints", "iran-us", "somalia"]}, {"id": "russia-africa", "name": "Russia's Africa Corps", "icon": "⬡", "color": "#8c4a9d", "what": "The post-Wagner state takeover of Russian influence in Africa", "sideA": "Russia (Africa Corps, MoD-controlled): Mali, Burkina, Niger, CAR, Libya", "sideB": "France (expelled), the EU, the US — the displaced Western security architecture", "contest": "Regime survival services in exchange for mining concessions and diplomatic alignment. Russia offers what the West won't: no governance conditions. In return it takes gold and mineral rights and gains UN votes.", "faultline": "The security results are poor — jihadist violence rose after Russian deployment in Mali and Burkina — but the political bargain holds because it's about regime survival, not counter-terrorism. Meanwhile Russia's DPRK alliance (troops and shells for the Ukraine war) shows the same logic operating globally: patrons who ask no questions.", "theaters": ["mali", "burkina", "niger", "ukraine", "korea"]}, {"id": "minerals-cold-war", "name": "The Minerals Cold War", "icon": "⬡", "color": "#4a9d5f", "what": "China's processing monopoly vs the Western de-risking bloc", "sideA": "China: ~90% of rare-earth processing, dominant in DRC cobalt (CMOC), Indonesian nickel JVs, Kazakh reactors (CNNC); buys Myanmar's heavy-REE feedstock", "sideB": "US/EU/G7 ('Pax Silica'): IRA/CRMA de-risking, the DRC EGC/Trafigura deal, Kazakh/Ukrainian minerals agreements, Middle Corridor investment", "contest": "Not the mines — the PROCESSING and the chokepoints. China's leverage is that it refines what everyone else digs. The Western counter is to build parallel supply chains, but it has forfeited key ground: the US 'wasn't even in the room' for Kazakhstan's reactor bids, and Indonesia's export ban handed downstream capacity largely to Chinese firms.", "faultline": "Every conflict theater with a mineral is a front: Myanmar (KIA controls ~94% of China's heavy-REE feedstock), DRC (M23 sits on the coltan), Indonesia (nickel), Kazakhstan (uranium), Ukraine (the minerals deal). The Caucasus TRIPP corridor is the connectivity front — a US-controlled route bypassing Russia and Iran.", "theaters": ["myanmar", "drc", "indonesia", "kazakhstan", "taiwan", "caucasus", "ukraine", "geopolitical"]}, {"id": "donroe", "name": "The Donroe Doctrine", "icon": "⬡", "color": "#e0a030", "what": "US hemispheric reassertion — Venezuela, Cuba, Colombia, Haiti", "sideA": "US: captured Maduro (Jan 2026), administers Venezuelan oil, sanctions Cuba, architected Haiti's GSF, aligns with Colombia's incoming Espriella government", "sideB": "China, Russia, Cuba, Nicaragua — plus Petro's outgoing Colombia; China/Russia/Pakistan abstained on the Haiti mandate", "contest": "Hemispheric primacy and resources — Venezuelan oil now flows through an opaque Qatari account under US administration; Cuba is being strangled into 100+ market reforms.", "faultline": "The tell is Haiti: the US architected and financed the Gang Suppression Force but kept it AFRICAN-LED by design — Chad (1,500), Benin (up to 2,000), Bangladesh, Mongolia — stabilizing the hemisphere without US boots. The same Chad simultaneously hosts the UAE's RSF arms pipeline. Colombia's incoming government will close its Havana and Managua embassies, tightening the ring.", "theaters": ["venezuela", "cuba", "colombia", "haiti", "mexico", "jamaica"]}, {"id": "sanctions-bloc", "name": "The Sanctions Bloc", "icon": "⬡", "color": "#5b9bd5", "what": "Iran-Russia-DPRK-Venezuela-Cuba: the mutual-survival network", "sideA": "Iran, Russia, North Korea, Venezuela, Cuba — sanctioned states trading with each other", "sideB": "The US-led sanctions architecture + the G7 financial system", "contest": "Survival outside the dollar system. Russia supplies DPRK with tech/energy/food for troops and shells; Iran supplied Russia with drones; DPRK's tungsten exports to China rose 13-fold; Venezuela's oil moves through opaque channels.", "faultline": "The Hormuz crisis is the sharpest edge — Iran is enforcing a transit regime (IRGC authorization, 'maritime service fees') that would be a permanent revenue stream and a permanent lever. New Supreme Leader Mojtaba Khamenei has enshrined 'the lever of closing the Strait of Hormuz' as strategic doctrine. Sanctions-evasion gold (Russia, Sudan) and DPRK coal move through the same shadow networks.", "theaters": ["iran-us", "ukraine", "korea", "venezuela", "cuba", "chokepoints", "sudan"]}, {"id": "indo-pacific", "name": "First Island Chain", "icon": "⬡", "color": "#4a7dc7", "what": "US alliance system vs Chinese expansion in the Western Pacific", "sideA": "US, Japan, ROK, Philippines, Australia, Taiwan — treaty alliances + AUKUS", "sideB": "China (+ Russia and DPRK as the northern anchor)", "contest": "Taiwan (~90% of advanced chips) and the South China Sea ($3.4T trade artery). China's gray-zone tactics — coast guards, water cannon, ramming — are calibrated to stay below the US Mutual Defense Treaty tripwire.", "faultline": "The alliance is showing strain: the US curtailed intelligence sharing with Seoul after a lawmaker exposed the Kusong enrichment site, and the Russia-DPRK war alliance (troops for tech) has converted a frozen Korean standoff into a live node of the Ukraine war. Myanmar's rare earths flow into the same Chinese supply chain that the Taiwan contest is ultimately about.", "theaters": ["taiwan", "south-china-sea", "korea", "myanmar", "indonesia"]},{"id":"saudi-axis","name":"The Saudi-Led Axis","icon":"☪","color":"#4cc98a","what":"Saudi Arabia + Qatar + Turkey + Pakistan + Egypt — a post-Iran-war security bloc meeting at quarterly FM level (Cairo, Jun 21 2026), dubbed an 'Islamic NATO' in Israeli reports. Pakistan's nuclear arsenal underpins it via the Saudi-Pakistani defense framework; Turkey brings NATO's second army and the KAAN fighter (Saudi SAMI co-invested); Qatar brings money and mediation; Egypt brings 438k troops.","contest":"Twin objectives that don't fully cohere: contain IRAN (and reclaim influence in Syria/Lebanon from its proxies) while also capping ISRAEL's 'military adventurism' — the Doha strike convinced Gulf capitals that 'we could be next.' Members split on whether to normalize with Israel or brace against it.","faultline":"The UAE is conspicuously EXCLUDED — Riyadh-Abu Dhabi mistrust now has institutional form, with both competing for the same post-oil investment. The deeper premise (Chatham House, May 2026): Gulf states 'should no longer rely on America for security guarantees' — and China won't fill the vacancy. The axis is what hedging looks like when the umbrella wobbles.","theaters":["saudi","turkey","pak-afg","egypt","uae-gulf","iran-us","syria","lebanon"]}];

  if((d.gov||[]).some(g=>(g.src+' '+g.detail).toLowerCase().includes(s))) hits.push('gov');
  if((d.leverage||[]).some(l=>(l.actor+' '+l.asset).toLowerCase().includes(s))) hits.push('leverage');
  if((d.econlev||[]).some(e=>(e.holder+' '+e.channel+' '+e.detail).toLowerCase().includes(s))) hits.push('econ');
  if((d.external||[]).some(x=>(x.actor+' '+x.side+' '+x.flow+' '+x.for).toLowerCase().includes(s))) hits.push('external');
  // systems: does this theater appear as a node in a matching system, or does a system match by name?
  (typeof SYSTEMS!=='undefined'?SYSTEMS:[]).forEach(sys=>{
    const sysText=(sys.name+' '+sys.type+' '+sys.summary+' '+sys.significance).toLowerCase();
    const nodeHit=(sys.nodes||[]).some(n=>n.theater===d.id && sysText.includes(s));
    const nameHit=(sys.nodes||[]).some(n=>n.theater===d.id) && sysText.includes(s);
    if(nodeHit||nameHit) hits.push('system');
  });
  (typeof INVEST!=='undefined'?INVEST:[]).forEach(inv=>{
    const invText=(inv.commodity+' '+inv.use+' '+inv.chokehold+' '+inv.signal+' '+inv.vectors).toLowerCase();
    if((inv.theaters||[]).includes(d.id) && invText.includes(s)) hits.push('investment');
  });
  (typeof GROUPS!=='undefined'?GROUPS:[]).forEach(g=>{
    const gText=(g.name+' '+g.full+' '+g.affil+' '+g.military+' '+g.logistics+' '+g.economy+' '+g.note).toLowerCase();
    if((g.theaters||[]).includes(d.id) && gText.includes(s)) hits.push('group');
  });
  (typeof BLOCS!=='undefined'?BLOCS:[]).forEach(b=>{
    const bText=(b.name+' '+b.arena+' '+b.members+' '+b.contest+' '+b.fault).toLowerCase();
    if((b.theaters||[]).includes(d.id) && bText.includes(s)) hits.push('bloc');
  });
  return hits;
}
function matches(d){ return matchWhere(d).length>0; }
function fdb(){
  let d=DB.filter(matches);
  if(subFlt!=='all')d=d.filter(x=>x.subregion===subFlt);
  if(flt==='critical')return d.filter(x=>x.sev==='critical');
  if(flt==='escalating')return d.filter(x=>x.trend==='up');
  if(flt==='deescalating')return d.filter(x=>x.trend==='dn');
  if(flt==='africa')return d.filter(x=>AFRICA.includes(x.subregion));
  if(flt==='latam')return d.filter(x=>['South America','Caribbean','North America'].includes(x.subregion)&&x.id!=='us-politics');
  if(flt==='conflict')return d.filter(x=>x.tclass==='conflict');
  if(flt==='watch')return d.filter(x=>x.tclass==='watch');
  return d;
}

    +sec('CHANGELOG \u00b7 RECENT BUILDS','<b>v58</b> Jul 17 sweep (6th-night strikes, blockade metrics, Fedorov firing); inline source links (refs); freshness-decay stamps; Watchlist TRIPPED tier \u00b7 <b>v58</b> cited-history standard complete 55/55 \u00b7 <b>v52</b> Asia histories \u00b7 <b>v51</b> week-rollover fix + rollweek tool + Europe/Eurasia histories \u00b7 <b>v50</b> full audit (7 sparkline desyncs fixed, tier-anchor doc corrected) \u00b7 <b>v48-49</b> Watchlist board + Middle East histories \u00b7 <b>v47</b> Markets live catalysts \u00b7 <b>v44-46</b> history layer 55/55, Africa citations, Jul 15-16 sweeps \u00b7 <b>v43</b> three dead boards recovered (Method/Systems/Patrons), board() arg fix')
    +sec('KNOWN LIMITS',
      '<b>Reconciliation risk (found and fixed, Jul 17 2026):</b> the History layer was authored from model knowledge while the news layer is swept from live reporting — the two can drift apart. An audit found Venezuela’s history still describing Maduro in the present tense as ‘a ruler who won’t leave’ months after a US raid captured him (3 Jan 2026); the timeline, actors and roots were corrected and an unverified casualty figure (4,333 quake dead) was withdrawn in favour of sourced reporting (~1,450). A cross-theater consistency scan found no other case. This class of error is now checked at sweep time. One analyst-AI pipeline, not a newsroom: single-point judgment on index scores; web-search source pool skews English-language; back-histories on newer theaters are estimates; freshness varies by theater (see stamps). The platform is a structured argument about the world, and its method is printed here so the argument can be checked.'));
}
function openBlocs(){
  document.getElementById('ovTitle').textContent='\u2b21 BLOCS \u0026 ALIGNMENTS \u00b7 THE STRUCTURAL FAULT LINES';
  document.getElementById('overlay').classList.add('show');
  const nm=id=>{const t=DB.find(x=>x.id===id);return t||{flag:'\u25cf',name:id};};
  document.getElementById('ovScroll').innerHTML=`
    <div class="inv-lead">Not a map of all diplomacy \u2014 only the structural alignments that actually explain the conflicts on this board. Each bloc shows who is on each side, what is genuinely being contested, and the fault line where it breaks. These are the \u201cwhy\u201d behind the external-actor flows tracked in every theater.</div>
    ${BLOCS.map(b=>`
    <div class="blc-card">
      <div class="blc-name">${b.icon} ${b.name}</div>
      <div class="blc-what">${b.what.toUpperCase()}</div>
      <div class="blc-sides">
        <div class="blc-side blc-a"><span class="blc-lbl">SIDE A</span>${b.sideA}</div>
        <div class="blc-side blc-b"><span class="blc-lbl">SIDE B</span>${b.sideB}</div>
      </div>
      <div class="blc-row"><div class="blc-k">WHAT'S ACTUALLY CONTESTED</div><div class="blc-v">${b.contest}</div></div>
      <div class="blc-fault"><div class="blc-k">\u26a0 FAULT LINE</div><div class="blc-v">${b.faultline}</div></div>
      <div class="blc-row"><div class="blc-k">THEATERS \u00b7 TAP TO OPEN</div><div class="inv-theaters">${b.theaters.map(id=>{const t=nm(id);return `<span class="inv-th-chip" onclick="closeOverlay();pick('${id}')">${t.flag||'\u25cf'} ${t.name?t.name.split('\u2014')[0].trim():id}</span>`;}).join('')}</div></div>
    </div>`).join('')}`;
}


function openContested(){
  const withC=DB.filter(d=>d.contested&&d.contested.claims&&d.contested.claims.length).sort((a,b)=>b.esc-a.esc);
  const none=DB.filter(d=>d.contested&&(!d.contested.claims||!d.contested.claims.length));
  // tally statuses
  const tally={};
  withC.forEach(d=>d.contested.claims.forEach(c=>{const k=c.status.split('\u2014')[0].trim();tally[k]=(tally[k]||0)+1;}));
  const nClaims=Object.values(tally).reduce((a,b)=>a+b,0);
  const chips=Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<span class="ct-st ${stCls(k)}" style="margin:0 5px 5px 0">${k} \u00b7 ${v}</span>`).join('');
  const cards=withC.map(d=>`
    <div class="ctb-card" onclick="closeOverlay();pick('${d.id}')">
      <div class="ctb-head">
        <div class="ctb-n">${d.flag||''} ${d.name}</div>
        <div class="ctb-e ${d.esc>=90?'e-crit':(d.esc>=75?'e-sev':'e-elev')}">${d.esc}</div>
      </div>
      <div class="ctb-sum">${d.contested.summary}</div>
      ${d.contested.claims.map(c=>`<div class="ctb-cl">
        <span class="ct-st ${stCls(c.status)}">${c.status.split('\u2014')[0].trim()}</span>
        <div class="ctb-ct">${c.claim}</div>
      </div>`).join('')}
    </div>`).join('');
  board('\u25c9 CONTESTED \u00b7 THE NARRATIVE WAR',
    `<div class="intro-note">Where the story and the ground don't match. Every claim is scored on what the evidence actually supports \u2014 not on who said it. <b>${withC.length} of ${DB.length} theaters</b> carry an active narrative war (${nClaims} contested claims). The other ${none.length} are marked as having none: <b>the absence of an information operation is itself a finding</b>, so it is stated rather than left blank.</div>
     <div class="ctb-tally">${chips}</div>
     ${cards}
     <div class="ctb-clean"><div class="ctb-ch">\u2713 NO SIGNIFICANT NARRATIVE WAR (${none.length})</div>
       <div class="ctb-cl2">${none.map(d=>`<span class="grp-th" onclick="closeOverlay();pick('${d.id}')">${d.flag||''} ${d.name.split('\u2014')[0].trim()}</span>`).join('')}</div></div>`);
}
function openMovers(){
  const real=DB.filter(d=>d.hist_real!==false);
  const seeded=DB.filter(d=>d.hist_real===false);
  const wd=d=>{const h=d.esc_history;return h[h.length-1]-h[h.length-2];};
  const up=real.filter(d=>wd(d)>0).sort((a,b)=>wd(b)-wd(a));
  const dn=real.filter(d=>wd(d)<0).sort((a,b)=>wd(a)-wd(b));
  const fl=real.filter(d=>wd(d)===0).sort((a,b)=>b.esc-a.esc);
  const row=d=>{const x=wd(d);const s=x>0?'+'+x:(x<0?''+x:'0');
    return `<div class="mv-row" onclick="closeOverlay();pick('${d.id}')">
      <div class="mv-d ${x>0?'mv-up':(x<0?'mv-dn':'mv-fl')}">${s}</div>
      <div class="mv-n">${d.flag||''} ${d.name}</div>
      <div class="mv-e">${d.esc}</div></div>`;};
  const srow=d=>`<div class="mv-row mv-seed" onclick="closeOverlay();pick('${d.id}')">
      <div class="mv-d mv-est">EST</div>
      <div class="mv-n">${d.flag||''} ${d.name}</div>
      <div class="mv-e">${d.esc}</div></div>`;
  board('\u21c5 MOVERS \u00b7 WEEK-OVER-WEEK',
    `<div class="intro-note">Ranked by change since last week. <b>Only theaters with real tracked history appear in the movement columns</b> \u2014 newly-seeded theaters have estimated back-history and cannot show meaningful deltas, so they are listed separately below rather than polluting the signal.</div>
     <div class="mv-sec"><div class="mv-h mv-hu">\u25b2 ESCALATING (${up.length})</div>${up.map(row).join('')||'<div class="mv-empty">None this week.</div>'}</div>
     <div class="mv-sec"><div class="mv-h mv-hd">\u25bc EASING (${dn.length})</div>${dn.map(row).join('')||'<div class="mv-empty">None this week.</div>'}</div>
     <div class="mv-sec"><div class="mv-h mv-hf">\u2014 HOLDING (${fl.length})</div>${fl.map(row).join('')}</div>
     <div class="mv-sec"><div class="mv-h mv-hs">\u25c8 NOT YET TRACKABLE (${seeded.length}) \u00b7 estimated back-history</div>
       <div class="mv-note">These theaters entered tracking recently. Their 10-week curves are analyst estimates, not observed movement \u2014 so no delta is claimed until two real weeks accumulate.</div>
       ${seeded.map(srow).join('')}</div>`);
}
function buildKML(data){
  const cm={military:'ff4e56e2',political:'fff07f9a',economic:'ff8ac94c',energy:'ff30a0e0',strategic:'ffd59b5b'};
  const ic={military:'red',political:'purple',economic:'grn',energy:'wht',strategic:'ltblu'};
  const st=Object.keys(cm).map(k=>`<Style id="s-${k}"><IconStyle><color>${cm[k]}</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/paddle/${ic[k]}-circle.png</href></Icon></IconStyle><LabelStyle><scale>.7</scale></LabelStyle></Style>`).join('');
  const bs=grp(data,'subregion');
  const folders=SUBS.filter(s=>bs[s]).map(sub=>`<Folder><name>${sub}</name>${bs[sub].filter(d=>!d.offmap&&d.lat!=null&&d.lon!=null).map(d=>{
    const dl=dlt(d);const ext=(d.external||[]).map(x=>`${x.actor}→${x.side} [${TIER[x.tier]}]: ${x.flow}`).join(' | ');
    return `<Placemark><name>${d.flag||''} ${d.name}${d.external?' ◆':''}</name><description><![CDATA[<b>${d.name}</b><br/>Index: ${d.esc}/100 (Δ${dstr(dl)})<br/>Status: ${SLBL[d.status]||d.status}<br/>${d.note}<br/>${ext?'<b>External:</b> '+ext:''}<br/><i>v58 · Week 16</i>]]></description><styleUrl>#s-${d.cat}</styleUrl><Point><coordinates>${d.lon},${d.lat},0</coordinates></Point></Placemark>`;
  }).join('')}</Folder>`).join('');
  return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>MERIDIAN by Leverage — Week 16</name>${st}${folders}</Document></kml>`;
}
function dl(c,n,m){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:m}));a.download=n;a.click();}
function exportKML(){dl(buildKML(fdb()),'MERIDIAN-Leverage-W16.kml','application/vnd.google-earth.kml+xml');}
function exportCSV(){
  const data=fdb();const h=['Name','Category','Subregion','Domain','Severity','Status','Index','Delta','Lat','Lon'];
  const rows=data.map(d=>[`"${d.name}"`,d.cat,`"${d.subregion}"`,`"${d.domain}"`,d.sev,SLBL[d.status]||d.status,d.esc,dstr(dlt(d)),d.lat,d.lon].join(','));
  dl([h.join(','),...rows].join('\n'),'MERIDIAN-Leverage-W16.csv','text/csv');
}
